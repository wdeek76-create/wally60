<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimers Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f12;--surface:#161a1f;--surface2:#1e2329;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#e8eaed;--muted:#7a8391;
    --accent:#27c071;--accent-dim:rgba(39,192,113,0.12);
    --red:#e84040;--red-dim:rgba(232,64,64,0.12);
    --amber:#f0a020;--amber-dim:rgba(240,160,32,0.12);
    --blue:#4a9eff;--blue-dim:rgba(74,158,255,0.12);
    --radius:8px;--radius-lg:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;}
  header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;}
  .logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;flex-shrink:0;}
  header h1{font-size:16px;font-weight:600;letter-spacing:.05em;}
  header p{font-size:11px;color:var(--muted);margin-top:2px;}
  .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 28px;}
  .tab{padding:12px 18px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.06em;text-transform:uppercase;transition:color .15s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .pane{display:none;padding:24px 28px;}
  .pane.active{display:block;}
  textarea{width:100%;height:220px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:12px;padding:14px;resize:vertical;outline:none;line-height:1.6;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--muted);}
  .btn{padding:9px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:#30d880;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
  .btn-secondary:hover{border-color:var(--text);}
  .btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,64,64,.3);}
  .parse-actions{display:flex;gap:10px;margin-top:12px;align-items:center;}
  .preview-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:20px 0 10px;}
  .bet-grid{display:flex;flex-direction:column;gap:8px;}
  .bet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;}
  .bet-card.graded-win{border-left:3px solid var(--accent);}
  .bet-card.graded-loss{border-left:3px solid var(--red);}
  .bet-card.graded-push{border-left:3px solid var(--amber);}
  .bet-card.graded-void{border-left:3px solid var(--muted);}
  .bet-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
  .sport-badge{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;}
  .sport-wnba{background:rgba(255,140,0,.15);color:#ff8c00;}
  .sport-mlb{background:rgba(74,158,255,.15);color:var(--blue);}
  .sport-nba{background:rgba(39,192,113,.15);color:var(--accent);}
  .sport-nfl{background:rgba(232,64,64,.15);color:var(--red);}
  .sport-nhl{background:rgba(74,158,255,.15);color:var(--blue);}
  .bet-game{font-size:13px;font-weight:600;color:var(--text);}
  .bet-pick{font-size:14px;font-weight:700;color:var(--accent);margin:6px 0;}
  .bet-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  .stat-val{font-size:13px;font-weight:600;}
  .stat-val.green{color:var(--accent);}
  .stat-val.amber{color:var(--amber);}
  .stat-val.blue{color:var(--blue);}
  .bet-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  .odds-pill{padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
  .stake-label{font-size:10px;color:var(--muted);text-align:right;}
  .tag-high{background:var(--accent-dim);color:var(--accent);font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;}
  .tag-sweet{background:var(--blue-dim);color:var(--blue);font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;}
  .inline-grade{display:flex;gap:4px;}
  .grade-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;font-size:11px;transition:all .15s;}
  .grade-btn:hover{color:var(--text);border-color:var(--text);}
  .grade-btn.win{background:var(--accent-dim);color:var(--accent);border-color:rgba(39,192,113,.3);}
  .grade-btn.loss{background:var(--red-dim);color:var(--red);border-color:rgba(232,64,64,.3);}
  .grade-btn.push{background:var(--amber-dim);color:var(--amber);border-color:rgba(240,160,32,.3);}
  .grade-btn.void{background:rgba(122,131,145,.1);color:var(--muted);}
  .result-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.05em;}
  .result-win{background:var(--accent-dim);color:var(--accent);}
  .result-loss{background:var(--red-dim);color:var(--red);}
  .result-push{background:var(--amber-dim);color:var(--amber);}
  .result-void{background:rgba(122,131,145,.15);color:var(--muted);}
  .unit-input{width:52px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;padding:3px 8px;outline:none;text-align:center;}
  .unit-input:focus{border-color:var(--accent);}
  /* summary cards */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
  .stat-card .sc-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .stat-card .sc-val{font-size:20px;font-weight:700;}
  .sc-val.green{color:var(--accent);}
  .sc-val.red{color:var(--red);}
  .sc-val.amber{color:var(--amber);}
  /* breakdown tables */
  .breakdown-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px;}
  .bk-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
  .bk-title{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:10px 14px 8px;border-bottom:1px solid var(--border);}
  .bk-table{width:100%;border-collapse:collapse;}
  .bk-table td{padding:7px 14px;font-size:12px;border-bottom:1px solid var(--border);}
  .bk-table tr:last-child td{border-bottom:none;}
  .bk-table td:first-child{color:var(--muted);}
  .bk-table td:nth-child(2){text-align:center;color:var(--text);}
  .bk-table td:nth-child(3){text-align:right;font-weight:600;}
  .bk-table td:nth-child(4){text-align:right;font-size:11px;}
  /* main results table */
  table{width:100%;border-collapse:collapse;}
  th{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
  td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .es-icon{font-size:40px;margin-bottom:12px;opacity:.3;}
  .section-title{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filter-row select,.results-filter{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:5px 10px;outline:none;}
  .date-group{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:8px;margin-top:16px;}
  .date-group:first-child{margin-top:0;}
  .profit-pos{color:var(--accent);font-weight:600;}
  .profit-neg{color:var(--red);font-weight:600;}
  .results-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);}
  .rtab{padding:8px 16px;cursor:pointer;font-size:11px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.06em;text-transform:uppercase;}
  .rtab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .rpane{display:none;}
  .rpane.active{display:block;}
  .toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;color:var(--text);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}
  .pl-bar-pos{display:inline-block;height:8px;background:var(--accent);border-radius:2px;vertical-align:middle;}
  .pl-bar-neg{display:inline-block;height:8px;background:var(--red);border-radius:2px;vertical-align:middle;}
</style>
</head>
<body>

<header>
  <div class="logo">D</div>
  <div>
    <h1>DIMERS PARSER</h1>
    <p>Paste · Parse · Grade · Track</p>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="parse">Parse</div>
  <div class="tab" data-tab="bets">Bet Log <span id="bet-count-badge" style="color:var(--muted);font-size:10px;"></span></div>
  <div class="tab" data-tab="results">Results</div>
</div>

<!-- PARSE TAB -->
<div class="pane active" id="pane-parse">
  <textarea id="paste-area" placeholder="Paste full Dimers best bets page text here. Sport is auto-detected from the paste (WNBA, MLB, NBA supported)."></textarea>
  <div class="parse-actions">
    <button class="btn btn-primary" onclick="parsePaste()">↯ PARSE & LOG</button>
    <button class="btn btn-secondary" onclick="document.getElementById('paste-area').value='';">Clear</button>
    <span id="parse-status" style="font-size:11px;color:var(--muted);margin-left:4px;"></span>
  </div>
</div>

<!-- BET LOG TAB -->
<div class="pane" id="pane-bets">
  <div class="filter-row">
    <select id="filter-sport" onchange="renderBetLog()">
      <option value="">All Sports</option>
      <option>WNBA</option><option>MLB</option><option>NBA</option>
    </select>
    <select id="filter-result" onchange="renderBetLog()">
      <option value="">All Results</option>
      <option value="pending">Pending</option>
      <option value="win">Win</option><option value="loss">Loss</option>
      <option value="push">Push</option><option value="void">Void</option>
    </select>
    <select id="filter-date" onchange="renderBetLog()">
      <option value="">All Dates</option>
    </select>
    <div style="margin-left:auto;display:flex;gap:8px;">
      <button class="btn btn-secondary" style="font-size:11px;padding:6px 12px;" onclick="gradeAllESPN()">⚡ AUTO-GRADE ESPN</button>
      <button class="btn btn-danger"    style="font-size:11px;padding:6px 12px;" onclick="clearAllBets()">✕ CLEAR ALL</button>
    </div>
  </div>
  <div id="bet-log-container">
    <div class="empty-state"><div class="es-icon">◈</div><p>No bets logged yet. Parse a Dimers page to get started.</p></div>
  </div>
</div>

<!-- RESULTS TAB -->
<div class="pane" id="pane-results">
  <div class="stats-row" id="summary-stats"></div>

  <div class="results-tabs">
    <div class="rtab active" data-rt="breakdown">Breakdown</div>
    <div class="rtab" data-rt="log">Bet Log</div>
  </div>

  <div class="rpane active" id="rpane-breakdown">
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <select class="results-filter" id="breakdown-sport-filter" onchange="renderResults()">
        <option value="">All Sports</option>
        <option>WNBA</option><option>MLB</option><option>NBA</option>
      </select>
    </div>
    <div id="breakdown-grid"></div>
  </div>
  <div class="rpane" id="rpane-log">
    <div class="section-header" style="margin-bottom:12px;">
      <span></span>
      <select class="results-filter" id="results-sport-filter" onchange="renderResults()">
        <option value="">All Sports</option>
        <option>WNBA</option><option>MLB</option><option>NBA</option>
      </select>
    </div>
    <div id="results-table-container">
      <div class="empty-state"><div class="es-icon">◈</div><p>No graded bets yet.</p></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'dimers_bets_v3';
let bets = [];
let parsedPreview = [];
let detectedSport = 'WNBA';

function load() { try { bets = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { bets = []; } }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); updateBadge(); }
function updateBadge() {
  const pending = bets.filter(b => !b.result).length;
  document.getElementById('bet-count-badge').textContent = bets.length ? `(${bets.length}${pending?' · '+pending+'⏳':''})` : '';
}
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// TABS
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('pane-'+t.dataset.tab).classList.add('active');
  if (t.dataset.tab==='bets') { populateDateFilter(); renderBetLog(); }
  if (t.dataset.tab==='results') renderResults();
}));

// RESULTS SUB-TABS
document.querySelectorAll('.rtab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.rtab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.rpane').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('rpane-'+t.dataset.rt).classList.add('active');
}));

// ─── UNIT CALC ────────────────────────────────────────────────────────────────
// Dogs (+odds): risk 1u to win odds/100u
// Favs (-odds): risk |odds|/100u to win 1u  e.g. -120 → risk 1.2u to win 1u
function probToAmerican(pct) {
  const p = pct / 100;
  if (p <= 0 || p >= 1) return '—';
  if (p >= 0.5) return '-' + Math.round(p / (1 - p) * 100);
  return '+' + Math.round((1 - p) / p * 100);
}

function calcStake(odds) {
  const n = parseInt(odds);
  if (isNaN(n)) return 1;
  if (n >= 0) return 1;
  return parseFloat((Math.abs(n) / 100).toFixed(4));
}

function oddsToDecimal(o) {
  const n = parseInt(o); if (isNaN(n)) return 1;
  return n > 0 ? n/100+1 : 100/Math.abs(n)+1;
}

function calcPL(b) {
  if (!b.result || b.result === 'pending') return null;
  if (b.result === 'push' || b.result === 'void') return 0;
  const stake = calcStake(b.odds);
  if (b.result === 'win') {
    const n = parseInt(b.odds);
    // win always returns 1u profit (fav) or odds/100 (dog)
    const profit = isNaN(n) ? 1 : n >= 0 ? parseFloat((n/100).toFixed(2)) : 1;
    return profit;
  }
  return -parseFloat(stake.toFixed(2));
}

function stakeDisplay(odds) {
  const n = parseInt(odds);
  if (isNaN(n)) return '1.00u risk';
  if (n >= 0) return '1.00u risk';
  return (Math.abs(n)/100).toFixed(2) + 'u risk';
}

// ─── PARSER ───────────────────────────────────────────────────────────────────
function parsePaste() {
  const raw = document.getElementById('paste-area').value;
  if (!raw.trim()) { toast('Paste some text first'); return; }

  // Auto-detect sport
  const sd = raw.match(/^(WNBA|MLB|NBA|NFL|NHL)\s+sport icon/im);
  detectedSport = sd ? sd[1].toUpperCase() : 'WNBA';

  // Truncate at "From other sportsbooks"
  const truncIdx = raw.search(/from other sportsbooks/i);
  const trimmed = truncIdx > -1 ? raw.slice(0, truncIdx) : raw;
  const lines = trimmed.split('\n').map(l => l.trim());

  const NOISE = /^(tag icon|compass star icon|compare \(\d+\)|hide|using your sportsbooks|see other bets|manage|fanduelnovic|fanduel|novig|betmgm|caesars|draftkings|bet365|betrivers|fanatics|thescore bet|hard rock bet|kalshi|polymarket|download the|search for a|filter|sort|last update|•|wnba sport icon|mlb sport icon|nba sport icon|nfl sport icon|nhl sport icon|sports|tools|dimers pro|betting|more|$)/i;
  const BOOK_RE = /^(FanDuel|DraftKings|BetMGM|Caesars|Novig|Polymarket|BetOnline|Pinnacle|Bookmaker|ProphetX|Fliff|bet365|BetRivers|Fanatics|Hard Rock Bet|Hard Rock|Kalshi|theScore Bet|theScore)$/i;
  const ODDS_RE = /^[+-]\d+$/;
  const GAME_RE = /^.+\s+vs\.?\s+.+$/i;
  const DATE_RE = /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d+,\s+\d+/i;
  const SPORT_RE = /^(WNBA|MLB|NBA|NFL|NHL)$/i;
  const SKIP_GAME = /prediction|favored|matchup|best bets|picks include|props include|why |how |what |discover|welcome|upgrade|join|our |every |whether|today|daily|data|live|user|explore|responsible|disclaimer|copyright|trending|questions|download|starting|slugging|strikeout/i;

  const gameIndices = [];
  for (let i = 0; i < lines.length; i++) {
    if (GAME_RE.test(lines[i]) && !SKIP_GAME.test(lines[i])) gameIndices.push(i);
  }

  if (!gameIndices.length) {
    document.getElementById('parse-status').textContent = '⚠ No game lines found';
    return;
  }

  const results = [];
  gameIndices.forEach((gi, idx) => {
    const blockEnd = idx + 1 < gameIndices.length ? gameIndices[idx+1] : Math.min(gi+25, lines.length);
    const bet = {
      id: Date.now() + Math.random(),
      sport: detectedSport,
      game: lines[gi].trim(),
      gameDate: null, gameDateRaw: '',
      pick: '', prob: null, edge: null, odds: null, book: null,
      tags: [], result: null,
      addedAt: new Date().toISOString()
    };

    // look back for sport + date
    for (let i = Math.max(0, gi-5); i < gi; i++) {
      if (SPORT_RE.test(lines[i])) bet.sport = lines[i].toUpperCase();
      if (DATE_RE.test(lines[i])) { bet.gameDateRaw = lines[i]; bet.gameDate = parseGameDate(lines[i]); }
    }

    let state = '';
    const fwd = lines.slice(gi+1, blockEnd);
    for (let j = 0; j < fwd.length; j++) {
      const l = fwd[j];
      if (!l || NOISE.test(l)) continue;
      if (DATE_RE.test(l) && !bet.gameDateRaw) { bet.gameDateRaw = l; bet.gameDate = parseGameDate(l); continue; }
      if (SPORT_RE.test(l)) { bet.sport = l.toUpperCase(); continue; }
      if (/high edge/i.test(l)) { if (!bet.tags.includes('HIGH')) bet.tags.push('HIGH'); continue; }
      if (/sweet spot/i.test(l)) { if (!bet.tags.includes('SWEET')) bet.tags.push('SWEET'); continue; }
      if (/^probability$/i.test(l)) { state='prob'; continue; }
      if (/^edge$/i.test(l)) { state='edge'; continue; }
      if (/^(odds|best odds)$/i.test(l)) { state='book'; continue; }
      const pct = l.match(/^([\d.]+)%$/);
      if (pct) {
        if (state==='prob') { bet.prob=parseFloat(pct[1]); state=''; }
        else if (state==='edge') { bet.edge=parseFloat(pct[1]); state=''; }
        continue;
      }
      if (ODDS_RE.test(l)) { bet.odds=l; state=''; continue; }
      if (BOOK_RE.test(l)) { bet.book=l; continue; }
      if (!bet.pick) {
        if (/^(over|under)\s+[\d.]+$/i.test(l)) { bet.pick=l; continue; }
        if (/^.+\s+[+-][\d.]+$/.test(l)) { bet.pick=l; continue; }
        if (/^.+\s+win$/i.test(l)) { bet.pick=l; continue; }
      }
    }

    if (bet.prob !== null || bet.edge !== null || bet.pick) results.push(bet);
  });

  if (!results.length) {
    document.getElementById('parse-status').textContent = '⚠ No bets extracted';
    return;
  }

  parsedPreview = results;
  // Auto-import immediately — no preview/confirm step needed
  importBets();
  document.getElementById('paste-area').value = '';
  document.getElementById('parse-status').textContent = `✓ Detected: ${detectedSport}`;
}

function parseGameDate(raw) {
  if (!raw) return null;
  const m = raw.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d+)/i);
  if (!m) return null;
  const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const mo = months[m[1].slice(0,3).toLowerCase()];
  return new Date(new Date().getFullYear(), mo, parseInt(m[2])).toISOString().split('T')[0];
}

function clearPreview() {
  parsedPreview = [];
  document.getElementById('preview-section').style.display = 'none';
}

function importBets() {
  if (!parsedPreview.length) return;
  const before = bets.length;
  let skipped = 0;
  parsedPreview.forEach(pb => {
    // Dupe = same game + same date + same market type (Over/Under/ML/Spread) + same direction/team
    // Ignores different line number or odds — same bet re-priced is still a dupe
    const pbMkt = marketType(pb.pick);
    const pbDir = marketDirection(pb.pick);
    const isDupe = bets.find(b =>
      b.game === pb.game &&
      b.gameDate === pb.gameDate &&
      marketType(b.pick) === pbMkt &&
      marketDirection(b.pick) === pbDir
    );
    if (isDupe) { skipped++; return; }
    bets.push(pb);
  });
  save();
  const added = bets.length - before;
  const msg = added > 0
    ? '✓ ' + added + ' logged' + (skipped ? ', ' + skipped + ' dupes skipped' : '') + ' — ' + detectedSport
    : '⚠ All ' + skipped + ' already logged';
  document.getElementById('parse-status').textContent = msg;
  toast(msg, 3000);
  parsedPreview = [];
  updateBadge();
  // Switch to bet log tab
  if (added > 0) {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.pane').forEach(x => x.classList.remove('active'));
    document.querySelector('[data-tab="bets"]').classList.add('active');
    document.getElementById('pane-bets').classList.add('active');
    populateDateFilter();
    renderBetLog();
  }
}

// Returns the direction/team component for dupe matching
// Over/Under → 'over'/'under'. ML/Spread → normalized team name. Unknown → full pick.
function marketDirection(pick) {
  if (!pick) return '';
  const p = pick.toLowerCase().trim();
  if (/^over\s/.test(p))  return 'over';
  if (/^under\s/.test(p)) return 'under';
  const spreadM = p.match(/^(.+?)\s+[+-][\d.]+$/);
  if (spreadM) return norm(spreadM[1]);
  const mlM = p.match(/^(.+?)\s+win$/);
  if (mlM) return norm(mlM[1]);
  return norm(p);
}

// ─── ESPN AUTO-GRADE ──────────────────────────────────────────────────────────
const ESPN_MAP={WNBA:'basketball/wnba',NBA:'basketball/nba',MLB:'baseball/mlb',NFL:'football/nfl',NHL:'hockey/nhl'};
async function fetchESPN(sport,date) {
  const path=ESPN_MAP[sport]; if(!path) return null;
  const d=date?date.replace(/-/g,''):'';
  try { const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/${path}/scoreboard${d?'?dates='+d:''}`); return (await r.json()).events||[]; }
  catch { return null; }
}
async function gradeAllESPN() {
  const pending=bets.filter(b=>!b.result&&ESPN_MAP[b.sport]);
  if(!pending.length) { toast('No pending gradeable bets'); return; }
  toast('Fetching ESPN scores...', 4000);
  // Group by sport+date, process oldest dates first
  const groups={};
  pending.forEach(b=>{ const k=b.sport+'|'+(b.gameDate||''); if(!groups[k]) groups[k]=[]; groups[k].push(b); });
  const sortedKeys = Object.keys(groups).sort((a,b)=>a.localeCompare(b)); // oldest date first
  let graded=0;
  for(const key of sortedKeys) {
    const [sport,date]=key.split('|');
    const events=await fetchESPN(sport,date); if(!events) continue;
    groups[key].forEach(bet=>{
      const ev=findEvent(bet,events); if(!ev) return;
      const res=gradeEvent(bet,ev);
      if(res) { bet.result=res.result; bet.finalScore=res.score; graded++; }
    });
  }
  save(); renderBetLog(); renderResults();
  toast(graded?'✓ Auto-graded '+graded+' bet'+(graded!==1?'s':''):'No completed matches found');
}
function norm(s){return(s||'').toLowerCase().replace(/[^a-z]/g,'');}
function findEvent(bet,events) {
  const parts=bet.game.split(/\s+vs\.?\s+/i); if(parts.length<2) return null;
  const a=norm(parts[0]),b2=norm(parts[1]);
  for(const ev of events) {
    const comps=ev.competitions?.[0]?.competitors||[];
    const names=comps.flatMap(c=>[c.team?.displayName,c.team?.shortDisplayName,c.team?.name,c.team?.abbreviation].filter(Boolean).map(norm));
    if(names.some(n=>n.includes(a.slice(0,5))||a.includes(n.slice(0,5)))||names.some(n=>n.includes(b2.slice(0,5))||b2.includes(n.slice(0,5)))) return ev;
  }
  return null;
}
function gradeEvent(bet,ev) {
  const comp=ev.competitions?.[0]; if(!comp||!ev.status?.type?.completed) return null;
  const comps=comp.competitors||[]; if(comps.length<2) return null;
  const home=comps.find(c=>c.homeAway==='home'), away=comps.find(c=>c.homeAway==='away');
  if(!home||!away) return null;
  const hs=parseFloat(home.score||0),as=parseFloat(away.score||0),total=hs+as;
  // Build score string: "Away team_abbr score - Home team_abbr score (total)"
  const awayAbbr=(away.team?.abbreviation||away.team?.shortDisplayName||'AWAY').toUpperCase();
  const homeAbbr=(home.team?.abbreviation||home.team?.shortDisplayName||'HOME').toUpperCase();
  const scoreStr=`${awayAbbr} ${as} – ${homeAbbr} ${hs} (${total})`;
  const pick=(bet.pick||'').toLowerCase().trim();
  const overM=pick.match(/^over\s+([\d.]+)/), underM=pick.match(/^under\s+([\d.]+)/);
  const spreadM=pick.match(/^(.+?)\s+([+-][\d.]+)$/), mlM=pick.match(/^(.+?)\s+win$/);
  const r = (res) => res ? {result:res, score:scoreStr} : null;
  if(overM)  { const l=parseFloat(overM[1]);  return r(total>l?'win':total<l?'loss':'push'); }
  if(underM) { const l=parseFloat(underM[1]); return r(total<l?'win':total>l?'loss':'push'); }
  if(spreadM) {
    const tp=norm(spreadM[1]),sp=parseFloat(spreadM[2]);
    const hn=[home.team?.displayName,home.team?.shortDisplayName,home.team?.abbreviation].filter(Boolean).map(norm);
    const an=[away.team?.displayName,away.team?.shortDisplayName,away.team?.abbreviation].filter(Boolean).map(norm);
    const iH=hn.some(n=>n.includes(tp.slice(0,5))||tp.includes(n.slice(0,5)));
    const iA=an.some(n=>n.includes(tp.slice(0,5))||tp.includes(n.slice(0,5)));
    if(iH||iA) { const fs=iH?hs:as,os=iH?as:hs,m=fs-os+sp; return r(m>0?'win':m<0?'loss':'push'); }
  }
  if(mlM) {
    const tp=norm(mlM[1]);
    const hn=[home.team?.displayName,home.team?.shortDisplayName,home.team?.abbreviation].filter(Boolean).map(norm);
    const an=[away.team?.displayName,away.team?.shortDisplayName,away.team?.abbreviation].filter(Boolean).map(norm);
    const iH=hn.some(n=>n.includes(tp.slice(0,5))||tp.includes(n.slice(0,5)));
    const iA=an.some(n=>n.includes(tp.slice(0,5))||tp.includes(n.slice(0,5)));
    if(iH) return r(hs>as?'win':hs<as?'loss':'push');
    if(iA) return r(as>hs?'win':as<hs?'loss':'push');
  }
  return null;
}

// ─── RESULTS ──────────────────────────────────────────────────────────────────
function marketType(pick) {
  if (!pick) return 'Unknown';
  const p = pick.toLowerCase();
  if (/^over\s/.test(p))  return 'Over';
  if (/^under\s/.test(p)) return 'Under';
  if (/win$/.test(p))     return 'ML';
  if (/[+-][\d.]+$/.test(p)) return 'Spread';
  return 'Other';
}

function edgeBucket(edge) {
  if (edge == null) return 'Unknown';
  if (edge >= 10)  return '10%+';
  if (edge >= 8)   return '8–10%';
  if (edge >= 5)   return '5–8%';
  if (edge >= 3)   return '3–5%';
  return '<3%';
}

function oddsBucket(odds) {
  const n = parseInt(odds);
  if (isNaN(n)) return 'Unknown';
  if (n <= -200)           return '≤-200 (heavy fav)';
  if (n <= -150)           return '-150 to -200';
  if (n <= -110)           return '-110 to -149';
  if (n < 0)               return '-109 to -101';
  if (n <= 110)            return '+100 to +110';
  if (n <= 150)            return '+111 to +150';
  if (n <= 200)            return '+151 to +200';
  return '+200+ (big dog)';
}

function bkRow(label, wins, losses, pushes, pl) {
  const total = wins+losses+pushes;
  const pct = total>0 ? ((wins/(wins+losses||1))*100).toFixed(0)+'%' : '—';
  const plStr = pl===0?'±0':(pl>0?'+':'')+pl.toFixed(2)+'u';
  const plCol = pl>0?'var(--accent)':pl<0?'var(--red)':'var(--muted)';
  return `<tr>
    <td>${label}</td>
    <td>${wins}-${losses}${pushes?'-'+pushes:''}</td>
    <td>${pct}</td>
    <td style="color:${plCol}">${plStr}</td>
  </tr>`;
}

function tagLabel(b) {
  if (b.tags?.includes('HIGH') && b.tags?.includes('SWEET')) return 'High+Sweet';
  if (b.tags?.includes('HIGH'))  return 'High Edge';
  if (b.tags?.includes('SWEET')) return 'Sweet Spot';
  return 'No Tag';
}

function buildBreakdown(filtered) {
  function stats(arr) {
    const w=arr.filter(b=>b.result==='win').length;
    const l=arr.filter(b=>b.result==='loss').length;
    const p=arr.filter(b=>b.result==='push').length;
    const pl=parseFloat(arr.reduce((s,b)=>s+(calcPL(b)||0),0).toFixed(2));
    const winPct = (w+l) > 0 ? Math.round(w/(w+l)*100)+'%' : '—';
    return {w,l,p,pl,winPct};
  }
  function plColor(pl) { return pl>0?'var(--accent)':pl<0?'var(--red)':'var(--muted)'; }
  function plStr(pl)   { return pl===0?'±0':(pl>0?'+':'')+pl.toFixed(2)+'u'; }

  const MARKETS = ['Over','Under','ML','Spread','Other'];
  const TAGS = ['High Edge','Sweet Spot','High+Sweet','No Tag'];

    'High Edge':  {bg:'rgba(39,192,113,0.1)',  color:'#27c071'},

    'No Tag':     {bg:'rgba(122,131,145,0.1)',  color:'#7a8391'},

  // Group bets by tag → market
  const byTagMarket = {};
  filtered.forEach(b => {
    const tag = tagLabel(b);
    const mkt = marketType(b.pick);
    if (!byTagMarket[tag]) byTagMarket[tag] = {};
    if (!byTagMarket[tag][mkt]) byTagMarket[tag][mkt] = [];
    byTagMarket[tag][mkt].push(b);

  // Build tag blocks
  const tagBlocks = TAGS.map(tag => {
    const mktData = byTagMarket[tag];
    if (!mktData) return '';
    const allBets = Object.values(mktData).flat();
    const ts = stats(allBets);
    const {bg, color} = TAG_COLORS[tag];

        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">W–L</span>
        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">WIN%</span>
        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;text-align:right;">P&L</span>
      </div>
      ${mktRows}
    </div>`;
  }).join('');

  // Sport strip
  const bySport = {};
  filtered.forEach(b => { if(!bySport[b.sport]) bySport[b.sport]=[]; bySport[b.sport].push(b); });
  const sportStrip = Object.entries(bySport).map(([sp, arr]) => {
    const s = stats(arr);
    return `<div style="border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <span class="sport-badge sport-${sp.toLowerCase()}">${sp}</span>
      <span style="font-size:12px;color:var(--text);">${s.w}–${s.l}${s.p?'–'+s.p:''}</span>
      <span style="font-size:12px;color:var(--muted);">${s.winPct}</span>
      <span style="font-size:12px;font-weight:600;color:${plColor(s.pl)};">${plStr(s.pl)}</span>
    </div>`;
  }).join('');


  // Fav/Dog + Odds bucket + Edge bucket
  const byFavDog = {};
  filtered.forEach(b => { const n=parseInt(b.odds); const k=isNaN(n)?'Unknown':n<0?'Favorite':'Underdog'; if(!byFavDog[k]) byFavDog[k]=[]; byFavDog[k].push(b); });
  const byOdds = {};
  filtered.forEach(b => { const k=oddsBucket(b.odds); if(!byOdds[k]) byOdds[k]=[]; byOdds[k].push(b); });
  const byEdge = {};
  filtered.forEach(b => {
    const k = edgeBucket(b.edge);
    if(!byEdge[k]) byEdge[k]=[];
    byEdge[k].push(b);
  });

  function miniTable(groups) {
    return Object.entries(groups).sort((a,b)=>{
      const pa=stats(a[1]).pl, pb=stats(b[1]).pl; return pb-pa;
    }).map(([k,arr])=>{
      const s=stats(arr);
      return `<div style="display:grid;grid-template-columns:1fr 52px 44px 64px;gap:4px;padding:6px 12px;border-top:1px solid var(--border);font-size:11px;">
        <span style="color:var(--muted);">${k}</span>
        <span>${s.w}–${s.l}${s.p?'–'+s.p:''}</span>
        <span>${s.winPct}</span>
        <span style="text-align:right;font-weight:600;color:${plColor(s.pl)};">${plStr(s.pl)}</span>
      </div>`;
    }).join('');
  }
  function miniCard(title, groups) {
    return `<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
      <div style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;background:var(--surface2);">${title}</div>
      <div style="display:grid;grid-template-columns:1fr 52px 44px 64px;gap:4px;padding:5px 12px;background:var(--surface2);">
        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;"></span>
        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">W–L</span>
        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">WIN%</span>
        <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;text-align:right;">P&L</span>
      </div>
      ${miniTable(groups)}
    </div>`;
  }

  const EDGE_BUCKETS = ['10%+','8–10%','5–8%','3–5%','<3%'];
  const SUB_DIMS = [
    { label: 'By Market',   keys: ['Over','Under','ML','Spread'], fn: b => marketType(b.pick) },
    { label: 'By Tag',      keys: ['High Edge','Sweet Spot','High+Sweet','No Tag'], fn: b => tagLabel(b) },
    { label: 'Fav vs Dog',  keys: ['Favorite','Underdog'], fn: b => { const n=parseInt(b.odds); return isNaN(n)?'Unknown':n<0?'Favorite':'Underdog'; } },
    { label: 'By Sport',    keys: ['WNBA','MLB','NBA'], fn: b => b.sport },
  ];

  function edgeColor(bkt) {
    return bkt==='10%+'||bkt==='8–10%' ? 'var(--accent)' : bkt==='5–8%' ? 'var(--amber)' : 'var(--muted)';
  }

  // Header row shared
  const HDR = `<div style="display:grid;grid-template-columns:1fr 58px 44px 68px;padding:5px 12px;background:var(--surface2);">
    <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">BUCKET</span>
    <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">W–L</span>
    <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;">WIN%</span>
    <span style="font-size:9px;color:var(--muted);letter-spacing:.07em;text-align:right;">P&L</span>
  </div>`;

  // 1. Edge solo card (full width)
  const edgeSoloRows = EDGE_BUCKETS.map(bkt => {
    const arr = byEdge[bkt]; if (!arr) return '';
    const s = stats(arr);
    return `<div style="display:grid;grid-template-columns:1fr 58px 44px 68px;padding:7px 12px;border-top:1px solid var(--border);font-size:12px;align-items:center;">
      <span style="font-weight:600;color:${edgeColor(bkt)};">${bkt}</span>
      <span>${s.w}–${s.l}${s.p?'–'+s.p:''}</span>
      <span>${s.winPct}</span>
      <span style="text-align:right;font-weight:600;color:${plColor(s.pl)};">${plStr(s.pl)}</span>
    </div>`;
  }).join('');

  const edgeSoloCard = `<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
    <div style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;background:var(--surface2);">Edge — Overall</div>
    ${HDR}${edgeSoloRows}
  </div>`;

  // 2. Edge × dimension cards (one per sub-dim, shown in a 2×2 grid)
  // Each card: bucket rows, each with sub-dim breakdown indented
  const edgeCrossCards = SUB_DIMS.map(dim => {
    // pre-build lookup: bkt → subkey → bets
    const map = {};
    filtered.forEach(b => {
      const bkt = edgeBucket(b.edge);
      const sk  = dim.fn(b);
      if (!map[bkt]) map[bkt] = {};
      if (!map[bkt][sk]) map[bkt][sk] = [];
      map[bkt][sk].push(b);
    });

    const rows = EDGE_BUCKETS.map(bkt => {
      const subMap = map[bkt]; if (!subMap) return '';
      const bktBets = byEdge[bkt];
      const bs = stats(bktBets);
      const subRows = dim.keys.map(sk => {
        const arr = subMap[sk]; if (!arr) return '';
        const s = stats(arr);
        return `<div style="display:grid;grid-template-columns:1fr 58px 44px 68px;padding:4px 12px 4px 22px;border-top:1px solid var(--border);font-size:11px;align-items:center;">
          <span style="color:var(--muted);">↳ ${sk}</span>
          <span>${s.w}–${s.l}${s.p?'–'+s.p:''}</span>
          <span>${s.winPct}</span>
          <span style="text-align:right;font-weight:600;color:${plColor(s.pl)};">${plStr(s.pl)}</span>
        </div>`;
      }).join('');
      return `<div style="border-top:1px solid var(--border);">
        <div style="display:grid;grid-template-columns:1fr 58px 44px 68px;padding:7px 12px;font-size:12px;font-weight:600;color:${edgeColor(bkt)};background:var(--surface);">
          <span>${bkt}</span>
          <span style="font-size:11px;color:var(--text);font-weight:400;">${bs.w}–${bs.l}${bs.p?'–'+bs.p:''}</span>
          <span style="font-size:11px;color:var(--text);font-weight:400;">${bs.winPct}</span>
          <span style="font-size:11px;text-align:right;font-weight:600;color:${plColor(bs.pl)};">${plStr(bs.pl)}</span>
        </div>
        ${subRows}
      </div>`;
    }).join('');

    return `<div style="border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
      <div style="padding:8px 12px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;background:var(--surface2);">Edge × ${dim.label}</div>
      ${HDR}${rows}
    </div>`;
  }).join('');

  return `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:16px;">
      ${tagBlocks}
    </div>
    <div style="font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">By Sport</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:16px;">
      ${sportStrip}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-bottom:16px;">
      ${miniCard('Fav vs Dog', byFavDog)}
      ${miniCard('Odds Bucket', byOdds)}
    </div>
    <div style="font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">Edge Breakdown</div>
    <div style="margin-bottom:12px;">${edgeSoloCard}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:10px;">
      ${edgeCrossCards}
    </div>`;
}

function renderResults() {
  const bsf = (document.getElementById('breakdown-sport-filter')||{}).value || '';
  const sf  = (document.getElementById('results-sport-filter')||{}).value  || '';
  const allGraded = bets.filter(b => b.result && b.result!=='pending');
  const filtered  = allGraded.filter(b => !bsf || b.sport===bsf);
  const tableFiltered = allGraded.filter(b => !sf || b.sport===sf);
  const wins=filtered.filter(b=>b.result==='win').length;
  const losses=filtered.filter(b=>b.result==='loss').length;
  const pushes=filtered.filter(b=>b.result==='push').length;
  const total=wins+losses+pushes;
  const winPct=total>0?((wins/(wins+losses||1))*100).toFixed(1):'—';
  const totalPL=filtered.reduce((s,b)=>s+(calcPL(b)||0),0);
  const totalStaked=filtered.filter(b=>b.result==='win'||b.result==='loss').reduce((s,b)=>s+calcStake(b.odds),0);
  const roi=totalStaked>0?((totalPL/totalStaked)*100).toFixed(1):'—';
  const edgeBets=filtered.filter(b=>b.edge!=null);
  const avgEdge=edgeBets.length?(edgeBets.reduce((s,b)=>s+b.edge,0)/edgeBets.length).toFixed(1):'—';
  const plC=totalPL>0?'green':totalPL<0?'red':'';

  document.getElementById('summary-stats').innerHTML = `
    <div class="stat-card"><div class="sc-label">Record</div><div class="sc-val">${wins}-${losses}${pushes?'-'+pushes:''}</div></div>
    <div class="stat-card"><div class="sc-label">Win %</div><div class="sc-val ${wins>losses?'green':'red'}">${winPct}%</div></div>
    <div class="stat-card"><div class="sc-label">P&L</div><div class="sc-val ${plC}">${totalPL>=0?'+':''}${totalPL.toFixed(2)}u</div></div>
    <div class="stat-card"><div class="sc-label">ROI</div><div class="sc-val ${plC}">${roi!=='—'?(totalPL>=0?'+':'')+roi+'%':roi}</div></div>
    <div class="stat-card"><div class="sc-label">Avg Edge</div><div class="sc-val amber">${avgEdge}${avgEdge!=='—'?'%':''}</div></div>
    <div class="stat-card"><div class="sc-label">Graded</div><div class="sc-val">${filtered.length}</div></div>`;

  // Breakdown
  if (filtered.length) {
    document.getElementById('breakdown-grid').innerHTML = buildBreakdown(filtered);
  } else {
    document.getElementById('breakdown-grid').innerHTML = '<div class="empty-state"><div class="es-icon">◈</div><p>No graded bets yet.</p></div>';
  }

  // Bet log table
  if (!tableFiltered.length) {
    document.getElementById('results-table-container').innerHTML = '<div class="empty-state"><div class="es-icon">◈</div><p>No graded bets yet.</p></div>';
    return;
  }
  const sorted=[...tableFiltered].sort((a,b)=>(b.gameDate||'').localeCompare(a.gameDate||''));
  const rows=sorted.map(b=>{
    const pl=calcPL(b);
    const plStr=pl===null?'—':pl===0?'±0':(pl>0?'+':'')+pl+'u';
    const stakeStr=b.odds?calcStake(b.odds).toFixed(2)+'u':'—';
    const plC2=pl>0?'profit-pos':pl<0?'profit-neg':'';
    return `<tr>
      <td>${b.gameDate||'—'}</td>
      <td><span class="sport-badge sport-${b.sport.toLowerCase()}">${b.sport}</span></td>
      <td style="color:var(--text);font-weight:500">${b.game}</td>
      <td style="color:var(--accent)">${b.pick||'—'}</td>
      <td style="color:var(--amber)">${b.edge!=null?b.edge+'%':'—'}</td>
      <td>${b.odds||'—'}</td>
      <td style="color:var(--muted);font-size:11px">${stakeStr}</td>
      <td><span class="result-badge result-${b.result}">${b.result.toUpperCase()}</span></td>
      <td style="font-size:11px;color:var(--muted)">${b.finalScore||'—'}</td>
      <td class="${plC2}">${plStr}</td>
    </tr>`;
  }).join('');
  document.getElementById('results-table-container').innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Date</th><th>Sport</th><th>Game</th><th>Pick</th><th>Edge</th><th>Odds</th><th>Stake</th><th>Result</th><th>Score</th><th>P&L</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
}

load(); updateBadge();
</script>
</body>
</html>
