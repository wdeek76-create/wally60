<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WNBA Odds Screen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
  :root {
    --bg:#0a0d14; --surface:#111520; --surface2:#181d2e; --surface3:#1e2438;
    --border:#252d42; --teal:#00c9a7; --teal-dim:rgba(0,201,167,0.12);
    --purple:#a855f7; --purple-dim:rgba(168,85,247,0.12);
    --yellow:#fbbf24; --green:#22c55e; --red:#ef4444;
    --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8; --card-radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .header-left{display:flex;align-items:center;gap:10px}
  .logo{font-size:16px;font-weight:900;letter-spacing:-0.5px;color:var(--teal);text-transform:uppercase}
  .logo span{color:var(--text)}
  .badge{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px}
  .refresh-btn{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s}
  .refresh-btn:hover{background:var(--teal);color:#000}
  .refresh-btn:disabled{opacity:.4;cursor:not-allowed}

  .tabs{display:flex;gap:2px;padding:10px 16px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-weight:600;font-size:12px;color:var(--muted);border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:all .15s;background:transparent;font-family:inherit}
  .tab.active{background:var(--bg);color:var(--teal);border-color:var(--border)}
  .tab:not(.active):hover{color:var(--text)}

  .filters{padding:10px 16px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg)}
  .filter-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .filter-pill{background:var(--surface);color:var(--muted2);border:1px solid var(--border);padding:4px 11px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;font-family:inherit}
  .filter-pill.active{background:var(--teal-dim);color:var(--teal);border-color:var(--teal)}
  .filter-pill:hover:not(.active){border-color:var(--muted);color:var(--text)}
  .search-input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;font-family:inherit;font-size:12px;width:150px;outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--teal)}
  .search-input::placeholder{color:var(--muted)}

  .status-bar{padding:6px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:center;font-size:10px;color:var(--muted)}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .status-item{display:flex;align-items:center;gap:4px}
  .status-item strong{color:var(--text);font-weight:600}

  .main{padding:14px 16px}
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* GAME HEADER */
  .game-header{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .game-logo-pair{display:flex;align-items:center;gap:6px}
  .team-logo{width:28px;height:28px;object-fit:contain}
  .team-logo-fb{width:28px;height:28px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--teal);border:1px solid var(--border);flex-shrink:0}
  .vs-sep{font-size:10px;color:var(--muted);font-weight:700}
  .game-text{flex:1;min-width:0}
  .game-teams{font-weight:700;font-size:13px;color:var(--text)}
  .game-meta{font-size:10px;color:var(--muted2);margin-top:1px}
  .game-total{text-align:right;flex-shrink:0}
  .game-total-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--yellow)}
  .game-total-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  /* PLAYER CARD */
  .player-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);margin-bottom:10px;overflow:hidden;transition:border-color .15s}
  .player-card:hover{border-color:rgba(0,201,167,.4)}
  .player-header{display:flex;align-items:center;padding:10px 14px;gap:10px;cursor:pointer;user-select:none}

  /* AVATAR */
  .avatar-wrap{position:relative;flex-shrink:0;width:46px;height:46px}
  .avatar-img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--surface3);display:block}
  .avatar-fb{width:46px;height:46px;border-radius:50%;background:var(--surface3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--teal)}
  /* team badge — bottom-right of avatar */
  .team-badge{position:absolute;bottom:-1px;right:-3px;width:18px;height:18px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .team-badge img{width:13px;height:13px;object-fit:contain}
  .team-badge-fb{font-size:6px;font-weight:700;color:var(--teal)}

  .player-info{flex:1;min-width:0}
  .player-name{font-weight:700;font-size:14px;color:var(--text)}
  .player-meta{font-size:11px;color:var(--muted2);margin-top:1px}
  .player-meta .opp{color:var(--teal);font-weight:600}
  .player-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .expand-btn{color:var(--muted);font-size:14px;transition:transform .2s}
  .player-card.open .expand-btn{transform:rotate(180deg)}
  .prop-count-badge{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,201,167,.3);padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700}

  /* PROPS */
  .props-container{border-top:1px solid var(--border)}
  .prop-section{padding:10px 14px;border-bottom:1px solid var(--border)}
  .prop-section:last-child{border-bottom:none}
  .prop-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .prop-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .prop-line-val{color:var(--teal);font-family:'JetBrains Mono',monospace;margin-left:4px}
  .prop-row{display:grid;grid-template-columns:78px 1fr;gap:8px;margin-bottom:6px;align-items:start}
  .prop-label{font-size:11px;font-weight:600;color:var(--muted2);padding-top:4px}
  .books-row{display:flex;flex-wrap:wrap;gap:4px}

  /* BOOK CHIP */
  .book-chip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;display:flex;flex-direction:column;align-items:center;min-width:56px;cursor:pointer;transition:all .15s;position:relative}
  .book-chip:hover{border-color:var(--teal);background:var(--teal-dim)}
  .book-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .book-line{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text)}
  .book-odds-row{display:flex;gap:4px}
  .book-odds{font-family:'JetBrains Mono',monospace;font-size:10px}
  .odds-over{color:var(--green)}
  .odds-under{color:var(--red)}
  .book-chip.best-over{border-color:var(--green);background:rgba(34,197,94,.07)}
  .book-chip.best-under{border-color:var(--red);background:rgba(239,68,68,.07)}
  .best-tag{position:absolute;top:-6px;right:3px;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;text-transform:uppercase}
  .best-tag.over{background:var(--green);color:#000}
  .best-tag.under{background:var(--red);color:#fff}

  /* CONSENSUS */
  .consensus-bar{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .consensus-label{font-size:10px;color:var(--muted);width:56px;flex-shrink:0}
  .bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px}
  .bar-fill.over{background:var(--green)}
  .bar-fill.under{background:var(--red)}
  .consensus-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;width:40px;text-align:right;flex-shrink:0}

  /* TREND */
  .trend-row{display:flex;gap:3px;align-items:center;margin-top:4px}
  .trend-label{font-size:9px;color:var(--muted);margin-right:2px}
  .trend-dot{width:15px;height:15px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
  .trend-dot.hit{background:rgba(34,197,94,.2);color:var(--green)}
  .trend-dot.miss{background:rgba(239,68,68,.2);color:var(--red)}
  .trend-dot.push{background:rgba(251,191,36,.15);color:var(--yellow)}

  /* STATS PANEL */
  .stats-panel{background:var(--surface2);margin:0 14px 10px;border-radius:8px;border:1px solid var(--border);overflow:hidden}
  .stats-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface3);overflow-x:auto;scrollbar-width:none}
  .stats-tabs::-webkit-scrollbar{display:none}
  .stats-tab{padding:6px 11px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .15s;white-space:nowrap}
  .stats-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
  .stats-content{padding:10px}

  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:6px}
  .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;text-align:center}
  .stat-box-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .stat-box-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);margin-top:2px}
  .stat-box-val.up{color:var(--green)}
  .stat-box-val.down{color:var(--red)}
  .stat-box-sub{font-size:9px;color:var(--muted2);margin-top:1px}

  .matchup-row{display:flex;gap:6px;margin-top:8px}
  .matchup-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px}
  .matchup-box-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:6px}
  .def-stat-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}
  .def-stat-row:last-child{border-bottom:none}
  .def-key{font-size:10px;color:var(--muted2)}
  .def-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600}
  .def-val.good{color:var(--green)}
  .def-val.bad{color:var(--red)}
  .def-val.mid{color:var(--yellow)}

  /* DEF TABLE */
  .def-table{width:100%;border-collapse:collapse;font-size:12px}
  .def-table th{text-align:left;padding:8px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:600}
  .def-table th:not(:first-child){text-align:center}
  .def-table td{padding:8px;border-bottom:1px solid var(--border)}
  .def-table td:not(:first-child){text-align:center;font-family:'JetBrains Mono',monospace;font-weight:600}
  .def-table tr:last-child td{border-bottom:none}
  .team-logo-cell{display:flex;align-items:center;gap:8px}

  /* AI */
  .ai-insight{background:var(--purple-dim);border:1px solid rgba(168,85,247,.3);border-radius:6px;padding:8px 10px;margin-top:8px;font-size:11px;color:var(--text);line-height:1.5}
  .ai-insight-label{font-size:9px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
  .ai-loading{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:11px}
  .spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted)}
  .empty-state .icon{font-size:36px;margin-bottom:10px}
  .empty-state h3{font-size:15px;color:var(--muted2);margin-bottom:6px}

  @media(max-width:480px){
    .prop-row{grid-template-columns:62px 1fr}
    .stat-grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">WNBA <span>Odds</span></div>
    <div class="badge">LIVE</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">⟳ Refresh</button>
</div>

<div class="status-bar">
  <div class="status-item"><span class="status-dot"></span><strong id="sGames">—</strong> games</div>
  <div class="status-item">📊 <strong id="sProps">—</strong> props</div>
  <div class="status-item">🕐 <strong id="sTime">—</strong></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('props',this)">Props</button>
  <button class="tab" onclick="switchTab('matchups',this)">Matchups</button>
  <button class="tab" onclick="switchTab('defense',this)">Def Ranks</button>
</div>

<div class="filters">
  <span class="filter-label">Mkt</span>
  <button class="filter-pill active" data-mkt="all"  onclick="filterMarket(this)">All</button>
  <button class="filter-pill" data-mkt="pts"  onclick="filterMarket(this)">PTS</button>
  <button class="filter-pill" data-mkt="reb"  onclick="filterMarket(this)">REB</button>
  <button class="filter-pill" data-mkt="ast"  onclick="filterMarket(this)">AST</button>
  <button class="filter-pill" data-mkt="pra"  onclick="filterMarket(this)">PRA</button>
  <button class="filter-pill" data-mkt="pr"   onclick="filterMarket(this)">P+R</button>
  <button class="filter-pill" data-mkt="pa"   onclick="filterMarket(this)">P+A</button>
  <button class="filter-pill" data-mkt="stk"  onclick="filterMarket(this)">STK</button>
  <button class="filter-pill" data-mkt="3pm"  onclick="filterMarket(this)">3PM</button>
  <button class="filter-pill" data-mkt="blk"  onclick="filterMarket(this)">BLK</button>
  <button class="filter-pill" data-mkt="stl"  onclick="filterMarket(this)">STL</button>
  <button class="filter-pill" data-mkt="to"   onclick="filterMarket(this)">TO</button>
  <input class="search-input" id="searchInput" placeholder="Search player…" oninput="filterPlayers()"/>
</div>

<div id="tab-props" class="tab-content active">
  <div class="main" id="propsContainer">
    <div class="empty-state"><div class="icon">🏀</div><h3>Loading props…</h3></div>
  </div>
</div>
<div id="tab-matchups" class="tab-content">
  <div class="main" id="matchupsContainer">
    <div class="empty-state"><div class="icon">⚔️</div><h3>Loading…</h3></div>
  </div>
</div>
<div id="tab-defense" class="tab-content">
  <div class="main" id="defenseContainer">
    <div class="empty-state"><div class="icon">🛡️</div><h3>Loading…</h3></div>
  </div>
</div>

let allData = null, activeMarket = 'all', searchTerm = '';

// WNBA team ESPN IDs for logos
const TEAM_ESPN = {

function espnHeadshot(name) {
  const ids = PLAYER_IDS[name];
  if (!ids?.espn) return null;
  return `https://a.espncdn.com/i/headshots/wnba/players/full/${ids.espn}.png`;
}
function espnLogo(abbr) {
  const id = TEAM_ESPN[abbr?.toUpperCase()];
  return id ? `https://a.espncdn.com/i/teamlogos/wnba/500/${id}.png` : null;
}
function logoEl(abbr, size=28) {
  const url = espnLogo(abbr);
  return url

async function fetchFromClaude() {
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  // Tell Claude exactly which player names are in our verified ID table
  const verifiedNames = Object.keys(PLAYER_IDS).map(n=>`"${n}"`).join(', ');

  const prompt=`You are a WNBA sports betting data assistant. Today is ${today}.

Generate comprehensive realistic WNBA player prop betting data for today's games.

IMPORTANT: For players, you MUST use these exact name spellings when including them (they have verified headshots): ${verifiedNames}

Return ONLY valid JSON (no markdown, no backticks):

{
  "games": [{"id":"g1","home":"New York Liberty","away":"Las Vegas Aces","homeAbbr":"NYL","awayAbbr":"LVA","time":"7:00 PM ET","gameTotal":165.5,"homeSpread":-3.5}],
  "players": [{
    "id":"p1",
    "name":"A'ja Wilson",
    "team":"Las Vegas Aces","teamAbbr":"LVA",
    "opponent":"New York Liberty","opponentAbbr":"NYL",
    "position":"F/C","gameId":"g1",
    "season":{"pts":26.4,"reb":11.2,"ast":2.1,"stl":1.5,"blk":2.8,"3pm":0.2,"to":2.4,"min":32.1,"ts%":0.638,"usg%":32.1},
    "l5":{"pts":28.6,"reb":10.8,"ast":2.4,"pra":41.8},
    "l10":{"pts":27.1,"reb":11.0,"ast":2.2,"pra":40.3},
    "vsOpp":{"pts":24.5,"reb":10.1,"ast":1.8,"pra":36.4,"games":3},
    "props":{
      "pts":{"line":24.5,"books":{"fanduel":{"over":-115,"under":-105},"draftkings":{"over":-110,"under":-110},"betmgm":{"over":-120,"under":100},"pinnacle":{"over":-106,"under":-106},"novig":{"over":-104,"under":-108},"prophetx":{"over":-108,"under":-104}}},
      "reb":{"line":10.5,"books":{"fanduel":{"over":-110,"under":-110},"draftkings":{"over":-115,"under":-105},"pinnacle":{"over":-104,"under":-108},"bet105":{"over":-106,"under":-106}}},
      "ast":{"line":2.5,"books":{"fanduel":{"over":-105,"under":-115},"draftkings":{"over":-110,"under":-110}}},
      "pra":{"line":38.5,"books":{"fanduel":{"over":-110,"under":-110},"draftkings":{"over":-118,"under":100},"novig":{"over":-106,"under":-106}}},
      "blk":{"line":2.5,"books":{"fanduel":{"over":100,"under":-120}}}
    },
    "defRanks":{"ptsDef":8,"rebDef":4,"astDef":11,"blkDef":3,"rankLabel":"Soft on perimeter, tough inside","ptsAllowed":22.1,"rebAllowed":9.8},
    "trend":{"pts":["H","H","H","M","H"],"reb":["H","H","M","H","H"],"ast":["M","H","H","H","M"]}
  }]
}

Rules:
- 3-4 real WNBA games, 4-6 players each
- Prioritize players from the verified names list — use exact spellings
- Vary book availability; include novig+prophetx on ~40% of props
- Sometimes vary the line by 0.5 across books
- defRanks: 1=toughest matchup, 12=easiest
- Realistic 2025 WNBA stats and lines`;

  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:CLAUDE_MODEL,max_tokens:4096,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok) throw new Error(`API ${resp.status}`);
  const json=await resp.json();
  const text=json.content.find(b=>b.type==='text')?.text||'';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

// ── PLAYER CARD ──
function renderPlayerCard(p){
  const initials = p.name.split(' ').map(n=>n[0]).join('').slice(0,2);
  const headshotUrl = espnHeadshot(p.name); // null if not in verified table
  const teamLogoUrl = espnLogo(p.teamAbbr);
  const s=p.season||{}, l5=p.l5||{}, l10=p.l10||{}, vo=p.vsOpp||{}, dr=p.defRanks||{};
  const markets = activeMarket==='all'?Object.keys(p.props||{}):[activeMarket].filter(m=>p.props?.[m]);
  const propCount = Object.keys(p.props||{}).length;

  // Avatar: only show headshot if verified, else initials
  const avatarHtml = headshotUrl
    ? `<img class="avatar-img" src="${headshotUrl}"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
         loading="lazy">
       <div class="avatar-fb" style="display:none">${initials}</div>`
    : `<div class="avatar-fb">${initials}</div>`;

  // Team badge on avatar
  const badgeHtml = teamLogoUrl
    ? `<div class="team-badge"><img src="${teamLogoUrl}" onerror="this.outerHTML='<span class=team-badge-fb>${(p.teamAbbr||'').slice(0,2)}</span>'" loading="lazy"></div>`
    : `<div class="team-badge"><span class="team-badge-fb">${(p.teamAbbr||'').slice(0,2)}</span></div>`;

  // Props
  let propsHtml='';
  markets.forEach(mkt=>{
    const prop=p.props[mkt]; if(!prop) return;
    const cfg=MARKETS[mkt]||{label:mkt.toUpperCase(),emoji:'📊'};
    const books=prop.books||{};
    let bestO=-Infinity,bestOBk=null,bestU=-Infinity,bestUBk=null;
    Object.entries(books).forEach(([bk,o])=>{
      if(o.over>bestO){bestO=o.over;bestOBk=bk;}
      if(o.under>bestU){bestU=o.under;bestUBk=bk;}
    });
    let chips='';
    Object.entries(books).forEach(([bk,o])=>{
      const bc=BOOKS[bk]||{label:bk.slice(0,4).toUpperCase(),color:'#666'};
      const cls=bk===bestOBk?'book-chip best-over':bk===bestUBk?'book-chip best-under':'book-chip';
      const tag=bk===bestOBk?'<span class="best-tag over">O↑</span>':bk===bestUBk?'<span class="best-tag under">U↑</span>':'';
      chips+=`<div class="${cls}">${tag}
        <span class="book-name" style="color:${bc.color}">${bc.label}</span>
        <span class="book-line">${prop.line}</span>
        <div class="book-odds-row">
          <span class="book-odds odds-over">${fmt(o.over)}</span>
          <span class="book-odds odds-under">${fmt(o.under)}</span>
        </div>
      </div>`;
    });
    const avgO=Object.values(books).reduce((a,b)=>a+b.over,0)/Object.values(books).length;
    const imp=impl(avgO);
    const trend=p.trend?.[mkt];
    const trendHtml=trend?`<div class="trend-row"><span class="trend-label">L5</span>${trend.map(t=>`<div class="trend-dot ${t==='H'?'hit':t==='M'?'miss':'push'}">${t}</div>`).join('')}</div>`:'';
    propsHtml+=`
    <div class="prop-section" data-mkt="${mkt}">
      <div class="prop-section-title">${cfg.emoji} ${cfg.label}<span class="prop-line-val">${prop.line}</span></div>
      <div class="prop-row"><span class="prop-label">Books</span><div class="books-row">${chips}</div></div>
      <div class="consensus-bar">
        <span class="consensus-label">Over imp%</span>
        <div class="bar-track"><div class="bar-fill over" style="width:${Math.min(imp,100)}%"></div></div>
        <span class="consensus-val" style="color:${imp>52?'var(--green)':'var(--muted2)'}">${imp.toFixed(1)}%</span>
      </div>
      ${trendHtml}
    </div>`;
  });

  const dc=r=>!r?'':r<=4?'bad':r>=9?'good':'mid';

  return `
  <div class="player-card" id="card-${p.id}">
    <div class="player-header" onclick="toggleCard('${p.id}')">
      <div class="avatar-wrap">${avatarHtml}${badgeHtml}</div>
      <div class="player-info">
        <div class="player-name">${p.name}</div>
        <div class="player-meta">${p.position||''} · ${p.teamAbbr} <span class="opp">vs ${p.opponentAbbr}</span> · ${s.pts||'?'}/${s.reb||'?'}/${s.ast||'?'}</div>
      </div>
      <div class="player-right">
        <div class="expand-btn">▼</div>
        <div class="prop-count-badge">${propCount} props</div>
      </div>
    </div>
    <div class="props-container" id="body-${p.id}" style="display:none">
      ${propsHtml}
      <div class="stats-panel">
        <div class="stats-tabs">
          <button class="stats-tab active" onclick="switchStatTab('${p.id}','season',this)">Season</button>
          <button class="stats-tab" onclick="switchStatTab('${p.id}','l5',this)">L5</button>
          <button class="stats-tab" onclick="switchStatTab('${p.id}','l10',this)">L10</button>
          <button class="stats-tab" onclick="switchStatTab('${p.id}','vsopp',this)">vs OPP</button>
          <button class="stats-tab" onclick="switchStatTab('${p.id}','def',this)">Def Rank</button>
          <button class="stats-tab" onclick="switchStatTab('${p.id}','adv',this)">Advanced</button>
        </div>
        <div id="ss-${p.id}" class="stats-content">
          <div class="stat-grid">
            ${sb('PTS',s.pts,'avg')}${sb('REB',s.reb,'avg')}${sb('AST',s.ast,'avg')}
            ${sb('STL',s.stl,'avg')}${sb('BLK',s.blk,'avg')}${sb('3PM',s['3pm'],'avg')}
            ${sb('TO',s.to,'avg')}${sb('MIN',s.min,'avg')}
          </div>
        </div>
        <div id="sl5-${p.id}" class="stats-content" style="display:none">
          <div class="stat-grid">
            ${sb('PTS',l5.pts,'L5',dfc(l5.pts,s.pts))}${sb('REB',l5.reb,'L5',dfc(l5.reb,s.reb))}
            ${sb('AST',l5.ast,'L5',dfc(l5.ast,s.ast))}${sb('PRA',l5.pra,'L5')}
          </div>
        </div>
        <div id="sl10-${p.id}" class="stats-content" style="display:none">
          <div class="stat-grid">
            ${sb('PTS',l10.pts,'L10',dfc(l10.pts,s.pts))}${sb('REB',l10.reb,'L10',dfc(l10.reb,s.reb))}
            ${sb('AST',l10.ast,'L10',dfc(l10.ast,s.ast))}${sb('PRA',l10.pra,'L10')}
          </div>
        </div>
        <div id="svo-${p.id}" class="stats-content" style="display:none">
          ${vo.games?`<div style="font-size:10px;color:var(--muted);margin-bottom:6px">vs ${p.opponentAbbr} (${vo.games}g)</div>
          <div class="stat-grid">
            ${sb('PTS',vo.pts,'vs opp',dfc(vo.pts,s.pts))}${sb('REB',vo.reb,'vs opp',dfc(vo.reb,s.reb))}
            ${sb('AST',vo.ast,'vs opp',dfc(vo.ast,s.ast))}${sb('PRA',vo.pra,'vs opp')}
          </div>`:'<div style="color:var(--muted);font-size:11px;padding:4px">No prior matchup data</div>'}
        </div>
        <div id="sdef-${p.id}" class="stats-content" style="display:none">
          <div style="font-size:10px;color:var(--muted);margin-bottom:8px">${p.opponentAbbr} defense vs ${p.position||'this pos'} · 1=toughest</div>
          <div class="matchup-row">
            <div class="matchup-box">
              <div class="matchup-box-title">Def Ranks</div>
              ${dr.ptsDef?`<div class="def-stat-row"><span class="def-key">PTS</span><span class="def-val ${dc(dr.ptsDef)}">#${dr.ptsDef}</span></div>`:''}
              ${dr.rebDef?`<div class="def-stat-row"><span class="def-key">REB</span><span class="def-val ${dc(dr.rebDef)}">#${dr.rebDef}</span></div>`:''}
              ${dr.astDef?`<div class="def-stat-row"><span class="def-key">AST</span><span class="def-val ${dc(dr.astDef)}">#${dr.astDef}</span></div>`:''}
              ${dr.blkDef?`<div class="def-stat-row"><span class="def-key">BLK</span><span class="def-val ${dc(dr.blkDef)}">#${dr.blkDef}</span></div>`:''}
            </div>
            <div class="matchup-box">
              <div class="matchup-box-title">Avg Allowed</div>
              ${dr.ptsAllowed?`<div class="def-stat-row"><span class="def-key">PTS/G</span><span class="def-val">${dr.ptsAllowed}</span></div>`:''}
              ${dr.rebAllowed?`<div class="def-stat-row"><span class="def-key">REB/G</span><span class="def-val">${dr.rebAllowed}</span></div>`:''}
              ${dr.rankLabel?`<div style="font-size:9px;color:var(--muted2);margin-top:8px;line-height:1.4">${dr.rankLabel}</div>`:''}
            </div>
          </div>
        </div>
        <div id="sadv-${p.id}" class="stats-content" style="display:none">
          <div class="stat-grid">
            ${sb('TS%',s['ts%']?(s['ts%']*100).toFixed(1)+'%':null,'true shoot')}
            ${sb('USG%',s['usg%']?s['usg%']+'%':null,'usage')}
            ${sb('PRA',((s.pts||0)+(s.reb||0)+(s.ast||0)).toFixed(1),'season')}
            ${sb('STK',((s.stl||0)+(s.blk||0)).toFixed(1),'stl+blk')}
          </div>
          <div id="aip-${p.id}" style="margin-top:8px">
            <button onclick="loadAI('${p.id}')" style="background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.3);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;font-weight:600;width:100%">✨ AI Insight</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function sb(label,val,sub,cls=''){
  return `<div class="stat-box">
    <div class="stat-box-label">${label}</div>
    <div class="stat-box-val ${cls}">${val==null?'—':val}</div>
    ${sub?`<div class="stat-box-sub">${sub}</div>`:''}
  </div>`;
}

// ── RENDER PROPS ──
function renderProps(){
  const c=document.getElementById('propsContainer');
  if(!allData?.players?.length) return;
  const filtered=allData.players.filter(p=>{
    const ms=!searchTerm||p.name.toLowerCase().includes(searchTerm.toLowerCase())||(p.team||'').toLowerCase().includes(searchTerm.toLowerCase());
    const mm=activeMarket==='all'||p.props?.[activeMarket];
    return ms&&mm;
  });
  const byGame={};
  filtered.forEach(p=>{const g=p.gameId||'x';if(!byGame[g])byGame[g]=[];byGame[g].push(p);});
  let html='';
  for(const[gid,players] of Object.entries(byGame)){
    const game=allData.games?.find(g=>g.id===gid);
    if(game) html+=renderGameHeader(game);
    players.forEach(p=>html+=renderPlayerCard(p));
  }
  c.innerHTML=html||'<div class="empty-state"><div class="icon">🔍</div><h3>No matches</h3></div>';
}

        </div>

      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr">
        <div style="padding:10px 14px;border-right:1px solid var(--border)">
          <div class="matchup-box-title" style="margin-bottom:8px;display:flex;align-items:center;gap:5px">${logoEl(g.awayAbbr,16)} ${g.awayAbbr}</div>
          ${prow(ap)}

        <div style="padding:10px 14px">
          <div class="matchup-box-title" style="margin-bottom:8px;display:flex;align-items:center;gap:5px">${logoEl(g.homeAbbr,16)} ${g.homeAbbr}</div>
          ${prow(hp)}
        </div>

}

// ── DEFENSE RANKS ──
function renderDefense(){
  const c=document.getElementById('defenseContainer');
  if(!allData?.players?.length) return;
  const teams={};
  allData.players.forEach(p=>{
    const o=p.opponentAbbr;
    if(!teams[o])teams[o]={abbr:o,pts:[],reb:[],ast:[],blk:[]};
    const dr=p.defRanks||{};
    if(dr.ptsDef)teams[o].pts.push(dr.ptsDef);
    if(dr.rebDef)teams[o].reb.push(dr.rebDef);
    if(dr.astDef)teams[o].ast.push(dr.astDef);
    if(dr.blkDef)teams[o].blk.push(dr.blkDef);
  });
  const avg=arr=>arr.length?(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1):'—';
  const rc=v=>{const n=parseFloat(v);return isNaN(n)?'var(--muted)':n<=4?'var(--red)':n<=7?'var(--yellow)':'var(--green)';};
  const rows=Object.values(teams).map(t=>`
    <tr>
      <td><div class="team-logo-cell">${logoEl(t.abbr,20)}<strong style="color:var(--teal)">${t.abbr}</strong></div></td>
      <td style="color:${rc(avg(t.pts))}">${avg(t.pts)}</td>
      <td style="color:${rc(avg(t.reb))}">${avg(t.reb)}</td>
      <td style="color:${rc(avg(t.ast))}">${avg(t.ast)}</td>
      <td style="color:${rc(avg(t.blk))}">${avg(t.blk)}</td>
    </tr>`).join('');
  c.innerHTML=`
  <table class="def-table">
    <thead><tr><th>Team</th><th>PTS</th><th>REB</th><th>AST</th><th>BLK</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="font-size:10px;color:var(--muted);padding:10px;line-height:1.5">🔴 1–4 toughest · 🟡 5–7 mid · 🟢 8–12 exploitable</div>`;
}

// ── AI INSIGHT ──
async function loadAI(pid){
  const panel=document.getElementById(`aip-${pid}`);
  const p=allData.players.find(x=>x.id===pid);
  if(!p||!panel) return;
  panel.innerHTML=`<div class="ai-insight"><div class="ai-loading"><div class="spinner"></div> Analyzing ${p.name}…</div></div>`;
  try{
    const s=p.season||{},dr=p.defRanks||{};
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:CLAUDE_MODEL,max_tokens:200,messages:[{role:'user',content:`Sharp 2-3 sentence WNBA betting insight on ${p.name} (${p.team}) vs ${p.opponent} today.
Stats: ${s.pts}pts ${s.reb}reb ${s.ast}ast ${s.min}min ${s['usg%']}%usg
L5: ${JSON.stringify(p.l5)} | vs opp: ${JSON.stringify(p.vsOpp)}
Opp def ranks (1=toughest): PTS#${dr.ptsDef} REB#${dr.rebDef} AST#${dr.astDef}
Props: ${Object.entries(p.props||{}).map(([k,v])=>`${k.toUpperCase()} ${v.line}`).join(', ')}
Identify best value prop specifically.`}]})
    });
    const json=await resp.json();
    const text=json.content.find(b=>b.type==='text')?.text||'No insight.';
    panel.innerHTML=`<div class="ai-insight"><div class="ai-insight-label">✨ AI Insight</div>${text}</div>`;
  }catch(e){panel.innerHTML=`<div class="ai-insight" style="color:var(--red)">Failed.</div>`;}
}

// ── UTILS ──
function fmt(o){return o==null?'—':o>0?`+${o}`:`${o}`;}
function impl(a){return a>0?100/(a+100)*100:Math.abs(a)/(Math.abs(a)+100)*100;}
function dfc(v,b){if(v==null||b==null)return'';const d=parseFloat(v)-parseFloat(b);return d>0.5?'up':d<-0.5?'down':'';}
function toggleCard(id){
  const card=document.getElementById(`card-${id}`),body=document.getElementById(`body-${id}`);
  if(!card||!body)return;
  const open=card.classList.toggle('open');
  body.style.display=open?'block':'none';
}
function switchStatTab(pid,tab,btn){
  const map={season:`ss-${pid}`,l5:`sl5-${pid}`,l10:`sl10-${pid}`,vsopp:`svo-${pid}`,def:`sdef-${pid}`,adv:`sadv-${pid}`};
  Object.values(map).forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  const target=document.getElementById(map[tab]);if(target)target.style.display='block';
  btn.closest('.stats-tabs').querySelectorAll('.stats-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function switchTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.getElementById(`tab-${name}`)?.classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function filterMarket(btn){
  activeMarket=btn.dataset.mkt;
  document.querySelectorAll('.filter-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(allData)renderProps();
}
function filterPlayers(){
  searchTerm=document.getElementById('searchInput').value;
  if(allData)renderProps();
}
function updateStatus(){
  document.getElementById('sGames').textContent=allData?.games?.length||0;
  document.getElementById('sProps').textContent=allData?.players?.reduce((a,p)=>a+Object.keys(p.props||{}).length,0)||0;
  document.getElementById('sTime').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
loadData();
</script>
