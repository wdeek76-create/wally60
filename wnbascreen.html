<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WNBA Odds Screen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root {
  --bg:#0a0d14;--surface:#111520;--surface2:#181d2e;--surface3:#1e2438;
  --border:#252d42;--teal:#00c9a7;--teal-dim:rgba(0,201,167,.12);
  --yellow:#fbbf24;--green:#22c55e;--red:#ef4444;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;min-height:100vh;overflow-x:hidden}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:900;letter-spacing:-.5px;color:var(--teal);text-transform:uppercase}
.logo span{color:var(--text)}
.live-badge{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;margin-left:8px}
.btn{background:var(--teal-dim);color:var(--teal);border:1px solid var(--teal);padding:5px 13px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s}
.btn:hover{background:var(--teal);color:#000}
.btn:disabled{opacity:.4;cursor:not-allowed}
.status-bar{padding:5px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center;font-size:10px;color:var(--muted);flex-wrap:wrap}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-right:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.si{display:flex;align-items:center;gap:3px}
.si strong{color:var(--text);font-weight:600}
.tabs{display:flex;gap:2px;padding:10px 16px 0;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 15px;border-radius:6px 6px 0 0;cursor:pointer;font-weight:600;font-size:12px;color:var(--muted);border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:all .15s;background:transparent;font-family:inherit}
.tab.active{background:var(--bg);color:var(--teal);border-color:var(--border)}
.tab:not(.active):hover{color:var(--text)}
.filters{padding:9px 16px;display:flex;gap:5px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg)}
.fl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pill{background:var(--surface);color:var(--muted2);border:1px solid var(--border);padding:3px 10px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;font-family:inherit}
.pill.active{background:var(--teal-dim);color:var(--teal);border-color:var(--teal)}
.pill:hover:not(.active){border-color:var(--muted);color:var(--text)}
.srch{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 11px;border-radius:6px;font-family:inherit;font-size:12px;width:140px;outline:none;transition:border-color .15s}
.srch:focus{border-color:var(--teal)}
.srch::placeholder{color:var(--muted)}
.main{padding:13px 16px}
.tc{display:none}.tc.active{display:block}
/* progress */
.prog-wrap{padding:16px;display:flex;flex-direction:column;gap:8px}
.prog-label{font-size:11px;color:var(--muted2)}
.prog-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
/* game header */
.game-hdr{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.tlogo-fb{border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--teal);border:1px solid var(--border);flex-shrink:0}
.gtv{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--yellow)}
.gtl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
/* player card */
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;transition:border-color .15s}
.pcard:hover{border-color:rgba(0,201,167,.35)}
.pcard-hdr{display:flex;align-items:center;padding:10px 14px;gap:10px;cursor:pointer;user-select:none}
.ava-wrap{position:relative;flex-shrink:0;width:46px;height:46px}
.ava-img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--surface3);display:block}
.ava-fb{width:46px;height:46px;border-radius:50%;background:var(--surface3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--teal)}
.team-badge{position:absolute;bottom:-1px;right:-3px;width:18px;height:18px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
.team-badge img{width:13px;height:13px;object-fit:contain}
.tbfb{font-size:6px;font-weight:700;color:var(--teal)}
.pinfo{flex:1;min-width:0}
.pname{font-weight:700;font-size:14px;color:var(--text)}
.pmeta{font-size:11px;color:var(--muted2);margin-top:1px}
.pmeta .opp{color:var(--teal);font-weight:600}
.pright{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.expand{color:var(--muted);font-size:13px;transition:transform .2s}
.pcard.open .expand{transform:rotate(180deg)}
.prop-badge{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(0,201,167,.3);padding:1px 7px;border-radius:10px;font-size:9px;font-weight:700}
.inj-tag{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700}
/* prop body */
.prop-body{border-top:1px solid var(--border)}
.psec{padding:10px 14px;border-bottom:1px solid var(--border)}
.psec:last-child{border-bottom:none}
.psec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.psec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.pline-val{color:var(--teal);font-family:'JetBrains Mono',monospace;margin-left:4px}
.line-move{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:6px}
.line-move.up{background:rgba(239,68,68,.2);color:var(--red)}
.line-move.dn{background:rgba(34,197,94,.2);color:var(--green)}
/* alt lines */
.alt-section{margin-bottom:8px}
.alt-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.alt-scroller{display:flex;gap:4px;overflow-x:auto;padding-bottom:3px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.alt-scroller::-webkit-scrollbar{height:3px}
.alt-scroller::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.alt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--muted2);transition:all .12s;white-space:nowrap;flex-shrink:0;position:relative}
.alt-btn:hover{border-color:var(--teal);color:var(--teal)}
.alt-btn.sel{background:var(--teal-dim);border-color:var(--teal);color:var(--teal)}
.alt-btn.ml{border-color:rgba(251,191,36,.5)}
.ml-dot{display:none;position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--yellow)}
.alt-btn.ml .ml-dot{display:block}
/* book chips */
.books-row{display:flex;flex-wrap:wrap;gap:4px}
.bchip{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;display:flex;flex-direction:column;align-items:center;min-width:56px;position:relative}
.bchip.best-o{border-color:var(--green);background:rgba(34,197,94,.07)}
.bchip.best-u{border-color:var(--red);background:rgba(239,68,68,.07)}
.bname{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.bline{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text)}
.bodds{display:flex;gap:4px}
.bo{font-family:'JetBrains Mono',monospace;font-size:10px}
.oo{color:var(--green)}.uo{color:var(--red)}
.btag{position:absolute;top:-6px;right:3px;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;text-transform:uppercase}
.btag.o{background:var(--green);color:#000}
.btag.u{background:var(--red);color:#fff}
.cbar{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;margin-top:6px;display:flex;align-items:center;gap:8px}
.clbl{font-size:10px;color:var(--muted);width:54px;flex-shrink:0}
.btrack{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px;background:var(--green)}
.cval{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;width:38px;text-align:right;flex-shrink:0}
/* recent log */
.game-log{display:flex;gap:4px;margin-top:6px;overflow-x:auto;scrollbar-width:none}
.game-log::-webkit-scrollbar{display:none}
.gl-game{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 7px;flex-shrink:0;text-align:center;min-width:44px}
.gl-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}
.gl-opp{font-size:8px;color:var(--muted);margin-top:1px}
.gl-h{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
.gl-m{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.06)}
/* stats panel */
.spanel{background:var(--surface2);margin:0 14px 10px;border-radius:8px;border:1px solid var(--border);overflow:hidden}
.stabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface3);overflow-x:auto;scrollbar-width:none}
.stabs::-webkit-scrollbar{display:none}
.stab{padding:6px 10px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;background:transparent;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.stab.active{color:var(--teal);border-bottom-color:var(--teal)}
.scontent{padding:10px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:6px}
.sbox{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 8px;text-align:center}
.sbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.sbv{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);margin-top:2px}
.sbs{font-size:9px;color:var(--muted2);margin-top:1px}
/* def / standings tables */
.dtbl{width:100%;border-collapse:collapse;font-size:12px}
.dtbl th{text-align:left;padding:8px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);font-weight:600}
.dtbl th:not(:first-child){text-align:center}
.dtbl td{padding:8px;border-bottom:1px solid var(--border)}
.dtbl td:not(:first-child){text-align:center;font-family:'JetBrains Mono',monospace;font-weight:600}
.dtbl tr:last-child td{border-bottom:none}
.tlc{display:flex;align-items:center;gap:7px}
/* injury cards */
.inj-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:30px;margin-bottom:8px}
.empty h3{font-size:14px;color:var(--muted2);margin-bottom:4px}
.empty p{font-size:11px;line-height:1.5}
.warn-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--yellow);line-height:1.5}
@media(max-width:480px){.sgrid{grid-template-columns:repeat(3,1fr)}.bchip{min-width:48px}}
</style>
</head>
<body>
<div class="hdr">
  <div style="display:flex;align-items:center">
    <div class="logo">WNBA <span>Odds</span></div>
    <div class="live-badge">LIVE</div>
  </div>
  <button class="btn" id="refreshBtn" onclick="loadAll()">⟳ Refresh</button>
</div>
<div class="status-bar">
  <div class="si"><span class="sdot"></span><strong id="sGames">—</strong>&nbsp;games</div>
  <div class="si">📊 <strong id="sProps">—</strong>&nbsp;props</div>
  <div class="si">📚 <strong id="sBooks">—</strong></div>
  <div class="si">🕐 <strong id="sTime">—</strong></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('props',this)">Props</button>
  <button class="tab" onclick="switchTab('matchups',this)">Matchups</button>
  <button class="tab" onclick="switchTab('defense',this)">Def Ranks</button>
  <button class="tab" onclick="switchTab('injuries',this)">Injuries</button>
  <button class="tab" onclick="switchTab('standings',this)">Standings</button>
</div>
<div class="filters">
  <span class="fl">Mkt</span>
  <button class="pill active" data-mkt="all"                     onclick="fmkt(this)">All</button>
  <button class="pill"        data-mkt="points"                  onclick="fmkt(this)">PTS</button>
  <button class="pill"        data-mkt="rebounds"                onclick="fmkt(this)">REB</button>
  <button class="pill"        data-mkt="assists"                 onclick="fmkt(this)">AST</button>
  <button class="pill"        data-mkt="points_rebounds_assists" onclick="fmkt(this)">PRA</button>
  <button class="pill"        data-mkt="points_rebounds"         onclick="fmkt(this)">P+R</button>
  <button class="pill"        data-mkt="points_assists"          onclick="fmkt(this)">P+A</button>
  <button class="pill"        data-mkt="rebounds_assists"        onclick="fmkt(this)">R+A</button>
  <button class="pill"        data-mkt="threes"                  onclick="fmkt(this)">3PM</button>
  <button class="pill"        data-mkt="double_double"           onclick="fmkt(this)">DD</button>
  <input class="srch" id="srch" placeholder="Search player…" oninput="renderProps()"/>
</div>
<div id="tab-props"     class="tc active"><div class="main" id="propsContainer"><div class="prog-wrap"><div class="prog-label">Initializing…</div><div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div></div></div></div>
<div id="tab-matchups"  class="tc"><div class="main" id="matchupsContainer"></div></div>
<div id="tab-defense"   class="tc"><div class="main" id="defContainer"></div></div>
<div id="tab-injuries"  class="tc"><div class="main" id="injContainer"></div></div>
<div id="tab-standings" class="tc"><div class="main" id="standContainer"></div></div>

<script>
const BASE='https://api.balldontlie.io/wnba/v1';
const KEY='9cdb249f-9635-4cca-a998-37c7b98a9372';
const H={Authorization:KEY};

let games=[], players={}, props={}, openProps={}, seasonStats={},
    teamSeasonStats=[], recentStats={}, injuries=[], gameOdds={}, standings=[];
let activeMkt='all', selLines={};
let warnings=[];

// ── ESPN / display lookups ──
const ESPN_IDS={
  "A'ja Wilson":'4066453',"Chelsea Gray":'2529074',"Kelsey Plum":'3149390',
  "Jackie Young":'4066446',"Dearica Hamby":'3918296',"Alysha Clark":'2529065',
  "Breanna Stewart":'3149391',"Sabrina Ionescu":'4066430',"Jonquel Jones":'3918299',
  "Courtney Vandersloot":'2961238',"Nyara Sabally":'4432657',
  "Caitlin Clark":'4432650',"Aliyah Boston":'4432642',"NaLyssa Smith":'4432648',
  "Kelsey Mitchell":'4066438',"Lexie Hull":'4432645',"Erica Wheeler":'2961235',
  "Angel Reese":'4573096',"Kahleah Copper":'3918295',"Marina Mabrey":'4066441',
  "Courtney Williams":'3918301',"Elizabeth Williams":'2961240',
  "Napheesa Collier":'4066440',"Kayla McBride":'2529077',"Diamond Miller":'4573095',
  "Arike Ogunbowale":'4066447',"Satou Sabally":'4066449',"Teaira McCowan":'4066439',
  "Odyssey Sims":'2529080',"Rhyne Howard":'4432641',"Allisha Gray":'4066431',
  "Tiffany Hayes":'2529071',"Jewell Loyd":'3149395',"Nneka Ogwumike":'2529070',
  "Skylar Diggins-Smith":'2529072',"Diana Taurasi":'313232',"Brittney Griner":'2472778',
  "Sophie Cunningham":'4066429',"Natasha Cloud":'3918294',"DeWanna Bonner":'313239',
  "Alyssa Thomas":'2961236',"DiJonai Carrington":'4432643',"Brionna Jones":'4066432',
  "Elena Delle Donne":'2489651',"Ariel Atkins":'4066428',"Shakira Austin":'4432640',
  "Layshia Clarendon":'2961239',
};
// ESPN WNBA team slugs — used in logo URLs and team page URLs
// BDL abbr → ESPN URL slug (verified from espn.com/wnba/team/_/name/{slug})
// wehoop ESPN team IDs (2026-05-30): ATL=20,CHI=19,CON=18,DAL=3,GS=129689,
// IND=5,LV=17,LA=6,MIN=8,NY=9,PHX=11,POR=132052,SEA=15,TOR=130093(?),WAS=16
const TEAM_SLUG={
  ATL:'atl', CHI:'chi', CON:'con', DAL:'dal',
  GLD:'gs',  GS:'gs',   IND:'ind', LV:'lv',
  LA:'la',   MIN:'min', NY:'ny',   PHX:'phx',
  POR:'por', SEA:'sea', TOR:'tor', WAS:'was',
  // BDL alternates
  LVA:'lv',  LAX:'la',  NYL:'ny',
};
// ESPN numeric IDs (for headshot URLs which need IDs not slugs)
const TEAM_ESPN={
  ATL:'20',CHI:'19',CON:'18',DAL:'3',GLD:'129689',GS:'129689',
  IND:'5',LV:'17',LA:'6',MIN:'8',NY:'9',PHX:'11',
  POR:'132052',SEA:'15',TOR:'130093',WAS:'16',
  LVA:'17',LAX:'6',NYL:'9',
};
const BNAMES={
  fanduel:{l:'FD',c:'#0077c8'},draftkings:{l:'DK',c:'#61b232'},
  caesars:{l:'CZR',c:'#006341'},betrivers:{l:'BRV',c:'#1d4ed8'},
  fanatics:{l:'FAN',c:'#e8002d'},betmgm:{l:'MGM',c:'#c5a000'},
};
const PLABEL={
  points:'Points',rebounds:'Rebounds',assists:'Assists',
  points_rebounds_assists:'PRA',points_rebounds:'Pts+Reb',
  points_assists:'Pts+Ast',rebounds_assists:'Reb+Ast',
  threes:'3-Pointers',double_double:'Dbl-Dbl',triple_double:'Triple-Dbl',
};
const PEMOJI={
  points:'🔥',rebounds:'💪',assists:'🎯',points_rebounds_assists:'🏆',
  points_rebounds:'📊',points_assists:'📊',rebounds_assists:'📊',
  threes:'🎯',double_double:'⭐',triple_double:'🌟',
};

// ── FETCH with retry on 429 ──
async function bdl(path, retries=3){
  for(let i=0;i<retries;i++){
    const r=await fetch(`${BASE}${path}`,{headers:H});
    if(r.status===429){
      const wait=1200*(i+1);
      setProgress(null,`Rate limited — waiting ${wait/1000}s…`);
      await sleep(wait);
      continue;
    }
    if(!r.ok) throw new Error(`BDL ${r.status} — ${path}`);
    return r.json();
  }
  throw new Error(`BDL 429 too many retries — ${path}`);
}

// Sequential fetch — don't burst all at once
async function bdlSeq(paths){
  const results=[];
  for(const p of paths){
    try{ results.push(await bdl(p)); }
    catch(e){ results.push({data:[],_err:e.message}); }
    await sleep(120); // 120ms between calls (~8/s, under 10/s limit)
  }
  return results;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function setProgress(pct, label){
  const fill=document.getElementById('progFill');
  const lbl=document.querySelector('.prog-label');
  if(fill&&pct!=null) fill.style.width=pct+'%';
  if(lbl&&label) lbl.textContent=label;
}

// ── HELPERS ──
function espnHead(name){const id=ESPN_IDS[name];return id?`https://a.espncdn.com/i/headshots/wnba/players/full/${id}.png`:null;}
function espnLogo(abbr){
  // Slug-based URL is more reliable than numeric ID — ESPN resolves it server-side
  const slug=TEAM_SLUG[abbr?.toUpperCase?.()];
  if(slug) return `https://a.espncdn.com/i/teamlogos/wnba/500/scoreboard/${slug}.png`;
  // Numeric ID fallback
  const id=TEAM_ESPN[abbr?.toUpperCase?.()];
  return id?`https://a.espncdn.com/i/teamlogos/wnba/500/${id}.png`:null;
}
function logoEl(abbr,sz=26){
  const url=espnLogo(abbr);
  if(!url) return `<div class="tlogo-fb" style="width:${sz}px;height:${sz}px">${abbr||''}</div>`;
  // On error try numeric ID fallback, then show text
  const id=TEAM_ESPN[abbr?.toUpperCase?.()];
  const fbId=id?`https://a.espncdn.com/i/teamlogos/wnba/500/${id}.png`:'';
  const txt=`<div class=\\"tlogo-fb\\" style=\\"width:${sz}px;height:${sz}px\\">${abbr||''}<\\/div>`;
  return `<img src="${url}" style="width:${sz}px;height:${sz}px;object-fit:contain;flex-shrink:0"
    onerror="this.src='${fbId}';this.onerror=function(){this.outerHTML='${txt}'}"
    loading="lazy">`;
}
function fmt(o){if(o==null)return'—';return o>0?`+${o}`:`${o}`;}
function impl(a){return a>0?100/(a+100)*100:Math.abs(a)/(Math.abs(a)+100)*100;}
function avgArr(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;}
function fmtN(n,d=1){return n!=null&&!isNaN(n)?Number(n).toFixed(d):'—';}
function gameTime(ds){
  try{return new Date(ds).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});}
  catch{return ds||'—';}
}

// ── MAIN LOAD ──
async function loadAll(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='⟳ Loading…';
  selLines={}; warnings=[];
  document.getElementById('propsContainer').innerHTML=
    '<div class="prog-wrap"><div class="prog-label">Fetching games…</div><div class="prog-bar"><div class="prog-fill" id="progFill" style="width:5%"></div></div></div>';

  try{
    await loadCore();
    renderAll();
    updateStatus();
  }catch(e){
    document.getElementById('propsContainer').innerHTML=
      `<div class="empty"><div class="icon">❌</div><h3>Load Error</h3><p>${e.message}</p></div>`;
    console.error(e);
  }
  btn.disabled=false; btn.textContent='⟳ Refresh';
}

async function loadCore(){
  const today=new Date().toISOString().slice(0,10);

  // 1. Games — use dates[] with bracket as per spec array param
  setProgress(10,'Loading today\'s games…');
  const gd=await bdl(`/games?dates[]=${today}&per_page=100`);
  games=gd.data||[];

  if(!games.length){
    document.getElementById('propsContainer').innerHTML=
      `<div class="empty"><div class="icon">🏀</div><h3>No WNBA games today</h3><p>${today}</p></div>`;
    return;
  }

  const gameIds=games.map(g=>g.id);
  setProgress(20,`Found ${games.length} games — loading odds…`);

  // 2. Game odds — dates param (no brackets) per spec
  const oddsData=await bdl(`/odds?dates[]=${today}&per_page=100`).catch(()=>({data:[]}));
  gameOdds={};
  (oddsData.data||[]).forEach(o=>{
    if(!gameOdds[o.game_id])gameOdds[o.game_id]=[];
    gameOdds[o.game_id].push(o);
  });
  await sleep(200);

  // 3. Props — sequential per game to avoid burst
  setProgress(30,'Loading player props…');
  props={}; openProps={};
  const propIds=new Set();
  for(let i=0;i<gameIds.length;i++){
    const gid=gameIds[i];
    setProgress(30+Math.floor((i/gameIds.length)*20),`Props game ${i+1}/${gameIds.length}…`);
    // current props
    const pd=await bdl(`/odds/player_props?game_id=${gid}`).catch(()=>({data:[]}));
    (pd.data||[]).forEach(p=>{
      const pid=p.player_id;
      propIds.add(pid);
      if(!props[pid])props[pid]={};
      if(!props[pid][p.prop_type])props[pid][p.prop_type]={};
      if(!props[pid][p.prop_type][p.vendor])props[pid][p.prop_type][p.vendor]=[];
      props[pid][p.prop_type][p.vendor].push({
        line:parseFloat(p.line_value),
        over:p.market?.over_odds??null,
        under:p.market?.under_odds??null,
        odds:p.market?.odds??null,
        type:p.market?.type,
      });
      props[pid][p.prop_type][p.vendor].sort((a,b)=>a.line-b.line);
    });
    await sleep(200);
    // opening props for line movement
    const op=await bdl(`/odds/player_props/opening?game_id=${gid}`).catch(()=>({data:[]}));
    (op.data||[]).forEach(p=>{
      openProps[`${p.player_id}_${p.prop_type}_${p.vendor}`]=parseFloat(p.line_value);
    });
    await sleep(200);
  }

  if(!propIds.size){
    warnings.push('No player props available yet for today\'s games — books may not have posted lines yet. Check back closer to game time.');
  }

  // 4. Player info — batch by 50
  setProgress(55,'Loading player info…');
  players={};
  const pids=[...propIds];
  const chunks=[];
  for(let i=0;i<pids.length;i+=50)chunks.push(pids.slice(i,i+50));
  for(const ch of chunks){
    const qs=ch.map(id=>`player_ids[]=${id}`).join('&');
    const d=await bdl(`/players?${qs}&per_page=100`).catch(()=>({data:[]}));
    d.data?.forEach(p=>{players[p.id]=p;});
    await sleep(200);
  }

  // 5. Season stats — try current season first, fall back to previous
  setProgress(65,'Loading season stats…');
  seasonStats={};
  const curSeason=new Date().getFullYear();
  for(const ch of chunks){
    const qs=ch.map(id=>`player_ids[]=${id}`).join('&');
    // try current year
    const d=await bdl(`/player_season_stats?${qs}&season=${curSeason}&per_page=100`).catch(()=>({data:[]}));
    d.data?.forEach(s=>{seasonStats[s.player.id]=s;});
    await sleep(200);
  }
  // fill missing with prior year
  const missing=pids.filter(id=>!seasonStats[id]);
  if(missing.length){
    const mc=[];
    for(let i=0;i<missing.length;i+=50)mc.push(missing.slice(i,i+50));
    for(const ch of mc){
      const qs=ch.map(id=>`player_ids[]=${id}`).join('&');
      const d=await bdl(`/player_season_stats?${qs}&season=${curSeason-1}&per_page=100`).catch(()=>({data:[]}));
      d.data?.forEach(s=>{if(!seasonStats[s.player.id])seasonStats[s.player.id]=s;});
      await sleep(200);
    }
  }

  // 6. Recent game logs
  setProgress(75,'Loading recent game logs…');
  recentStats={};
  for(const ch of chunks){
    const qs=ch.map(id=>`player_ids[]=${id}`).join('&');
    const d=await bdl(`/player_stats?${qs}&seasons[]=${curSeason}&per_page=100`).catch(()=>({data:[]}));
    d.data?.forEach(s=>{
      const pid=s.player.id;
      if(!recentStats[pid])recentStats[pid]=[];
      recentStats[pid].push(s);
    });
    await sleep(200);
  }
  Object.keys(recentStats).forEach(pid=>{
    recentStats[pid].sort((a,b)=>new Date(b.game.date)-new Date(a.game.date));
  });

  // 7. Injuries, standings, team stats — sequential
  setProgress(85,'Loading injuries & standings…');
  const injData=await bdl('/player_injuries?per_page=100').catch(()=>({data:[]}));
  injuries=injData.data||[];
  await sleep(200);

  const stData=await bdl(`/standings?season=${curSeason}`).catch(()=>({data:[]}));
  standings=stData.data||[];
  await sleep(200);

  const tsData=await bdl(`/team_season_stats?season=${curSeason}&per_page=100`).catch(()=>({data:[]}));
  teamSeasonStats=tsData.data||[];

  setProgress(100,'Done!');
}

// ── RENDER ALL ──
function renderAll(){
  renderProps();
  renderMatchups();
  renderDefense();
  renderInjuries();
  renderStandings();
}

// ── PROPS ──
function renderProps(){
  const c=document.getElementById('propsContainer');
  if(!games.length) return;

  const search=(document.getElementById('srch')?.value||'').toLowerCase();
  let html='', totalProps=0;

  // warnings
  if(warnings.length){
    html+=`<div class="warn-box">⚠️ ${warnings.join('<br>')}</div>`;
  }

  games.forEach(g=>{
    const hA=g.home_team?.abbreviation||'', aA=g.visitor_team?.abbreviation||'';
    const gPlayers=Object.keys(props).map(Number).filter(pid=>{
      const p=players[pid]; if(!p) return false;
      const inGame=p.team?.id===g.home_team?.id||p.team?.id===g.visitor_team?.id;
      if(!inGame) return false;
      if(search&&!`${p.first_name} ${p.last_name}`.toLowerCase().includes(search)&&
         !(p.team?.abbreviation||'').toLowerCase().includes(search)) return false;
      if(activeMkt!=='all'&&!props[pid]?.[activeMkt]) return false;
      return true;
    });

    const go=gameOdds[g.id]||[];
    const fdO=go.find(o=>o.vendor==='fanduel')||go[0];
    const total=fdO?.total_value||'—';
    const spread=fdO?.spread_home_value!=null?`${fdO.spread_home_value>0?'+':''}${fdO.spread_home_value}`:'—';
    const live=g.status==='in_progress'?'🔴 LIVE':(g.period>0?`Q${g.period} ${g.time||''}`:gameTime(g.date));

    html+=`<div class="game-hdr">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:4px">${logoEl(aA,26)}<span style="font-size:10px;color:var(--muted);font-weight:700">@</span>${logoEl(hA,26)}</div>
        <div>
          <div style="font-weight:700;font-size:13px">${aA} @ ${hA}</div>
          <div style="font-size:10px;color:var(--muted2);margin-top:1px">${live} · ${hA} ${spread}</div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="gtv">${total}</div><div class="gtl">Total</div>
      </div>
    </div>`;

    if(!gPlayers.length){
      html+=`<div style="padding:10px 14px;font-size:11px;color:var(--muted);margin-bottom:10px">No props posted yet for this game.</div>`;
    } else {
      gPlayers.forEach(pid=>{
        totalProps+=Object.keys(props[pid]||{}).length;
        html+=renderPlayerCard(pid,g);
      });
    }
  });

  document.getElementById('sProps').textContent=totalProps;
  c.innerHTML=html||'<div class="empty"><div class="icon">🔍</div><h3>No props match filter</h3></div>';
}

function renderPlayerCard(pid,game){
  const p=players[pid]; if(!p) return '';
  const fn=`${p.first_name} ${p.last_name}`;
  const ini=`${p.first_name?.[0]||''}${p.last_name?.[0]||''}`;
  const inj=injuries.find(i=>i.player?.id===pid);
  const ss=seasonStats[pid];
  const abbr=p.team?.abbreviation||'';
  const opp=game.home_team?.id===p.team?.id?game.visitor_team?.abbreviation:game.home_team?.abbreviation;
  const hs=espnHead(fn), tl=espnLogo(abbr);
  const pp=props[pid]||{};
  const mktKeys=activeMkt==='all'?Object.keys(pp):[activeMkt].filter(m=>pp[m]);

  // avatar
  const ava=hs
    ?`<img class="ava-img" src="${hs}" onerror="this.style.display='none';document.getElementById('afb${pid}').style.display='flex'" loading="lazy"><div class="ava-fb" id="afb${pid}" style="display:none">${ini}</div>`
    :`<div class="ava-fb">${ini}</div>`;
  const badge=tl
    ?`<div class="team-badge"><img src="${tl}" onerror="this.outerHTML='<span class=tbfb>${abbr.slice(0,2)}</span>'" loading="lazy"></div>`
    :`<div class="team-badge"><span class="tbfb">${abbr.slice(0,2)}</span></div>`;

  // prop sections
  let propHtml='';
  mktKeys.forEach(mkt=>{
    const vm=pp[mkt];
    const allLines=[...new Set(Object.values(vm).flatMap(a=>a.map(x=>x.line)))].sort((a,b)=>a-b);
    const lc={}; Object.values(vm).forEach(a=>a.forEach(x=>{lc[x.line]=(lc[x.line]||0)+1;}));
    const mainLine=allLines.reduce((a,b)=>lc[b]>lc[a]?b:a,allLines[0]);
    const key=`${pid}_${mkt}`;
    if(selLines[key]==null) selLines[key]=mainLine;
    const sel=selLines[key];

    // line move
    let moveBadge='';
    const fv=Object.keys(vm)[0];
    if(fv){
      const op=openProps[`${pid}_${mkt}_${fv}`];
      if(op!=null&&op!==sel){
        const d=(sel-op).toFixed(1);
        moveBadge=`<span class="line-move ${d>0?'up':'dn'}">${d>0?'▲':'▼'}${Math.abs(d)}</span>`;
      }
    }

    // alt buttons
    const altBtns=allLines.map(l=>`
      <button class="alt-btn${l===sel?' sel':''}${l===mainLine?' ml':''}" onclick="pickLine('${key}',${l},${pid})">
        ${l}<span class="ml-dot"></span>
      </button>`).join('');

    // chips at selected line
    let bestO=-Infinity,bestOBk=null,bestU=-Infinity,bestUBk=null;
    const bAt={};
    Object.entries(vm).forEach(([v,a])=>{
      const e=a.find(x=>x.line===sel); if(!e) return;
      bAt[v]=e;
      if(e.over!=null&&e.over>bestO){bestO=e.over;bestOBk=v;}
      if(e.under!=null&&e.under>bestU){bestU=e.under;bestUBk=v;}
    });
    const isMile=Object.values(bAt)[0]?.type==='milestone';
    let chips='';
    Object.entries(bAt).forEach(([v,e])=>{
      const bc=BNAMES[v]||{l:v.slice(0,4).toUpperCase(),c:'#888'};
      const bO=!isMile&&v===bestOBk, bU=!isMile&&v===bestUBk;
      const tag=bO?'<span class="btag o">O↑</span>':bU?'<span class="btag u">U↑</span>':'';
      chips+=`<div class="bchip${bO?' best-o':bU?' best-u':''}">${tag}
        <span class="bname" style="color:${bc.c}">${bc.l}</span>
        <span class="bline">${e.line}</span>
        <div class="bodds">
          ${isMile?`<span class="bo oo">${fmt(e.odds)}</span>`
            :`<span class="bo oo">${fmt(e.over)}</span><span class="bo uo">${fmt(e.under)}</span>`}
        </div>
      </div>`;
    });

    // consensus
    const overOdds=Object.values(bAt).map(e=>e.over).filter(x=>x!=null);
    const imp=overOdds.length?impl(avgArr(overOdds)):null;
    const cbar=imp!=null?`<div class="cbar">
      <span class="clbl">Over imp%</span>
      <div class="btrack"><div class="bfill" style="width:${Math.min(imp,100)}%"></div></div>
      <span class="cval" style="color:${imp>52?'var(--green)':'var(--muted2)'}">${imp.toFixed(1)}%</span>
    </div>`:'';

    // recent log for pts/reb/ast
    const skMap={points:'pts',rebounds:'reb',assists:'ast'};
    const sk=skMap[mkt];
    let logHtml='';
    if(sk&&recentStats[pid]?.length){
      const recent=recentStats[pid].slice(0,5);
      logHtml='<div class="game-log">';
      recent.forEach(g=>{
        const val=g[sk]??null;
        if(val==null) return;
        const hit=val>=sel;
        logHtml+=`<div class="gl-game ${hit?'gl-h':'gl-m'}">
          <div class="gl-val" style="color:${hit?'var(--green)':'var(--red)'}">${val}</div>
          <div class="gl-opp">${g.team?.abbreviation||'?'}</div>
        </div>`;
      });
      logHtml+='</div>';
    }

    propHtml+=`<div class="psec" data-mkt="${mkt}">
      <div class="psec-title">${PEMOJI[mkt]||'📊'} ${PLABEL[mkt]||mkt}
        <span class="pline-val">${sel}</span>${moveBadge}
      </div>
      ${allLines.length>1?`<div class="alt-section">
        <div class="alt-label">
          <span>Alt Lines</span>
          <span style="color:var(--muted2)">${allLines.length} lines · <span style="color:var(--yellow)">●</span> main</span>
        </div>
        <div class="alt-scroller">${altBtns}</div>
      </div>`:''}
      <div class="books-row">${chips||'<span style="font-size:11px;color:var(--muted)">No odds at this line</span>'}</div>
      ${cbar}${logHtml}
    </div>`;
  });

  // stats
  const pts=fmtN(ss?.pts), reb=fmtN(ss?.reb), ast=fmtN(ss?.ast);
  const szn=ss?.season?` '${String(ss.season).slice(2)}`:'';

  return `<div class="pcard" id="pc-${pid}">
    <div class="pcard-hdr" onclick="toggleCard(${pid})">
      <div class="ava-wrap">${ava}${badge}</div>
      <div class="pinfo">
        <div class="pname">${fn}${inj?` <span class="inj-tag">${inj.status||'INJ'}</span>`:''}</div>
        <div class="pmeta">${p.position||''} · ${abbr} <span class="opp">vs ${opp||'?'}</span> · ${pts}/${reb}/${ast}${szn}</div>
      </div>
      <div class="pright"><div class="expand">▼</div><div class="prop-badge">${Object.keys(pp).length} props</div></div>
    </div>
    <div class="prop-body" id="pb-${pid}" style="display:none">
      ${propHtml}
      <div class="spanel">
        <div class="stabs">
          <button class="stab active" onclick="sstab(${pid},'s',this)">Season${szn}</button>
          <button class="stab" onclick="sstab(${pid},'sh',this)">Shooting</button>
          <button class="stab" onclick="sstab(${pid},'rl',this)">Last 5</button>
          <button class="stab" onclick="sstab(${pid},'bio',this)">Bio</button>
        </div>
        <div id="ss-${pid}" class="scontent">
          <div class="sgrid">
            ${sb('PTS',pts,'avg')}${sb('REB',reb,'avg')}${sb('AST',ast,'avg')}
            ${sb('STL',fmtN(ss?.stl),'avg')}${sb('BLK',fmtN(ss?.blk),'avg')}${sb('3PM',fmtN(ss?.fg3m),'avg')}
            ${sb('TO',fmtN(ss?.turnover),'avg')}${sb('MIN',fmtN(ss?.min),'avg')}
            ${sb('PRA',ss?fmtN((ss.pts||0)+(ss.reb||0)+(ss.ast||0)):'—','calc')}
          </div>
        </div>
        <div id="sh-${pid}" class="scontent" style="display:none">
          <div class="sgrid">
            ${sb('FG%',ss?.fg_pct!=null?fmtN(ss.fg_pct,1)+'%':'—','')}
            ${sb('3P%',ss?.fg3_pct!=null?fmtN(ss.fg3_pct,1)+'%':'—','')}
            ${sb('FT%',ss?.ft_pct!=null?fmtN(ss.ft_pct,1)+'%':'—','')}
            ${sb('FGM',fmtN(ss?.fgm),'avg')}${sb('FGA',fmtN(ss?.fga),'avg')}
            ${sb('GP',ss?.games_played??'—','games')}
          </div>
        </div>
        <div id="rl-${pid}" class="scontent" style="display:none">
          ${renderRecentLog(pid)}
        </div>
        <div id="bio-${pid}" class="scontent" style="display:none">
          <div class="sgrid">
            ${sb('Age',p.age??'—','')}${sb('#',p.jersey_number??'—','jersey')}${sb('Pos',p.position??'—','')}
          </div>
          <div style="font-size:11px;color:var(--muted2);margin-top:8px;line-height:1.7">
            ${p.height?`📏 ${p.height}&emsp;`:''}${p.weight?`⚖️ ${p.weight}&emsp;`:''}${p.college?`🎓 ${p.college}`:''}
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderRecentLog(pid){
  const gs=(recentStats[pid]||[]).slice(0,5);
  if(!gs.length) return '<div style="color:var(--muted);font-size:11px">No recent game data loaded.</div>';
  return `<div style="display:flex;flex-direction:column;gap:4px">
    ${gs.map(g=>{
      const d=new Date(g.game.date).toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px">
        <span style="color:var(--muted);min-width:36px">${d}</span>
        <div style="display:flex;gap:10px">
          ${gs_stat('PTS',g.pts)}${gs_stat('REB',g.reb)}${gs_stat('AST',g.ast)}
          ${gs_stat('STL',g.stl)}${gs_stat('BLK',g.blk)}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
function gs_stat(l,v){return `<span><span style="color:var(--muted)">${l}</span> <strong style="font-family:'JetBrains Mono',monospace">${v??'—'}</strong></span>`;}
function sb(l,v,s){return `<div class="sbox"><div class="sbl">${l}</div><div class="sbv">${v??'—'}</div>${s?`<div class="sbs">${s}</div>`:''}</div>`;}

          <span style="font-size:10px;color:var(--muted2);margin-left:4px">${gameTime(g.date)}</span>
        </div>
        <div style="text-align:right"><div class="gtv" style="font-size:15px">${fdO?.total_value||'—'}</div><div class="gtl">O/U</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr">
        <div style="padding:10px 14px;border-right:1px solid var(--border)">
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px">${logoEl(aA,14)} ${aA}</div>
          ${pRows(g.visitor_team?.id)}
        </div>
        <div style="padding:10px 14px">
          <div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:5px">${logoEl(hA,14)} ${hA}</div>
          ${pRows(g.home_team?.id)}
        </div>
      </div>
      ${go.length?`<div style="padding:7px 14px;border-top:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap">
        ${go.map(o=>{const bc=BNAMES[o.vendor]||{l:o.vendor,c:'#888'};
          return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-size:10px">
            <strong style="color:${bc.c}">${bc.l}</strong>
            <span style="color:var(--muted2);margin-left:4px">${hA} ${o.spread_home_value>0?'+':''}${o.spread_home_value}</span>
            <span style="color:var(--muted);margin:0 3px">·</span>
            <span style="color:var(--muted2)">O/U ${o.total_value}</span>
          </div>`;}).join('')}
      </div>`:``}
    </div>`;
  });
  c.innerHTML=html;
}

// ── DEF RANKS ──
function renderDefense(){
  const c=document.getElementById('defContainer');
  if(!games.length){c.innerHTML='<div class="empty"><div class="icon">🛡️</div><h3>No games</h3></div>';return;}
  const td={};
  games.forEach(g=>{
    [[g.home_team,g.visitor_team],[g.visitor_team,g.home_team]].forEach(([def,off])=>{
      const k=def.abbreviation;
      if(!td[k])td[k]={abbr:k,pts:[],reb:[],ast:[],blk:[],stl:[],fg3m:[]};
      Object.keys(props).map(Number).forEach(pid=>{
        if(players[pid]?.team?.id!==off.id) return;
        const ss=seasonStats[pid]; if(!ss) return;
        if(ss.pts)td[k].pts.push(ss.pts);
        if(ss.reb)td[k].reb.push(ss.reb);
        if(ss.ast)td[k].ast.push(ss.ast);
        if(ss.blk)td[k].blk.push(ss.blk);
        if(ss.stl)td[k].stl.push(ss.stl);
        if(ss.fg3m)td[k].fg3m.push(ss.fg3m);
      });
    });
  });
  const aF=a=>a.length?fmtN(avgArr(a)):'—';
  const rows=Object.values(td).map(t=>`<tr>
    <td><div class="tlc">${logoEl(t.abbr,20)}<strong style="color:var(--teal)">${t.abbr}</strong></div></td>
    <td>${aF(t.pts)}</td><td>${aF(t.reb)}</td><td>${aF(t.ast)}</td>
    <td>${aF(t.blk)}</td><td>${aF(t.stl)}</td><td>${aF(t.fg3m)}</td>
    <td style="color:var(--muted2)">${t.pts.length}</td>
  </tr>`).join('');

  const tsRows=teamSeasonStats.map(t=>{
    const a=t.team?.abbreviation||'';
    return `<tr>
      <td><div class="tlc">${logoEl(a,20)}<strong style="color:var(--teal)">${a}</strong></div></td>
      <td>${fmtN(t.pts)}</td><td>${fmtN(t.reb)}</td><td>${fmtN(t.ast)}</td>
      <td>${fmtN(t.blk)}</td><td>${fmtN(t.stl)}</td><td>${fmtN(t.fg3m)}</td>
      <td style="color:var(--muted2)">${t.games_played||'—'}</td>
    </tr>`;
  }).join('');

  c.innerHTML=`
    <div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px">Today's Matchups — Avg Allowed</div>
    <table class="dtbl" style="margin-bottom:20px">
      <thead><tr><th>Defense</th><th>PTS</th><th>REB</th><th>AST</th><th>BLK</th><th>STL</th><th>3PM</th><th>N</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:16px">No player data yet</td></tr>'}</tbody>
    </table>
    ${tsRows?`<div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px">Team Season Averages</div>
    <table class="dtbl">
      <thead><tr><th>Team</th><th>PTS</th><th>REB</th><th>AST</th><th>BLK</th><th>STL</th><th>3PM</th><th>GP</th></tr></thead>
      <tbody>${tsRows}</tbody>
    </table>`:''}
    <div style="font-size:10px;color:var(--muted);padding:10px 0">Top: avg season stats of today's prop players vs each defense. Bottom: league-wide team averages.</div>`;
}

// ── INJURIES ──
function renderInjuries(){
  const c=document.getElementById('injContainer');
  if(!injuries.length){
    c.innerHTML='<div class="empty"><div class="icon">✅</div><h3>No injuries reported</h3><p>BDL injury report is clear.</p></div>';
    return;
  }
  c.innerHTML=injuries.map(i=>{
    const p=i.player, fn=`${p.first_name} ${p.last_name}`, abbr=p.team?.abbreviation||'';
    const hs=espnHead(fn);
    const av=hs
      ?`<img src="${hs}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:1px solid var(--border)" onerror="this.style.display='none'" loading="lazy">`
      :`<div style="width:34px;height:34px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--teal)">${p.first_name?.[0]||''}${p.last_name?.[0]||''}</div>`;
    const sc=i.status==='Out'?'var(--red)':i.status==='Doubtful'?'var(--yellow)':'var(--muted2)';
    return `<div class="inj-card">
      <div style="position:relative;flex-shrink:0">${av}
        <div style="position:absolute;bottom:-1px;right:-3px;width:16px;height:16px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden">${logoEl(abbr,12)}</div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:13px">${fn} <span style="color:${sc};font-size:11px;font-weight:600">${i.status||''}</span></div>
        <div style="font-size:10px;color:var(--muted2);margin-top:1px">${abbr}${p.position?` · ${p.position}`:''}${i.return_date?` · Return: ${i.return_date}`:''}</div>
        ${i.comment?`<div style="font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5">${i.comment}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── STANDINGS ──
function renderStandings(){
  const c=document.getElementById('standContainer');
  if(!standings.length){c.innerHTML='<div class="empty"><div class="icon">🏆</div><h3>No standings data</h3></div>';return;}
  const east=standings.filter(s=>s.conference?.includes('Eastern')).sort((a,b)=>(a.playoff_seed||99)-(b.playoff_seed||99));
  const west=standings.filter(s=>s.conference?.includes('Western')).sort((a,b)=>(a.playoff_seed||99)-(b.playoff_seed||99));
  const conf=(title,teams)=>`
    <div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;padding:4px 0 8px">${title}</div>
    <table class="dtbl" style="margin-bottom:18px">
      <thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>Home</th><th>Away</th></tr></thead>
      <tbody>${teams.map(s=>`<tr>
        <td style="color:var(--muted)">${s.playoff_seed||'—'}</td>
        <td><div class="tlc">${logoEl(s.team?.abbreviation,18)}<span style="font-weight:700">${s.team?.abbreviation}</span></div></td>
        <td style="color:var(--green)">${s.wins}</td>
        <td style="color:var(--red)">${s.losses}</td>
        <td>${fmtN(s.win_percentage,3)}</td>
        <td style="color:var(--muted2)">${s.games_behind||'—'}</td>
        <td style="color:var(--muted2);font-size:11px">${s.home_record||'—'}</td>
        <td style="color:var(--muted2);font-size:11px">${s.away_record||'—'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  c.innerHTML=conf('Eastern Conference',east)+conf('Western Conference',west);
}

// ── UI ──
function pickLine(key,line,pid){
  selLines[key]=line;
  renderProps();
  requestAnimationFrame(()=>{
    const b=document.getElementById(`pb-${pid}`), card=document.getElementById(`pc-${pid}`);
    if(b&&card){b.style.display='block';card.classList.add('open');}
  });
}
function toggleCard(pid){
  const card=document.getElementById(`pc-${pid}`), body=document.getElementById(`pb-${pid}`);
  if(!card||!body) return;
  body.style.display=card.classList.toggle('open')?'block':'none';
}
function sstab(pid,tab,btn){
  ['s','sh','rl','bio'].forEach(t=>{const el=document.getElementById(`${t}-${pid}`);if(el)el.style.display=t===tab?'block':'none';});
  btn.closest('.stabs').querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function switchTab(name,btn){
  document.querySelectorAll('.tc').forEach(el=>el.classList.remove('active'));
  document.getElementById(`tab-${name}`)?.classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function fmkt(btn){
  activeMkt=btn.dataset.mkt;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProps();
}
function updateStatus(){
  document.getElementById('sGames').textContent=games.length;
  const allBooks=new Set();
  Object.values(props).forEach(pm=>Object.values(pm).forEach(vm=>Object.keys(vm).forEach(v=>allBooks.add(v))));
  document.getElementById('sBooks').textContent=[...allBooks].map(v=>BNAMES[v]?.l||v).join(', ')||'—';
  document.getElementById('sTime').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

document.getElementById('srch').addEventListener('input',renderProps);
loadAll();
</script>
</body>
</html>
