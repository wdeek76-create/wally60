<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: #222;
    --green: #27c071;
    --green-dim: rgba(39,192,113,0.1);
    --red: #ff3b3b;
    --amber: #f5a623;
    --text: #ffffff;
    --sub: #666;
    --font: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 8px;
    padding-top: calc(12px + env(safe-area-inset-top));
  }
  .logo { display: flex; align-items: baseline; gap: 6px; }
  .logo-name { font-size: 18px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
  .logo-dot  { color: var(--green); }
  .header-meta {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--green); font-weight: 600;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.stale { background: var(--amber); animation: none; }
  .sync-dot.live  { animation: blink 1.3s infinite; }
  #refresh-btn {
    background: none; border: none; color: var(--sub);
    font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
    transition: color 0.15s;
  }
  #refresh-btn.spinning { color: var(--green); animation: spin 0.7s linear infinite; }

  /* ── LEAGUE FILTER STRIP ── */
  .league-strip {
    display: flex; gap: 6px; padding: 6px 16px 10px;
    overflow-x: auto; scrollbar-width: none;
  }
  .league-strip::-webkit-scrollbar { display: none; }

  .league-chip {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    padding: 6px 12px 5px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer; user-select: none;
    transition: border-color 0.15s, background 0.15s, opacity 0.15s;
    min-width: 48px; flex-shrink: 0;
  }
  .league-chip.active {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .chip-name {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--sub); transition: color 0.15s; text-transform: uppercase;
  }
  .league-chip.empty { opacity: 0.4; }
  .league-chip.active .chip-name { color: var(--green); }

  /* sub-line: game count + optional live dot */
  .chip-meta {
    display: flex; align-items: center; gap: 4px;
    margin-top: 3px; height: 10px;
  }
  .chip-count {
    font-size: 10px; font-weight: 700; color: var(--sub);
    transition: color 0.15s;
  }
  .league-chip.active .chip-count { color: var(--green); }
  .chip-live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
    animation: blink 1.3s infinite;
  }
  /* live count badge on chip */
  .chip-live-count {
    font-size: 9px; font-weight: 800; color: var(--red);
  }

  /* ── STATUS BAR ── */
  .status-strip {
    display: flex; align-items: center;
    margin: 0 16px 10px;
    background: var(--card); border-radius: 12px; overflow: hidden;
  }
  .stat-cell {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px 4px; border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-val { font-size: 22px; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -1px; }
  .stat-val.red    { color: var(--red); }
  .stat-val.amber  { color: var(--amber); }
  .stat-label { font-size: 8px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }

  /* ── SECTION LABEL ── */
  .section-label {
    display: flex; align-items: center; gap: 7px;
    padding: 2px 16px 6px;
  }
  .section-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .section-dot.live  { background: var(--red); animation: blink 1.3s infinite; box-shadow: 0 0 5px var(--red); }
  .section-dot.soon  { background: var(--amber); }
  .section-dot.sched { background: #3a3a3a; }
  .section-dot.final { background: #3a3a3a; }
  .section-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sub); }
  .section-n { font-size: 11px; font-weight: 700; color: var(--sub); }

  /* ── GAME ROWS ── */
  .games-list { display: flex; flex-direction: column; }
  .game-row {
    display: flex; align-items: center;
    padding: 8px 14px 8px 18px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    animation: fadein 0.18s ease;
    position: relative;
  }
  .game-row:last-child { border-bottom: none; }
  .game-row.live-row  { background: rgba(255,59,59,0.03); }
  .game-row.soon-row  { }
  .game-row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
    border-radius: 0 2px 2px 0;
  }
  .live-row::before  { background: var(--red); }
  .soon-row::before  { background: var(--amber); }
  .sched-row::before { background: transparent; }
  .final-row::before { background: transparent; }

  /* LOGOS */
  .logos { display: flex; flex-direction: column; gap: 4px; align-items: center; flex-shrink: 0; width: 28px; }
  .team-logo { width: 24px; height: 24px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
  .team-logo.dim { opacity: 0.45; filter: grayscale(60%); }
  .logo-placeholder {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 900; color: rgba(255,255,255,0.85);
  }

  /* TEAMS */
  .teams { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .team-line { display: flex; align-items: center; gap: 5px; }
  .t-name {
    font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-transform: uppercase; line-height: 1;
  }
  .t-name.loser { color: #555; font-weight: 600; }
  /* Record: same line as name, white, smaller */
  .t-rec { font-size: 9px; color: #888; font-weight: 600; flex-shrink: 0; white-space: nowrap; }

  /* SCORES */
  .scores { display: flex; flex-direction: column; gap: 3px; align-items: flex-end; flex-shrink: 0; }
  .t-score {
    font-size: 15px; font-weight: 800; color: var(--text);
    line-height: 1; min-width: 22px; text-align: right;
    font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
  }
  .t-score.winner { color: var(--green); }
  .t-score.loser  { color: #555; }
  .t-score.blank  { color: #444; font-size: 12px; }

  /* STATUS */
  .game-status {
    flex-shrink: 0; min-width: 54px; text-align: right;
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .gs-live    { font-size: 9px; font-weight: 800; color: var(--red); letter-spacing: 0.6px; }
  .gs-period  { font-size: 10px; font-weight: 700; color: var(--text); }
  .gs-clock   { font-size: 10px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .gs-break   { font-size: 9px; font-weight: 800; color: var(--amber); line-height: 1.3; }
  .gs-cd      { font-size: 14px; font-weight: 800; color: var(--amber); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
  .gs-time    { font-size: 10px; font-weight: 700; color: var(--text); }
  .gs-final   { font-size: 9px; font-weight: 800; color: #555; letter-spacing: 0.5px; }

  /* league micro-label */
  .game-league {
    font-size: 8px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
    position: absolute; bottom: 4px; right: 14px; color: #333;
  }
  .live-row  .game-league { color: rgba(255,59,59,0.4); }
  .soon-row  .game-league { color: rgba(245,166,35,0.4); }

  /* window highlight */
  .game-row.win-highlight { background: rgba(39,192,113,0.07) !important; }
  .game-row.win-highlight::before { background: var(--green) !important; }

  /* divider between teams */
  .teams-divider { height: 1px; background: var(--border); margin: 1px 0; }
  /* section separator */
  .section-sep { height: 1px; background: var(--border); margin: 8px 0 2px; }

  /* ── BASEBALL SITUATION ── */
  .mlb-sit { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .mlb-count { font-size: 9px; font-weight: 700; color: var(--text); letter-spacing: 0.3px; }
  .mlb-count span { color: var(--sub); }
  /* SVG diamond rendered inline — sized via width/height attrs */

  /* divider line between teams in a row */
  .teams-divider { height: 1px; background: var(--border); margin: 0; }

  /* section separator */
  .section-sep { height: 1px; background: var(--border); margin: 10px 0 4px; }

  /* ── PEAK WINDOWS ── */
  #windows-wrap { padding: 0 16px 2px; }
  .windows-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--sub); margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .windows-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .window-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    padding: 11px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    position: relative; overflow: hidden;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .window-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:#333; }
  .window-card.w-active { border-color: rgba(39,192,113,0.35); }
  .window-card.w-active::before { background: var(--green); }
  .window-card.w-selected { border-color: rgba(39,192,113,0.6) !important; background: rgba(39,192,113,0.08) !important; }
  .window-card.w-selected::before { background: var(--green) !important; }

  .win-count { font-size: 26px; font-weight: 800; letter-spacing: -2px; line-height: 1; flex-shrink: 0; min-width: 30px; color: #555; }
  .window-card.w-active   .win-count { color: var(--green); }
  .window-card.w-selected .win-count { color: var(--green); }

  .win-info { flex: 1; min-width: 0; }
  .win-time   { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .win-leagues { font-size: 10px; color: var(--sub); margin-top: 3px; letter-spacing: 0.3px; }
  .win-badge { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; padding: 3px 8px; border-radius: 20px; flex-shrink: 0; background: rgba(39,192,113,0.1); color: var(--green); }
  .win-badge.now { background: rgba(255,59,59,0.12); color: var(--red); animation: blink 1.3s infinite; }


  #loading {
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px; gap: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 2.5px solid #222;
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  #loading p { font-size: 13px; color: var(--sub); font-weight: 600; }
  .empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 13px; font-weight: 600; }

  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes fadein { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">Live<span class="logo-dot">.</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="header-meta">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="last-updated">--:--</span>
    </div>
    <button id="refresh-btn" onclick="fetchAll()" title="Refresh">↻</button>
  </div>
</header>

<!-- LEAGUE FILTER CHIPS -->
<div class="league-strip" id="league-strip">
  <!-- built dynamically -->
</div>

<!-- STATUS BAR -->
<div class="status-strip">
  <div class="stat-cell">
    <span class="stat-val red" id="sum-live">—</span>
    <span class="stat-label">Live</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val amber" id="sum-soon">—</span>
    <span class="stat-label">Soon</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val" id="sum-today">—</span>
    <span class="stat-label">Today</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val" id="sum-final">—</span>
    <span class="stat-label">Final</span>
  </div>
</div>

<div id="loading"><div class="spinner"></div><p>Loading today's games…</p></div>
<div id="windows-wrap" style="display:none"></div>
<div id="content" style="display:none"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const LEAGUE_CFG = {
  NBA:  { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard'  },
  WNBA: { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard' },
  NFL:  { url:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard'    },
  MLB:  { url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'    },
  NHL:  { url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard'      },
};
const SKIP_SEASON = new Set([1, 4]);
const SOON_MIN = 90;
const BREAK_KW = ['halftime','half time','between innings','end of inning',
  'intermission','end of 1st','end of 2nd','end of 3rd','end of 4th','break'];

let allGames = [];
let activeLeagues = new Set(Object.keys(LEAGUE_CFG));
let autoTimer = null, cdTimer = null;

// ── DATE ─────────────────────────────────────────────────────────
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
}
function isToday(iso) {
  const d = new Date(iso), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchLeague(key, cfg) {
  try {
    const r = await fetch(`${cfg.url}?dates=${todayStr()}`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const st = d.season?.type?.id ?? d.leagues?.[0]?.season?.type?.id ?? 2;
    if (SKIP_SEASON.has(Number(st))) return [];
    return (d.events||[]).filter(ev=>isToday(ev.date)).map(ev=>parseEvent(ev,key));
  } catch(e) { console.warn(key,e); return []; }
}

function parseEvent(ev, key) {
  const comp = ev.competitions?.[0]||{};
  const st   = ev.status||{};
  const stateType = st.type?.state||'pre';
  const stateDesc = st.type?.shortDetail||'';
  const clock = st.displayClock||'';
  const period = st.period||0;
  const competitors = comp.competitors||[];
  const home = competitors.find(c=>c.homeAway==='home')||competitors[0]||{};
  const away = competitors.find(c=>c.homeAway==='away')||competitors[1]||{};
  const startTime = new Date(ev.date);
  const diffMin = (startTime-Date.now())/60000;

  let bucket;
  if      (stateType==='in')              bucket='live';
  else if (stateType==='post')            bucket='final';
  else if (diffMin<=SOON_MIN&&diffMin>-5) bucket='soon';
  else                                    bucket='sched';

  const sit = comp.situation || {};

  const pt = c => {
    const t=c.team||{};
    return {
      abbr:  t.abbreviation||t.shortDisplayName||'?',
      logo:  t.logo||'',
      color: t.color?'#'+t.color:'#333',
      score: parseInt(c.score||0),
      record:c.records?.[0]?.summary||'',
    };
  };
  return {
    id:ev.id, league:key, bucket, stateType, stateDesc, clock, period, startTime, diffMin,
    home:pt(home), away:pt(away),
    sit: {
      onFirst:  sit.onFirst  || false,
      onSecond: sit.onSecond || false,
      onThird:  sit.onThird  || false,
      balls:    sit.balls    ?? null,
      strikes:  sit.strikes  ?? null,
      outs:     sit.outs     ?? null,
      batter:   sit.batter?.displayName || '',
      pitcher:  sit.pitcher?.displayName || '',
    }
  };
}

let lastFetchMs = 0;
let clockTimer = null;

function startLiveClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  document.getElementById('last-updated').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  // Mark dot as stale if data is >90s old with live games, or >6min otherwise
  const age = Date.now() - lastFetchMs;
  const hasLive = allGames.some(g => g.bucket === 'live');
  const dot = document.getElementById('sync-dot');
  if (lastFetchMs === 0) return;
  if ((hasLive && age > 90000) || (!hasLive && age > 360000)) {
    dot.classList.add('stale');
    dot.classList.remove('live');
  } else if (hasLive) {
    dot.classList.add('live');
    dot.classList.remove('stale');
  } else {
    dot.classList.remove('live', 'stale');
  }
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  const results = await Promise.all(Object.entries(LEAGUE_CFG).map(([k,c])=>fetchLeague(k,c)));
  allGames = results.flat();
  lastFetchMs = Date.now();
  btn.classList.remove('spinning');

  // Reset dot to healthy
  const dot = document.getElementById('sync-dot');
  dot.classList.remove('stale');
  const hasLive = allGames.some(g => g.bucket === 'live');
  hasLive ? dot.classList.add('live') : dot.classList.remove('live');

  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  buildChips();
  render();
  startCd();
  startLiveClock();

  // Smart refresh: 30s if live games, 2min if games soon, 5min otherwise
  if (autoTimer) clearTimeout(autoTimer);
  const hasSoon = allGames.some(g => g.bucket === 'soon');
  const interval = hasLive ? 30000 : hasSoon ? 120000 : 300000;
  autoTimer = setTimeout(fetchAll, interval);
}

// ── CHIPS ─────────────────────────────────────────────────────────
function buildChips() {
  const strip = document.getElementById('league-strip');
  const leagueKeys = Object.keys(LEAGUE_CFG);

  // Sort leagues: ones with games today first (by count desc), then empty ones
  const sorted = [...leagueKeys].sort((a, b) => {
    const aCount = allGames.filter(g => g.league === a).length;
    const bCount = allGames.filter(g => g.league === b).length;
    if (aCount === 0 && bCount === 0) return 0;
    if (aCount === 0) return 1;
    if (bCount === 0) return -1;
    return bCount - aCount;
  });

  const allKeys = ['ALL', ...sorted];

  strip.innerHTML = allKeys.map(key => {
    const games  = key==='ALL' ? allGames : allGames.filter(g=>g.league===key);
    const liveN  = games.filter(g=>g.bucket==='live').length;
    const total  = games.length;
    const isActive = key==='ALL' ? activeLeagues.size===Object.keys(LEAGUE_CFG).length : activeLeagues.has(key);
    const isEmpty  = total === 0;

    const metaHtml = isEmpty
      ? `<span class="chip-count" style="color:#333">—</span>`
      : liveN > 0
        ? `<span class="chip-live-dot"></span><span class="chip-live-count">${liveN}</span><span class="chip-count" style="color:#444">/</span><span class="chip-count">${total}</span>`
        : `<span class="chip-count">${total}</span>`;

    return `<div class="league-chip${isActive?' active':''}${isEmpty?' empty':''}" data-league="${key}" onclick="toggleLeague(this)">
      <span class="chip-name">${key}</span>
      <div class="chip-meta">${metaHtml}</div>
    </div>`;
  }).join('');
}

// ── FILTER ────────────────────────────────────────────────────────
function toggleLeague(el) {
  const l = el.dataset.league;
  if (l==='ALL') {
    const allOn = activeLeagues.size===Object.keys(LEAGUE_CFG).length;
    allOn ? activeLeagues.clear() : Object.keys(LEAGUE_CFG).forEach(k=>activeLeagues.add(k));
  } else {
    activeLeagues.has(l) ? activeLeagues.delete(l) : activeLeagues.add(l);
  }
  buildChips();
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const f = allGames.filter(g=>activeLeagues.has(g.league));
  const ord = ['NBA','WNBA','NFL','MLB','NHL'];
  const byL = (a,b)=>ord.indexOf(a.league)-ord.indexOf(b.league);

  const live  = f.filter(g=>g.bucket==='live').sort(byL);
  const soon  = f.filter(g=>g.bucket==='soon').sort((a,b)=>a.diffMin-b.diffMin);
  const sched = f.filter(g=>g.bucket==='sched').sort((a,b)=>a.startTime-b.startTime);
  const final = f.filter(g=>g.bucket==='final').sort(byL);

  document.getElementById('sum-live').textContent  = live.length  || '0';
  document.getElementById('sum-soon').textContent  = soon.length  || '0';
  document.getElementById('sum-today').textContent = (live.length+soon.length+sched.length) || '0';
  document.getElementById('sum-final').textContent = final.length || '0';

  const out = document.getElementById('content');

  if (!f.length) {
    out.innerHTML = '<div class="empty">No games today for selected leagues.</div>';
    renderWindows([]);
    return;
  }

  selectedWindowIds = null;
  renderWindows(f);
  let html = '';
  if (live.length)  html += section('live',  '● Live',        live,  liveRow);
  if (soon.length)  html += section('soon',  'Starting Soon', soon,  soonRow);
  if (sched.length) html += section('sched', 'Later Today',   sched, schedRow);
  if (final.length) html += section('final', 'Final',         final, finalRow);
  out.innerHTML = html;
}

function section(cls, title, games, fn) {
  return `<div class="section-sep"></div>
  <div class="section-label">
    <div class="section-dot ${cls}"></div>
    <span class="section-name">${title}</span>
    <span class="section-n">${games.length}</span>
  </div>
  <div class="games-list">${games.map(fn).join('')}</div>`;
}

// ── STATUS HELPERS ────────────────────────────────────────────────
function gameStatus(g) {
  const desc=g.stateDesc||'', lo=desc.toLowerCase();
  const isBreak=BREAK_KW.some(b=>lo.includes(b));
  if (desc) return {label:desc, isBreak};
  if (!g.period) return {label:'',isBreak:false};
  let label;
  if (g.league==='MLB') label=`${ord(g.period)} Inn`;
  else if (g.league==='NHL') label=`${ord(g.period)} Per`;
  else label=`${ord(g.period)} Qtr`;
  return {label, isBreak:false};
}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

// ── LOGO HELPERS ──────────────────────────────────────────────────
function logo(team, dim=false) {
  const cls=`team-logo${dim?' dim':''}`;
  if (team.logo) return `<img class="${cls}" src="${team.logo}" alt="${team.abbr}" onerror="this.outerHTML=ph('${team.abbr}','${team.color.replace('#','')}')">`;
  return ph(team.abbr, team.color.replace('#',''));
}
function ph(abbr,color){return `<div class="logo-placeholder" style="background:#${color}1a;border:1px solid #${color}33">${abbr.slice(0,3)}</div>`;}

// ── COUNTDOWN ─────────────────────────────────────────────────────
function startCd(){
  if (cdTimer) clearInterval(cdTimer);
  cdTimer=setInterval(tickCd,1000); tickCd();
}
function tickCd(){
  document.querySelectorAll('[data-ms]').forEach(el=>{
    const diff=parseInt(el.dataset.ms)-Date.now();
    if (diff<=0){el.textContent='NOW';return;}
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    el.textContent=h>0?`${h}h ${String(m).padStart(2,'0')}m`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  });
}

// ── BASEBALL DIAMOND SVG ──────────────────────────────────────────
function diamondSvg(sit) {
  const ON  = 'var(--amber)';
  const OFF = '#2a2a2a';
  const S   = 28; // total svg size
  // Diamond centered: 4 bases as rotated squares
  // Layout: 2nd top, 1st right, 3rd left, home bottom
  const base = (cx, cy, on) =>
    `<rect x="${cx-4}" y="${cy-4}" width="8" height="8" transform="rotate(45,${cx},${cy})" fill="${on?ON:OFF}" stroke="#0a0a0a" stroke-width="0.5"/>`;

  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
    ${base(14, 5,  sit.onSecond)}
    ${base(23, 14, sit.onFirst)}
    ${base(5,  14, sit.onThird)}
    ${base(14, 23, false)}
  </svg>`;
}

function mlbStatusHtml(g) {
  const {label, isBreak} = gameStatus(g);
  if (isBreak) return `<span class="gs-break">${label}</span>`;

  const sit = g.sit;
  const hasSit = sit.balls !== null;

  // Inning label from stateDesc e.g. "Top 5th" — no clock
  const inningLine = label ? `<span class="gs-period">${label}</span>` : '';

  if (!hasSit) {
    return `<span class="gs-live">LIVE</span>${inningLine}`;
  }

  const countLine = `<div class="mlb-count">${sit.balls}-${sit.strikes} <span>${sit.outs}O</span></div>`;
  return `<div class="mlb-sit">
    <span class="gs-live">LIVE</span>
    ${inningLine}
    ${diamondSvg(sit)}
    ${countLine}
  </div>`;
}


function liveRow(g) {
  const aW=g.away.score>g.home.score, hW=g.home.score>g.away.score;

  let statusHtml;
  if (g.league === 'MLB') {
    statusHtml = mlbStatusHtml(g);
  } else {
    const {label,isBreak}=gameStatus(g);
    statusHtml = isBreak
      ? `<span class="gs-break">${label}</span>`
      : `<span class="gs-live">LIVE</span>
         ${label?`<span class="gs-period">${label}</span>`:''}
         ${g.clock&&!label.includes(g.clock)?`<span class="gs-clock">${g.clock}</span>`:''}`;
  }
  return `<div class="game-row live-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away,hW)}${logo(g.home,aW)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name${aW?'':' loser'}">${g.away.abbr}</span>${g.away.record?`<span class="t-rec">${g.away.record}</span>`:''}</div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name${hW?'':' loser'}">${g.home.abbr}</span>${g.home.record?`<span class="t-rec">${g.home.record}</span>`:''}</div>
    </div>
    <div class="scores">
      <span class="t-score${aW?' winner':hW?' loser':''}">${g.away.score}</span>
      <span class="t-score${hW?' winner':aW?' loser':''}">${g.home.score}</span>
    </div>
    <div class="game-status">${statusHtml}</div>
    <span class="game-league">${g.league}</span>
  </div>`;
}

function soonRow(g) {
  return `<div class="game-row soon-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away)}${logo(g.home)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name">${g.away.abbr}</span>${g.away.record?`<span class="t-rec">${g.away.record}</span>`:''}</div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name">${g.home.abbr}</span>${g.home.record?`<span class="t-rec">${g.home.record}</span>`:''}</div>
    </div>
    <div class="scores">
      <span class="t-score blank">—</span>
      <span class="t-score blank">—</span>
    </div>
    <div class="game-status">
      <span class="gs-cd" data-ms="${g.startTime.getTime()}">--:--</span>
      <span class="gs-time">${g.startTime.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span>
    </div>
    <span class="game-league">${g.league}</span>

}

function schedRow(g) {
  return `<div class="game-row sched-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away)}${logo(g.home)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name">${g.away.abbr}</span></div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name">${g.home.abbr}</span></div>
    </div>
    <div class="scores">
      <span class="t-score blank">—</span>
      <span class="t-score blank">—</span>
    </div>
    <div class="game-status">
      <span class="gs-cd" data-ms="${g.startTime.getTime()}">--:--</span>
      <span class="gs-time">${g.startTime.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span>
    </div>
    <span class="game-league">${g.league}</span>

function finalRow(g) {
  const aW=g.away.score>g.home.score, hW=g.home.score>g.away.score;
  return `<div class="game-row final-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away,!aW)}${logo(g.home,!hW)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name${aW?'':' loser'}">${g.away.abbr}</span></div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name${hW?'':' loser'}">${g.home.abbr}</span></div>
    </div>
    <div class="scores">
      <span class="t-score${aW?' winner':' loser'}">${g.away.score}</span>
      <span class="t-score${hW?' winner':' loser'}">${g.home.score}</span>
    </div>
    <div class="game-status"><span class="gs-final">FINAL</span></div>
    <span class="game-league">${g.league}</span>
  </div>`;
}

// ── ACTION WINDOWS ────────────────────────────────────────────────
// Group games by start hour-block (rounded to nearest 30min).
// A "window" = a cluster of game starts within 30 min of each other.
// Show top 3 windows sorted by game count desc.

let selectedWindowIds = null;
let currentWindows = [];

function selectWindow(idx) {
  const w = currentWindows[idx];
  if (!w) return;

  // Toggle off if same window tapped again
  const alreadySelected = selectedWindowIds && selectedWindowIds.size === w.ids.size &&
    [...w.ids].every(id => selectedWindowIds.has(id));

  selectedWindowIds = alreadySelected ? null : w.ids;

  // Highlight matching rows
  document.querySelectorAll('.game-row').forEach(row => {
    const id = row.dataset.gameid;
    row.classList.toggle('win-highlight', !!(selectedWindowIds && selectedWindowIds.has(id)));
  });

  // Update card states
  document.querySelectorAll('.window-card').forEach((card, i) => {
    card.classList.toggle('w-selected', !!(selectedWindowIds && i === idx));
  });

  // Scroll to first highlighted row
  if (selectedWindowIds) {
    setTimeout(() => {
      const first = document.querySelector('.game-row.win-highlight');
      if (first) first.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}
  const relevant = games.filter(g => g.bucket !== 'final');
  if (!relevant.length) return [];

  // Sort by start time
  const sorted = [...relevant].sort((a,b) => a.startTime - b.startTime);

  // Cluster: games within 45 min of the cluster's first start go in same window
  const CLUSTER_MS = 45 * 60000;
  const clusters = [];
  let cur = null;

  for (const g of sorted) {
    if (!cur || g.startTime - cur.anchorMs > CLUSTER_MS) {
      cur = { anchorMs: g.startTime.getTime(), games: [g] };
      clusters.push(cur);
    } else {
      cur.games.push(g);
    }
  }

  // For each cluster, compute the time range (earliest start → latest start)
  return clusters
    .map(c => {
      const starts = c.games.map(g => g.startTime.getTime());
      const leagues = [...new Set(c.games.map(g => g.league))];
      return {
        count: c.games.length,
        start: Math.min(...starts),
        end:   Math.max(...starts),
        leagues,
        ids: new Set(c.games.map(g => g.id)),
        games: c.games,
      };
    })
    .filter(w => w.count >= 2)            // only worth showing if 2+ games
    .sort((a,b) => b.count - a.count)     // biggest windows first
    .slice(0, 3);
}

function selectWindow(idx, windows) {
  const w = windows[idx];
  // Toggle off if already selected
  if (selectedWindowIds && [...selectedWindowIds].every(id => w.ids.has(id)) && selectedWindowIds.size === w.ids.size) {
    selectedWindowIds = null;
  } else {
    selectedWindowIds = w.ids;
  }
  // Re-highlight rows
  document.querySelectorAll('.game-row').forEach(row => {
    const id = row.dataset.gameid;
    row.classList.toggle('win-highlight', !!(selectedWindowIds && id && selectedWindowIds.has(id)));
  });
  // Update card selected state
  document.querySelectorAll('.window-card').forEach((card, i) => {
    card.classList.toggle('w-selected', !!(selectedWindowIds && i === idx));
  });
  // Scroll to first highlighted row
  if (selectedWindowIds) {
    const first = document.querySelector('.game-row.win-highlight');
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function renderWindows(games) {
  const wrap = document.getElementById('windows-wrap');
  const f = games.filter(g => activeLeagues.has(g.league));
  currentWindows = computeWindows(f);
  if (!currentWindows.length) { wrap.style.display='none'; wrap.innerHTML=''; return; }

  const nowMs = Date.now();
  const fmt = ms => new Date(ms).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});

  const cards = currentWindows.map((w, i) => {
    const isActive = nowMs >= w.start - 30*60000 && nowMs <= w.end + 180*60000;
    const cls = isActive ? 'w-active' : 'w-inactive';
    const isNow = nowMs >= w.start - 10*60000 && nowMs <= w.end + 120*60000;
    const timeRange = w.start === w.end
      ? fmt(w.start)
      : `${fmt(w.start)} – ${fmt(w.end)}`;
    const leagueStr = w.leagues.join(' · ');
    const badge = isNow
      ? `<span class="win-badge now">NOW</span>`
      : `<span class="win-badge">${w.count} games</span>`;

    return `<div class="window-card ${cls}" onclick="selectWindow(${i})">
      <span class="win-count">${w.count}</span>
      <div class="win-info">
        <div class="win-time">${timeRange}</div>
        <div class="win-leagues">${leagueStr}</div>
      </div>
      ${badge}
    </div>`;
  });

  wrap.innerHTML = `<div class="windows-label">Action Windows</div>${cards.join('')}`;
  wrap.style.display = 'block';
}

fetchAll();
