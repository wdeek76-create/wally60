<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #141414;
    --border: #222;
    --green: #27c071;
    --green-dim: rgba(39,192,113,0.1);
    --red: #ff3b3b;
    --amber: #f5a623;
    --text: #ffffff;
    --sub: #666;
    --font: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overscroll-behavior: none; }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
    padding-top: calc(14px + env(safe-area-inset-top));
  }
  .logo { display: flex; align-items: baseline; gap: 6px; }
  .logo-name { font-size: 18px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
  .logo-dot  { color: var(--green); }
  .header-meta {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--green); font-weight: 600;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.stale { background: var(--amber); animation: none; }
  .sync-dot.live  { animation: blink 1.3s infinite; }
  #refresh-btn {
    background: none; border: none; color: var(--sub);
    font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
    transition: color 0.15s;
  }
  #refresh-btn.spinning { color: var(--green); animation: spin 0.7s linear infinite; }

  /* ── LEAGUE FILTER STRIP ── */
  .league-strip {
    display: flex; gap: 8px; padding: 8px 18px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .league-strip::-webkit-scrollbar { display: none; }

  .league-chip {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    padding: 8px 14px 7px;
    border-radius: 14px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer; user-select: none;
    transition: border-color 0.15s, background 0.15s;
    min-width: 54px; flex-shrink: 0;
  }
  .league-chip.active {
    border-color: var(--green);
    background: var(--green-dim);
  }
  .chip-name {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--sub); transition: color 0.15s; text-transform: uppercase;
  }
  .league-chip.active .chip-name { color: var(--green); }

  /* sub-line: game count + optional live dot */
  .chip-meta {
    display: flex; align-items: center; gap: 4px;
    margin-top: 3px; height: 10px;
  }
  .chip-count {
    font-size: 10px; font-weight: 700; color: var(--sub);
    transition: color 0.15s;
  }
  .league-chip.active .chip-count { color: var(--green); }
  .chip-live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
    animation: blink 1.3s infinite;
  }
  /* live count badge on chip */
  .chip-live-count {
    font-size: 9px; font-weight: 800; color: var(--red);
  }

  /* ── STATUS BAR ── */
  .status-strip {
    display: flex; align-items: center; gap: 0;
    margin: 0 18px 14px;
    background: var(--card); border-radius: 14px;
    overflow: hidden;
  }
  .stat-cell {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 6px;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-val { font-size: 22px; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -1px; }
  .stat-val.red    { color: var(--red); }
  .stat-val.amber  { color: var(--amber); }
  .stat-label { font-size: 8px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }

  /* ── SECTION LABEL ── */
  .section-label {
    display: flex; align-items: center; gap: 7px;
    padding: 4px 18px 8px;
  }
  .section-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .section-dot.live  { background: var(--red); animation: blink 1.3s infinite; box-shadow: 0 0 5px var(--red); }
  .section-dot.soon  { background: var(--amber); }
  .section-dot.sched { background: #3a3a3a; }
  .section-dot.final { background: #3a3a3a; }
  .section-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--sub); }
  .section-n { font-size: 11px; font-weight: 700; color: var(--sub); }

  /* ── GAME ROWS (flat, no card boxes) ── */
  .games-list { display: flex; flex-direction: column; }

  .game-row {
    display: flex; align-items: center;
    padding: 11px 18px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    animation: fadein 0.18s ease;
    position: relative;
  }
  .game-row:last-child { border-bottom: none; }
  .game-row.live-row  { background: rgba(255,59,59,0.03); }
  .game-row.soon-row  { background: rgba(245,166,35,0.03); }

  /* live indicator strip on left edge */
  .game-row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
    border-radius: 0 2px 2px 0;
  }
  .live-row::before  { background: var(--red); }
  .soon-row::before  { background: var(--amber); }
  .sched-row::before { background: transparent; }
  .final-row::before { background: transparent; }

  /* LOGOS side by side stacked */
  .logos {
    display: flex; flex-direction: column; gap: 6px;
    align-items: center; flex-shrink: 0; width: 32px;
  }
  .team-logo {
    width: 26px; height: 26px; object-fit: contain;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  }
  .team-logo.dim { opacity: 0.3; filter: grayscale(80%); }
  .logo-placeholder {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 900; color: rgba(255,255,255,0.7);
  }

  /* TEAMS column */
  .teams { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
  .team-line { display: flex; align-items: baseline; gap: 6px; }
  .t-name {
    font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; text-transform: uppercase;
  }
  .t-name.loser { color: #3a3a3a; font-weight: 500; }
  .t-rec { font-size: 10px; color: var(--sub); font-weight: 500; flex-shrink: 0; }

  /* SCORES column */
  .scores { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; flex-shrink: 0; }
  .t-score {
    font-size: 16px; font-weight: 800; color: var(--text);
    line-height: 1; min-width: 24px; text-align: right;
    font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
  }
  .t-score.winner { color: var(--green); }
  .t-score.loser  { color: #3a3a3a; }
  .t-score.blank  { color: #333; font-size: 13px; }

  /* STATUS column */
  .game-status {
    flex-shrink: 0; min-width: 56px; text-align: right;
    display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
  }
  .gs-live    { font-size: 9px; font-weight: 800; color: var(--red); letter-spacing: 0.6px; }
  .gs-period  { font-size: 10px; font-weight: 700; color: var(--text); }
  .gs-clock   { font-size: 11px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .gs-break   { font-size: 10px; font-weight: 800; color: var(--amber); line-height: 1.3; }
  .gs-cd      { font-size: 15px; font-weight: 800; color: var(--amber); font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }
  .gs-time    { font-size: 10px; font-weight: 600; color: var(--sub); }
  .gs-final   { font-size: 9px; font-weight: 800; color: #444; letter-spacing: 0.5px; }

  /* league micro-label */
  .game-league { font-size: 8px; font-weight: 800; color: #2a2a2a; letter-spacing: 0.6px; position: absolute; bottom: 6px; right: 18px; }

  /* divider line between teams in a row */
  .teams-divider { height: 1px; background: var(--border); margin: 0; }

  /* section separator */
  .section-sep { height: 1px; background: var(--border); margin: 10px 0 4px; }

  /* ── PEAK WINDOWS ── */
  #windows-wrap { padding: 0 18px 4px; }
  .windows-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--sub); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .windows-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .window-card {
    background: var(--card); border-radius: 12px;
    border: 1px solid var(--border);
    padding: 11px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    position: relative; overflow: hidden;
  }
  .window-card.peak { border-color: rgba(39,192,113,0.3); }
  .window-card.peak::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--green);
  }
  .window-card.secondary { border-color: rgba(245,166,35,0.2); }
  .window-card.secondary::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background: var(--amber);
  }

  .win-count {
    font-size: 28px; font-weight: 800; letter-spacing: -2px; line-height: 1;
    flex-shrink: 0; min-width: 32px;
  }
  .window-card.peak      .win-count { color: var(--green); }
  .window-card.secondary .win-count { color: var(--amber); }

  .win-info { flex: 1; min-width: 0; }
  .win-time { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .win-leagues { font-size: 10px; color: var(--sub); margin-top: 3px; font-weight: 500; letter-spacing: 0.3px; }
  .win-now { font-size: 9px; font-weight: 800; color: var(--red); letter-spacing: 0.5px; animation: blink 1.3s infinite; }

  .win-badge {
    font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
    padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
  }
  .window-card.peak      .win-badge { background: var(--green-dim); color: var(--green); }
  .window-card.secondary .win-badge { background: rgba(245,166,35,0.1); color: var(--amber); }
  .win-badge.active-now  { background: rgba(255,59,59,0.1); color: var(--red); }


  #loading {
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px; gap: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 2.5px solid #222;
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  #loading p { font-size: 13px; color: var(--sub); font-weight: 600; }
  .empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 13px; font-weight: 600; }

  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes fadein { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">Live<span class="logo-dot">.</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="header-meta">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="last-updated">--:--</span>
    </div>
    <button id="refresh-btn" onclick="fetchAll()" title="Refresh">↻</button>
  </div>
</header>

<!-- LEAGUE FILTER CHIPS -->
<div class="league-strip" id="league-strip">
  <!-- built dynamically -->
</div>

<!-- STATUS BAR -->
<div class="status-strip">
  <div class="stat-cell">
    <span class="stat-val red" id="sum-live">—</span>
    <span class="stat-label">Live</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val amber" id="sum-soon">—</span>
    <span class="stat-label">Soon</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val" id="sum-today">—</span>
    <span class="stat-label">Today</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val" id="sum-final">—</span>
    <span class="stat-label">Final</span>
  </div>
</div>

<div id="loading"><div class="spinner"></div><p>Loading today's games…</p></div>
<div id="windows-wrap" style="display:none"></div>
<div id="content" style="display:none"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const LEAGUE_CFG = {
  NBA:  { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard'  },
  WNBA: { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard' },
  NFL:  { url:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard'    },
  MLB:  { url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'    },
  NHL:  { url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard'      },
};
const SKIP_SEASON = new Set([1, 4]);
const SOON_MIN = 90;
const BREAK_KW = ['halftime','half time','between innings','end of inning',
  'intermission','end of 1st','end of 2nd','end of 3rd','end of 4th','break'];

let allGames = [];
let activeLeagues = new Set(Object.keys(LEAGUE_CFG));
let autoTimer = null, cdTimer = null;

// ── DATE ─────────────────────────────────────────────────────────
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
}
function isToday(iso) {
  const d = new Date(iso), n = new Date();
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchLeague(key, cfg) {
  try {
    const r = await fetch(`${cfg.url}?dates=${todayStr()}`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const st = d.season?.type?.id ?? d.leagues?.[0]?.season?.type?.id ?? 2;
    if (SKIP_SEASON.has(Number(st))) return [];
    return (d.events||[]).filter(ev=>isToday(ev.date)).map(ev=>parseEvent(ev,key));
  } catch(e) { console.warn(key,e); return []; }
}

function parseEvent(ev, key) {
  const comp = ev.competitions?.[0]||{};
  const st   = ev.status||{};
  const stateType = st.type?.state||'pre';
  const stateDesc = st.type?.shortDetail||'';
  const clock = st.displayClock||'';
  const period = st.period||0;
  const competitors = comp.competitors||[];
  const home = competitors.find(c=>c.homeAway==='home')||competitors[0]||{};
  const away = competitors.find(c=>c.homeAway==='away')||competitors[1]||{};
  const startTime = new Date(ev.date);
  const diffMin = (startTime-Date.now())/60000;

  let bucket;
  if      (stateType==='in')              bucket='live';
  else if (stateType==='post')            bucket='final';
  else if (diffMin<=SOON_MIN&&diffMin>-5) bucket='soon';
  else                                    bucket='sched';

  const pt = c => {
    const t=c.team||{};
    return {
      abbr:  t.abbreviation||t.shortDisplayName||'?',
      logo:  t.logo||'',
      color: t.color?'#'+t.color:'#333',
      score: parseInt(c.score||0),
      record:c.records?.[0]?.summary||'',
    };
  };
  return { id:ev.id, league:key, bucket, stateType, stateDesc, clock, period, startTime, diffMin, home:pt(home), away:pt(away) };
}

let lastFetchMs = 0;
let clockTimer = null;

function startLiveClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  document.getElementById('last-updated').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  // Mark dot as stale if data is >90s old with live games, or >6min otherwise
  const age = Date.now() - lastFetchMs;
  const hasLive = allGames.some(g => g.bucket === 'live');
  const dot = document.getElementById('sync-dot');
  if (lastFetchMs === 0) return;
  if ((hasLive && age > 90000) || (!hasLive && age > 360000)) {
    dot.classList.add('stale');
    dot.classList.remove('live');
  } else if (hasLive) {
    dot.classList.add('live');
    dot.classList.remove('stale');
  } else {
    dot.classList.remove('live', 'stale');
  }
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  const results = await Promise.all(Object.entries(LEAGUE_CFG).map(([k,c])=>fetchLeague(k,c)));
  allGames = results.flat();
  lastFetchMs = Date.now();
  btn.classList.remove('spinning');

  // Reset dot to healthy
  const dot = document.getElementById('sync-dot');
  dot.classList.remove('stale');
  const hasLive = allGames.some(g => g.bucket === 'live');
  hasLive ? dot.classList.add('live') : dot.classList.remove('live');

  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  buildChips();
  render();
  startCd();
  startLiveClock();

  // Smart refresh: 30s if live games, 2min if games soon, 5min otherwise
  if (autoTimer) clearTimeout(autoTimer);
  const hasSoon = allGames.some(g => g.bucket === 'soon');
  const interval = hasLive ? 30000 : hasSoon ? 120000 : 300000;
  autoTimer = setTimeout(fetchAll, interval);
}

// ── CHIPS ─────────────────────────────────────────────────────────
// Each chip shows: league name, total game count, live count (if any)
function buildChips() {
  const strip = document.getElementById('league-strip');
  const allKeys = ['ALL', ...Object.keys(LEAGUE_CFG)];

  strip.innerHTML = allKeys.map(key => {
    const games  = key==='ALL' ? allGames : allGames.filter(g=>g.league===key);
    const liveN  = games.filter(g=>g.bucket==='live').length;
    const total  = games.length;
    const isActive = key==='ALL' ? activeLeagues.size===Object.keys(LEAGUE_CFG).length : activeLeagues.has(key);

    const metaHtml = total === 0
      ? `<span class="chip-count">—</span>`
      : liveN > 0
        ? `<span class="chip-live-dot"></span><span class="chip-live-count">${liveN}</span><span class="chip-count" style="color:#444">/</span><span class="chip-count">${total}</span>`
        : `<span class="chip-count">${total}</span>`;

    return `<div class="league-chip${isActive?' active':''}" data-league="${key}" onclick="toggleLeague(this)">
      <span class="chip-name">${key}</span>
      <div class="chip-meta">${metaHtml}</div>
    </div>`;
  }).join('');
}

// ── FILTER ────────────────────────────────────────────────────────
function toggleLeague(el) {
  const l = el.dataset.league;
  if (l==='ALL') {
    const allOn = activeLeagues.size===Object.keys(LEAGUE_CFG).length;
    allOn ? activeLeagues.clear() : Object.keys(LEAGUE_CFG).forEach(k=>activeLeagues.add(k));
  } else {
    activeLeagues.has(l) ? activeLeagues.delete(l) : activeLeagues.add(l);
  }
  buildChips();
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const f = allGames.filter(g=>activeLeagues.has(g.league));
  const ord = ['NBA','WNBA','NFL','MLB','NHL'];
  const byL = (a,b)=>ord.indexOf(a.league)-ord.indexOf(b.league);

  const live  = f.filter(g=>g.bucket==='live').sort(byL);
  const soon  = f.filter(g=>g.bucket==='soon').sort((a,b)=>a.diffMin-b.diffMin);
  const sched = f.filter(g=>g.bucket==='sched').sort((a,b)=>a.startTime-b.startTime);
  const final = f.filter(g=>g.bucket==='final').sort(byL);

  document.getElementById('sum-live').textContent  = live.length  || '0';
  document.getElementById('sum-soon').textContent  = soon.length  || '0';
  document.getElementById('sum-today').textContent = (live.length+soon.length+sched.length) || '0';
  document.getElementById('sum-final').textContent = final.length || '0';

  const out = document.getElementById('content');

  if (!f.length) {
    out.innerHTML = '<div class="empty">No games today for selected leagues.</div>';
    renderWindows([]);
    return;
  }

  renderWindows(f);
  let html = '';
  if (live.length)  html += section('live',  '● Live',        live,  liveRow);
  if (soon.length)  html += section('soon',  'Starting Soon', soon,  soonRow);
  if (sched.length) html += section('sched', 'Later Today',   sched, schedRow);
  if (final.length) html += section('final', 'Final',         final, finalRow);
  out.innerHTML = html;
}

function section(cls, title, games, fn) {
  return `<div class="section-sep"></div>
  <div class="section-label">
    <div class="section-dot ${cls}"></div>
    <span class="section-name">${title}</span>
    <span class="section-n">${games.length}</span>
  </div>
  <div class="games-list">${games.map(fn).join('')}</div>`;
}

// ── STATUS HELPERS ────────────────────────────────────────────────
function gameStatus(g) {
  const desc=g.stateDesc||'', lo=desc.toLowerCase();
  const isBreak=BREAK_KW.some(b=>lo.includes(b));
  if (desc) return {label:desc, isBreak};
  if (!g.period) return {label:'',isBreak:false};
  let label;
  if (g.league==='MLB') label=`${ord(g.period)} Inn`;
  else if (g.league==='NHL') label=`${ord(g.period)} Per`;
  else label=`${ord(g.period)} Qtr`;
  return {label, isBreak:false};
}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

// ── LOGO HELPERS ──────────────────────────────────────────────────
function logo(team, dim=false) {
  const cls=`team-logo${dim?' dim':''}`;
  if (team.logo) return `<img class="${cls}" src="${team.logo}" alt="${team.abbr}" onerror="this.outerHTML=ph('${team.abbr}','${team.color.replace('#','')}')">`;
  return ph(team.abbr, team.color.replace('#',''));
}
function ph(abbr,color){return `<div class="logo-placeholder" style="background:#${color}1a;border:1px solid #${color}33">${abbr.slice(0,3)}</div>`;}

// ── COUNTDOWN ─────────────────────────────────────────────────────
function startCd(){
  if (cdTimer) clearInterval(cdTimer);
  cdTimer=setInterval(tickCd,1000); tickCd();
}
function tickCd(){
  document.querySelectorAll('[data-ms]').forEach(el=>{
    const diff=parseInt(el.dataset.ms)-Date.now();
    if (diff<=0){el.textContent='NOW';return;}
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    el.textContent=h>0?`${h}h ${String(m).padStart(2,'0')}m`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  });
}

function liveRow(g) {

  const statusHtml=isBreak
    ?`<span class="gs-break">${label}</span>`
    :`<span class="gs-live">LIVE</span>
      ${label?`<span class="gs-period">${label}</span>`:''}

  return `<div class="game-row live-row">
    <div class="logos">${logo(g.away,hW)}${logo(g.home,aW)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name${aW?'':' loser'}">${g.away.abbr}</span>${g.away.record?`<span class="t-rec">${g.away.record}</span>`:''}</div>

}

// ── PEAK WINDOWS ──────────────────────────────────────────────────
// Assumes each game is active for ~AVG_DURATION minutes from start
const AVG_DURATION = { NBA:150, WNBA:130, NFL:200, MLB:180, NHL:150, default:150 };
const BUCKET_MIN = 15; // resolution

function computeWindows(games) {
  // Only pre/in games (not finals) contribute
  const active = games.filter(g => g.bucket !== 'final');
  if (!active.length) return [];

  const nowMs = Date.now();

  // Build time range: from earliest start to latest end
  const starts = active.map(g => g.startTime.getTime());
  const ends   = active.map(g => g.startTime.getTime() + (AVG_DURATION[g.league]||AVG_DURATION.default)*60000);
  const rangeStart = Math.min(...starts);
  const rangeEnd   = Math.max(...ends);

  const bucketMs = BUCKET_MIN * 60000;
  const buckets = [];

  for (let t = rangeStart; t < rangeEnd; t += bucketMs) {
    const tEnd = t + bucketMs;
    const inWindow = active.filter(g => {
      const gs = g.stateType === 'in' ? nowMs : g.startTime.getTime(); // live games start "now"
      const ge = gs + (AVG_DURATION[g.league]||AVG_DURATION.default)*60000;
      return gs < tEnd && ge > t;
    });
    if (inWindow.length > 0) {
      buckets.push({ t, tEnd, count: inWindow.length, games: inWindow });
    }
  }

  if (!buckets.length) return [];

  // Find peak count
  const maxCount = Math.max(...buckets.map(b => b.count));

  // Group consecutive buckets at peak into windows (allow 1-bucket gaps for tolerance)
  // Then find top 2 distinct windows by count
  const allWindows = [];
  let cur = null;

  for (const b of buckets) {
    const isPeak = b.count >= maxCount - 1; // include near-peak too
    if (isPeak) {
      if (!cur || b.t - cur.end > bucketMs * 2) {
        if (cur) allWindows.push(cur);
        cur = { start: b.t, end: b.tEnd, maxCount: b.count, leagues: new Set(b.games.map(g=>g.league)) };
      } else {
        cur.end = b.tEnd;
        cur.maxCount = Math.max(cur.maxCount, b.count);
        b.games.forEach(g => cur.leagues.add(g.league));
      }
    } else {
      if (cur) { allWindows.push(cur); cur = null; }
    }
  }
  if (cur) allWindows.push(cur);

  // Sort by count desc, return top 2
  return allWindows.sort((a,b) => b.maxCount - a.maxCount).slice(0,2);
}

function renderWindows(games) {
  const wrap = document.getElementById('windows-wrap');
  const f = games.filter(g => activeLeagues.has(g.league));
  const windows = computeWindows(f);
  if (!windows.length) { wrap.style.display='none'; wrap.innerHTML=''; return; }

  const nowMs = Date.now();
  const fmtTime = ms => new Date(ms).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});

  const cards = windows.map((w, i) => {
    const isPeak = i === 0;
    const cls = isPeak ? 'peak' : 'secondary';
    const isNow = w.start <= nowMs && w.end >= nowMs;
    const leagueList = [...w.leagues].join(' · ');

    let badgeHtml;
    if (isNow) {
      badgeHtml = `<span class="win-badge active-now">NOW</span>`;
    } else if (w.start > nowMs) {
      const diffM = Math.round((w.start - nowMs)/60000);
      const label = diffM < 60 ? `in ${diffM}m` : `in ${Math.floor(diffM/60)}h ${diffM%60}m`;
      badgeHtml = `<span class="win-badge">${label}</span>`;
    } else {
      badgeHtml = `<span class="win-badge">ACTIVE</span>`;
    }

    const timeRange = `${fmtTime(w.start)} – ${fmtTime(w.end)}`;
    const label = isPeak ? 'PEAK WINDOW' : 'NEXT WINDOW';

    return `<div class="window-card ${cls}">
      <span class="win-count">${w.maxCount}</span>
      <div class="win-info">
        <div class="win-time">${timeRange}</div>
        <div class="win-leagues">${label} &nbsp;·&nbsp; ${leagueList}</div>
      </div>
      ${badgeHtml}
    </div>`;
  });

  wrap.innerHTML = `<div class="windows-label">Action Windows</div>${cards.join('')}`;
  wrap.style.display = 'block';
}
