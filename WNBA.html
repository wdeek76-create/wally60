<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WNBA BLENDER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:radial-gradient(ellipse 80% 50% at 15% 0%, rgba(85,37,131,0.28) 0%, rgba(85,37,131,0) 60%),radial-gradient(ellipse 60% 40% at 85% 10%, rgba(253,185,39,0.10) 0%, rgba(253,185,39,0) 55%),radial-gradient(ellipse 100% 80% at 50% 100%, rgba(85,37,131,0.15) 0%, rgba(13,17,23,0) 70%),linear-gradient(180deg, #0a0a14 0%, #0d1117 35%, #0a0d12 100%);background-attachment:fixed;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;font-size:15px;position:relative;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at top, rgba(139,92,246,0.04) 0%, transparent 50%);z-index:0;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:linear-gradient(180deg, transparent 0%, transparent 60%, rgba(10,10,20,0.4) 100%);z-index:0;pointer-events:none;}
#main{position:relative;z-index:1;}
#header{position:relative;z-index:1;}
#tabs{position:relative;z-index:1;}
.tab-content{position:relative;z-index:1;}
button{font-family:'Inter',sans-serif;cursor:pointer;font-size:15px;}
input{font-family:'Inter',sans-serif;font-size:15px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#161b22;}
::-webkit-scrollbar-thumb{background:#525a64;border-radius:3px;}

#header{padding:14px 32px;border-bottom:1px solid #1f2733;display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#0d1117;}
#tabs{display:flex;border-bottom:1px solid #1f2733;background:#0d1117;padding:0 32px;}
.tab-btn{padding:11px 22px;font-size:12px;letter-spacing:1px;font-weight:700;background:none;border:none;border-bottom:2px solid transparent;color:#d4dae3;text-transform:uppercase;font-family:'Inter',sans-serif;cursor:pointer;transition:color 0.2s;}
.tab-btn:hover{color:#FDB927;}
.tab-btn.active{color:#FDB927;border-bottom-color:#552583;text-shadow:0 0 10px rgba(253,185,39,0.5);}

#main{padding:18px 24px;width:100%;max-width:1280px;margin:0 auto;}

.slot{margin-bottom:8px;padding:14px 18px;background:#161b22;border-radius:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid #1f2733;}
.slot.loaded{border-color:#55258355;background:#0e2926;}
.upload-label{cursor:pointer;background:#552583;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;color:#0d1117;font-family:'Inter',sans-serif;transition:background 0.2s;}
.upload-label:hover{background:#FDB927;}

#merge-btn{width:100%;padding:14px;font-size:13px;font-weight:700;letter-spacing:0.5px;border:none;border-radius:8px;margin-top:8px;transition:all 0.2s;}

#controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
#controls input[type=text]{background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:8px 14px;font-size:13px;color:#e2e8f0;outline:none;width:170px;transition:border-color 0.2s;}
#controls input[type=text]:focus{border-color:#552583;}

.ctrl-btn{background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;letter-spacing:0.3px;transition:all 0.2s;}
.ctrl-btn:hover{border-color:#55258377;color:#FDB927;}
.ctrl-btn.active{background:#55258330;border-color:#552583;color:#FDB927;}

.stat-btn{background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;transition:all 0.2s;}
.stat-btn:hover{border-color:#55258377;color:#FDB927;}
.stat-btn.active{background:#55258330;border-color:#552583;color:#FDB927;}

#export-btn,#export-con-btn{border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;letter-spacing:0.3px;transition:all 0.2s;font-family:'Inter',sans-serif;cursor:pointer;}
#export-btn{background:#552583;color:#0d1117;}
#export-btn:hover{background:#FDB927;}
#export-con-btn{background:#161b22;border:1px solid #552583;color:#FDB927;}
#export-con-btn:hover{background:#55258330;}

#copytight-btn{background:#161b22;border:1px solid #552583;color:#FDB927;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;transition:all 0.2s;}
#copytight-btn:hover{background:#55258330;}

#table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #1f2733;}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
thead{background:#161b22;}
th{padding:8px 10px;font-size:11px;color:#d4dae3;letter-spacing:0.6px;font-weight:600;text-transform:uppercase;white-space:nowrap;}
th.left{text-align:left;}th.center{text-align:center;}
tr.even{background:#0d1117;}tr.odd{background:#10161e;}
tr:hover{background:#0e2926 !important;}
td{border-bottom:1px solid #161b22;}
table colgroup col.player-col{width:36%;}
table colgroup col.src-col{width:16%;}
table colgroup col.avg-col{width:16%;}

.tol-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}

#tol-val{font-size:13px;font-weight:700;color:#FDB927;min-width:44px;}
#shown-count{font-size:12px;font-weight:500;color:#d4dae3;}
#log{font-size:12px;color:#d4dae3;margin-left:auto;}
.sep{color:#525a64;font-size:10px;}
#empty-results{color:#525a64;text-align:center;padding:60px 0;font-size:13px;}

#copy-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#552583;color:#0d1117;padding:8px 20px;border-radius:8px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity 0.2s;
  pointer-events:none;z-index:9999;
}
.copyable{cursor:pointer;}
.copyable:hover{opacity:0.8;}

/* MODAL */
#track-modal{display:none;position:fixed;inset:0;background:#0008;z-index:1000;align-items:center;justify-content:center;}
#track-modal.open{display:flex;}
#track-modal-box{background:#161b22;border:1px solid #1f2733;border-radius:12px;padding:18px 20px 16px;width:380px;max-width:95vw;}
#track-modal-box h3{font-size:15px;font-weight:800;color:#fff;margin-bottom:1px;}
#track-modal-box .sub{font-size:11px;color:#d4dae3;margin-bottom:14px;}
.modal-row{display:flex;gap:8px;margin-bottom:8px;}
.modal-field{flex:1;display:flex;flex-direction:column;gap:3px;}
.modal-field label{font-size:9px;font-weight:700;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;}
.modal-field input,.modal-field select{background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:7px 10px;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;width:100%;}
.modal-field input:focus,.modal-field select:focus{border-color:#552583;}
.modal-field select option{background:#161b22;}
#modal-proj-display{font-size:12px;color:#FDB927;font-weight:600;margin-bottom:2px;min-height:16px;}
#modal-stake-preview{font-size:12px;color:#d4dae3;margin-bottom:10px;min-height:14px;}
.modal-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:4px;}
.modal-btn-cancel{background:transparent;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:8px 18px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.modal-btn-save{background:#552583;border:none;color:#0d1117;border-radius:6px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}

/* QUICK GRADE */
#qg-overlay{display:none;position:fixed;inset:0;background:#0a0e13;z-index:2000;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
#qg-overlay.open{display:flex;}
#qg-card{background:#161b22;border:1px solid #1f2733;border-radius:16px;padding:32px;width:420px;max-width:95vw;text-align:center;}
#qg-progress{font-size:11px;color:#d4dae3;letter-spacing:1px;margin-bottom:20px;}
#qg-player{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px;}
#qg-detail{font-size:15px;color:#FDB927;font-weight:600;margin-bottom:6px;}
#qg-proj{font-size:13px;color:#d4dae3;margin-bottom:28px;}
.qg-btns{display:flex;gap:12px;justify-content:center;}
.qg-btn{border:none;border-radius:10px;padding:16px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:transform 0.1s;letter-spacing:0.5px;}
.qg-btn:active{transform:scale(0.95);}
#qg-hit{background:#22c55e;color:#fff;}
#qg-miss{background:#f87171;color:#fff;}
#qg-void{background:#f59e0b;color:#fff;}
#qg-skip{background:#161b22;border:1px solid #1f2733;color:#d4dae3;}
#qg-close-btn{margin-top:20px;background:transparent;border:none;color:#d4dae3;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}

/* TRACKER */
.tracker-section{margin-bottom:28px;}
.tracker-section h4{font-size:13px;font-weight:700;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1f2733;}
.stat-card{display:inline-flex;flex-direction:column;background:rgba(22,27,34,0.6);border:1px solid #1f2733;border-radius:8px;padding:12px 18px;margin:0 8px 8px 0;min-width:110px;}
.stat-card .sc-label{font-size:11px;color:#d4dae3;font-weight:600;margin-bottom:4px;}
.stat-card .sc-val{font-size:18px;font-weight:800;color:#fff;}
.stat-card .sc-sub{font-size:11px;color:#d4dae3;margin-top:2px;}
/* Sleeker minimal variant for the main Overview row */
.overview-strip{display:flex;gap:0;margin-bottom:16px;background:transparent;border:1px solid #1f2733;border-radius:10px;padding:0;overflow:hidden;flex-wrap:wrap;}
.overview-stat{flex:1 1 0;padding:14px 18px;border-right:1px solid #1f2733;display:flex;flex-direction:column;gap:2px;min-width:140px;transition:background 0.15s;}
.overview-stat:last-child{border-right:none;}
.overview-stat .os-label{font-size:10px;color:#d4dae3;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.overview-stat .os-val{font-size:22px;font-weight:800;color:#fff;line-height:1.1;letter-spacing:-0.5px;}
.overview-stat .os-sub{font-size:11px;color:#d4dae3;font-weight:500;}
.overview-stat.clickable{cursor:pointer;}
.overview-stat.clickable:hover{background:rgba(253,185,39,0.04);}
.overview-stat.active{background:rgba(253,185,39,0.08);}
#tracker-controls{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.result-btn{border:none;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin:0 2px;}
.result-btn.hit{background:#22c55e22;color:#22c55e;border:1px solid #22c55e55;}
.result-btn.miss{background:#f8717122;color:#f87171;border:1px solid #f8717155;}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div>
      <span style="font-size:20px;font-weight:800;color:#8b5cf6;letter-spacing:0.5px;text-shadow:0 0 14px rgba(139,92,246,0.7);">WNBA</span>
      <span style="font-size:20px;font-weight:800;color:#FDB927;letter-spacing:0.5px;margin-left:5px;text-shadow:0 0 12px rgba(253,185,39,0.55);">BLENDER</span>
    </div>
  </div>
  <div id="source-badges" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:16px;"></div>
  <span id="log"></span>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('upload')">UPLOAD</button>
  <button class="tab-btn" onclick="switchTab('results')">RESULTS</button>
  <button class="tab-btn" onclick="switchTab('totals')">TOTALS</button>
  <button class="tab-btn" onclick="switchTab('tracker')">TRACKER</button>
  <button class="tab-btn" onclick="switchTab('autograde')">AUTO GRADE</button>
</div>

<div id="main">
  <div id="upload-tab">
    <div id="slots-container"></div>
    <button id="merge-btn" onclick="runMerge()">RUN BLEND - 0/3 SOURCES LOADED</button>
  </div>

  <div id="tracker-tab" style="display:none;"></div>

  <div id="autograde-tab" style="display:none;"></div>

  <div id="totals-tab" style="display:none;"></div>

  <div id="results-tab" style="display:none;">
    <div id="empty-results">Upload sources and run blend first.</div>
    <div id="results-content" style="display:none;">
      <div id="controls">
        <div style="position:relative;display:inline-block;">
          <input type="text" id="search-box" placeholder="Search player..." oninput="renderTable()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="padding-right:28px;"/>
          <button onclick="clearSearch()" title="Clear search" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#d4dae3;cursor:pointer;padding:2px 6px;font-size:14px;font-family:'Inter',sans-serif;line-height:1;">✕</button>
        </div>
        <button class="ctrl-btn" id="con-btn" onclick="toggleConOnly()">CONSENSUS ONLY</button>
        <span class="sep">|</span>
        <span style="color:#3d5570;font-size:11px;font-weight:600;letter-spacing:2px;">SORT</span>
        <button class="ctrl-btn" id="tight-btn" onclick="toggleSortMode()">TIGHTEST FIRST</button>
        <span class="sep">|</span>
        <div id="stat-btns"></div>
        <div class="tol-wrap">
          <span style="font-size:12px;font-weight:600;color:#d4dae3;">TIGHTNESS</span>
          <div style="display:flex;align-items:center;gap:4px;background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:4px 10px;">
            <span style="font-size:12px;color:#d4dae3;">+/-</span>
            <input type="number" id="tol-input" min="1" max="100" value="15" autocomplete="off" spellcheck="false"
              oninput="onTolChange()"
              style="width:40px;background:transparent;border:none;outline:none;color:#FDB927;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;text-align:center;"/>
            <span style="font-size:12px;color:#d4dae3;">%</span>
          </div>
          <span id="shown-count"></span>
        </div>
        <button id="copytight-btn" onclick="copyTightest()">ALIGNMENTS</button>
        <button id="export-btn" onclick="doExport()">EXPORT AVG</button>
        <button id="export-con-btn" onclick="doExportConsensus()">EXPORT CONSENSUS</button>
      </div>
      <div id="table-wrap">
        <table>
          <colgroup id="table-colgroup"></colgroup>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="copy-toast"></div>

// TEAM ADVANCED STATS (for the Pace × Eff independent total model)
// Pasted from stats.wnba.com/teams/advanced — keyed by team abbr.

// Per-team merge logic: 2025 base + 2026 override when available + games-played-weighted blend.

// ────────────────────────────────────────────────────────────────────────────
let teamStats2025 = {};

function loadTeamStats() {
  try {
    const raw25 = localStorage.getItem("wnba_team_stats_2025");
    if (raw25) teamStats2025 = JSON.parse(raw25);
    const raw26 = localStorage.getItem("wnba_team_stats_2026");
    if (raw26) teamStats2026 = JSON.parse(raw26);
    teamStats2025UpdatedAt = localStorage.getItem("wnba_team_stats_2025_updated") || null;
    teamStats2026UpdatedAt = localStorage.getItem("wnba_team_stats_2026_updated") || null;
    // Legacy single-key migration: old data goes to 2025 slot
    const rawLegacy = localStorage.getItem("wnba_team_stats");
    if (rawLegacy && Object.keys(teamStats2025).length === 0) {
      teamStats2025 = JSON.parse(rawLegacy);
      localStorage.setItem("wnba_team_stats_2025", rawLegacy);
      localStorage.removeItem("wnba_team_stats");
    }
  } catch(e) { teamStats2025 = {}; teamStats2026 = {}; }
}
function saveTeamStats() {
  try {
    localStorage.setItem("wnba_team_stats_2025", JSON.stringify(teamStats2025));
    localStorage.setItem("wnba_team_stats_2026", JSON.stringify(teamStats2026));
    if (teamStats2025UpdatedAt) localStorage.setItem("wnba_team_stats_2025_updated", teamStats2025UpdatedAt);
    if (teamStats2026UpdatedAt) localStorage.setItem("wnba_team_stats_2026_updated", teamStats2026UpdatedAt);

// Format a stored ISO timestamp as "5/15 2:14 PM" or "—"
function formatStatsUpdatedAt(iso) {
  if (!iso) return "never";
  const d = new Date(iso);
  if (isNaN(d)) return "never";
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const time = d.toLocaleTimeString([], {hour:"numeric", minute:"2-digit"});
  if (sameDay) return `today ${time}`;
  const date = `${d.getMonth()+1}/${d.getDate()}`;
  return `${date} ${time}`;
}

// Effective team stats: blend 2025 prior with 2026 actual based on GP
// Few 2026 games → mostly 2025 prior. Many 2026 games → mostly 2026 actual.
// Pure 2026 only (expansion teams) → 2026 only.
// Pure 2025 only → 2025 only.
const PRIOR_WEIGHT_GAMES = 15;  // sample size at which 2026 weight = 50%
// season: undefined/"auto" → Bayesian blend. "2025" → only 2025. "2026" → only 2026. "blend" → 50/50 forced blend.
function effectiveTeamStats(abbr, season) {
  const cur = teamStats2026[abbr];
  const prior = teamStats2025[abbr];
  if (!cur && !prior) return null;

  if (season === "2025") {
    if (!prior) return null;
    return { ...prior, source: "2025" };
  }
  if (season === "2026") {
    if (!cur) return null;
    return { ...cur, source: "2026" };
  }
  if (season === "blend") {
    // Force 50/50 even if one side missing → fall back to the side that exists
    if (!cur) return { ...prior, source: "2025" };
    if (!prior) return { ...cur, source: "2026" };
    return {
      ortg: (cur.ortg + prior.ortg) / 2,
      drtg: (cur.drtg + prior.drtg) / 2,
      pace: (cur.pace + prior.pace) / 2,
      gp: cur.gp,
      source: "blend (50/50)"
    };
  }
  // Default: auto Bayesian blend by games played
  if (!cur) return { ...prior, source: "2025" };
  if (!prior) return { ...cur, source: "2026" };
  const gpCur = cur.gp || 0;
  const w26 = gpCur / (gpCur + PRIOR_WEIGHT_GAMES);
  const w25 = 1 - w26;
  return {
    ortg: cur.ortg * w26 + prior.ortg * w25,
    drtg: cur.drtg * w26 + prior.drtg * w25,
    pace: cur.pace * w26 + prior.pace * w25,
    gp: gpCur,
    source: `auto (${(w26*100).toFixed(0)}% 2026)`
  };
}

// Parse pasted stats.wnba.com advanced table.
function parseTeamStatsPaste(text) {
  const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  const parsed = {};
  for (let i = 0; i < lines.length; i++) {
    const abbr = teamLineToAbbr(lines[i]);
    if (!abbr) continue;
    const dataLine = lines[i+1];
    if (!dataLine) continue;
    const parts = dataLine.split(/\s+/).map(s => s.replace(/[^\d.\-]/g, "")).filter(s => s !== "");
    if (parts.length < 17) continue;
    const gp = parseInt(parts[0]);
    const ortg = parseFloat(parts[4]);
    const drtg = parseFloat(parts[5]);
    const pace = parseFloat(parts[16]);
    if (isNaN(ortg) || isNaN(drtg) || isNaN(pace)) continue;
    parsed[abbr] = { gp, ortg, drtg, pace };
    i++;
  }
  return parsed;
}

function importTeamStats(season) {
  const ta = document.getElementById(`team-stats-paste-${season}`);
  if (!ta) return;
  const text = ta.value;
  if (!text.trim()) { showToast("Paste advanced stats table first"); return; }
  const parsed = parseTeamStatsPaste(text);
  const count = Object.keys(parsed).length;
  if (count === 0) { showToast("Couldn't parse any teams — check format"); return; }
  const now = new Date().toISOString();
  if (season === "2025") { teamStats2025 = parsed; teamStats2025UpdatedAt = now; }
  else { teamStats2026 = parsed; teamStats2026UpdatedAt = now; }
  saveTeamStats();
  ta.value = "";
  showToast(`Imported ${count} ${season} team${count===1?"":"s"}`);
  renderTotals();
}

function clearTeamStats(season) {
  if (!confirm(`Clear all stored ${season} team advanced stats?`)) return;
  if (season === "2025") {
    teamStats2025 = {};
    teamStats2025UpdatedAt = null;
    try { localStorage.removeItem("wnba_team_stats_2025_updated"); } catch(e) {}
  } else {
    teamStats2026 = {};
    teamStats2026UpdatedAt = null;
    try { localStorage.removeItem("wnba_team_stats_2026_updated"); } catch(e) {}
  }
  saveTeamStats();
  renderTotals();
}

// Independent total: Pace × Efficiency model with league-average fallback for missing teams.
// season: undefined/"auto" | "2025" | "2026" | "blend" — controls effectiveTeamStats per call.
// Returns null only if BOTH teams have no data anywhere.
function independentTotal(awayAbbr, homeAbbr, season) {
  const a = effectiveTeamStats(awayAbbr, season);
  const b = effectiveTeamStats(homeAbbr, season);
  // Need at least one team's data to compute anything useful
  if (!a && !b) return null;

  // Build league average from whatever effective stats we have (using same season filter)
  const allAbbrs = new Set([...Object.keys(teamStats2025), ...Object.keys(teamStats2026)]);
  const allEffective = [...allAbbrs].map(abbr => effectiveTeamStats(abbr, season)).filter(Boolean);
  if (allEffective.length === 0) return null;
  const leagueOrtg = allEffective.reduce((s,t)=>s+t.ortg,0) / allEffective.length;
  const leagueDrtg = allEffective.reduce((s,t)=>s+t.drtg,0) / allEffective.length;
  const leaguePace = allEffective.reduce((s,t)=>s+t.pace,0) / allEffective.length;

  const aEff = a || { ortg: leagueOrtg, drtg: leagueDrtg, pace: leaguePace, source: "league avg" };
  const bEff = b || { ortg: leagueOrtg, drtg: leagueDrtg, pace: leaguePace, source: "league avg" };

  const paceAB = (aEff.pace + bEff.pace) / 2;
  const actualPoss = paceAB * (40/48);
  const ptsA = aEff.ortg * (bEff.drtg / leagueOrtg) * actualPoss / 100;
  const ptsB = bEff.ortg * (aEff.drtg / leagueOrtg) * actualPoss / 100;
  const usedFallback = !a || !b;
  return {
    total: ptsA + ptsB,
    ptsA, ptsB,
    paceAB,
    leagueAvg: leagueOrtg,
    usedFallback,
    aSource: aEff.source,
    bSource: bEff.source
  };
}
let modalPlayer = "";
let modalPos = "";

function norm(s) {
  if (!s) return "";
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\b(jr|sr|ii|iii|iv)\b/g,"")
    .replace(/[^a-z]/g,"");
}

const NAME_ALIASES = {};

function resolveNorm(n) {
  const normalized = norm(n);
  return NAME_ALIASES[normalized] || normalized;
}

function parseCSV(raw) {
  const text = raw.charCodeAt(0)===0xFEFF ? raw.slice(1) : raw;
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const nonEmpty = lines.filter(l=>l.trim());
  if (!nonEmpty.length) return [];
  // RotoWire-style: first row is a grouping header (",,,,Popular Stats,,,,Additional Stats,...")
  // and the actual column headers are on row 2. Detect by counting non-empty cells.
  let headerIdx = 0;
  if (nonEmpty.length >= 2) {
    const r1 = splitLine(nonEmpty[0]).filter(c => c.trim()).length;
    const r2 = splitLine(nonEmpty[1]).filter(c => c.trim()).length;
    if (r1 < r2 && r1 < r2 / 2) headerIdx = 1;
  }
  const headers = splitLine(nonEmpty[headerIdx]);
  return nonEmpty.slice(headerIdx + 1).map(line=>{
    const vals = splitLine(line);
    const row = {};
    headers.forEach((h,i)=>{ row[h]=vals[i]??""; });
    return row;
  }).filter(r=>Object.values(r).some(v=>v.trim()));
}

function splitLine(line) {
  const vals=[]; let cur="", inQ=false;
  for (let ci=0; ci<line.length; ci++) {
    const ch = line[ci];
    if (ch==='"') { inQ=!inQ; }
    else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=""; }
    else cur+=ch;
  }
  vals.push(cur.trim());
  return vals.map(v=>v.replace(/^"|"$/g,"").trim());
}

function findCol(headers, candidates) {
  const lc = headers.map(h=>h.toLowerCase().trim());
  for (const c of candidates) {
    const i = lc.findIndex(h=>h===c);
    if (i!==-1) return headers[i];
  }
  for (const c of candidates) {
    const i = lc.findIndex(h=>h.includes(c));
    if (i!==-1) return headers[i];
  }
  return null;
}

function parseSource(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const h = Object.keys(rows[0]);
  const C = {
    name:    findCol(h,["player","name"]),
    team:    findCol(h,["team","tm"]),
    pos:     findCol(h,["pos","position"]),
    pts:     findCol(h,["points","pts","exp pts"]),
    reb:     findCol(h,["rebounds","reb","rb","exp reb"]),
    ast:     findCol(h,["assists","ast","exp ast"]),
    threepm: findCol(h,["three_pointers_made","3pm","3pt","exp 3p","threepm"]),
    pra:     findCol(h,["exp pra","pra","p-r-a"]),
    min:     findCol(h,["proj min","minutes","mins","min"]),
  };
  if (!C.name) return [];
  return rows.filter(r=>r[C.name]?.trim()).map(r=>{
    const g=col=>{if(!col)return null;const v=parseFloat(r[col]);return isNaN(v)?null:v;};
    const pts=g(C.pts),reb=g(C.reb),ast=g(C.ast);
    const pra=g(C.pra)??(pts!=null&&reb!=null&&ast!=null?pts+reb+ast:null);
    return {
      rawName:r[C.name].trim(), norm:resolveNorm(r[C.name]),
      team: C.team ? (r[C.team]||"").trim() : "",
      pos:  C.pos ? (r[C.pos]||"").trim() : "",
      pts,reb,ast,threepm:g(C.threepm),pra,min:g(C.min)
    };
  }).filter(p => p.rawName && /[a-zA-Z]/.test(p.rawName) && p.norm.length >= 3);
}

}

function getSlotLookups() {
  return slots.map(s => {
    if (!s) return null;
    const lk = {};
    s.players.forEach(p => { lk[p.norm] = p; });
    return lk;
  });
}

function getStatVals(r, stat, lookups) {
  return lookups.flatMap(lk => {
    if (!lk) return [];
    const m = lk[norm(r.rawName)];
    return (m && m[stat] != null && m[stat] > 0) ? [m[stat]] : [];
  });
}

function isTight(r, stat, lookups) {
  const vals = getStatVals(r, stat, lookups);
  const activeSrc = slots.filter(Boolean).length;
  if (vals.length < activeSrc) return false;
  const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
  if (avg === 0) return false;
  return vals.every(v => Math.abs(v - avg) / avg * 100 <= tolerance);
}

function runMerge() {
  const active = slots.filter(Boolean);
  if (!active.length) { setLog("Load at least 1 source"); return; }

  const lookups = getSlotLookups();

  // Build roster from union of template + any source players not in template
  const tmplByNorm = {};
  WNBA_TEMPLATE.forEach(r => { tmplByNorm[norm(r.name)] = r; });
  const allNorms = new Set(Object.keys(tmplByNorm));
  active.forEach(s => s.players.forEach(p => allNorms.add(p.norm)));

  merged = Array.from(allNorms).map(epNorm => {
    const tmplRow = tmplByNorm[epNorm];
    // Pull display info from template if present, else from first source that has the player
    let rawName, team, pos;
    if (tmplRow) {
      rawName = tmplRow.name; team = tmplRow.team; pos = tmplRow.position;
    } else {
      const src = active.find(s => s.players.find(p => p.norm === epNorm));
      const p = src.players.find(p => p.norm === epNorm);
      rawName = p.rawName;
      // Take team/pos from any source that has them (later sources can fill gaps)
      team = "";
      pos = "";
      for (const s of active) {
        const sp = s.players.find(pp => pp.norm === epNorm);
        if (sp) {
          if (!team && sp.team) team = sp.team;
          if (!pos && sp.pos) pos = sp.pos;
        }
      }
    }
    const matches = lookups.map(lk => lk ? (lk[epNorm]||null) : null);
    const found = matches.filter(Boolean);
    const con = {};
    STATS.forEach(stat => {
      const vals = found.map(p=>p[stat]).filter(v=>v!=null && v>0);
      con[stat] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    });
    return {rawName, norm:epNorm, team, pos, matches, found:found.length, con, isConsensus:found.length>=active.length};
  });

  const nM = merged.filter(r=>r.found>0).length;
  const nC = merged.filter(r=>r.isConsensus).length;
  setLog(`${nM} matched - ${nC} in both sources`);
  switchTab("results");
  renderTable();
}

function getRowsForRender() {
  if (!merged) return [];
  const lookups = getSlotLookups();
  const search = document.getElementById("search-box").value.toLowerCase();

    .filter(r => !conOnly || isTight(r, sortBy, lookups))
    .filter(r => !search || r.rawName.toLowerCase().includes(search))
    .sort((a,b) => {
      if (sortMode==="consensus") {
        const aVals=getStatVals(a,sortBy,lookups), bVals=getStatVals(b,sortBy,lookups);
        const aAvg=aVals.length?aVals.reduce((x,y)=>x+y,0)/aVals.length:0;
        const bAvg=bVals.length?bVals.reduce((x,y)=>x+y,0)/bVals.length:0;
        const aSpread=aVals.length>1?Math.max(...aVals)-Math.min(...aVals):999;
        const bSpread=bVals.length>1?Math.max(...bVals)-Math.min(...bVals):999;
        if (aSpread!==bSpread) return aSpread-bSpread;
        if (aVals.length!==bVals.length) return bVals.length-aVals.length;
        return bAvg-aAvg;
      }
      return (b.con[sortBy]??-1)-(a.con[sortBy]??-1);
    });
}

function copyTightest() {
  if (!merged) return;
  const lookups = getSlotLookups();
  const statsToScan = ["pts","reb","ast","threepm","pra"];
  const lines = [`WNBA ALIGNMENTS`, ""];
  let totalCount = 0;
  statsToScan.forEach(stat => {
    const computeGap = r => {
      const vals = lookups.map(lk => lk ? (lk[r.norm]?.[stat] ?? null) : null).filter(v => v != null);
      return vals.length >= 2 ? (Math.max(...vals) - Math.min(...vals)) : 999;
    };
    const tightRows = merged.filter(r => isTight(r, stat, lookups))
      .sort((a,b) => {
        const ga = computeGap(a), gb = computeGap(b);
        if (ga !== gb) return ga - gb; // tightest first
        return (b.con[stat] ?? -1) - (a.con[stat] ?? -1); // tiebreak: bigger projection first
      });
    if (!tightRows.length) return;
    lines.push(STAT_LABEL[stat]);
    tightRows.forEach(r => {
      const proj = r.con[stat];
      if (proj == null) return;
      // Pull each source's individual projection
      const srcVals = lookups.map(lk => {
        if (!lk) return null;
        const m = lk[r.norm];
        return (m && m[stat] != null) ? m[stat] : null;
      });
      const parts = SOURCES.map((s,i) => {
        const v = srcVals[i];
        return v != null ? `${s.label} ${v.toFixed(1)}` : null;
      }).filter(Boolean);
      const present = srcVals.filter(v => v != null);
      const gap = present.length >= 2 ? (Math.max(...present) - Math.min(...present)) : null;
      const gapStr = gap != null ? ` gap ${gap.toFixed(1)}` : "";
      lines.push(`${r.rawName} (${r.team}) ${parts.join(" / ")}${gapStr} avg ${proj.toFixed(1)}`);
      totalCount++;
    });
    lines.push("");
  });
  if (!totalCount) {
    showToast("No alignments at current tolerance");
    return;
  }
  const text = lines.join("\n").trimEnd();
  navigator.clipboard.writeText(text).then(() => {
    showToast(`Copied ${totalCount} alignments across all stats`);
  });
}

function doExportConsensus() {
  if (!merged) return;
  // Use the currently visible filtered rows (CONSENSUS ONLY / TIGHTEST / search all apply)
  const rows = getRowsForRender();
  if (!rows.length) { showToast("No rows match current filters"); return; }
  const header = "id,name,first_name,last_name,position,team,three_pointers_made,assists,blocks,double_double,points,rebounds,steals,triple_double,turnovers,fd_points,dk_points";
  // Build a quick lookup from WNBA_TEMPLATE so consensus rows that exist in template carry full id/first/last
  const tmplByNorm = {};
  WNBA_TEMPLATE.forEach(t => { tmplByNorm[norm(t.name)] = t; });
  const dataRows = rows.map(r => {
    const con = r.con || {};
    const t = tmplByNorm[r.norm] || {};
    const first = t.first_name || (r.rawName.split(" ")[0] || "");
    const last  = t.last_name  || (r.rawName.split(" ").slice(1).join(" ") || "");
    return [
      t.id || "", r.rawName, first, last, r.pos || t.position || "", r.team || t.team || "",
      con.threepm!=null?con.threepm.toFixed(2):"",
      con.ast!=null?con.ast.toFixed(2):"",
      "","",
      con.pts!=null?con.pts.toFixed(2):"",
      con.reb!=null?con.reb.toFixed(2):"",
      "","","","","",
    ].map(v=>`"${v}"`).join(",");
  });
  const csv = [header,...dataRows].join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="WNBAblenderConsensus.csv"; a.style.display="none";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  showToast(`Exported ${rows.length} consensus rows`);
}

function calcStake(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  if (odds < 0) return { stake: parseFloat((Math.abs(odds)/100).toFixed(2)), toWin: 1.00, type: "fav" };
  return { stake: 1.00, toWin: parseFloat((odds/100).toFixed(2)), type: "dog" };
}

function oddsToImplied(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  return odds < 0 ? Math.abs(odds)/(Math.abs(odds)+100) : 100/(odds+100);
}

function oddsToDecimal(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  return odds < 0 ? 1+(100/Math.abs(odds)) : 1+(odds/100);
}

function calcEdge(bookOdds, fairOdds) {
  const fp = oddsToImplied(fairOdds), bd = oddsToDecimal(bookOdds);
  if (fp == null || bd == null) return null;
  return ((fp * bd) - 1) * 100;
}

function updateStakePreview() {

}

// Stdev assumptions for fair-value calc by stat
function stdevForStat(stat) {
  switch ((stat||"").toUpperCase()) {
    case "GAME_TOTAL": return totalsSigma();
    case "PTS": return 5.5;
    case "REB": return 3.0;
    case "AST": return 2.2;
    case "3PM": return 1.4;
    case "PRA": return 7.5;
    case "PR":  return 6.0;
    case "PA":  return 5.5;
    case "RA":  return 3.6;
    case "MIN": return 4.0;
    default: return 6;
  }
}

function probToAmerican(p) {
  if (p == null || p <= 0 || p >= 1) return null;
  if (p >= 0.5) return Math.round(-100 * p / (1 - p));
  return Math.round(100 * (1 - p) / p);
}

function modelWinProb(proj, line, side, stat) {
  if (proj == null || line == null) return null;
  const sd = stdevForStat(stat);
  const z = (line - proj) / sd;
  const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
  const pOver = 1 - pUnder;
  return side === "over" ? pOver : pUnder;
}

function recomputeFairFromProj() {
  const fairEl = document.getElementById("modal-fair");
  const projVal = window._modalProj;
  const line = window._modalLine;
  const ou = window._modalOU || "under";
  const statEl = document.getElementById("modal-stat");
  const stat = statEl ? statEl.value : null;
  if (!fairEl) return;
  // Only auto-fill if user hasn't manually overridden (track manual override flag)
  if (window._modalFairManual) return;
  if (projVal == null || line == null) {
    fairEl.value = "";
    return;
  }
  const p = modelWinProb(projVal, line, ou, stat);
  const fairOdds = probToAmerican(p);
  if (fairOdds != null) {
    fairEl.value = fairOdds > 0 ? "+" + fairOdds : String(fairOdds);
  }
  updateEvPreview();
}

// Back-solve fair odds from a target EV % and the offered odds.
// (fair_implied_prob × decimal_odds_offered) - 1 = ev/100
// fair_implied_prob = (1 + ev/100) / decimal_odds_offered
function recomputeFairFromEvInput() {
  const evEl = document.getElementById("modal-ev-input");
  const fairEl = document.getElementById("modal-fair");
  const preview = document.getElementById("ev-input-preview");
  if (!evEl || !fairEl) return;
  const evRaw = evEl.value.trim();
  if (!evRaw) {
    if (preview) preview.textContent = "";
    // Don't clear fair — let proj-based auto-calc resume if user hasn't overridden
    if (!window._modalFairManual) recomputeFairFromProj();
    updateEvPreview();
    return;
  }
  const evPct = parseFloat(evRaw);
  if (isNaN(evPct)) {
    if (preview) { preview.textContent = "Enter a number like 5 or 7.5"; preview.style.color = "#f87171"; }
    return;
  }
  const oddsVal = parseInt(document.getElementById("modal-odds").value);
  if (isNaN(oddsVal)) {
    if (preview) { preview.textContent = "Enter offered odds first"; preview.style.color = "#f87171"; }
    return;
  }
  const dec = oddsToDecimal(oddsVal);
  if (!dec) return;
  const fairProb = (1 + evPct/100) / dec;
  if (fairProb <= 0 || fairProb >= 1) {
    if (preview) { preview.textContent = "Out of range — pick a smaller EV %"; preview.style.color = "#f87171"; }
    return;
  }
  const fairOdds = probToAmerican(fairProb);
  if (fairOdds != null) {
    fairEl.value = fairOdds > 0 ? "+" + fairOdds : String(fairOdds);
    window._modalFairManual = true; // EV-driven fair counts as manual override
    if (preview) {
      preview.innerHTML = `Fair set to <span style="color:#FDB927;font-weight:700">${fairOdds>0?'+':''}${fairOdds}</span> for ${evPct.toFixed(1)}% EV vs ${oddsVal>0?'+':''}${oddsVal}`;
      preview.style.color = "#d4dae3";
    }
  }
  updateEvPreview();
}

// ── SHORTHAND ENTRY ─────────────────────────────────────────────────
// Parses one of:  "u17.5 200"  |  "u17.5 200 -120"  |  "o6.5 -110 -135"
// First token: line with leading u/o
// Second:      offered American odds
// Third:       fair value American odds (optional — auto-calc if missing)
function parseShorthand(el) {
  const raw = el.value.trim().toLowerCase();
  const preview = document.getElementById("shorthand-preview");
  const lineHidden = document.getElementById("modal-line");
  const oddsHidden = document.getElementById("modal-odds");
  const fairHidden = document.getElementById("modal-fair");
  const bookEl = document.getElementById("modal-book");
  if (!raw) {
    el.style.borderColor = "#1f2733";
    if (preview) preview.textContent = "";
    lineHidden.value = ""; oddsHidden.value = ""; fairHidden.value = "";
    window._modalLine = null; window._modalFairManual = false; window._modalEvTyped = null;
    updateEvPreview();
    return;
  }
  // Clear typed-EV cache at start of every parse — only re-set if user provides one
  window._modalEvTyped = null;
  // Tokenize on whitespace. Format: u17.5 [odds] [book?] [ev%? OR fair odds?]
  // Examples:
  //   u17.5 +200                 → line + offered odds, fair auto-calcs from proj
  //   u17.5 +200 -120            → line + offered + fair (American odds)
  //   u17.5 +111 fd 11.77        → line + offered + book + EV% (back-solves fair)
  //   u17.5 +111 fd              → line + offered + book (fair auto-calcs)
  const tokens = raw.split(/\s+/);
  const lineTok = tokens[0] || "";

  const lineMatch = lineTok.match(/^([ou])([\d.]+)$/);
  if (!lineMatch) {
    el.style.borderColor = "#f8717155";
    if (preview) { preview.textContent = "Format: u17.5 +111 fd 11.77"; preview.style.color = "#f87171"; }
    return;
  }
  const dir = lineMatch[1] === "o" ? "over" : "under";
  const lineVal = parseFloat(lineMatch[2]);
  window._modalOU = dir;
  window._modalLine = lineVal;
  lineHidden.value = (dir === "over" ? "o" : "u") + lineVal;

  // Helper: decide if a token is American odds (e.g. +200, -120, 150) vs an EV% (e.g. 11.77, 5)
  // Heuristic: integer with 3+ digits OR has explicit +/- sign → odds. Otherwise (decimal or 1-2 digits) → EV%.
  const isLikelyOdds = (s) => /^[+\-]\d{2,4}$/.test(s) || /^\d{3,4}$/.test(s);
  const isLikelyBook = (s) => !/^[+\-]?\d/.test(s); // doesn't start with digit/sign → book name

  // Walk remaining tokens: tokens[1..] — try to identify each
  let oddsVal = null;
  let fairVal = null;
  let bookVal = null;
  let evPct = null;

  // Token 1: should be offered odds
  const oddsTok = tokens[1] || "";
  if (oddsTok) {
    const m = oddsTok.match(/^([+\-]?)(\d{2,4})$/);
    if (m) {
      const sign = m[1] === "-" ? -1 : 1;
      oddsVal = sign * parseInt(m[2]);
      oddsHidden.value = String(oddsVal);
    }
  }

  // Walk tokens[2..] — book strings come first, then either fair odds or EV%
  for (let i = 2; i < tokens.length; i++) {
    const t = tokens[i];
    if (!t) continue;
    if (isLikelyBook(t) && bookVal == null) {
      bookVal = normBookInput(t); // resolve fd → FanDuel, etc.
      continue;
    }
    // Numeric token after odds: either fair (American) or EV% (decimal/small int)
    if (isLikelyOdds(t)) {
      // Treat as fair odds
      const m = t.match(/^([+\-]?)(\d{2,4})$/);
      if (m) {
        const sign = m[1] === "-" ? -1 : 1;
        fairVal = sign * parseInt(m[2]);
      }
    } else if (/^\d+(\.\d+)?$/.test(t)) {
      // Treat as EV%
      evPct = parseFloat(t);
      window._modalEvTyped = evPct;
    }
  }

  // Apply book if specified — write to hidden modal-book field
  // Also auto-fill the matching alt-book row with the offered odds so the price is visible there
  if (bookVal && bookEl) {
    bookEl.value = bookVal;
    if (oddsVal != null) {
      const altInput = document.querySelector(`input.alt-input[data-book="${bookVal}"]`);
      if (altInput) {
        altInput.value = oddsVal > 0 ? `+${oddsVal}` : String(oddsVal);
      }
    }
  }

  // Resolve fair: explicit fair odds wins; else EV%-based; else auto-calc from proj
  if (fairVal != null) {
    fairHidden.value = String(fairVal);
    window._modalFairManual = true;
  } else if (evPct != null && oddsVal != null) {
    // Back-solve from EV%: fair_implied = (1 + ev/100) / decimal_odds
    const dec = oddsToDecimal(oddsVal);
    if (dec) {
      const fairProb = (1 + evPct/100) / dec;
      if (fairProb > 0 && fairProb < 1) {
        const fo = probToAmerican(fairProb);
        if (fo != null) {
          fairVal = fo;
          fairHidden.value = String(fo);
          window._modalFairManual = true;
        }
      }
    }
  } else {
    window._modalFairManual = false;
    fairHidden.value = "";
    recomputeFairFromProj();
    fairVal = parseInt(fairHidden.value) || null;
  }

  el.style.borderColor = "#552583";
  if (preview) {
    const sideColor = dir === "over" ? "#22c55e" : "#f87171";
    const sideLbl = dir === "over" ? "OVER" : "UNDER";
    let txt = `<span style="color:${sideColor};font-weight:700">${sideLbl} ${lineVal}</span>`;
    if (oddsVal != null) txt += `<span style="color:#e2e8f0;margin-left:8px">${oddsVal>0?'+':''}${oddsVal}</span>`;
    if (bookVal) txt += `<span style="color:#FDB927;margin-left:8px">${bookVal}</span>`;
    if (evPct != null) txt += `<span style="color:#22c55e;margin-left:8px">${evPct.toFixed(2)}% EV</span>`;
    if (fairVal != null) txt += `<span style="color:#d4dae3;margin-left:8px">fair ${fairVal>0?'+':''}${fairVal}</span>`;
    preview.innerHTML = txt;
  }
  updateEvPreview();
}

function updateEvPreview() {
  const el = document.getElementById("modal-ev-preview");
  if (!el) return;
  const odds = parseInt(document.getElementById("modal-odds").value);
  const fair = parseInt(document.getElementById("modal-fair").value);
  if (isNaN(odds) || isNaN(fair)) { el.textContent = ""; return; }
  const stat = document.getElementById("modal-stat")?.value;

  // For TOTALS: show edge in points (projection vs line) — that's what you care about.
  // For PROPS: keep EV% display.
  if (stat === "GAME_TOTAL" && window._modalProj != null && window._modalLine != null) {
    const proj = window._modalProj;
    const line = window._modalLine;
    const ou = window._modalOU || "under";
    // Edge: how far the projection is OFF the line in the bet's favor
    // For OVER: proj - line (positive if proj > line, favors over)
    // For UNDER: line - proj (positive if line > proj, favors under)
    const edge = ou === "over" ? (proj - line) : (line - proj);
    const color = edge >= 3 ? "#22c55e" : edge > 0 ? "#FDB927" : "#f87171";
    el.innerHTML = `Edge: <span style="color:${color}">${edge>0?'+':''}${edge.toFixed(2)} pts</span>`;
    return;
  }

  // PROPS path — show EV%
  let ev = window._modalEvTyped != null ? window._modalEvTyped : calcEdge(odds, fair);
  if (ev == null || isNaN(ev)) { el.textContent = ""; return; }
  const color = ev >= 5 ? "#22c55e" : ev > 0 ? "#FDB927" : "#f87171";
  const decimals = (window._modalEvTyped != null && Math.abs(ev*10 - Math.round(ev*10)) > 0.01) ? 2 : 1;
  el.innerHTML = `EV: <span style="color:${color}">${ev>0?'+':''}${ev.toFixed(decimals)}%</span>`;
}

function renderBookSettings() {
  const el = document.getElementById("book-settings-list");

  el.innerHTML = ALT_BOOKS_ORDER.map(book => {
    const visible = !hiddenBooks.has(book);
    return `<label style="display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:12px;color:#d4dae3;">
      <input type="checkbox" ${visible?'checked':''} onchange="toggleBookVisibility('${book.replace(/'/g,"\\\'")}')" style="cursor:pointer;accent-color:#552583;"/>
      <span style="${visible?'':'opacity:0.5;'}">${book}</span>
    </label>`;
  }).join("");
}
function toggleBookSettings() {
  const panel = document.getElementById("book-settings-panel");
  if (!panel) return;
  const open = panel.style.display === "block";
  panel.style.display = open ? "none" : "block";
  if (!open) renderBookSettings();
}

// Toggle the alt-line input visibility for a given book
function toggleAltLine(book) {
  const wrap = document.querySelector(`.alt-line-wrap[data-book="${book}"]`);
  if (!wrap) return;
  const isOpen = wrap.style.display !== "none";
  if (isOpen) {

function getAltBooks() {
  const list = document.getElementById("modal-altbooks-list");
  if (!list) return [];
  const result = [];
  list.querySelectorAll('input.alt-input[data-book]').forEach(inp => {
    const raw = inp.value?.trim().toLowerCase();
    const b = inp.dataset.book;
    if (!b || !raw) return;

    // Tokenize and classify each token
    // Recognized formats per token:
    //   u19.5, o2.5            → alt line (with direction prefix)
    //   -110, +125, 100        → American odds
    //   11.7, 5.2              → EV% (decimal or small number, no sign)
    let line = null, odds = null, evPct = null;
    raw.split(/\s+/).forEach(t => {
      // Line: starts with o/u then number
      const lineM = t.match(/^([ou])([\d.]+)$/);
      if (lineM) {
        const ln = parseFloat(lineM[2]);
        if (!isNaN(ln)) line = ln;
        return;
      }
      // Odds: explicit sign or 3+ digit integer
      if (/^[+\-]\d{2,4}$/.test(t) || /^\d{3,4}$/.test(t)) {
        const m = t.match(/^([+\-]?)(\d+)$/);
        if (m) {
          const sign = m[1] === "-" ? -1 : 1;
          odds = sign * parseInt(m[2]);
        }
        return;
      }
      // EV%: decimal or 1-2 digit integer (no sign)
      if (/^\d+(\.\d+)?$/.test(t)) {
        const v = parseFloat(t);
        if (!isNaN(v)) evPct = v;
        return;
      }
    });

    if (odds == null) return; // need at least odds to register
    const entry = { book: b, odds };
    if (line != null) entry.line = line;
    if (evPct != null) {
      // Explicit EV% wins — back-solve fair from offered odds
      const dec = oddsToDecimal(odds);
      if (dec) {
        const fairProb = (1 + evPct/100) / dec;
        if (fairProb > 0 && fairProb < 1) {
          const fo = probToAmerican(fairProb);
          if (fo != null) entry.fair = fo;
        }
      }
    } else if (line != null && window._modalProj != null) {
      // For TOTALS only: when an alt has a different line and no typed EV%,
      // auto-compute fair from the projection so play-to is line-aware.
      // Props inherit main fair as before — no auto-recalc on props.
      const stat = document.getElementById("modal-stat")?.value;
      if (stat === "GAME_TOTAL") {
        const ou = window._modalOU || "under";
        try {
          const winProb = modelWinProb(window._modalProj, line, ou, stat);
          if (winProb != null && winProb > 0 && winProb < 1) {
            const fo = probToAmerican(winProb);
            if (fo != null) entry.fair = fo;
          }
        } catch(e) { /* swallow — leave fair undefined to inherit main */ }
      }
    }
    result.push(entry);
  });
  return result;
}

// Map shorthand and common variants to canonical book names
const BOOK_SHORTHAND = {
  "fd":"FanDuel","fanduel":"FanDuel",
  
  "pb":"Prop Builder","pp":"Prop Builder","propbuilder":"Prop Builder","prop builder":"Prop Builder",
  "onyx":"DK (Courtside/Onyx)","courtside":"DK (Courtside/Onyx)","courtsideonyx":"DK (Courtside/Onyx)","dk":"DK (Courtside/Onyx)","draftkings":"DK (Courtside/Onyx)",
  "fliff":"Fliff","fl":"Fliff",
  "novig":"Novig","nv":"Novig",
  "prophetx":"ProphetX","prophet":"ProphetX","px":"ProphetX",
  "bookmaker":"Bookmaker","bm":"Bookmaker",
  "pin":"Pinnacle","pinny":"Pinnacle","pinnacle":"Pinnacle",
  "bet105":"Bet105","105":"Bet105","b1":"Bet105","b105":"Bet105"
};
function normBookInput(s) {
  if (!s) return s;
  const key = s.trim().toLowerCase();
  return BOOK_SHORTHAND[key] || s.trim();
}

// ── BULK ALT BOOKS PASTE ───────────────────────────────────────────────────
// Paste one big shorthand line/block, parse into the matching alt-input rows.
// Each entry: [book-shorthand] [odds] (+ optional line/EV%)
// Examples:
//   "fd -115  pp -110  pin -118"
//   "fd -115\npp -110\npin -118"
//   "FanDuel: -115, PB: u19.5 -110 12"
function toggleAltBulkMode() {
  const bulk = document.getElementById("modal-altbooks-bulk");
  const list = document.getElementById("modal-altbooks-list");
  const btn = document.getElementById("alt-bulk-toggle");
  if (!bulk || !list || !btn) return;
  const isOpen = bulk.style.display !== "none";
  if (isOpen) {
    bulk.style.display = "none";
    list.style.display = "flex";
    btn.textContent = "⚡ BULK";
  } else {
    bulk.style.display = "block";
    list.style.display = "none";
    btn.textContent = "× CLOSE";
    setTimeout(() => document.getElementById("modal-altbooks-bulk-input")?.focus(), 0);
  }
}

function applyAltBulk() {
  const ta = document.getElementById("modal-altbooks-bulk-input");
  if (!ta) return;
  const raw = ta.value.trim();
  if (!raw) { toggleAltBulkMode(); return; }

  // Strip punctuation that wraps tokens: "FanDuel: -115," → "FanDuel -115"
  const cleaned = raw.replace(/[:,;|]+/g, " ").replace(/\s+/g, " ");

  // We need to break this into book-bundles. Walk tokens; whenever we hit a book
  // shorthand or full name, start a new bundle that continues until the next book.
  const tokens = cleaned.split(/\s+/);
  const isBookToken = (t) => {
    const k = t.toLowerCase();
    return !!BOOK_SHORTHAND[k] || Object.values(BOOK_SHORTHAND).some(v => v.toLowerCase() === k);
  };
  // Multi-word book names ("prop builder", "draft kings") — try 2-token combos first
  const isBookCombo = (t1, t2) => {
    const k = `${t1} ${t2}`.toLowerCase();
    return !!BOOK_SHORTHAND[k];
  };

  const bundles = [];
  let cur = null;
  for (let i = 0; i < tokens.length; i++) {
    const t = tokens[i];
    const next = tokens[i+1];
    if (next && isBookCombo(t, next)) {
      if (cur) bundles.push(cur);
      cur = { book: normBookInput(`${t} ${next}`), rest: [] };
      i++; // skip the second word
    } else if (isBookToken(t)) {
      if (cur) bundles.push(cur);
      cur = { book: normBookInput(t), rest: [] };
    } else if (cur) {
      cur.rest.push(t);
    }
  }
  if (cur) bundles.push(cur);

  let filled = 0;
  bundles.forEach(b => {
    if (!b.book || !b.rest.length) return;
    const inp = document.querySelector(`input.alt-input[data-book="${b.book}"]`);
    if (!inp) return;
    inp.value = b.rest.join(" ");
    filled++;
  });

  ta.value = "";
  toggleAltBulkMode();
  showToast(filled ? `Filled ${filled} book${filled===1?"":"s"}` : "Couldn't match any books");
}

function saveBet() {
  const lineRaw = document.getElementById("modal-line").value.trim().toLowerCase();
  const lineMatch = lineRaw.match(/^[ou]\s*([\d.]+)$/);
  const line = lineMatch ? parseFloat(lineMatch[1]) : parseFloat(lineRaw);
  const odds = parseInt(document.getElementById("modal-odds").value);
  const stat = document.getElementById("modal-stat").value;
  const ou = getOU();
  const book = normBookInput(document.getElementById("modal-book").value);
  if (isNaN(line) || isNaN(odds)) { alert("Please enter the bet (e.g. 'u17.5 200 -120')"); return; }
  const fair = parseInt(document.getElementById("modal-fair").value) || null;
  if (fair == null) {
    alert("Fair value is required (or let it auto-calc from projection).");
    return;
  }
  const altBooks = getAltBooks();
  const s = calcStake(odds);
  const now = new Date();
  const dateVal = document.getElementById("modal-date")?.value;
  const gameDate = dateVal ? new Date(dateVal + "T12:00:00") : now;
  const dateStr = gameDate.toLocaleDateString();
  const isoDate = gameDate.toISOString().slice(0,10);
  const timestamp = now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}) + " " + dateStr;
  const bet = {
    id: Date.now(), date: dateStr, gameDate: isoDate, timestamp,
    player: modalPlayer, pos: modalPos,
    stat, ou, line, odds, fair, altBooks,
    stake: s.stake, toWin: s.toWin, type: s.type,
    book, proj: window._modalProj, team: window._modalTeam,
    result: "pending"
  };
  // Stamp the totals model that was active when this bet was tracked
  if (stat === "GAME_TOTAL") {
    if (window._modalProjSource) bet.projSource = window._modalProjSource;
    if (window._modalProjSnapshots) bet.projSnapshots = window._modalProjSnapshots;
  }
  bets.unshift(bet);
  saveBets();
  closeTrackModal();
  if (currentTab === "tracker") renderTracker();
  if (currentTab === "totals") renderTotals();
  copyVal(`${modalPlayer} ${ou} ${line} ${stat}`);
}

function setBetResult(id, result) {
  const b = bets.find(x => x.id === id);
  if (!b) return;
  b.result = result;
  saveBets();
  renderTracker();
  if (currentTab === "totals") renderTotals();
}

function deleteBet(id) {
  if (!confirm("Delete this bet?")) return;
  bets = bets.filter(b => b.id !== id);
  saveBets();
  renderTracker();
  if (currentTab === "totals") renderTotals();
}

// Format and copy a single bet to clipboard — same format as bulk copy
function copySingleBet(id) {
  const b = bets.find(x => x.id === id);
  if (!b) return;
  const isTotal = (b.stat || "").toUpperCase() === "GAME_TOTAL";

  // Find best price across primary + alts (each alt may carry its own fair + line)
  const candidates = [{ book: b.book, odds: b.odds, fair: b.fair, line: b.line }];
  if (Array.isArray(b.altBooks)) {
    b.altBooks.forEach(a => {
      if (a && a.book && a.odds != null) {
        candidates.push({
          book: a.book,
          odds: a.odds,
          fair: a.fair != null ? a.fair : b.fair,
          line: a.line != null ? a.line : b.line
        });
      }
    });
  }
  let best = null;
  candidates.forEach(c => {
    const ev = c.fair != null ? calcEdge(c.odds, c.fair) : null;
    if (!best || (ev != null && (best.ev == null || ev > best.ev))) best = { ...c, ev };
  });
  if (!best) best = { book: b.book, odds: b.odds, fair: b.fair, line: b.line, ev: null };

  // Declarations that were missing — bestLine, ouLower, oddsStr
  const bestLine = best.line != null ? best.line : b.line;
  const ouLower = (b.ou || "").toLowerCase();
  const oddsStr = best.odds > 0 ? `+${best.odds}` : `${best.odds}`;

  // Append alts (excluding the one we used as headline). Dedupe by book+odds+line.
  const seenK = new Set();
  const remaining = candidates.filter(c => {
    if (c.book === best.book && c.odds === best.odds && c.line === bestLine) return false;
    const key = `${c.book}|${c.odds}|${c.line}`;
    if (seenK.has(key)) return false;
    seenK.add(key);
    return true;
  });

  // If alts share headline's line, drop play-to from headline (alts row owns it)
  const altsAtBestLine = remaining.some(p => (p.line ?? b.line) === bestLine);
  const playTo = (!altsAtBestLine && best.fair != null) ? playToOdds(best.fair, 5) : null;
  const playToStr = playTo != null ? ` play to ${playTo > 0 ? "+" + playTo : playTo}` : "";

  let line;
  if (isTotal) {
    line = `${b.player}  ${ouLower} ${bestLine} ${oddsStr} ${best.book}${playToStr}`;
  } else {
    const teamStr = b.team ? ` (${b.team})` : "";
    const statName = STAT_FULL_NAME[b.stat] || b.stat;
    line = `${b.player}${teamStr}  ${ouLower} ${bestLine} ${statName} ${oddsStr} ${best.book}${playToStr}`;
  }

  if (remaining.length) {
    const byLine = {};
    // Seed group at bestLine with the headline so its play-to includes the headline price
    if (altsAtBestLine) {
      byLine[String(bestLine)] = { line: bestLine, fair: best.fair, items: [] };
    }
    remaining.forEach(p => {
      const k = String(p.line ?? b.line);
      if (!byLine[k]) byLine[k] = { line: p.line, fair: p.fair, items: [] };
      byLine[k].items.push(p);
    });
    const groupStrs = Object.values(byLine).filter(g => g.items.length > 0).map(g => {
      const items = g.items.map(p => {
        const o = p.odds > 0 ? `+${p.odds}` : `${p.odds}`;
        // When line differs from main, prepend side letter so it's unambiguous (u4.5, o9.5)
        const lineHint = (p.line != null && p.line !== bestLine) ? `${ouLower[0]}${p.line} ` : "";
        return `${p.book} ${lineHint}${o}`;
      }).join("  ");
      const altPlayTo = g.fair != null ? playToOdds(g.fair, 5) : null;
      const altPlayToStr = altPlayTo != null ? `  play to ${altPlayTo > 0 ? "+" + altPlayTo : altPlayTo}` : "";
      return `${items}${altPlayToStr}`;
    });
    // Only prefix "alts:" if any of the alt prices are at a DIFFERENT line than the main bet
    const hasAltLine = remaining.some(p => p.line != null && p.line !== bestLine);
    const prefix = hasAltLine ? "alts: " : "";
    line += `\n${prefix}${groupStrs.join("  ")}`;
  }

  // Bulletproof copy
  const tryExec = (t) => {
    try {
      const ta = document.createElement("textarea");
      ta.value = t; ta.style.position="fixed"; ta.style.opacity="0";
      ta.setAttribute("readonly","");
      document.body.appendChild(ta);
      ta.focus(); ta.select(); ta.setSelectionRange(0, t.length);
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch(e) { return false; }
  };
  if (tryExec(line)) {
    showToast(`Copied ${b.player}`);
  } else if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(line)
      .then(() => showToast(`Copied ${b.player}`))
      .catch(() => { showToast("Copy blocked — text in console"); console.log(line); });
  } else {
    showToast("Copy not supported"); console.log(line);
  }
}

function decimalToAmerican(dec) {
  if (!dec || dec <= 1) return null;
  if (dec >= 2) return Math.round((dec - 1) * 100);
  return Math.round(-100 / (dec - 1));
}

function playToOdds(fairOdds, evCutoff) {
  // Returns the worst (max) American odds where you still have evCutoff% EV
  // (fairProb * bookDecimal) - 1 = evCutoff/100  =>  bookDecimal = (1 + evCutoff/100) / fairProb
  const fp = oddsToImplied(fairOdds);
  if (fp == null) return null;
  const bookDec = (1 + evCutoff/100) / fp;
  return decimalToAmerican(bookDec);
}

// ── ESPN AUTOGRADE ─────────────────────────────────────────────────────────
const _espnCache = {}; // key: ISO date, value: array of {playerNorm, displayName, completed, stats}
const _espnGameCountCache = {}; // key: ISO date, value: {total, completed, statuses, games}

async function fetchESPNStatsForDate(isoDate) {
  if (_espnCache[isoDate]) return { rows: _espnCache[isoDate], meta: _espnGameCountCache[isoDate] };
  const yyyymmdd = isoDate.replace(/-/g, "");
  const sbUrl = `https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard?dates=${yyyymmdd}`;
  let scoreboard;
  try {
    const res = await fetch(sbUrl);
    if (!res.ok) throw new Error(`ESPN scoreboard ${res.status}`);
    scoreboard = await res.json();
  } catch (e) { throw new Error("ESPN scoreboard error: " + e.message); }

  const events = scoreboard.events || [];
  const meta = { total: events.length, completed: 0, statuses: [], games: [] };
  const allRows = [];
  for (const ev of events) {
    const completed = ev.status?.type?.completed === true;
    const statusName = ev.status?.type?.shortDetail || ev.status?.type?.name || "Unknown";
    meta.statuses.push(statusName);
    // Capture team abbrs and final scores for game-level grading (totals/spreads/ML)
    const comp = ev.competitions?.[0];
    const home = comp?.competitors?.find(c => c.homeAway === "home");
    const away = comp?.competitors?.find(c => c.homeAway === "away");
    meta.games.push({
      eventId: ev.id,
      completed,
      status: statusName,
      awayAbbr: normTeamAbbr(away?.team?.abbreviation),
      homeAbbr: normTeamAbbr(home?.team?.abbreviation),
      awayScore: parseInt(away?.score) || null,
      homeScore: parseInt(home?.score) || null,
    });
    if (!completed) continue;
    meta.completed++;
    let summary;
    try {
      const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/summary?event=${ev.id}`);
      if (!r.ok) continue;
      summary = await r.json();
    } catch { continue; }

    const teamPlayerGroups = summary.boxscore?.players || [];
    for (const teamGroup of teamPlayerGroups) {
      const stats = teamGroup.statistics || [];
      for (const statGroup of stats) {
        const labels = (statGroup.labels || statGroup.keys || []).map(s => s.toString().toLowerCase());
        const idx = {
          min: labels.findIndex(l => l === "min"),
          pts: labels.findIndex(l => l === "pts"),
          reb: labels.findIndex(l => l === "reb"),
          ast: labels.findIndex(l => l === "ast"),
          tpt: labels.findIndex(l => l === "3pt" || l === "fg3" || l === "3p")
        };
        const athletes = statGroup.athletes || [];
        for (const a of athletes) {
          const player = a.athlete || {};
          const fullName = player.displayName || `${player.firstName||""} ${player.lastName||""}`.trim();
          if (!fullName) continue;
          const stRow = a.stats || [];
          const parseInt0 = (s) => { const n = parseInt(s); return isNaN(n) ? 0 : n; };
          let fg3m = 0;
          if (idx.tpt >= 0 && stRow[idx.tpt]) {
            const m = String(stRow[idx.tpt]).match(/^(\d+)/);
            if (m) fg3m = parseInt(m[1]);
          }
          allRows.push({
            playerNorm: norm(fullName),
            displayName: fullName,
            stats: {
              min: idx.min >= 0 ? parseInt0(stRow[idx.min]) : 0,
              pts: idx.pts >= 0 ? parseInt0(stRow[idx.pts]) : 0,
              reb: idx.reb >= 0 ? parseInt0(stRow[idx.reb]) : 0,
              ast: idx.ast >= 0 ? parseInt0(stRow[idx.ast]) : 0,
              fg3m: fg3m,
            }
          });
        }
      }
    }
  }
  _espnCache[isoDate] = allRows;
  _espnGameCountCache[isoDate] = meta;
  return { rows: allRows, meta };
}

function getStatValueForESPN(row, statKey) {
  const s = row.stats || {};
  const pts = s.pts || 0, reb = s.reb || 0, ast = s.ast || 0, fg3m = s.fg3m || 0;
  switch ((statKey||"").toUpperCase()) {
    case "PTS": return pts;
    case "REB": return reb;
    case "AST": return ast;
    case "3PM": return fg3m;
    case "PRA": return pts + reb + ast;
    case "PR":  return pts + reb;
    case "PA":  return pts + ast;
    case "RA":  return reb + ast;
    case "MIN": return s.min || 0;
    default: return null;
  }
}

function getBetISODate(b) {
  if (b.gameDate) return b.gameDate;
  if (!b.date) return null;
  const parts = b.date.split("/");
  if (parts.length !== 3) return null;
  const [m, d, y] = parts.map(x => parseInt(x));
  if (!m || !d || !y) return null;
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

async function gradeBet(b) {
  const iso = getBetISODate(b);
  if (!iso) return { ok: false, reason: "No date on bet" };
  let rows, meta;
  try {
    const result = await fetchESPNStatsForDate(iso);
    rows = result.rows;
    meta = result.meta;
  } catch (e) { return { ok: false, reason: "ESPN error: " + e.message }; }

  // GAME TOTAL grading branch — uses team scores, not player stats
  if ((b.stat||"").toUpperCase() === "GAME_TOTAL") {
    if (!meta || !meta.games || !meta.games.length) {
      return { ok: false, reason: `No WNBA games scheduled on ${iso}` };
    }
    // b.player is "AWAY @ HOME" label; b.team should be "AWAY/HOME"
    let awayAbbr = null, homeAbbr = null;
    if (b.team && b.team.includes("/")) {
      [awayAbbr, homeAbbr] = b.team.split("/").map(s => normTeamAbbr(s.trim()));
    } else if (b.player && b.player.includes("@")) {
      const parts = b.player.split("@").map(s => s.trim());
      awayAbbr = normTeamAbbr(parts[0]);
      homeAbbr = normTeamAbbr(parts[1]);
    }
    if (!awayAbbr || !homeAbbr) return { ok: false, reason: "Could not parse matchup from bet" };
    const game = meta.games.find(g => normTeamAbbr(g.awayAbbr) === awayAbbr && normTeamAbbr(g.homeAbbr) === homeAbbr);
    if (!game) return { ok: false, reason: `${awayAbbr} @ ${homeAbbr} not in ESPN games for ${iso}` };
    if (!game.completed) return { ok: false, reason: `${awayAbbr} @ ${homeAbbr} not final yet (${game.status})` };
    if (game.awayScore == null || game.homeScore == null) return { ok: false, reason: "ESPN final scores not available yet" };
    const total = game.awayScore + game.homeScore;
    const line = b.line, ou = b.ou;
    let result;
    if (Math.abs(total - line) < 0.001) result = "void";
    else if (ou === "over") result = total > line ? "hit" : "miss";
    else result = total < line ? "hit" : "miss";
    return { ok: true, result, total };
  }

  // Player prop grading (default)
  // No box score data found
  if (!rows || !rows.length) {
    if (!meta || meta.total === 0) {
      return { ok: false, reason: `No WNBA games scheduled on ${iso}` };
    }
    if (meta.completed === 0) {
      return { ok: false, reason: `Games not final yet (${meta.statuses.join(", ")})` };
    }
    return { ok: false, reason: `${meta.completed} game(s) final but ESPN box score not loaded yet` };
  }

  const playerNorm = norm(b.player);
  const matches = rows.filter(r => r.playerNorm === playerNorm);
  if (!matches.length) return { ok: false, reason: `${b.player} not in ESPN box scores for ${iso} (DNP?)` };

  // Sum across all matches (rare: multi-game days)
  let total = 0;
  matches.forEach(m => { total += getStatValueForESPN(m, b.stat); });

  const line = b.line, ou = b.ou;
  let result;
  if (Math.abs(total - line) < 0.001) result = "void";
  else if (ou === "over") result = total > line ? "hit" : "miss";
  else result = total < line ? "hit" : "miss";
  return { ok: true, result, total };
}

function logGrade(msg, kind) {
  // kind: "info", "hit", "miss", "void", "error"
  gradeLog.unshift({ ts: new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"}), msg, kind: kind || "info" });
  if (gradeLog.length > 200) gradeLog.length = 200;
  if (currentTab === "autograde") renderAutoGrade();
}

async function gradeAllPending() {
  if (gradingInProgress) return;
  const pendingBets = bets.filter(b => b.result === "pending");
  if (!pendingBets.length) {
    logGrade("No pending bets to grade", "info");
    showToast("No pending bets to grade");
    return;
  }
  gradingInProgress = true;
  if (currentTab === "autograde") renderAutoGrade();
  gradeLog.length = 0;
  logGrade(`Starting grading for ${pendingBets.length} pending bets...`, "info");
  let graded = 0, failed = 0, skipped = 0, hit = 0, miss = 0, voided = 0;
  for (const b of pendingBets) {
    const r = await gradeBet(b);
    const lineStr = `${b.ou.toUpperCase()} ${b.line}`;
    if (r.ok) {
      const target = bets.find(x => x.id === b.id);
      if (target) {
        target.result = r.result;
        target.actual = r.total;
        graded++;
        if (r.result === "hit") hit++;
        else if (r.result === "miss") miss++;
        else if (r.result === "void") voided++;
        logGrade(`${b.player} ${lineStr} ${b.stat}: actual ${r.total} → ${r.result.toUpperCase()}`, r.result);
      }
    } else {
      const isNotFinal = /not final|ingesting|in progress|not started/i.test(r.reason);
      if (isNotFinal) {
        skipped++;
        logGrade(`${b.player} ${lineStr} ${b.stat}: ${r.reason} — skipped`, "void");
      } else {
        failed++;
        logGrade(`${b.player} ${lineStr} ${b.stat}: ${r.reason}`, "error");
      }
    }
  }
  saveBets();
  gradingInProgress = false;
  const summaryParts = [`${graded} graded (${hit}W ${miss}L ${voided}V)`];
  if (skipped) summaryParts.push(`${skipped} not final`);
  if (failed) summaryParts.push(`${failed} failed`);
  logGrade(`Done. ${summaryParts.join(", ")}.`, "info");
  if (currentTab === "autograde") renderAutoGrade();
  if (currentTab === "tracker") renderTracker();
  const toastBits = [`Graded ${graded} of ${pendingBets.length}`];
  if (skipped) toastBits.push(`${skipped} not final`);
  if (failed) toastBits.push(`${failed} failed`);
  showToast(toastBits.join(" • "));
}

async function gradeOneBet(id) {
