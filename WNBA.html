<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WNBA BLENDER</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d1117;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;font-size:15px;}
button{font-family:'Inter',sans-serif;cursor:pointer;font-size:15px;}
input{font-family:'Inter',sans-serif;font-size:15px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#161b22;}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px;}

#header{padding:14px 32px;border-bottom:1px solid #1f2733;display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#0d1117;}
#tabs{display:flex;border-bottom:1px solid #1f2733;background:#0d1117;padding:0 32px;}
.tab-btn{padding:11px 22px;font-size:12px;letter-spacing:1px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:#7d8590;text-transform:uppercase;font-family:'Inter',sans-serif;cursor:pointer;transition:color 0.2s;}
.tab-btn:hover{color:#5eead4;}
.tab-btn.active{color:#5eead4;border-bottom-color:#14b8a6;}

#main{padding:24px 32px;width:100%;}

.slot{margin-bottom:8px;padding:14px 18px;background:#161b22;border-radius:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid #1f2733;}
.slot.loaded{border-color:#14b8a644;background:#0e2926;}
.upload-label{cursor:pointer;background:#14b8a6;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;color:#0d1117;font-family:'Inter',sans-serif;transition:background 0.2s;}
.upload-label:hover{background:#5eead4;}

#merge-btn{width:100%;padding:14px;font-size:13px;font-weight:700;letter-spacing:0.5px;border:none;border-radius:8px;margin-top:8px;transition:all 0.2s;}

#controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
#controls input[type=text]{background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:8px 14px;font-size:13px;color:#e2e8f0;outline:none;width:170px;transition:border-color 0.2s;}
#controls input[type=text]:focus{border-color:#14b8a6;}

.ctrl-btn{background:#161b22;border:1px solid #1f2733;color:#7d8590;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;letter-spacing:0.3px;transition:all 0.2s;}
.ctrl-btn:hover{border-color:#14b8a655;color:#5eead4;}
.ctrl-btn.active{background:#14b8a622;border-color:#14b8a6;color:#5eead4;}

.stat-btn{background:#161b22;border:1px solid #1f2733;color:#7d8590;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;transition:all 0.2s;}
.stat-btn:hover{border-color:#14b8a655;color:#5eead4;}
.stat-btn.active{background:#14b8a622;border-color:#14b8a6;color:#5eead4;}

#export-btn{background:#14b8a6;color:#0d1117;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:700;transition:background 0.2s;}
#export-btn:hover{background:#5eead4;}

#copytight-btn{background:#161b22;border:1px solid #14b8a6;color:#5eead4;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:600;transition:all 0.2s;}
#copytight-btn:hover{background:#14b8a622;}

#table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #1f2733;}
table{width:100%;border-collapse:collapse;table-layout:auto;}
thead{background:#161b22;}
th{padding:10px 12px;font-size:12px;color:#7d8590;letter-spacing:0.8px;font-weight:600;text-transform:uppercase;white-space:nowrap;}
th.left{text-align:left;}th.center{text-align:center;}
tr.even{background:#0d1117;}tr.odd{background:#10161e;}
tr:hover{background:#0e2926 !important;}
td{border-bottom:1px solid #161b22;}

.tol-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}

#tol-val{font-size:13px;font-weight:700;color:#5eead4;min-width:44px;}
#shown-count{font-size:12px;font-weight:500;color:#7d8590;}
#log{font-size:12px;color:#7d8590;margin-left:auto;}
.sep{color:#30363d;font-size:10px;}
#empty-results{color:#30363d;text-align:center;padding:60px 0;font-size:13px;}

#copy-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#14b8a6;color:#0d1117;padding:8px 20px;border-radius:8px;
  font-size:13px;font-weight:700;opacity:0;transition:opacity 0.2s;
  pointer-events:none;z-index:9999;
}
.copyable{cursor:pointer;}
.copyable:hover{opacity:0.8;}

/* MODAL */
#track-modal{display:none;position:fixed;inset:0;background:#0008;z-index:1000;align-items:center;justify-content:center;}
#track-modal.open{display:flex;}
#track-modal-box{background:#161b22;border:1px solid #1f2733;border-radius:14px;padding:28px 28px 24px;width:460px;max-width:95vw;}
#track-modal-box h3{font-size:17px;font-weight:800;color:#fff;margin-bottom:2px;}
#track-modal-box .sub{font-size:12px;color:#7d8590;margin-bottom:22px;}
.modal-row{display:flex;gap:12px;margin-bottom:12px;}
.modal-field{flex:1;display:flex;flex-direction:column;gap:5px;}
.modal-field label{font-size:10px;font-weight:700;color:#7d8590;letter-spacing:1px;text-transform:uppercase;}
.modal-field input,.modal-field select{background:#0d1117;border:1px solid #1f2733;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;width:100%;}
.modal-field input:focus,.modal-field select:focus{border-color:#14b8a6;}
.modal-field select option{background:#161b22;}
#modal-proj-display{font-size:13px;color:#5eead4;font-weight:600;margin-bottom:4px;min-height:18px;}
#modal-stake-preview{font-size:13px;color:#7d8590;margin-bottom:18px;min-height:18px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.modal-btn-cancel{background:transparent;border:1px solid #1f2733;color:#7d8590;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.modal-btn-save{background:#14b8a6;border:none;color:#0d1117;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}

/* QUICK GRADE */
#qg-overlay{display:none;position:fixed;inset:0;background:#0a0e13;z-index:2000;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
#qg-overlay.open{display:flex;}
#qg-card{background:#161b22;border:1px solid #1f2733;border-radius:16px;padding:32px;width:420px;max-width:95vw;text-align:center;}
#qg-progress{font-size:11px;color:#7d8590;letter-spacing:1px;margin-bottom:20px;}
#qg-player{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px;}
#qg-detail{font-size:15px;color:#5eead4;font-weight:600;margin-bottom:6px;}
#qg-proj{font-size:13px;color:#7d8590;margin-bottom:28px;}
.qg-btns{display:flex;gap:12px;justify-content:center;}
.qg-btn{border:none;border-radius:10px;padding:16px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:transform 0.1s;letter-spacing:0.5px;}
.qg-btn:active{transform:scale(0.95);}
#qg-hit{background:#22c55e;color:#fff;}
#qg-miss{background:#f87171;color:#fff;}
#qg-void{background:#f59e0b;color:#fff;}
#qg-skip{background:#161b22;border:1px solid #1f2733;color:#7d8590;}
#qg-close-btn{margin-top:20px;background:transparent;border:none;color:#7d8590;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}

/* TRACKER */
.tracker-section{margin-bottom:28px;}
.tracker-section h4{font-size:13px;font-weight:700;color:#7d8590;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1f2733;}
.stat-card{display:inline-flex;flex-direction:column;background:#161b22;border:1px solid #1f2733;border-radius:8px;padding:12px 18px;margin:0 8px 8px 0;min-width:110px;}
.stat-card .sc-label{font-size:11px;color:#7d8590;font-weight:600;margin-bottom:4px;}
.stat-card .sc-val{font-size:18px;font-weight:800;color:#fff;}
.stat-card .sc-sub{font-size:11px;color:#7d8590;margin-top:2px;}
#tracker-controls{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.result-btn{border:none;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin:0 2px;}
.result-btn.hit{background:#22c55e22;color:#22c55e;border:1px solid #22c55e55;}
.result-btn.miss{background:#f8717122;color:#f87171;border:1px solid #f8717155;}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#14b8a6,#5eead4);border-radius:8px;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:14px;font-weight:900;color:#0d1117;">W</span>
    </div>
    <div>
      <span style="font-size:18px;font-weight:800;color:#fff;letter-spacing:0.5px;">WNBA</span>
      <span style="font-size:18px;font-weight:800;color:#5eead4;letter-spacing:0.5px;margin-left:5px;">BLENDER</span>
    </div>
  </div>
  <div id="source-badges" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:16px;"></div>
  <span id="log"></span>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('upload')">UPLOAD</button>
  <button class="tab-btn" onclick="switchTab('results')">RESULTS</button>
  <button class="tab-btn" onclick="switchTab('totals')">TOTALS</button>
  <button class="tab-btn" onclick="switchTab('tracker')">TRACKER</button>
  <button class="tab-btn" onclick="switchTab('autograde')">AUTO GRADE</button>
</div>

<div id="main">
  <div id="upload-tab">
    <div id="slots-container"></div>
    <button id="merge-btn" onclick="runMerge()">RUN BLEND - 0/3 SOURCES LOADED</button>
  </div>

  <div id="tracker-tab" style="display:none;"></div>

  <div id="autograde-tab" style="display:none;"></div>

  <div id="totals-tab" style="display:none;"></div>

  <div id="results-tab" style="display:none;">
    <div id="empty-results">Upload sources and run blend first.</div>
    <div id="results-content" style="display:none;">
      <div id="controls">
        <div style="position:relative;display:inline-block;">
          <input type="text" id="search-box" placeholder="Search player..." oninput="renderTable()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="padding-right:28px;"/>
          <button onclick="clearSearch()" title="Clear search" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#7d8590;cursor:pointer;padding:2px 6px;font-size:14px;font-family:'Inter',sans-serif;line-height:1;">✕</button>
        </div>
        <button class="ctrl-btn" id="con-btn" onclick="toggleConOnly()">CONSENSUS ONLY</button>
        <span class="sep">|</span>
        <span style="color:#3d5570;font-size:11px;font-weight:600;letter-spacing:2px;">SORT</span>
        <button class="ctrl-btn" id="tight-btn" onclick="toggleSortMode()">TIGHTEST FIRST</button>
        <span class="sep">|</span>
        <div id="stat-btns"></div>
        <div class="tol-wrap">
          <span style="font-size:12px;font-weight:600;color:#7d8590;">TIGHTNESS</span>
          <div style="display:flex;align-items:center;gap:4px;background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:4px 10px;">
            <span style="font-size:12px;color:#7d8590;">+/-</span>
            <input type="number" id="tol-input" min="1" max="100" value="15" autocomplete="off" spellcheck="false"
              oninput="onTolChange()"
              style="width:40px;background:transparent;border:none;outline:none;color:#5eead4;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;text-align:center;"/>
            <span style="font-size:12px;color:#7d8590;">%</span>
          </div>
          <span id="shown-count"></span>
        </div>
        <button id="copytight-btn" onclick="copyTightest()">ALIGNMENTS</button>
        <button id="export-btn" onclick="doExport()">EXPORT CSV</button>
      </div>
      <div id="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="copy-toast"></div>

function norm(s) {
  if (!s) return "";
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/\b(jr|sr|ii|iii|iv)\b/g,"")
    .replace(/[^a-z]/g,"");
}

const NAME_ALIASES = {};

function resolveNorm(n) {
  const normalized = norm(n);
  return NAME_ALIASES[normalized] || normalized;
}

function parseCSV(raw) {
  const text = raw.charCodeAt(0)===0xFEFF ? raw.slice(1) : raw;
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const nonEmpty = lines.filter(l=>l.trim());
  if (!nonEmpty.length) return [];
  // RotoWire-style: first row is a grouping header (",,,,Popular Stats,,,,Additional Stats,...")
  // and the actual column headers are on row 2. Detect by counting non-empty cells.
  let headerIdx = 0;
  if (nonEmpty.length >= 2) {
    const r1 = splitLine(nonEmpty[0]).filter(c => c.trim()).length;
    const r2 = splitLine(nonEmpty[1]).filter(c => c.trim()).length;
    if (r1 < r2 && r1 < r2 / 2) headerIdx = 1;
  }
  const headers = splitLine(nonEmpty[headerIdx]);
  return nonEmpty.slice(headerIdx + 1).map(line=>{
    const vals = splitLine(line);
    const row = {};
    headers.forEach((h,i)=>{ row[h]=vals[i]??""; });
    return row;
  }).filter(r=>Object.values(r).some(v=>v.trim()));
}

function splitLine(line) {
  const vals=[]; let cur="", inQ=false;
  for (let ci=0; ci<line.length; ci++) {
    const ch = line[ci];
    if (ch==='"') { inQ=!inQ; }
    else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=""; }
    else cur+=ch;
  }
  vals.push(cur.trim());
  return vals.map(v=>v.replace(/^"|"$/g,"").trim());
}

function findCol(headers, candidates) {
  const lc = headers.map(h=>h.toLowerCase().trim());
  for (const c of candidates) {
    const i = lc.findIndex(h=>h===c);
    if (i!==-1) return headers[i];
  }
  for (const c of candidates) {
    const i = lc.findIndex(h=>h.includes(c));
    if (i!==-1) return headers[i];
  }
  return null;
}

function parseSource(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const h = Object.keys(rows[0]);
  const C = {
    name:    findCol(h,["player","name"]),
    team:    findCol(h,["team","tm"]),
    pos:     findCol(h,["pos","position"]),
    pts:     findCol(h,["points","pts","exp pts"]),
    reb:     findCol(h,["rebounds","reb","rb","exp reb"]),
    ast:     findCol(h,["assists","ast","exp ast"]),
    threepm: findCol(h,["three_pointers_made","3pm","3pt","exp 3p","threepm"]),
    pra:     findCol(h,["exp pra","pra","p-r-a"]),
    min:     findCol(h,["proj min","minutes","mins","min"]),
  };
  if (!C.name) return [];
  return rows.filter(r=>r[C.name]?.trim()).map(r=>{
    const g=col=>{if(!col)return null;const v=parseFloat(r[col]);return isNaN(v)?null:v;};
    const pts=g(C.pts),reb=g(C.reb),ast=g(C.ast);
    const pra=g(C.pra)??(pts!=null&&reb!=null&&ast!=null?pts+reb+ast:null);
    return {
      rawName:r[C.name].trim(), norm:resolveNorm(r[C.name]),
      team: C.team ? (r[C.team]||"").trim() : "",
      pos:  C.pos ? (r[C.pos]||"").trim() : "",
      pts,reb,ast,threepm:g(C.threepm),pra,min:g(C.min)
    };
  }).filter(p => p.rawName && /[a-zA-Z]/.test(p.rawName) && p.norm.length >= 3);
}

function loadFile(idx, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const players = parseSource(e.target.result);
    slots[idx] = {label: file.name, players};
    setLog(`${SOURCES[idx].label} loaded: ${players.length} players`);
    buildSlots();
    updateBadges();
  };
  reader.readAsText(file);
}

function getSlotLookups() {
  return slots.map(s => {
    if (!s) return null;
    const lk = {};
    s.players.forEach(p => { lk[p.norm] = p; });
    return lk;
  });
}

function getStatVals(r, stat, lookups) {
  return lookups.flatMap(lk => {
    if (!lk) return [];
    const m = lk[norm(r.rawName)];
    return (m && m[stat] != null && m[stat] > 0) ? [m[stat]] : [];
  });
}

function isTight(r, stat, lookups) {
  const vals = getStatVals(r, stat, lookups);
  const activeSrc = slots.filter(Boolean).length;
  if (vals.length < activeSrc) return false;
  const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
  if (avg === 0) return false;
  return vals.every(v => Math.abs(v - avg) / avg * 100 <= tolerance);
}

function runMerge() {
  const active = slots.filter(Boolean);
  if (!active.length) { setLog("Load at least 1 source"); return; }

  const lookups = getSlotLookups();

  // Build roster from union of template + any source players not in template
  const tmplByNorm = {};
  WNBA_TEMPLATE.forEach(r => { tmplByNorm[norm(r.name)] = r; });
  const allNorms = new Set(Object.keys(tmplByNorm));
  active.forEach(s => s.players.forEach(p => allNorms.add(p.norm)));

  merged = Array.from(allNorms).map(epNorm => {
    const tmplRow = tmplByNorm[epNorm];
    // Pull display info from template if present, else from first source that has the player
    let rawName, team, pos;
    if (tmplRow) {
      rawName = tmplRow.name; team = tmplRow.team; pos = tmplRow.position;
    } else {
      const src = active.find(s => s.players.find(p => p.norm === epNorm));
      const p = src.players.find(p => p.norm === epNorm);
      rawName = p.rawName;
      // Take team/pos from any source that has them (later sources can fill gaps)
      team = "";
      pos = "";
      for (const s of active) {
        const sp = s.players.find(pp => pp.norm === epNorm);
        if (sp) {
          if (!team && sp.team) team = sp.team;
          if (!pos && sp.pos) pos = sp.pos;
        }
      }
    }
    const matches = lookups.map(lk => lk ? (lk[epNorm]||null) : null);
    const found = matches.filter(Boolean);
    const con = {};
    STATS.forEach(stat => {
      const vals = found.map(p=>p[stat]).filter(v=>v!=null && v>0);
      con[stat] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    });
    return {rawName, norm:epNorm, team, pos, matches, found:found.length, con, isConsensus:found.length>=active.length};
  });

  const nM = merged.filter(r=>r.found>0).length;
  const nC = merged.filter(r=>r.isConsensus).length;
  setLog(`${nM} matched - ${nC} in both sources`);
  switchTab("results");
  renderTable();
}

    <button class="stat-btn${f===sortBy?' active':''}" onclick="setSortBy('${f}')">${STAT_LABEL[f]}</button>
  `).join("");
}

function setSortBy(f) {
  sortBy = f;
  document.querySelectorAll(".stat-btn").forEach((b,i)=>{
    b.classList.toggle("active", STATS[i]===f);

function getRowsForRender() {
  if (!merged) return [];
  const lookups = getSlotLookups();
  const search = document.getElementById("search-box").value.toLowerCase();
  return merged
    .filter(r => !conOnly || isTight(r, sortBy, lookups))
    .filter(r => !search || r.rawName.toLowerCase().includes(search))
    .sort((a,b) => {
      if (sortMode==="consensus") {
        const aVals=getStatVals(a,sortBy,lookups), bVals=getStatVals(b,sortBy,lookups);
        const aAvg=aVals.length?aVals.reduce((x,y)=>x+y,0)/aVals.length:0;
        const bAvg=bVals.length?bVals.reduce((x,y)=>x+y,0)/bVals.length:0;
        const aSpread=aVals.length>1?Math.max(...aVals)-Math.min(...aVals):999;
        const bSpread=bVals.length>1?Math.max(...bVals)-Math.min(...bVals):999;
        if (aSpread!==bSpread) return aSpread-bSpread;
        if (aVals.length!==bVals.length) return bVals.length-aVals.length;
        return bAvg-aAvg;
      }
      return (b.con[sortBy]??-1)-(a.con[sortBy]??-1);
    });
}

function renderTable() {
  if (!merged) return;

    }).join("")

  rowCache = rows.map((r,i) => {
    const lk = getSlotLookups();
    const srcVals = lk.map(l => { if(!l) return null; const m=l[norm(r.rawName)]; return (m&&m[sortBy]!=null)?m[sortBy]:null; });
    const pv = srcVals.filter(v=>v!=null);

  });

  const tbody = document.getElementById("table-body");
  tbody.innerHTML = rows.map((r,i)=>{
    const srcVals = lookups.map(lk=>{
      if(!lk) return null;
      const m=lk[norm(r.rawName)];

    });
    const presentVals = srcVals.filter(v=>v!=null);
    const avg = presentVals.length ? presentVals.reduce((a,b)=>a+b,0)/presentVals.length : null;
    const tight = isTight(r, sortBy, lookups);
    const tc = presentVals.length===0?"#30363d":tight?"#ffffff":"#8b9aa8";

    const srcCells = srcVals.map((v,si)=>{
      const withinTol = v!=null&&avg!=null&&(avg===0||Math.abs(v-avg)/avg*100<=tolerance);
      if (v!=null) {
        return `<td style="padding:8px 12px;text-align:center" class="copyable" onclick="copyAvg(${v.toFixed(4)})" title="${sortBy==='pra'?'Click to copy /3 for PRA sim':'Click to copy'}"><span style="color:${withinTol?SOURCES[si].color:SOURCES[si].color+'33'};font-size:14px;font-weight:${withinTol?700:400}">${v.toFixed(2)}</span></td>`;
      }
      return `<td style="padding:8px 12px;text-align:center"><span style="color:#30363d">-</span></td>`;
    }).join("");

    return `<tr class="${i%2===0?'even':'odd'}">
      <td style="padding:8px 12px;font-size:15px;font-weight:600;color:${tc};white-space:nowrap;width:200px;cursor:pointer" class="copyable" onclick="copyName(${i})" title="Click to copy name">${r.rawName}</td>
      <td style="padding:8px 6px;font-size:14px;font-weight:500;color:#ffffff;text-align:center;width:50px">${r.pos}</td>
      <td style="padding:8px 6px;font-size:14px;font-weight:600;color:#ffffff;text-align:center;width:50px">${r.team}</td>
      <td style="padding:4px 8px;text-align:center"><button onclick="trackRow(${i})" style="background:#14b8a622;border:1px solid #14b8a655;color:#5eead4;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">TRACK</button></td>
      ${srcCells}
      <td style="padding:8px 12px;font-size:15px;color:${avg!=null?'#ffffff':'#30363d'};text-align:center;font-weight:700;${avg!=null?'cursor:pointer':''}" ${avg!=null?`onclick="copyAvg(${avg.toFixed(4)})" title="${sortBy==='pra'?'Click to copy /3 for PRA sim':'Click to copy'}"`:''} class="${avg!=null?'copyable':''}">${avg!=null?avg.toFixed(2):'-'}</td>
    </tr>`;
  }).join("");
}

function copyTightest() {
  if (!merged) return;
  const lookups = getSlotLookups();
  const statsToScan = ["pts","reb","ast","threepm","pra"];
  const lines = [`WNBA ALIGNMENTS`, ""];
  let totalCount = 0;
  statsToScan.forEach(stat => {
    const computeGap = r => {
      const vals = lookups.map(lk => lk ? (lk[r.norm]?.[stat] ?? null) : null).filter(v => v != null);
      return vals.length >= 2 ? (Math.max(...vals) - Math.min(...vals)) : 999;
    };
    const tightRows = merged.filter(r => isTight(r, stat, lookups))
      .sort((a,b) => {
        const ga = computeGap(a), gb = computeGap(b);
        if (ga !== gb) return ga - gb; // tightest first
        return (b.con[stat] ?? -1) - (a.con[stat] ?? -1); // tiebreak: bigger projection first
      });
    if (!tightRows.length) return;
    lines.push(STAT_LABEL[stat]);
    tightRows.forEach(r => {
      const proj = r.con[stat];
      if (proj == null) return;
      // Pull each source's individual projection
      const srcVals = lookups.map(lk => {
        if (!lk) return null;
        const m = lk[r.norm];
        return (m && m[stat] != null) ? m[stat] : null;
      });
      const parts = SOURCES.map((s,i) => {
        const v = srcVals[i];
        return v != null ? `${s.label} ${v.toFixed(1)}` : null;
      }).filter(Boolean);
      const present = srcVals.filter(v => v != null);
      const gap = present.length >= 2 ? (Math.max(...present) - Math.min(...present)) : null;
      const gapStr = gap != null ? ` gap ${gap.toFixed(1)}` : "";
      lines.push(`${r.rawName} (${r.team}) ${parts.join(" / ")}${gapStr} avg ${proj.toFixed(1)}`);
      totalCount++;
    });
    lines.push("");
  });
  if (!totalCount) {
    showToast("No alignments at current tolerance");
    return;
  }
  const text = lines.join("\n").trimEnd();
  navigator.clipboard.writeText(text).then(() => {
    showToast(`Copied ${totalCount} alignments across all stats`);
  });
}

function calcStake(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  if (odds < 0) return { stake: parseFloat((Math.abs(odds)/100).toFixed(2)), toWin: 1.00, type: "fav" };
  return { stake: 1.00, toWin: parseFloat((odds/100).toFixed(2)), type: "dog" };
}

function oddsToImplied(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  return odds < 0 ? Math.abs(odds)/(Math.abs(odds)+100) : 100/(odds+100);
}

function oddsToDecimal(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  return odds < 0 ? 1+(100/Math.abs(odds)) : 1+(odds/100);
}

function calcEdge(bookOdds, fairOdds) {
  const fp = oddsToImplied(fairOdds), bd = oddsToDecimal(bookOdds);
  if (fp == null || bd == null) return null;
  return ((fp * bd) - 1) * 100;
}

function updateStakePreview() {

function decimalToAmerican(dec) {
  if (!dec || dec <= 1) return null;
  if (dec >= 2) return Math.round((dec - 1) * 100);
  return Math.round(-100 / (dec - 1));
}

function playToOdds(fairOdds, evCutoff) {
  // Returns the worst (max) American odds where you still have evCutoff% EV
  // (fairProb * bookDecimal) - 1 = evCutoff/100  =>  bookDecimal = (1 + evCutoff/100) / fairProb
  const fp = oddsToImplied(fairOdds);
  if (fp == null) return null;
  const bookDec = (1 + evCutoff/100) / fp;
  return decimalToAmerican(bookDec);
}

// ── ESPN AUTOGRADE ─────────────────────────────────────────────────────────
const _espnCache = {}; // key: ISO date, value: array of {playerNorm, displayName, completed, stats}
const _espnGameCountCache = {}; // key: ISO date, value: {total, completed}

async function fetchESPNStatsForDate(isoDate) {
  if (_espnCache[isoDate]) return { rows: _espnCache[isoDate], meta: _espnGameCountCache[isoDate] };
  const yyyymmdd = isoDate.replace(/-/g, "");
  const sbUrl = `https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard?dates=${yyyymmdd}`;
  let scoreboard;
  try {
    const res = await fetch(sbUrl);
    if (!res.ok) throw new Error(`ESPN scoreboard ${res.status}`);
    scoreboard = await res.json();
  } catch (e) { throw new Error("ESPN scoreboard error: " + e.message); }

  const events = scoreboard.events || [];
  const meta = { total: events.length, completed: 0, statuses: [] };
  const allRows = [];
  for (const ev of events) {
    const completed = ev.status?.type?.completed === true;
    const statusName = ev.status?.type?.shortDetail || ev.status?.type?.name || "Unknown";
    meta.statuses.push(statusName);
    if (!completed) continue;
    meta.completed++;
    let summary;
    try {
      const r = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/summary?event=${ev.id}`);
      if (!r.ok) continue;
      summary = await r.json();
    } catch { continue; }

    const teamPlayerGroups = summary.boxscore?.players || [];
    for (const teamGroup of teamPlayerGroups) {
      const stats = teamGroup.statistics || [];
      for (const statGroup of stats) {
        const labels = (statGroup.labels || statGroup.keys || []).map(s => s.toString().toLowerCase());
        const idx = {
          min: labels.findIndex(l => l === "min"),
          pts: labels.findIndex(l => l === "pts"),
          reb: labels.findIndex(l => l === "reb"),
          ast: labels.findIndex(l => l === "ast"),
          tpt: labels.findIndex(l => l === "3pt" || l === "fg3" || l === "3p")
        };
        const athletes = statGroup.athletes || [];
        for (const a of athletes) {
          const player = a.athlete || {};
          const fullName = player.displayName || `${player.firstName||""} ${player.lastName||""}`.trim();
          if (!fullName) continue;
          const stRow = a.stats || [];
          const parseInt0 = (s) => { const n = parseInt(s); return isNaN(n) ? 0 : n; };
          let fg3m = 0;
          if (idx.tpt >= 0 && stRow[idx.tpt]) {
            const m = String(stRow[idx.tpt]).match(/^(\d+)/);
            if (m) fg3m = parseInt(m[1]);
          }
          allRows.push({
            playerNorm: norm(fullName),
            displayName: fullName,
            stats: {
              min: idx.min >= 0 ? parseInt0(stRow[idx.min]) : 0,
              pts: idx.pts >= 0 ? parseInt0(stRow[idx.pts]) : 0,
              reb: idx.reb >= 0 ? parseInt0(stRow[idx.reb]) : 0,
              ast: idx.ast >= 0 ? parseInt0(stRow[idx.ast]) : 0,
              fg3m: fg3m,
            }
          });
        }
      }
    }
  }
  _espnCache[isoDate] = allRows;
  _espnGameCountCache[isoDate] = meta;
  return { rows: allRows, meta };
}

function getStatValueForESPN(row, statKey) {
  const s = row.stats || {};
  const pts = s.pts || 0, reb = s.reb || 0, ast = s.ast || 0, fg3m = s.fg3m || 0;
  switch ((statKey||"").toUpperCase()) {
    case "PTS": return pts;
    case "REB": return reb;
    case "AST": return ast;
    case "3PM": return fg3m;
    case "PRA": return pts + reb + ast;
    case "PR":  return pts + reb;
    case "PA":  return pts + ast;
    case "RA":  return reb + ast;
    case "MIN": return s.min || 0;
    default: return null;
  }
}

function getBetISODate(b) {
  if (b.gameDate) return b.gameDate;
  if (!b.date) return null;
  const parts = b.date.split("/");
  if (parts.length !== 3) return null;
  const [m, d, y] = parts.map(x => parseInt(x));
  if (!m || !d || !y) return null;
  return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

async function gradeBet(b) {
  const iso = getBetISODate(b);
  if (!iso) return { ok: false, reason: "No date on bet" };
  let rows, meta;
  try {
    const result = await fetchESPNStatsForDate(iso);
    rows = result.rows;
    meta = result.meta;
  } catch (e) { return { ok: false, reason: "ESPN error: " + e.message }; }

  // No box score data found
  if (!rows || !rows.length) {
    if (!meta || meta.total === 0) {
      return { ok: false, reason: `No WNBA games scheduled on ${iso}` };
    }
    if (meta.completed === 0) {
      return { ok: false, reason: `Games not final yet (${meta.statuses.join(", ")})` };
    }
    return { ok: false, reason: `${meta.completed} game(s) final but ESPN box score not loaded yet` };
  }

  const playerNorm = norm(b.player);
  const matches = rows.filter(r => r.playerNorm === playerNorm);
  if (!matches.length) return { ok: false, reason: `${b.player} not in ESPN box scores for ${iso} (DNP?)` };

  // Sum across all matches (rare: multi-game days)
  let total = 0;
  matches.forEach(m => { total += getStatValueForESPN(m, b.stat); });

  const line = b.line, ou = b.ou;
  let result;
  if (Math.abs(total - line) < 0.001) result = "void";
  else if (ou === "over") result = total > line ? "hit" : "miss";
  else result = total < line ? "hit" : "miss";
  return { ok: true, result, total };
}

function logGrade(msg, kind) {
  // kind: "info", "hit", "miss", "void", "error"
  gradeLog.unshift({ ts: new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"}), msg, kind: kind || "info" });
  if (gradeLog.length > 200) gradeLog.length = 200;
  if (currentTab === "autograde") renderAutoGrade();
}

async function gradeAllPending() {
  if (gradingInProgress) return;
  const pendingBets = bets.filter(b => b.result === "pending");
  if (!pendingBets.length) {
    logGrade("No pending bets to grade", "info");
    showToast("No pending bets to grade");
    return;
  }
  gradingInProgress = true;
  if (currentTab === "autograde") renderAutoGrade();
  gradeLog.length = 0;
  logGrade(`Starting grading for ${pendingBets.length} pending bets...`, "info");
  let graded = 0, failed = 0, skipped = 0, hit = 0, miss = 0, voided = 0;
  for (const b of pendingBets) {
    const r = await gradeBet(b);
    const lineStr = `${b.ou.toUpperCase()} ${b.line}`;
    if (r.ok) {
      const target = bets.find(x => x.id === b.id);
      if (target) {
        target.result = r.result;
        target.actual = r.total;
        graded++;
        if (r.result === "hit") hit++;
        else if (r.result === "miss") miss++;
        else if (r.result === "void") voided++;
        logGrade(`${b.player} ${lineStr} ${b.stat}: actual ${r.total} → ${r.result.toUpperCase()}`, r.result);
      }
    } else {
      const isNotFinal = /not final|ingesting|in progress|not started/i.test(r.reason);
      if (isNotFinal) {
        skipped++;
        logGrade(`${b.player} ${lineStr} ${b.stat}: ${r.reason} — skipped`, "void");
      } else {
        failed++;
        logGrade(`${b.player} ${lineStr} ${b.stat}: ${r.reason}`, "error");
      }
    }
  }
  saveBets();
  gradingInProgress = false;
  const summaryParts = [`${graded} graded (${hit}W ${miss}L ${voided}V)`];
  if (skipped) summaryParts.push(`${skipped} not final`);
  if (failed) summaryParts.push(`${failed} failed`);
  logGrade(`Done. ${summaryParts.join(", ")}.`, "info");
  if (currentTab === "autograde") renderAutoGrade();
  if (currentTab === "tracker") renderTracker();
  const toastBits = [`Graded ${graded} of ${pendingBets.length}`];
  if (skipped) toastBits.push(`${skipped} not final`);
  if (failed) toastBits.push(`${failed} failed`);
  showToast(toastBits.join(" • "));
}

async function gradeOneBet(id) {
  const b = bets.find(x => x.id === id);
  if (!b) return;
  const r = await gradeBet(b);
  if (r.ok) {
    b.result = r.result;
    b.actual = r.total;
    saveBets();
    renderTracker();
    showToast(`${b.player} ${b.stat}: ${r.total} → ${r.result.toUpperCase()}`);
  } else {
    showToast("Grade failed: " + r.reason);
  }
}

function copyDailyRecap() {
  // Group settled bets by their game date
  const settled = bets.filter(b => b.result !== "pending");
  if (!settled.length) { showToast("No settled bets to recap"); return; }

  const byDate = {};
  settled.forEach(b => {
    const d = b.date || "Unknown";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(b);
  });

  // Most recent date first (parse mm/dd/yyyy format)
  const dateKeys = Object.keys(byDate).sort((a,b) => {
    const pa = a.split("/").map(Number), pb = b.split("/").map(Number);
    if (pa.length !== 3 || pb.length !== 3) return a.localeCompare(b);
    const da = new Date(pa[2], pa[0]-1, pa[1]);
    const db = new Date(pb[2], pb[0]-1, pb[1]);
    return db - da;
  });

  // Default to most recent date
  const targetDate = dateKeys[0];
  const dayBets = byDate[targetDate];
  const hits = dayBets.filter(b => b.result === "hit");
  const misses = dayBets.filter(b => b.result === "miss");
  const voids = dayBets.filter(b => b.result === "void");
  const settledOnly = [...hits, ...misses]; // exclude voids from W-L
  const totalWon = hits.reduce((a,b) => a + b.toWin, 0);
  const totalLost = misses.reduce((a,b) => a + b.stake, 0);
  const totalStaked = settledOnly.reduce((a,b) => a + b.stake, 0);
  const netPL = totalWon - totalLost;
  const roi = totalStaked > 0 ? ((netPL/totalStaked)*100).toFixed(1) : null;

  const lines = [];
  lines.push(`WNBA RECAP ${targetDate}`);
  lines.push("");
  lines.push(`${hits.length}W ${misses.length}L${voids.length?` ${voids.length}V`:""}    ${netPL>=0?"+":""}${netPL.toFixed(2)}u${roi!==null?`    ${roi}% ROI`:""}`);
  lines.push("");

  // Picks list, hits first then misses, void at bottom
  const ordered = [
    ...hits.sort((a,b)=>b.toWin-a.toWin),
    ...misses.sort((a,b)=>b.stake-a.stake),
    ...voids
  ];
  ordered.forEach(b => {
    const oddsStr = b.odds > 0 ? `+${b.odds}` : `${b.odds}`;
    const lineStr = `${b.ou.toUpperCase()} ${b.line}`;
    const teamStr = b.team ? ` (${b.team})` : "";
    let resultStr;
    if (b.result === "hit") resultStr = `WIN +${b.toWin.toFixed(2)}u`;
    else if (b.result === "miss") resultStr = `LOSS ${b.stake.toFixed(2)}u`;
    else resultStr = `VOID`;
    lines.push(`${b.player}${teamStr}   ${lineStr} ${b.stat}   ${oddsStr}   ${resultStr}`);
  });

  const text = lines.join("\n");
  navigator.clipboard.writeText(text).then(() => {
    showToast(`Copied ${dayBets.length} bet recap for ${targetDate}`);
  });
}

function copyOpenPlays() {
  const open = bets.filter(b => b.result === "pending");
  if (!open.length) { showToast("No open plays to copy"); return; }
  // Only include plays at 5%+ EV (must have fair value to qualify)
  const qualified = open.filter(b => {
    const ev = calcEdge(b.odds, b.fair);
    return ev != null && ev >= 5;
  });
  if (!qualified.length) { showToast("No plays at 5%+ EV"); return; }
  const byBook = {};
  qualified.forEach(b => {
    if (!byBook[b.book]) byBook[b.book] = [];
    byBook[b.book].push(b);
  });
  const lines = [`WNBA OPEN PLAYS`, ""];
  const bookKeys = Object.keys(byBook).sort();
  bookKeys.forEach((book, bi) => {
    lines.push(book);
    lines.push("");
    byBook[book].sort((a,b) => calcEdge(b.odds, b.fair) - calcEdge(a.odds, a.fair));
    byBook[book].forEach((b, pi) => {
      const oddsStr = b.odds > 0 ? `+${b.odds}` : `${b.odds}`;
      const lineStr = `${b.ou.toUpperCase()} ${b.line}`;
      const ev = calcEdge(b.odds, b.fair);
      const evStr = `${ev.toFixed(1)}% EV`;
      const playTo = playToOdds(b.fair, 5);
      const playToStr = playTo != null ? `   play to ${playTo > 0 ? "+" + playTo : playTo}` : "";
      const teamStr = b.team ? ` (${b.team})` : "";
      lines.push(`${b.player}${teamStr}   ${lineStr} ${b.stat}   ${oddsStr}   ${evStr}${playToStr}`);
      if (pi < byBook[book].length - 1) lines.push("");
    });
    if (bi < bookKeys.length - 1) lines.push("");
  });
  const text = lines.join("\n").trimEnd();
  navigator.clipboard.writeText(text).then(() => {
    showToast(`Copied ${qualified.length} plays at 5%+ EV`);
  });
}

function renderTracker() {
  const el = document.getElementById("tracker-tab");
  const settled = bets.filter(b => b.result !== "pending" && b.result !== "void");
  const hits = bets.filter(b => b.result === "hit");
  const misses = bets.filter(b => b.result === "miss");
  const pending = bets.filter(b => b.result === "pending");
  const totalWon = hits.reduce((a,b)=>a+b.toWin,0);
  const totalLost = misses.reduce((a,b)=>a+b.stake,0);
  const totalStaked = settled.reduce((a,b)=>a+b.stake,0);
  const netPL = totalWon - totalLost;
  const roi = totalStaked > 0 ? ((netPL/totalStaked)*100).toFixed(1) : "—";
  const winRate = settled.length > 0 ? ((hits.length/settled.length)*100).toFixed(1) : "—";

  const statBreak = {};
  settled.forEach(b => {
    if (!statBreak[b.stat]) statBreak[b.stat] = {hits:0,total:0,pl:0,staked:0};
    statBreak[b.stat].total++;
    statBreak[b.stat].staked += b.stake;
    if (b.result==="hit") { statBreak[b.stat].hits++; statBreak[b.stat].pl += b.toWin; }
    else statBreak[b.stat].pl -= b.stake;
  });

  const bookBreak = {};
  settled.forEach(b => {
    if (!bookBreak[b.book]) bookBreak[b.book] = {hits:0,total:0,pl:0,staked:0};
    bookBreak[b.book].total++;
    bookBreak[b.book].staked += b.stake;
    if (b.result==="hit") { bookBreak[b.book].hits++; bookBreak[b.book].pl += b.toWin; }
    else bookBreak[b.book].pl -= b.stake;
  });

  const ouBreak = {over:{hits:0,total:0,pl:0,staked:0}, under:{hits:0,total:0,pl:0,staked:0}};
  settled.forEach(b => {
    ouBreak[b.ou].total++;
    ouBreak[b.ou].staked += b.stake;
    if (b.result==="hit") { ouBreak[b.ou].hits++; ouBreak[b.ou].pl += b.toWin; }
    else ouBreak[b.ou].pl -= b.stake;

  const pct = (h,t) => t>0 ? `${((h/t)*100).toFixed(0)}%` : "—";

      <div class="sc-sub" style="color:${Number(r)>=0?'#5eead4':'#f87171'};">ROI ${r!=="—"?r+"%":"—"}</div>
    </div>`;
  };

  const search = (document.getElementById("bet-search")?.value || "").toLowerCase();
  let filtered = openOnly ? bets.filter(b => b.result === "pending") : bets;
  if (search) filtered = filtered.filter(b => b.player.toLowerCase().includes(search) || b.stat.toLowerCase().includes(search) || b.book.toLowerCase().includes(search));

  const betRows = filtered.map(b => {

    const plColor = b.result==="hit"?"#22c55e":b.result==="miss"?"#f87171":b.result==="void"?"#f59e0b":"#7d8590";

    const actualStr = b.actual != null ? (Number.isInteger(b.actual) ? String(b.actual) : b.actual.toFixed(1)) : "—";
    const actualColor = b.actual == null ? "#30363d" : b.result === "hit" ? "#22c55e" : b.result === "miss" ? "#f87171" : "#fff";
    return `<tr style="border-bottom:1px solid #161b22;">
      <td style="padding:8px 12px;font-size:14px;font-weight:600;color:#fff;white-space:nowrap">${b.player}</td>

    </tr>`;
  }).join("");

  el.innerHTML = `

      <span style="color:#1f2733;font-size:12px;">|</span>

// ── QUICK GRADE ───────────────────────────────────────────────────────────
let qgQueue = [];
let qgIdx = 0;
let openOnly = false;
let gradeLog = [];
let gradingInProgress = false;

function toggleOpenOnly() {
  openOnly = !openOnly;
  renderTracker();
}

function openQuickGrade() {
  qgQueue = bets.filter(b => b.result === "pending");
  if (qgQueue.length === 0) { alert("No pending bets to grade!"); return; }
  qgIdx = 0;
  document.getElementById("qg-overlay").classList.add("open");
  qgShow();
}

function qgShow() {
  if (qgIdx >= qgQueue.length) { closeQG(); return; }
  const b = qgQueue[qgIdx];
  document.getElementById("qg-progress").textContent = (qgIdx+1) + " of " + qgQueue.length + " PENDING BETS";
  document.getElementById("qg-player").textContent = b.player;
  document.getElementById("qg-detail").textContent = b.ou.toUpperCase() + " " + b.line + " " + b.stat + "  ·  " + (b.odds>0?"+"+b.odds:b.odds) + "  ·  " + b.book;
  const edge = (b.fair && b.odds) ? calcEdge(b.odds, b.fair) : null;
  const edgeStr = edge != null ? (edge>0?"+":"") + edge.toFixed(1) + "% EV" : "";
  document.getElementById("qg-proj").textContent = (b.proj?"Proj: "+b.proj.toFixed(2)+"  ":"") + edgeStr;
}

function qgGrade(result) {
  const b = qgQueue[qgIdx];
  const bet = bets.find(x => x.id === b.id);
  if (bet) { bet.result = result; saveBets(); }
  qgIdx++;
  qgShow();
}

function qgNext() { qgIdx++; qgShow(); }

function closeQG() {
  document.getElementById("qg-overlay").classList.remove("open");
  renderTracker();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (document.getElementById("qg-overlay").classList.contains("open")) closeQG();
    else if (document.getElementById("track-modal").classList.contains("open")) closeTrackModal();
  }
  if (!document.getElementById("qg-overlay").classList.contains("open")) return;
  if (e.key === "h" || e.key === "H") qgGrade("hit");
  else if (e.key === "m" || e.key === "M") qgGrade("miss");
  else if (e.key === "v" || e.key === "V") qgGrade("void");
  else if (e.key === "s" || e.key === "S" || e.key === " ") { e.preventDefault(); qgNext(); }
});

// ── TOTALS MODEL ───────────────────────────────────────────────────────────
// Sums blended player projections per team to produce projected team/game totals.
// Slate is determined entirely from the Betstamp paste — no external API.

let betstampGames = []; // ordered: [{awayAbbr, homeAbbr, awayName, homeName, time, books:[...]}]

// Map source team abbrs to canonical (Roto/Saber/RotoWire vs Betstamp use slight variants)
const ESPN_TO_PROJ = {
  "ATL":"ATL","CHI":"CHI","CON":"CON","DAL":"DAL",
  "GS":"GSV","GSV":"GSV","IND":"IND","LV":"LVA","LVA":"LVA",
  "LA":"LAS","LAS":"LAS","MIN":"MIN","NY":"NYL","NYL":"NYL",
  "PHX":"PHX","PHO":"PHX","SEA":"SEA","TOR":"TOR","WAS":"WAS","WSH":"WAS","POR":"POR"
};
function normTeamAbbr(abbr) {
  if (!abbr) return "";
  const u = abbr.toUpperCase().trim();
  return ESPN_TO_PROJ[u] || u;
}

const TEAM_NAME_ALIASES = {
  "atlanta dream":"ATL","chicago sky":"CHI","connecticut sun":"CON",
  "dallas wings":"DAL","golden state valkyries":"GSV","indiana fever":"IND",
  "las vegas aces":"LVA","los angeles sparks":"LAS","minnesota lynx":"MIN",
  "new york liberty":"NYL","phoenix mercury":"PHX","seattle storm":"SEA",
  "toronto tempo":"TOR","washington mystics":"WAS","portland fire":"POR",
  "atlanta":"ATL","chicago":"CHI","connecticut":"CON","dallas":"DAL",
  "golden state":"GSV","valkyries":"GSV","indiana":"IND","fever":"IND",
  "las vegas":"LVA","aces":"LVA","los angeles":"LAS","sparks":"LAS",
  "minnesota":"MIN","lynx":"MIN","new york":"NYL","liberty":"NYL",
  "phoenix":"PHX","mercury":"PHX","seattle":"SEA","storm":"SEA",
  "toronto":"TOR","tempo":"TOR","washington":"WAS","mystics":"WAS",
  "portland":"POR","fire":"POR"
};
function teamLineToAbbr(line) {
  if (!line) return null;
  const cleaned = line.toLowerCase().replace(/^@\s*/,"").replace(/[^a-z\s]/g,"").trim();
  if (TEAM_NAME_ALIASES[cleaned]) return TEAM_NAME_ALIASES[cleaned];
  for (const k of Object.keys(TEAM_NAME_ALIASES)) {
    if (cleaned.includes(k)) return TEAM_NAME_ALIASES[k];
  }
  const u = cleaned.toUpperCase().replace(/\s/g,"");
  if (u.length >= 2 && u.length <= 4) return normTeamAbbr(u);
  return null;
}

const BOOK_ALIASES = {
  "dk":"DraftKings","draftkings":"DraftKings",
  "fd":"FanDuel","fanduel":"FanDuel",
  "mgm":"BetMGM","betmgm":"BetMGM",
  "czr":"Caesars","caesars":"Caesars",
  "espn":"ESPNBet","espnbet":"ESPNBet",
  "pin":"Pinnacle","pinnacle":"Pinnacle",
  "fanatic":"Fanatics","fanatics":"Fanatics",
  "bet365":"Bet365","365":"Bet365","bet105":"Bet105",
  "novig":"NoVig","nv":"NoVig",
  "prophetx":"ProphetX","prophet":"ProphetX",
  "circa":"Circa","hard":"HardRock","hardrock":"HardRock",
  "bovada":"Bovada","bov":"Bovada",
  "pb":"PointsBet","pointsbet":"PointsBet",
  "bookmaker":"Bookmaker","bm":"Bookmaker"
};
function normBook(s) {
  if (!s) return null;
  const k = s.toLowerCase().replace(/[^a-z0-9]/g,"");
  return BOOK_ALIASES[k] || (k.length >= 2 ? s.trim() : null);
}

// Build team projection by summing blended PTS from merged
function buildTeamProjection(teamAbbr) {
  if (!merged) return null;
  const target = normTeamAbbr(teamAbbr);
  const teamPlayers = merged.filter(r => normTeamAbbr(r.team) === target && r.found > 0 && r.con.pts != null);
  if (!teamPlayers.length) return null;
  let total = 0;
  const sourceTotals = {};
  SOURCES.forEach(s => sourceTotals[s.key] = { sum: 0, count: 0 });
  const lookups = getSlotLookups();
  const byPlayer = teamPlayers.map(r => {
    total += r.con.pts;
    SOURCES.forEach((s,i) => {
      const lk = lookups[i];
      if (!lk) return;
      const m = lk[r.norm];
      if (m && m.pts != null) {
        sourceTotals[s.key].sum += m.pts;
        sourceTotals[s.key].count++;
      }
    });
    return { name: r.rawName, pts: r.con.pts };
  }).sort((a,b) => b.pts - a.pts);
  return { total, byPlayer, sourceTotals };
}

// ── BETSTAMP "BEST AVAILABLE FULLTIME" PARSER ─────────────────────────────
// Real format: each game is a 12-line price block following two team links.
// Markdown copy looks like:
//   [TIME](url)
//   [Away Team](url)
//   [PCT%](url)
//   [Home Team](url)
//   [PCT%](url)
//   <Away ML> <Book>
//   <Spread> <Odds> <Book>
//   o<TOT> <Odds> <Book>      ← FULLTIME OVER (idx 2)
//   <Home ML> <Book>
//   <Spread> <Odds> <Book>
//   u<TOT> <Odds> <Book>      ← FULLTIME UNDER (idx 5)
//   <Away 1H ML> <Book>
//   ... (1H markets — ignored)
function parseBetstamp(text) {
  const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
  const teamLineRe = /^\[([^\]]+)\]\(https:\/\/betstamp\.com\/app\/games\/(\d+)\)$/;
  const timeLineRe = /^\[(\d{1,2}:\d{2}(am|pm))\]\(https:\/\/betstamp\.com\/app\/games\/(\d+)\)$/i;
  const pctLineRe = /^\[\d+%\]\(/;
  const overLineRe = /^o([\d.]+)\s+([+\-]\d{2,4})\s+(.+)$/i;
  const underLineRe = /^u([\d.]+)\s+([+\-]\d{2,4})\s+(.+)$/i;

  const games = [];
  let i = 0;
  while (i < lines.length) {
    const ln = lines[i];
    const tm = ln.match(timeLineRe);
    if (!tm) { i++; continue; }
    const time = tm[1];
    const gameId = tm[3];

    // Find away team (next team link with same game id, but skip percentage anchors)
    let j = i + 1;
    let awayName = null, homeName = null;
    while (j < lines.length && j < i + 8) {
      if (pctLineRe.test(lines[j])) { j++; continue; }
      const t = lines[j].match(teamLineRe);
      if (t && t[2] === gameId) { awayName = t[1]; j++; break; }
      j++;
    }
    if (!awayName) { i++; continue; }

    // Skip pct anchor, find home (also skip pct anchors)
    while (j < lines.length && j < i + 12) {
      if (pctLineRe.test(lines[j])) { j++; continue; }
      const t = lines[j].match(teamLineRe);
      if (t && t[2] === gameId) { homeName = t[1]; j++; break; }
      j++;
    }
    if (!homeName) { i++; continue; }

    // Skip home pct
    while (j < lines.length && pctLineRe.test(lines[j])) j++;

    // Collect odds rows until next time anchor or end
    const oddsRows = [];
    while (j < lines.length && oddsRows.length < 16) {
      if (timeLineRe.test(lines[j])) break;
      if (teamLineRe.test(lines[j]) || pctLineRe.test(lines[j])) { j++; continue; }
      oddsRows.push(lines[j]);
      j++;
    }

    // Index 2 = fulltime over, index 5 = fulltime under
    const oM = (oddsRows[2]||"").match(overLineRe);
    const uM = (oddsRows[5]||"").match(underLineRe);

    const awayAbbr = teamLineToAbbr(awayName);
    const homeAbbr = teamLineToAbbr(homeName);
    if (!awayAbbr || !homeAbbr) { i = j; continue; }

    const books = [];
    if (oM) books.push({ book: normBook(oM[3]), line: parseFloat(oM[1]), overOdds: parseInt(oM[2]), underOdds: null, side: "over" });
    if (uM) books.push({ book: normBook(uM[3]), line: parseFloat(uM[1]), overOdds: null, underOdds: parseInt(uM[2]), side: "under" });

    games.push({ awayAbbr, homeAbbr, awayName, homeName, time, books });
    i = j;
  }
  return games;
}

function pasteBetstamp() {
  const ta = document.getElementById("betstamp-paste");
  const text = ta?.value || "";
  if (!text.trim()) { showToast("Paste Betstamp text first"); return; }
  betstampGames = parseBetstamp(text);
  showToast(`Parsed ${betstampGames.length} games`);
  renderTotals();
}
function clearBetstamp() {
  betstampGames = [];
  const ta = document.getElementById("betstamp-paste");
  if (ta) ta.value = "";
  renderTotals();
}

// EV using normal approx around projected total
function americanEvRough(odds, projTotal, line, side) {
  const stdev = 12;
  const z = (line - projTotal) / stdev;
  const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
  const pOver = 1 - pUnder;
  const winProb = side === "over" ? pOver : pUnder;
  const dec = oddsToDecimal(odds);
  if (!dec) return null;
  return ((winProb * dec) - 1) * 100;
}
function erf(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x < 0 ? -1 : 1; x = Math.abs(x);
  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign * y;
}

function renderTotals() {
  const el = document.getElementById("totals-tab");
  const noProjections = !merged;
  const noGames = betstampGames.length === 0;

  const cards = betstampGames.map(g => {
    const away = buildTeamProjection(g.awayAbbr);
    const home = buildTeamProjection(g.homeAbbr);
    const projTotal = (away && home) ? away.total + home.total : null;

    const sourceBreakdown = (away && home) ? SOURCES.map(s => {
      const a = away.sourceTotals[s.key];
      const h = home.sourceTotals[s.key];
      const total = a.sum + h.sum;
      const players = a.count + h.count;
      return players > 0 ? `<span style="color:${s.color};font-weight:600">${s.label} ${total.toFixed(1)}</span>` : null;
    }).filter(Boolean).join(" · ") : "";

    // Compute EV for each book entry
    const enrichedBooks = g.books.map(b => {
      let ev = null, edge = null;
      if (projTotal != null) {
        if (b.side === "over") {
          edge = projTotal - b.line;
          ev = americanEvRough(b.overOdds, projTotal, b.line, "over");
        } else {
          edge = b.line - projTotal;
          ev = americanEvRough(b.underOdds, projTotal, b.line, "under");
        }
      }
      return { ...b, ev, edge };
    });

    // Best of each side
    const bestOver = enrichedBooks.filter(b => b.side === "over" && b.ev != null).sort((a,b)=>b.ev-a.ev)[0];
    const bestUnder = enrichedBooks.filter(b => b.side === "under" && b.ev != null).sort((a,b)=>b.ev-a.ev)[0];

    const bookRows = enrichedBooks.length
      ? enrichedBooks.map(b => {
          const odds = b.side === "over" ? b.overOdds : b.underOdds;
          const sideLbl = b.side === "over" ? "OVER" : "UNDER";
          const sideColor = b.side === "over" ? "#22c55e" : "#f87171";
          const evColor = b.ev == null ? "#7d8590" : b.ev >= 5 ? "#22c55e" : b.ev > 0 ? "#5eead4" : "#7d8590";
          return `<tr>
            <td style="padding:6px 10px;color:#e2e8f0;font-weight:600">${b.book||""}</td>
            <td style="padding:6px 10px;text-align:center;color:${sideColor};font-weight:700">${sideLbl} ${b.line}</td>
            <td style="padding:6px 10px;text-align:center;color:#fff">${odds!=null?(odds>0?'+':'')+odds:'—'}</td>
            <td style="padding:6px 10px;text-align:center;color:${evColor};font-weight:${b.ev!=null&&b.ev>0?700:400}">${b.ev!=null?(b.ev>0?'+':'')+b.ev.toFixed(1)+'%':'—'}</td>
          </tr>`;
        }).join("")
      : `<tr><td colspan="4" style="padding:12px;color:#30363d;text-align:center;font-size:12px">No prices parsed</td></tr>`;

    let bestSummary = "";
    if (projTotal != null) {
      const parts = [];
      if (bestOver && bestOver.ev > 0) {
        parts.push(`<span style="color:#22c55e;font-weight:700">OVER ${bestOver.line} @ ${bestOver.overOdds>0?'+':''}${bestOver.overOdds} ${bestOver.book}</span> <span style="color:#5eead4">${bestOver.ev.toFixed(1)}% EV</span>`);
      }
      if (bestUnder && bestUnder.ev > 0) {
        parts.push(`<span style="color:#f87171;font-weight:700">UNDER ${bestUnder.line} @ ${bestUnder.underOdds>0?'+':''}${bestUnder.underOdds} ${bestUnder.book}</span> <span style="color:#5eead4">${bestUnder.ev.toFixed(1)}% EV</span>`);
      }
      if (parts.length) bestSummary = `<div style="margin-top:10px;padding:10px 12px;background:#0e2926;border:1px solid #14b8a644;border-radius:6px;font-size:13px;">${parts.join(" &nbsp;|&nbsp; ")}</div>`;
    }

    const projDisplay = projTotal != null
      ? `<div style="font-size:34px;font-weight:800;color:#5eead4">${projTotal.toFixed(1)}</div>
         <div style="font-size:11px;color:#7d8590;margin-top:2px">PROJECTED TOTAL</div>`
      : `<div style="font-size:13px;color:#7d8590;padding:14px 0">No projection — load sources & run blend</div>`;

    const teamLine = (t, abbr) => t
      ? `<div><span style="font-weight:700;color:#fff">${abbr}</span> <span style="color:#5eead4;font-weight:700;font-size:18px">${t.total.toFixed(1)}</span></div>`
      : `<div><span style="font-weight:700;color:#fff">${abbr}</span> <span style="color:#30363d">no proj</span></div>`;

    return `
      <div style="background:#161b22;border:1px solid #1f2733;border-radius:10px;padding:18px 20px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-size:16px;font-weight:800;color:#fff;">${g.awayAbbr} <span style="color:#7d8590;font-weight:500">@</span> ${g.homeAbbr}</div>
            <div style="font-size:12px;color:#7d8590;margin-top:2px">${g.awayName} at ${g.homeName} · ${g.time}</div>
          </div>
          <div style="text-align:right">${projDisplay}</div>
        </div>
        <div style="display:flex;gap:24px;margin-bottom:8px;font-size:14px;">
          ${teamLine(away, g.awayAbbr)}
          ${teamLine(home, g.homeAbbr)}
        </div>
        ${sourceBreakdown ? `<div style="font-size:11px;margin-bottom:14px;color:#7d8590">By source: ${sourceBreakdown}</div>` : ""}
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#0d1117;">
              <th style="padding:6px 10px;text-align:left;font-size:10px;color:#7d8590;letter-spacing:1px;text-transform:uppercase;font-weight:600">Book</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#7d8590;letter-spacing:1px;text-transform:uppercase;font-weight:600">Line</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#7d8590;letter-spacing:1px;text-transform:uppercase;font-weight:600">Odds</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#7d8590;letter-spacing:1px;text-transform:uppercase;font-weight:600">EV</th>
            </tr>
          </thead>
          <tbody>${bookRows}</tbody>
        </table>
        ${bestSummary}
      </div>`;
  }).join("");

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;">Totals Model</div>
        <div style="font-size:13px;color:#7d8590;">Sums blended player projections by team · paste Betstamp for the slate</div>
      </div>
    </div>

    ${noProjections ? `<div style="padding:18px;background:#161b22;border:1px solid #1f2733;border-radius:8px;color:#f87171;font-size:13px;margin-bottom:16px;">Run blend on Upload tab first to enable projections.</div>` : ""}

    <div style="background:#161b22;border:1px solid #1f2733;border-radius:8px;padding:14px;margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:700;color:#7d8590;letter-spacing:1px;text-transform:uppercase;">Betstamp Paste — Best Available Fulltime</div>
        <div style="display:flex;gap:8px;">
          <button onclick="pasteBetstamp()" style="background:#14b8a6;border:none;color:#0d1117;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">PARSE</button>
          <button onclick="clearBetstamp()" style="background:#161b22;border:1px solid #1f2733;color:#7d8590;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
        </div>
      </div>
      <textarea id="betstamp-paste" placeholder="Copy the Betstamp WNBA Best Available page and paste here..." spellcheck="false"
        style="width:100%;min-height:80px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:10px 12px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:12px;outline:none;resize:vertical;"></textarea>
      ${noGames ? `<div style="font-size:11px;color:#30363d;margin-top:8px;">Paste the Betstamp slate above to load games.</div>` : `<div style="font-size:11px;color:#5eead4;margin-top:8px;">${betstampGames.length} games loaded</div>`}
    </div>

    ${cards}`;
}

// Init
buildSlots();
updateBadges();
loadBets();

  const oddsEl = document.getElementById("modal-odds");
  if (oddsEl) oddsEl.addEventListener("input", updateStakePreview);
