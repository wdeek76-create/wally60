      <span style="font-size:11px;color:#22c55e;background:#22c55e15;border:1px solid #22c55e33;border-radius:4px;padding:2px 8px;">Auto-saved</span>
      <span style="color:#1f2733;font-size:12px;">|</span>
      <span style="font-size:13px;color:#d4dae3;">${pending.length} pending · ${settled.length} settled</span>
      <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="openQuickGrade()" style="background:#14b8a6;border:none;color:#0d1117;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Quick Grade</button>
        <button onclick="copyOpenPlays()" style="background:#161b22;border:1px solid #14b8a6;color:#5eead4;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Copy Props</button>
        <button onclick="copyOpenTotals()" style="background:#161b22;border:1px solid #14b8a6;color:#5eead4;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Copy Totals</button>
        <button onclick="copyDailyRecapProps()" style="background:#161b22;border:1px solid #14b8a6;color:#5eead4;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Props Recap</button>
        <button onclick="copyDailyRecapTotals()" style="background:#161b22;border:1px solid #14b8a6;color:#5eead4;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Totals Recap</button>
        <button onclick="exportBets()" style="background:#161b22;border:1px solid #1f2733;color:#5eead4;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Backup</button>
        <button onclick="importBets()" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Restore</button>
      </span>
    </div>

    <div class="overview-strip">
      <div class="overview-stat">
        <div class="os-label">Win Rate</div>
        <div class="os-val">${winRate}${winRate!=="—"?"%":""}</div>
        <div class="os-sub">${hits.length}W · ${misses.length}L</div>
      </div>
      <div class="overview-stat">
        <div class="os-label">Net P&L</div>
        <div class="os-val" style="color:${netPL>=0?'#22c55e':'#f87171'}">${netPL>=0?"+":""}${netPL.toFixed(2)}u</div>
        <div class="os-sub">${settled.length} settled</div>
      </div>
      <div class="overview-stat">
        <div class="os-label">ROI</div>
        <div class="os-val" style="color:${Number(roi)>=0?'#5eead4':'#f87171'}">${roi}${roi!=="—"?"%":""}</div>
        <div class="os-sub">${totalStaked.toFixed(2)}u staked</div>
      </div>
      <div class="overview-stat clickable ${openOnly?'active':''}" onclick="setOpenOnly(${openOnly?'false':'true'})" title="${openOnly?'Show all bets':'Filter to open bets only'}">
        <div class="os-label">Pending</div>
        <div class="os-val" style="color:${pending.length>0?'#5eead4':'#fff'};${pending.length>0?'text-shadow:0 0 12px rgba(94,234,212,0.5);':''}">${pending.length}</div>
        <div class="os-sub" style="color:${openOnly?'#5eead4':'#d4dae3'};">${openOnly?'✓ filtered':'click to filter'}</div>
      </div>
    </div>

    <div class="tracker-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1f2733;flex-wrap:wrap;gap:8px;">
        <h4 style="margin:0;padding:0;border:none;">${openOnly ? `Open ${betKindFilter==='all'?'Bets':betKindFilter==='props'?'Props':'Totals'} (${pending.length})` : `${betKindFilter==='all'?'Bet History':betKindFilter==='props'?'Props History':'Totals History'}`}</h4>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="bet-search" placeholder="${openOnly ? 'Search open...' : 'Search all bets...'}" value="${search.replace(/"/g,'&quot;')}" oninput="filterBetRows(this.value)" autocomplete="off" spellcheck="false"
            style="background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:6px 12px;font-size:12px;color:#e2e8f0;outline:none;width:160px;font-family:'Inter',sans-serif;"/>
          <div style="display:inline-flex;background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:2px;gap:2px;">
            ${["all","props","totals"].map(k => {
              const active = betKindFilter === k;
              return `<button onclick="setBetKindFilter('${k}')" style="background:${active?'#14b8a6':'transparent'};border:none;color:${active?'#0d1117':'#d4dae3'};border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;">${k.toUpperCase()}</button>`;
            }).join("")}
          </div>
          <button onclick="toggleOpenOnly()" style="background:${openOnly?'#14b8a622':'#161b22'};border:1px solid ${openOnly?'#14b8a6':'#1f2733'};color:${openOnly?'#5eead4':'#d4dae3'};border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;">${openOnly?'✓ OPEN ONLY':'OPEN ONLY'}</button>
        </div>
      </div>
      ${filtered.length === 0 ? '<p style="color:#525a64;font-size:13px;padding:20px 0;text-align:center;">'+(search?"No bets match search.":openOnly?"No open bets.":"No bets yet. Hit TRACK on any player.")+'</p>' : `
        <div id="bet-table-body">${betRows}</div>`}
    </div>

    <div class="tracker-section">
      <h4 style="font-size:11px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;border:none;padding-bottom:0;margin-bottom:8px;">Over / Under</h4>
      <div class="overview-strip">${card("Over", ouBreak.over)}${card("Under", ouBreak.under)}</div>
    </div>

    <div class="tracker-section">
      <h4 style="font-size:11px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;border:none;padding-bottom:0;margin-bottom:8px;">By Stat</h4>
      ${Object.entries(statBreak).length === 0 ? '<p style="color:#525a64;font-size:13px;padding:8px 0;">No settled bets yet</p>' : `<div class="overview-strip" style="flex-wrap:wrap;">${Object.entries(statBreak).map(([k,v])=>card(k,v)).join("")}</div>`}
    </div>

    <div class="tracker-section">
      <h4 style="font-size:11px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;border:none;padding-bottom:0;margin-bottom:8px;">By Sportsbook</h4>
      ${Object.entries(bookBreak).length === 0 ? '<p style="color:#525a64;font-size:13px;padding:8px 0;">No settled bets yet</p>' : `<div class="overview-strip" style="flex-wrap:wrap;">${Object.entries(bookBreak).map(([k,v])=>card(k,v,{book:true})).join("")}</div>`}
    </div>

    ${hasSourceHistory ? `
    <div class="tracker-section">
      <h4 style="font-size:11px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;border:none;padding-bottom:0;margin-bottom:8px;">Projection Source · PlayerBased vs Pace×Eff</h4>
      <div class="overview-strip" style="flex-wrap:wrap;">
        ${sourceBreak.blended.total > 0 ? card("PlayerBased (RW/RG/Saber)", sourceBreak.blended) : ""}
        ${sourceBreak.paceeff.total > 0 ? card("PACE × EFF", sourceBreak.paceeff) : ""}
        ${sourceBreak.both.total > 0 ? card("BOTH (avg)", sourceBreak.both) : ""}
        ${sourceBreak.unknown.total > 0 ? card("Untagged", sourceBreak.unknown) : ""}
      </div>
    </div>` : ""}

    ${hasCfHistory ? `
    <div class="tracker-section">
      <h4 style="font-size:11px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;border:none;padding-bottom:0;margin-bottom:8px;">Model Performance · Which models AGREED with your pick?</h4>
      <p style="font-size:10px;color:#a8b0bb;margin:-4px 0 8px 0;line-height:1.4;">Among bets each model said "yes" (≥50% likely), what % hit? Higher hit% means that model was right when it was confident.</p>
      <div class="overview-strip" style="flex-wrap:wrap;">
        ${cfBreak.blended.total > 0 ? card("PlayerBased called", cfBreak.blended) : ""}
        ${cfBreak.paceeff.total > 0 ? card("Pace × Eff called", cfBreak.paceeff) : ""}
        ${cfBreak.both.total > 0 ? card("Combined called", cfBreak.both) : ""}
      </div>
    </div>` : ""}`;
}

function filterBetRows(val) {
  const s = val.toLowerCase();
  document.querySelectorAll('#bet-table-body > .bet-card').forEach(row => {
    row.style.display = (!s || row.textContent.toLowerCase().includes(s)) ? '' : 'none';
  });
}

// ── QUICK GRADE ───────────────────────────────────────────────────────────
let qgQueue = [];
let qgIdx = 0;
let openOnly = false;
// Bet kind filter for Tracker: 'all' | 'props' | 'totals'
let betKindFilter = "all";
let gradeLog = [];
let gradingInProgress = false;

function toggleOpenOnly() {
  openOnly = !openOnly;
  renderTracker();
}

function setOpenOnly(val) {
  openOnly = !!val;
  renderTracker();
}

function setBetKindFilter(kind) {
  betKindFilter = kind;
  renderTracker();
}

function openQuickGrade() {
  qgQueue = bets.filter(b => b.result === "pending");
  if (qgQueue.length === 0) { alert("No pending bets to grade!"); return; }
  qgIdx = 0;
  document.getElementById("qg-overlay").classList.add("open");
  qgShow();
}

function qgShow() {
  if (qgIdx >= qgQueue.length) { closeQG(); return; }
  const b = qgQueue[qgIdx];
  document.getElementById("qg-progress").textContent = (qgIdx+1) + " of " + qgQueue.length + " PENDING BETS";
  document.getElementById("qg-player").textContent = b.player;
  document.getElementById("qg-detail").textContent = b.ou.toUpperCase() + " " + b.line + " " + b.stat + "  ·  " + (b.odds>0?"+"+b.odds:b.odds) + "  ·  " + b.book;
  const edge = (b.fair && b.odds) ? calcEdge(b.odds, b.fair) : null;
  const edgeStr = edge != null ? (edge>0?"+":"") + edge.toFixed(1) + "% EV" : "";
  document.getElementById("qg-proj").textContent = (b.proj?"Proj: "+b.proj.toFixed(2)+"  ":"") + edgeStr;
}

function qgGrade(result) {
  const b = qgQueue[qgIdx];
  const bet = bets.find(x => x.id === b.id);
  if (bet) { bet.result = result; saveBets(); }
  qgIdx++;
  qgShow();
}

function qgNext() { qgIdx++; qgShow(); }

function closeQG() {
  document.getElementById("qg-overlay").classList.remove("open");
  renderTracker();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (document.getElementById("qg-overlay").classList.contains("open")) closeQG();
    else if (document.getElementById("track-modal").classList.contains("open")) closeTrackModal();
  }
  if (!document.getElementById("qg-overlay").classList.contains("open")) return;
  if (e.key === "h" || e.key === "H") qgGrade("hit");
  else if (e.key === "m" || e.key === "M") qgGrade("miss");
  else if (e.key === "v" || e.key === "V") qgGrade("void");
  else if (e.key === "s" || e.key === "S" || e.key === " ") { e.preventDefault(); qgNext(); }
});

// ── TOTALS MODEL ───────────────────────────────────────────────────────────
// Sums blended player projections per team to produce projected team/game totals.
// Slate is determined entirely from the Betstamp paste — no external API.

let betstampGames = []; // ordered: [{awayAbbr, homeAbbr, awayName, homeName, time, books:[...]}]

// Map source team abbrs to canonical (Roto/Saber/RotoWire vs Betstamp use slight variants)
const ESPN_TO_PROJ = {
  "ATL":"ATL","CHI":"CHI","CON":"CON","DAL":"DAL",
  "GS":"GSV","GSV":"GSV","IND":"IND",
  "LV":"LVA","LVA":"LVA","LAV":"LVA",
  "LA":"LAS","LAS":"LAS",
  "MIN":"MIN","NY":"NYL","NYL":"NYL",
  "PHX":"PHX","PHO":"PHX",
  "SEA":"SEA","TOR":"TOR","WAS":"WAS","WSH":"WAS","POR":"POR"
};
function normTeamAbbr(abbr) {
  if (!abbr) return "";
  const u = abbr.toUpperCase().trim();
  return ESPN_TO_PROJ[u] || u;
}

const TEAM_NAME_ALIASES = {
  "atlanta dream":"ATL","chicago sky":"CHI","connecticut sun":"CON",
  "dallas wings":"DAL","golden state valkyries":"GSV","indiana fever":"IND",
  "las vegas aces":"LVA","los angeles sparks":"LAS","minnesota lynx":"MIN",
  "new york liberty":"NYL","phoenix mercury":"PHX","seattle storm":"SEA",
  "toronto tempo":"TOR","washington mystics":"WAS","portland fire":"POR",
  "atlanta":"ATL","chicago":"CHI","connecticut":"CON","dallas":"DAL",
  "golden state":"GSV","valkyries":"GSV","indiana":"IND","fever":"IND",
  "las vegas":"LVA","aces":"LVA","los angeles":"LAS","sparks":"LAS",
  "minnesota":"MIN","lynx":"MIN","new york":"NYL","liberty":"NYL",
  "phoenix":"PHX","mercury":"PHX","seattle":"SEA","storm":"SEA",
  "toronto":"TOR","tempo":"TOR","washington":"WAS","mystics":"WAS",
  "portland":"POR","fire":"POR"
};
function teamLineToAbbr(line) {
  if (!line) return null;
  const cleaned = line.toLowerCase().replace(/^@\s*/,"").replace(/[^a-z\s]/g,"").trim();
  if (TEAM_NAME_ALIASES[cleaned]) return TEAM_NAME_ALIASES[cleaned];
  for (const k of Object.keys(TEAM_NAME_ALIASES)) {
    if (cleaned.includes(k)) return TEAM_NAME_ALIASES[k];
  }
  const u = cleaned.toUpperCase().replace(/\s/g,"");
  if (u.length >= 2 && u.length <= 4) return normTeamAbbr(u);
  return null;
}

const BOOK_ALIASES = {
  "dk":"DraftKings","draftkings":"DraftKings",
  "fd":"FanDuel","fanduel":"FanDuel",
  "pb":"Prop Builder","propbuilder":"Prop Builder",
  "pin":"Pinnacle","pinnacle":"Pinnacle",
  "bet105":"Bet105","105":"Bet105",
  "novig":"Novig","nv":"Novig",
  "prophetx":"ProphetX","prophet":"ProphetX","px":"ProphetX",
  "bookmaker":"Bookmaker","bm":"Bookmaker",
  "fliff":"Fliff",
  "onyx":"Onyx"
};
function normBook(s) {
  if (!s) return null;
  const k = s.toLowerCase().replace(/[^a-z0-9]/g,"");
  return BOOK_ALIASES[k] || (k.length >= 2 ? s.trim() : null);
}

// Build team projection by summing blended PTS from merged.
// Returns both:
//   total: union total (sum of every player projected by any source, blended avg)
//   bySource: { roto: 170.7, saber: 168.2, rotowire: 172.6 } — each source's standalone team total
//   sourceAvg: mean of all available source standalone totals (apples-to-apples)
function buildTeamProjection(teamAbbr) {
  if (!merged) return null;
  const target = normTeamAbbr(teamAbbr);
  const teamPlayers = merged.filter(r => normTeamAbbr(r.team) === target && r.found > 0 && r.con.pts != null);
  if (!teamPlayers.length) return null;
  let total = 0;
  const sourceTotals = {};
  SOURCES.forEach(s => sourceTotals[s.key] = { sum: 0, count: 0 });
  const lookups = getSlotLookups();
  const byPlayer = teamPlayers.map(r => {
    total += r.con.pts;
    SOURCES.forEach((s,i) => {
      const lk = lookups[i];
      if (!lk) return;
      const m = lk[r.norm];
      if (m && m.pts != null) {
        sourceTotals[s.key].sum += m.pts;
        sourceTotals[s.key].count++;
      }
    });
    return { name: r.rawName, pts: r.con.pts };
  }).sort((a,b) => b.pts - a.pts);
  return { total, byPlayer, sourceTotals };
}

// ── BETSTAMP "BEST AVAILABLE" PARSER (plain-text format from app) ──────────
// Block structure when copying from the Betstamp web app (rendered text):
//   "WNBA"          ← sport header (may not appear at top, but appears between games)
//   "1:00pm"        ← time
//   "DAL"           ← away abbrev
//   "Dallas Wings"  ← away full name
//   "33%"           ← away win%
//   "IND"           ← home abbrev
//   "Indiana Fever" ← home full name
//   "67%"           ← home win%
//   "+200"          ← away ML       [bare odds, no space]
//   "DraftKings"    ← book
//   "+5.5 -106"     ← spread        [HAS space — skip]
//   "FanDuel"       ← book
//   "o177.5 -108"   ← OVER total    ← keep
//   "Pinnacle"      ← book
//   "-223"          ← home ML
//   ...
//   "u177.5 -110"   ← UNDER total   ← keep
//   "DraftKings"    ← book
//   ... fulltime/1H market group repeats below ...
function parseBetstamp(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const games = [];
  const timeRe = /^\d{1,2}:\d{2}(am|pm)$/i;
  const pctRe = /^\d+%$/;
  const overTotalRe = /^o([\d.]+)\s+([+\-]\d{2,4})$/i;
  const underTotalRe = /^u([\d.]+)\s+([+\-]\d{2,4})$/i;
  const bareOddsRe = /^[+\-]\d{2,4}$/; // ML (no space)
  const spreadRe = /^[+\-][\d.]+\s+[+\-]\d{2,4}$/; // spread with space (skip)

  // Skip header noise from Betstamp web layout (logos, navigation, my-picks)
  const skipLineRe = /^(All Leagues|Best Available|Last Refresh|Sat |Sun |Mon |Tue |Wed |Thu |Fri |betstamp|Games|Odds Comparison|Futures|My Picks|Accounting|Analysis|Find Bettors|Sportsbooks|Help|stacktheunits|SINGLES|PARLAY|Track|Your bet|Add Bet|\$0)/i;

  // Walk lines looking for time anchors. For each time, expect away/home blocks then odds.
  let i = 0;
  while (i < lines.length) {
    if (skipLineRe.test(lines[i])) { i++; continue; }
    if (!timeRe.test(lines[i])) { i++; continue; }
    const time = lines[i];
    i++;

    // Skip optional "WNBA" sport header right after time, if present
    if (lines[i] && /^(WNBA|NBA|NHL|NFL|MLB)$/i.test(lines[i])) i++;

    // Capture away abbrev / full / pct
    const awayAbbr = lines[i]; i++;
    const awayFull = lines[i]; i++;
    if (!pctRe.test(lines[i] || "")) {
      // Structure didn't match; reset and continue searching
      continue;
    }
    i++; // skip pct

    // Capture home abbrev / full / pct
    const homeAbbr = lines[i]; i++;
    const homeFull = lines[i]; i++;
    if (!pctRe.test(lines[i] || "")) continue;
    i++;

    // Now scan odds rows until next time anchor or end. Capture o<line> and u<line>.
    const overEntries = []; // [{line, odds, book}]
    const underEntries = [];
    let j = i;
    while (j < lines.length) {
      const ln = lines[j];
      if (timeRe.test(ln)) break;
      if (skipLineRe.test(ln)) { j++; continue; }

      const oM = ln.match(overTotalRe);
      const uM = ln.match(underTotalRe);
      if (oM) {
        // Next non-skip line is the book
        let k = j + 1;
        while (k < lines.length && skipLineRe.test(lines[k])) k++;
        const book = (k < lines.length) ? lines[k] : null;
        overEntries.push({ line: parseFloat(oM[1]), odds: parseInt(oM[2]), book: normBook(book) });
        j = k + 1;
        continue;
      }
      if (uM) {
        let k = j + 1;
        while (k < lines.length && skipLineRe.test(lines[k])) k++;
        const book = (k < lines.length) ? lines[k] : null;
        underEntries.push({ line: parseFloat(uM[1]), odds: parseInt(uM[2]), book: normBook(book) });
        j = k + 1;
        continue;
      }
      j++;
    }

    // The Betstamp page repeats fulltime block twice when toggle = "Best Available Fulltime"
    // and shows fulltime + 1H when toggle = "Best Available 1st Half".
    // We pick the FIRST over and FIRST under, since first appearance is fulltime.
    const firstOver = overEntries[0];
    const firstUnder = underEntries[0];

    const aA = teamLineToAbbr(awayFull) || normTeamAbbr(awayAbbr);
    const hA = teamLineToAbbr(homeFull) || normTeamAbbr(homeAbbr);
    if (!aA || !hA) { i = j; continue; }

    const books = [];
    if (firstOver) books.push({ book: firstOver.book, line: firstOver.line, overOdds: firstOver.odds, underOdds: null, side: "over" });
    if (firstUnder) books.push({ book: firstUnder.book, line: firstUnder.line, overOdds: null, underOdds: firstUnder.odds, side: "under" });

    games.push({ awayAbbr: aA, homeAbbr: hA, awayName: awayFull, homeName: homeFull, time, books });
    i = j;
  }

  return games;
}

function pasteBetstamp() {
  const ta = document.getElementById("betstamp-paste");
  const text = ta?.value || "";
  if (!text.trim()) { showToast("Paste Betstamp text first"); return; }
  betstampGames = parseBetstamp(text);
  showToast(`Parsed ${betstampGames.length} games`);
  renderTotals();
}
function clearBetstamp() {
  betstampGames = [];
  const ta = document.getElementById("betstamp-paste");
  if (ta) ta.value = "";
  renderTotals();
}

// EV using normal approx around projected total
function americanEvRough(odds, projTotal, line, side) {
  const stdev = totalsSigma();
  const z = (line - projTotal) / stdev;
  const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
  const pOver = 1 - pUnder;
  const winProb = side === "over" ? pOver : pUnder;
  const dec = oddsToDecimal(odds);
  if (!dec) return null;
  return ((winProb * dec) - 1) * 100;
}
function erf(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x < 0 ? -1 : 1; x = Math.abs(x);
  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign * y;
}

function renderTotals() {
  const el = document.getElementById("totals-tab");
  const noProjections = !merged;
  const noGames = betstampGames.length === 0;

  const cards = betstampGames.map(g => {
    const away = buildTeamProjection(g.awayAbbr);
    const home = buildTeamProjection(g.homeAbbr);

    // Projected total = AVG of each source's standalone game total.
    let blendedTotal = null;
    const perSourceGameTotal = {};
    if (away && home) {
      const totals = [];
      SOURCES.forEach(s => {
        const a = away.sourceTotals[s.key];
        const h = home.sourceTotals[s.key];
        const sum = a.sum + h.sum;
        const players = a.count + h.count;
        if (players > 0) {
          perSourceGameTotal[s.key] = sum;
          totals.push(sum);
        }
      });
      if (totals.length) blendedTotal = totals.reduce((x,y)=>x+y,0) / totals.length;
    }

    // Pace × Eff independent total (from team-level advanced stats)
    const indepInfo = independentTotal(g.awayAbbr, g.homeAbbr);
    const paceEffTotal = indepInfo ? indepInfo.total : null;

    // Active projection source for this game card. Persists per-game in window state.
    // Default order of preference: 'both' if both exist, else whichever is available
    const cardKey = `${g.awayAbbr}_${g.homeAbbr}`;
    window._cardProjSource = window._cardProjSource || {};
    if (!window._cardProjSource[cardKey]) {
      if (blendedTotal != null && paceEffTotal != null) window._cardProjSource[cardKey] = "both";
      else if (blendedTotal != null) window._cardProjSource[cardKey] = "blended";
      else if (paceEffTotal != null) window._cardProjSource[cardKey] = "paceeff";
    }
    const projSource = window._cardProjSource[cardKey];

    // Resolve projTotal based on active source
    let projTotal = null;
    if (projSource === "blended") projTotal = blendedTotal;
    else if (projSource === "paceeff") projTotal = paceEffTotal;
    else if (projSource === "both" && blendedTotal != null && paceEffTotal != null) {
      projTotal = (blendedTotal + paceEffTotal) / 2;
    }

    // Dominant book line — used for side-agreement check below + Total Probability display
    let dominantLine = null;
    if (g.books && g.books.length) {
      const lineCount = {};
      g.books.forEach(b => { lineCount[b.line] = (lineCount[b.line] || 0) + 1; });
      dominantLine = Object.entries(lineCount).sort((a,b) => b[1] - a[1])[0][0];
      dominantLine = parseFloat(dominantLine);
    }

    // Agreement signal: do both models point to the SAME SIDE of the line?
    // (Not "are the totals close" — that's the wrong question.)
    // If both > line → both say OVER. If both < line → both say UNDER. Agree.
    // If one is over and one is under → disagree.
    let agreement = null;
    if (blendedTotal != null && paceEffTotal != null && dominantLine != null) {
      const blendSide = blendedTotal > dominantLine ? "over" : "under";
      const peSide = paceEffTotal > dominantLine ? "over" : "under";
      const sameSide = blendSide === peSide;
      const diff = blendedTotal - paceEffTotal;
      agreement = {
        diff,
        agree: sameSide,
        side: sameSide ? blendSide.toUpperCase() : null
      };
    } else if (blendedTotal != null && paceEffTotal != null) {
      // No book line yet — fall back to "are totals close" check
      agreement = { diff: blendedTotal - paceEffTotal, agree: Math.abs(blendedTotal - paceEffTotal) <= 5, side: null };
    }

    const sourceBreakdown = (away && home) ? SOURCES.map(s => {
      const t = perSourceGameTotal[s.key];
      return t != null ? `<span style="color:${s.color};font-weight:600">${s.label} ${t.toFixed(1)}</span>` : null;
    }).filter(Boolean).join(" · ") : "";

    const enrichedBooks = g.books.map(b => {
      let edge = null, winProb = null;
      if (projTotal != null) {
        const odds = b.side === "over" ? b.overOdds : b.underOdds;
        // Edge in points
        edge = b.side === "over" ? (projTotal - b.line) : (b.line - projTotal);
        // Model win probability using normal approx
        const stdev = totalsSigma();
        const z = (b.line - projTotal) / stdev;
        const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
        const pOver = 1 - pUnder;
        winProb = b.side === "over" ? pOver : pUnder;
      }
      return { ...b, edge, winProb };
    });

    // Best of each side (by point-edge)
    const bestOver = enrichedBooks.filter(b => b.side === "over" && b.edge != null).sort((a,b)=>b.edge-a.edge)[0];
    const bestUnder = enrichedBooks.filter(b => b.side === "under" && b.edge != null).sort((a,b)=>b.edge-a.edge)[0];

    // Dominant book line was computed above (for agreement check)
    const probsFor = (total) => {
      if (total == null || dominantLine == null) return null;
      const z = (dominantLine - total) / totalsSigma();
      const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
      return { pOver: 1 - pUnder, pUnder };
    };
    const bothTotal = (blendedTotal != null && paceEffTotal != null) ? (blendedTotal + paceEffTotal) / 2 : null;

    const bookRows = enrichedBooks.length
      ? enrichedBooks.map(b => {
          const odds = b.side === "over" ? b.overOdds : b.underOdds;
          const sideLbl = b.side === "over" ? "OVER" : "UNDER";
          const sideColor = b.side === "over" ? "#22c55e" : "#f87171";
          const edgeColor = b.edge == null ? "#d4dae3" : b.edge > 0 ? "#22c55e" : b.edge < 0 ? "#f87171" : "#fff";
          // Win % color: bright green ≥ 60%, teal 50-60%, white 45-50%, red < 45%
          const wpPct = b.winProb != null ? b.winProb * 100 : null;
          const wpColor = wpPct == null ? "#d4dae3"
            : wpPct >= 60 ? "#22c55e"
            : wpPct >= 50 ? "#5eead4"
            : wpPct >= 45 ? "#fff"
            : "#f87171";
          const projForTrack = projTotal != null ? projTotal.toFixed(2) : "null";
          const bookSafe = (b.book||"").replace(/'/g,"\\'");
          return `<tr>
            <td style="padding:6px 10px;color:#e2e8f0;font-weight:600">${b.book||""}</td>
            <td style="padding:6px 10px;text-align:center;color:${sideColor};font-weight:700">${sideLbl} ${b.line}</td>
            <td style="padding:6px 10px;text-align:center;color:#fff">${odds!=null?(odds>0?'+':'')+odds:'—'}</td>
            <td style="padding:6px 10px;text-align:center;color:${edgeColor};font-weight:700">${b.edge!=null?(b.edge>0?'+':'')+b.edge.toFixed(1):'—'}</td>
            <td style="padding:6px 10px;text-align:center;color:${wpColor};font-weight:700">${wpPct!=null?wpPct.toFixed(1)+'%':'—'}</td>
            <td style="padding:6px 10px;text-align:center"><button onclick='trackTotal(${JSON.stringify({
              awayAbbr: g.awayAbbr,
              homeAbbr: g.homeAbbr,
              side: b.side,
              line: b.line,
              odds,
              book: bookSafe.replace(/\\'/g, "'"),
              projTotal,
              projSource,
              snapshots: {
                blended: blendedTotal != null && probsFor(blendedTotal) ? { total: blendedTotal, winProb: b.side === "over" ? probsFor(blendedTotal).pOver : probsFor(blendedTotal).pUnder } : null,
                paceeff: paceEffTotal != null && probsFor(paceEffTotal) ? { total: paceEffTotal, winProb: b.side === "over" ? probsFor(paceEffTotal).pOver : probsFor(paceEffTotal).pUnder } : null,
                both: bothTotal != null && probsFor(bothTotal) ? { total: bothTotal, winProb: b.side === "over" ? probsFor(bothTotal).pOver : probsFor(bothTotal).pUnder } : null
              }
            }).replace(/'/g, "\\'")})' style="background:#14b8a622;border:1px solid #14b8a655;color:#5eead4;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">TRACK</button></td>
          </tr>`;
        }).join("")
      : `<tr><td colspan="6" style="padding:12px;color:#525a64;text-align:center;font-size:12px">No prices parsed</td></tr>`;

    let bestSummary = "";
    if (projTotal != null) {
      const parts = [];
      if (bestOver && bestOver.edge != null && bestOver.edge > 0) {
        parts.push(`<span style="color:#22c55e;font-weight:700">OVER ${bestOver.line} @ ${bestOver.overOdds>0?'+':''}${bestOver.overOdds} ${bestOver.book}</span> <span style="color:#5eead4">+${bestOver.edge.toFixed(1)} edge</span>`);
      }
      if (bestUnder && bestUnder.edge != null && bestUnder.edge > 0) {
        parts.push(`<span style="color:#f87171;font-weight:700">UNDER ${bestUnder.line} @ ${bestUnder.underOdds>0?'+':''}${bestUnder.underOdds} ${bestUnder.book}</span> <span style="color:#5eead4">+${bestUnder.edge.toFixed(1)} edge</span>`);
      }
      if (parts.length) bestSummary = `<div style="margin-top:10px;padding:10px 12px;background:#0e2926;border:1px solid #14b8a644;border-radius:6px;font-size:13px;">${parts.join(" &nbsp;|&nbsp; ")}</div>`;
    }

    // Build the right-side display: picker + selected total + comparison
    const fmtTotal = (v, color="#fff", glow=false) => v != null
      ? `<span style="color:${color};font-weight:700;${glow?'text-shadow:0 0 16px rgba(94,234,212,0.6);':''}">${v.toFixed(1)}</span>`
      : `<span style="color:#525a64;">—</span>`;

    // Per-source pills (clickable to switch)
    const pillStyle = (active, disabled) => `
      background:${active?'#14b8a6':disabled?'transparent':'#161b22'};
      border:1px solid ${active?'#14b8a6':disabled?'#1f2733':'#1f2733'};
      color:${active?'#0d1117':disabled?'#525a64':'#d4dae3'};
      border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;
      cursor:${disabled?'not-allowed':'pointer'};font-family:'Inter',sans-serif;letter-spacing:0.5px;
      opacity:${disabled?'0.5':'1'};
    `;

    const blendedDisabled = blendedTotal == null;
    const paceEffDisabled = paceEffTotal == null;
    const bothDisabled = blendedDisabled || paceEffDisabled;

    const fallbackBadge = (indepInfo && indepInfo.usedFallback)
      ? `<span style="font-size:9px;color:#f59e0b;font-weight:700;letter-spacing:0.5px;margin-left:4px;" title="${g.awayAbbr}: ${indepInfo.aSource} · ${g.homeAbbr}: ${indepInfo.bSource}">⚠ FALLBACK</span>`
      : "";

    // Source-year badge — tells you whether P×E is using 2025, 2026, or blend
    const sourceYearBadge = (() => {
      if (!indepInfo) return "";
      const a = indepInfo.aSource || "", b = indepInfo.bSource || "";
      // Both teams from the same source → single label
      if (a === b && a) {
        const color = a === "2025" ? "#8b5cf6" : a === "2026" ? "#5eead4" : a.startsWith("blend") ? "#f59e0b" : "#a8b0bb";
        return `<span style="font-size:9px;color:${color};font-weight:700;letter-spacing:0.5px;margin-left:4px;">${a.toUpperCase()}</span>`;
      }
      // Different sources per team
      return `<span style="font-size:9px;color:#a8b0bb;font-weight:700;letter-spacing:0.5px;margin-left:4px;" title="${g.awayAbbr}: ${a} · ${g.homeAbbr}: ${b}">MIXED</span>`;
    })();

    // Calculate models for all three projections (so we can render them)
    const modelData = [
      { key: "blended",  label: "PlayerBased", total: blendedTotal,  probs: probsFor(blendedTotal),  meta: "RW/RG/Saber" },
      { key: "paceeff",  label: "Pace × Eff",  total: paceEffTotal,   probs: probsFor(paceEffTotal),  meta: sourceYearBadge ? "" : "" },
      { key: "both",     label: "Combined",    total: bothTotal,      probs: probsFor(bothTotal),     meta: "PlayerBased + P×E avg" }
    ];

    const agreementBadge = agreement
      ? (() => {
          if (agreement.agree && agreement.side) {
            return `<span style="font-size:10px;font-weight:700;color:#22c55e;margin-left:6px;">✓ AGREE · ${agreement.side}</span>`;
          }
          if (agreement.agree) {
            return `<span style="font-size:10px;font-weight:700;color:#22c55e;margin-left:6px;">✓ AGREE</span>`;
          }
          return `<span style="font-size:10px;font-weight:700;color:#f59e0b;margin-left:6px;">⚠ SPLIT · ${agreement.diff>=0?'+':''}${agreement.diff.toFixed(1)}</span>`;
        })()
      : "";

    const modelCard = (m) => {
      const isActive = m.key === projSource;
      const accent = isActive ? "#14b8a6" : "#1f2733";
      const labelColor = isActive ? "#5eead4" : "#a8b0bb";
      const totalDisplay = m.total != null ? m.total.toFixed(1) : "—";
      const totalColor = m.total != null ? (isActive ? "#5eead4" : "#fff") : "#525a64";
      const probsLine = m.probs && dominantLine != null
        ? (() => {
            const oC = m.probs.pOver >= 0.6 ? "#22c55e" : m.probs.pOver >= 0.5 ? "#5eead4" : "#d4dae3";
            const uC = m.probs.pUnder >= 0.6 ? "#22c55e" : m.probs.pUnder >= 0.5 ? "#5eead4" : "#d4dae3";
            return `<div style="display:flex;justify-content:space-between;gap:10px;font-size:11px;font-weight:700;margin-top:4px;">
              <span style="color:${oC};">O ${(m.probs.pOver*100).toFixed(1)}%</span>
              <span style="color:${uC};">U ${(m.probs.pUnder*100).toFixed(1)}%</span>
            </div>`;
          })()
        : `<div style="font-size:10px;color:#525a64;margin-top:4px;text-align:center;">no data</div>`;
      const extraBadge = m.key === "paceeff" ? sourceYearBadge : "";
      return `<div onclick="${m.total!=null?`setCardProjSource('${cardKey}','${m.key}')`:''}" style="flex:1;background:#0d1117;border:1.5px solid ${accent};border-radius:6px;padding:8px 10px;cursor:${m.total!=null?'pointer':'default'};transition:border-color 0.15s;min-width:120px;">
        <div style="font-size:9px;color:${labelColor};letter-spacing:0.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px;">${m.label}${isActive?' ●':''}</div>
        <div style="font-size:18px;color:${totalColor};font-weight:800;">${totalDisplay}${extraBadge}</div>
        ${probsLine}
      </div>`;
    };

    const rightPanel = `
      <div style="min-width:420px;flex:1;max-width:560px;">
        ${projTotal != null
          ? `<div style="text-align:right;margin-bottom:8px;">
              <span style="font-size:28px;font-weight:800;color:#5eead4;text-shadow:0 0 16px rgba(94,234,212,0.6);">${projTotal.toFixed(1)}</span>
              <span style="font-size:10px;color:#d4dae3;margin-left:6px;letter-spacing:0.8px;">ACTIVE · ${projSource === "blended" ? "PLAYERBASED" : projSource.toUpperCase()}</span>
              ${agreementBadge}
              ${dominantLine != null ? `<div style="font-size:9px;color:#a8b0bb;margin-top:2px;">Probabilities vs book line ${dominantLine}</div>` : ""}
            </div>`
          : `<div style="font-size:13px;color:#f87171;padding:8px 0;text-align:right;">No projection available</div>`
        }
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${modelCard(modelData[0])}
          ${modelCard(modelData[1])}
          ${modelCard(modelData[2])}
        </div>
      </div>`;

    const teamLine = (t, abbr) => t
      ? `<div><span style="font-weight:700;color:#fff">${abbr}</span> <span style="color:#5eead4;font-weight:700;font-size:18px;text-shadow:0 0 10px rgba(94,234,212,0.5);">${t.total.toFixed(1)}</span></div>`
      : `<div><span style="font-weight:700;color:#fff">${abbr}</span> <span style="color:#525a64">no proj</span></div>`;

    return `
      <div style="background:#161b22;border:1px solid #1f2733;border-radius:10px;padding:18px 20px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-size:16px;font-weight:800;color:#fff;">${g.awayAbbr} <span style="color:#d4dae3;font-weight:500">@</span> ${g.homeAbbr}</div>
            <div style="font-size:12px;color:#d4dae3;margin-top:2px">${g.awayName} at ${g.homeName} · ${g.time}</div>
          </div>
          ${rightPanel}
        </div>
        <div style="display:flex;gap:24px;margin-bottom:8px;font-size:14px;">
          ${teamLine(away, g.awayAbbr)}
          ${teamLine(home, g.homeAbbr)}
        </div>
        ${sourceBreakdown ? `<div style="font-size:11px;margin-bottom:14px;color:#d4dae3">By source: ${sourceBreakdown}</div>` : ""}
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#0d1117;">
              <th style="padding:6px 10px;text-align:left;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600">Book</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600">Line</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600">Odds</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600" title="Points difference: model proj minus line">Edge</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600" title="Model probability this side hits at this line">Win %</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600"></th>
            </tr>
          </thead>
          <tbody>${bookRows}</tbody>
        </table>
        ${bestSummary}
      </div>`;
  }).join("");

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;">Totals Model</div>
        <div style="font-size:13px;color:#d4dae3;">Per-card pick: Blend (RG/Saber/RW) or Pace × Eff · σ=14</div>
      </div>
    </div>

    ${noProjections && Object.keys(teamStats2025).length === 0 && Object.keys(teamStats2026).length === 0
      ? `<div style="padding:18px;background:#161b22;border:1px solid #1f2733;border-radius:8px;color:#f87171;font-size:13px;margin-bottom:16px;">Load player projections (Upload tab) OR paste team advanced stats below to enable totals analysis.</div>`
      : noProjections
        ? `<div style="padding:14px;background:#161b22;border:1px solid #1f2733;border-radius:8px;color:#f59e0b;font-size:12px;margin-bottom:16px;">No player projections loaded · running on Pace × Eff only. Cards default to P×E for matchups where team stats exist.</div>`
        : ""}

    <div style="background:#161b22;border:1px solid #1f2733;border-radius:8px;padding:14px;margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:700;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;">Betstamp Paste — Best Available Fulltime</div>
        <div style="display:flex;gap:8px;">
          <button onclick="pasteBetstamp()" style="background:#14b8a6;border:none;color:#0d1117;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">PARSE</button>
          <button onclick="clearBetstamp()" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
        </div>
      </div>
      <textarea id="betstamp-paste" placeholder="Copy the Betstamp WNBA Best Available page and paste here..." spellcheck="false"
        style="width:100%;min-height:80px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:10px 12px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:12px;outline:none;resize:vertical;"></textarea>
      ${noGames ? `<div style="font-size:11px;color:#525a64;margin-top:8px;">Paste the Betstamp slate above to load games.</div>` : `<div style="font-size:11px;color:#5eead4;margin-top:8px;">${betstampGames.length} games loaded</div>`}
    </div>

    <div style="background:#161b22;border:1px solid #1f2733;border-radius:8px;padding:14px;margin-bottom:18px;">
      <div style="margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;">Team Advanced Stats — Pace × Efficiency Model</div>
        <div style="font-size:11px;color:#a8b0bb;margin-top:2px;">Paste from stats.wnba.com/teams/advanced. 2025 = stable prior · 2026 = current season (blended ${PRIOR_WEIGHT_GAMES}-game weighting). Expansion teams (POR, TOR) need 2026 paste to compute.</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;color:#a8b0bb;font-weight:700;letter-spacing:0.5px;">2025 (PRIOR)</span>
            <div style="display:flex;gap:4px;">
              <button onclick="importTeamStats('2025')" style="background:#14b8a6;border:none;color:#0d1117;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">IMPORT</button>
              <button onclick="clearTeamStats('2025')" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
            </div>
          </div>
          <textarea id="team-stats-paste-2025" placeholder="Paste 2025 advanced team stats table..." spellcheck="false"
            style="width:100%;min-height:60px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:11px;outline:none;resize:vertical;"></textarea>
          <div style="font-size:10px;color:${Object.keys(teamStats2025).length===0?'#525a64':'#5eead4'};margin-top:4px;">${Object.keys(teamStats2025).length} teams loaded</div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;color:#a8b0bb;font-weight:700;letter-spacing:0.5px;">2026 (CURRENT)</span>
            <div style="display:flex;gap:4px;">
              <button onclick="importTeamStats('2026')" style="background:#14b8a6;border:none;color:#0d1117;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">IMPORT</button>
              <button onclick="clearTeamStats('2026')" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
            </div>
          </div>
          <textarea id="team-stats-paste-2026" placeholder="Paste 2026 advanced team stats table..." spellcheck="false"
            style="width:100%;min-height:60px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:11px;outline:none;resize:vertical;"></textarea>
          <div style="font-size:10px;color:${Object.keys(teamStats2026).length===0?'#525a64':'#5eead4'};margin-top:4px;">${Object.keys(teamStats2026).length} teams loaded</div>
        </div>
      </div>
    </div>

    ${cards}`;
}

// Init
buildSlots();
updateBadges();
loadBets();
document.addEventListener("DOMContentLoaded", () => {
  const oddsEl = document.getElementById("modal-odds");
  if (oddsEl) oddsEl.addEventListener("input", () => { updateStakePreview(); updateEvPreview(); });
  const fairEl = document.getElementById("modal-fair");
  if (fairEl) fairEl.addEventListener("input", updateEvPreview);
});
</script>
<!-- TRACK MODAL -->
<div id="track-modal">
  <div id="track-modal-box">
    <h3 id="modal-player-name">Player Name</h3>
    <div class="sub" id="modal-player-sub">Add a bet</div>

    <!-- Stat badge + shorthand input -->
    <div class="modal-row" style="align-items:flex-start;">
      <div class="modal-field" style="flex:0 0 auto;">
        <label>Stat</label>
        <div id="modal-stat-display" style="background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:9px 14px;font-size:14px;color:#5eead4;font-weight:700;letter-spacing:0.5px;min-width:80px;text-align:center;">PTS</div>
        <select id="modal-stat" style="display:none;" onchange="recomputeFairFromProj()">
          <option value="PTS">PTS</option>
          <option value="REB">REB</option>
          <option value="AST">AST</option>
          <option value="3PM">3PM</option>
          <option value="PRA">PRA</option>
          <option value="MIN">MIN</option>
          <option value="PR">PR</option>
          <option value="PA">PA</option>
          <option value="RA">RA</option>
          <option value="GAME_TOTAL">GAME TOTAL</option>
        </select>
      </div>
      <div class="modal-field" style="flex:1;">
        <label>Quick Entry</label>
        <input type="text" id="modal-shorthand" placeholder="u17.5 +111 fd 11.77"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="parseShorthand(this)"
          onkeydown="if(event.key==='Enter'){event.preventDefault();saveBet();}"/>
        <div id="shorthand-preview" style="font-size:11px;color:#d4dae3;margin-top:4px;min-height:14px;"></div>
      </div>
    </div>

    <!-- Hidden fields (still used by save logic) -->
    <input type="hidden" id="modal-line"/>
    <input type="hidden" id="modal-odds"/>
    <input type="hidden" id="modal-fair"/>
    <input type="hidden" id="modal-book" value=""/>

    <div class="modal-row">
      <div class="modal-field">
        <label>Game Date</label>
        <input type="date" id="modal-date" autocomplete="off" style="color-scheme:dark;"/>
      </div>
    </div>

    <!-- Alt books (book + odds pairs) -->
    <div style="margin-top:4px;">
      <label style="font-size:9px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;">Alt Books (optional)</label>
      <div id="modal-altbooks-list" style="margin-top:4px;display:flex;flex-direction:column;gap:3px;"></div>
    </div>
    <datalist id="alt-book-options">
      <option value="FanDuel"></option>
      <option value="DraftKings"></option>
      <option value="Prop Builder"></option>
      <option value="Onyx"></option>
      <option value="Fliff"></option>
      <option value="Novig"></option>
      <option value="ProphetX"></option>
      <option value="Bookmaker"></option>
      <option value="Pinnacle"></option>
      <option value="Bet105"></option>
    </datalist>

    <div id="modal-proj-display" style="margin-top:14px;"></div>
    <div id="modal-stake-preview"></div>
    <div id="modal-ev-preview" style="margin-top:6px;font-size:13px;font-weight:700;"></div>

    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeTrackModal()">Cancel</button>
      <button class="modal-btn-save" id="modal-save-btn" onclick="saveBet()">Track Bet</button>
    </div>
  </div>
</div>

<!-- QUICK GRADE OVERLAY -->
<div id="qg-overlay">
  <div id="qg-card">
    <div id="qg-progress"></div>
    <div id="qg-player"></div>
    <div id="qg-detail"></div>
    <div id="qg-proj"></div>
    <div class="qg-btns">
      <button class="qg-btn" id="qg-hit" onclick="qgGrade('hit')">HIT</button>
      <button class="qg-btn" id="qg-miss" onclick="qgGrade('miss')">MISS</button>
      <button class="qg-btn" id="qg-void" onclick="qgGrade('void')">VOID</button>
      <button class="qg-btn" id="qg-skip" onclick="qgNext()">SKIP</button>
    </div>
    <button id="qg-close-btn" onclick="closeQG()">Close</button>
  </div>
</div>

</body>
</html>
