}

function copyDailyRecap() { _copyDailyRecapFiltered("all"); }
function copyDailyRecapProps() { _copyDailyRecapFiltered("props"); }
function copyDailyRecapTotals() { _copyDailyRecapFiltered("totals"); }

function _copyDailyRecapFiltered(kind) {
  // Group settled bets by their game date
  const isTotal = b => (b.stat || "").toUpperCase() === "GAME_TOTAL";
  let settled = bets.filter(b => b.result !== "pending");
  if (kind === "props") settled = settled.filter(b => !isTotal(b));
  else if (kind === "totals") settled = settled.filter(b => isTotal(b));
  if (!settled.length) {
    showToast(kind === "totals" ? "No settled totals" : kind === "props" ? "No settled props" : "No settled bets to recap");
    return;
  }

  const byDate = {};
  settled.forEach(b => {
    const d = b.date || "Unknown";
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(b);
  });

  // Most recent date first (parse mm/dd/yyyy format)
  const dateKeys = Object.keys(byDate).sort((a,b) => {
    const pa = a.split("/").map(Number), pb = b.split("/").map(Number);
    if (pa.length !== 3 || pb.length !== 3) return a.localeCompare(b);
    const da = new Date(pa[2], pa[0]-1, pa[1]);
    const db = new Date(pb[2], pb[0]-1, pb[1]);
    return db - da;
  });

  // Default to most recent date
  const targetDate = dateKeys[0];
  const dayBets = byDate[targetDate];
  const hits = dayBets.filter(b => b.result === "hit");
  const misses = dayBets.filter(b => b.result === "miss");
  const voids = dayBets.filter(b => b.result === "void");
  const settledOnly = [...hits, ...misses]; // exclude voids from W-L
  const totalWon = hits.reduce((a,b) => a + b.toWin, 0);
  const totalLost = misses.reduce((a,b) => a + b.stake, 0);
  const totalStaked = settledOnly.reduce((a,b) => a + b.stake, 0);
  const netPL = totalWon - totalLost;
  const roi = totalStaked > 0 ? ((netPL/totalStaked)*100).toFixed(1) : null;

  const lines = [];
  const headerKind = kind === "props" ? "PROPS RECAP" : kind === "totals" ? "TOTALS RECAP" : "RECAP";
  lines.push(`WNBA ${headerKind} ${targetDate}`);
  lines.push("");
  lines.push(`${hits.length}W ${misses.length}L${voids.length?` ${voids.length}V`:""}    ${netPL>=0?"+":""}${netPL.toFixed(2)}u${roi!==null?`    ${roi}% ROI`:""}`);
  lines.push("");

  // Picks list, hits first then misses, void at bottom
  const ordered = [
    ...hits.sort((a,b)=>b.toWin-a.toWin),
    ...misses.sort((a,b)=>b.stake-a.stake),
    ...voids
  ];
  ordered.forEach(b => {
    const oddsStr = b.odds > 0 ? `+${b.odds}` : `${b.odds}`;
    const lineStr = `${b.ou.toUpperCase()} ${b.line}`;
    const teamStr = b.team ? ` (${b.team})` : "";
    const statLbl = isTotal(b) ? "" : ` ${b.stat}`;
    let resultStr;
    if (b.result === "hit") resultStr = `WIN +${b.toWin.toFixed(2)}u`;
    else if (b.result === "miss") resultStr = `LOSS ${b.stake.toFixed(2)}u`;
    else resultStr = `VOID`;
    lines.push(`${b.player}${teamStr}   ${lineStr}${statLbl}   ${oddsStr}   ${resultStr}`);
  });

  const text = lines.join("\n");
  // Bulletproof copy (works inside Claude artifact iframe + GitHub Pages)
  const tryExec = (t) => {
    try {
      const ta = document.createElement("textarea");
      ta.value = t; ta.style.position="fixed"; ta.style.opacity="0";
      ta.setAttribute("readonly","");
      document.body.appendChild(ta);
      ta.focus(); ta.select(); ta.setSelectionRange(0, t.length);
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch(e) { return false; }
  };
  const label = kind === "props" ? "props" : kind === "totals" ? "totals" : "bets";
  if (tryExec(text)) {
    showToast(`Copied ${dayBets.length} ${label} recap for ${targetDate}`);
  } else if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showToast(`Copied ${dayBets.length} ${label} recap`))
      .catch(() => { showToast("Copy blocked — text in console"); console.log(text); });
  } else {
    showToast("Copy not supported"); console.log(text);
  }
}

function copyOpenPlays() { _copyOpenFiltered("props"); }
function copyOpenTotals() { _copyOpenFiltered("totals"); }

// Stat code → full lowercase name
const STAT_FULL_NAME = {
  "PTS":"points", "REB":"rebounds", "AST":"assists", "3PM":"threes",
  "PRA":"PRA", "MIN":"minutes", "PR":"PR", "PA":"PA", "RA":"RA"
};

function _copyOpenFiltered(kind) {
  const open = bets.filter(b => b.result === "pending");
  if (!open.length) { showToast("No open plays to copy"); return; }
  const isTotal = b => (b.stat || "").toUpperCase() === "GAME_TOTAL";
  const filtered = open.filter(b => kind === "totals" ? isTotal(b) : !isTotal(b));
  if (!filtered.length) { showToast(kind === "totals" ? "No open totals" : "No open props"); return; }

  // For each bet, scan primary + alt books, pick the highest-EV price.
  // Each alt may carry its own fair (back-solved from a per-alt EV%) and its own line.
  const pickBest = (b) => {
    const candidates = [{ book: b.book, odds: b.odds, fair: b.fair, line: b.line }];
    if (Array.isArray(b.altBooks)) {
      b.altBooks.forEach(a => {
        if (a && a.book && a.odds != null) {
          candidates.push({
            book: a.book,
            odds: a.odds,
            fair: a.fair != null ? a.fair : b.fair,
            line: a.line != null ? a.line : b.line
          });
        }
      });
    }
    let best = null;
    candidates.forEach(c => {
      if (!c.fair) return;
      const ev = calcEdge(c.odds, c.fair);
      if (ev == null) return;
      if (!best || ev > best.ev) best = { ...c, ev };
    });
    return best;
  };

  const enriched = filtered.map(b => {
    const best = pickBest(b);
    return best ? { bet: b, best } : null;
  }).filter(x => x);

  if (!enriched.length) { showToast(`No open ${kind}`); return; }

  // Sort by EV descending — best plays first
  enriched.sort((a,b) => b.best.ev - a.best.ev);

  const headerLabel = kind === "totals" ? "totals" : "props";
  const lines = [`WNBA early ${headerLabel}: (${enriched.length})`, ""];
  enriched.forEach(({bet, best}, idx) => {
    const oddsStr = best.odds > 0 ? `+${best.odds}` : `${best.odds}`;
    const ouLower = (bet.ou || "").toLowerCase();
    const bestLine = best.line != null ? best.line : bet.line;

    // Build the candidate set + dedupe (same logic used for alts)
    const allPrices = [{ book: bet.book, odds: bet.odds, line: bet.line, fair: bet.fair }];
    if (Array.isArray(bet.altBooks)) {
      bet.altBooks.forEach(a => {
        if (a && a.book && a.odds != null) {
          allPrices.push({
            book: a.book,
            odds: a.odds,
            line: a.line != null ? a.line : bet.line,
            fair: a.fair != null ? a.fair : bet.fair
          });
        }
      });
    }
    const seen = new Set();
    const remaining = allPrices.filter(p => {
      if (p.book === best.book && p.odds === best.odds && p.line === bestLine) return false;
      const key = `${p.book}|${p.odds}|${p.line}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    // If any alt is at the same line as the headline, the alts row will own the play-to.
    // Otherwise the headline shows its own.
    const altsAtBestLine = remaining.some(p => (p.line ?? bet.line) === bestLine);
    const headlinePlayTo = altsAtBestLine ? null : playToOdds(best.fair, 5);
    const headlinePlayToStr = headlinePlayTo != null ? ` play to ${headlinePlayTo > 0 ? "+" + headlinePlayTo : headlinePlayTo}` : "";

    let row;
    if (kind === "totals") {
      row = `${bet.player}  ${ouLower} ${bestLine} ${oddsStr} ${best.book}${headlinePlayToStr}`;
    } else {
      const teamStr = bet.team ? ` (${bet.team})` : "";
      const statName = STAT_FULL_NAME[bet.stat] || bet.stat;
      row = `${bet.player}${teamStr}  ${ouLower} ${bestLine} ${statName} ${oddsStr} ${best.book}${headlinePlayToStr}`;
    }
    lines.push(row);

    // Alts row — group by line, one play-to per group.
    // For the group at the headline's line, prepend the headline's price so its play-to covers everyone at that line.
    if (remaining.length) {
      const byLine = {};
      // Seed groups with the headline at its own line so alts at same line get the play-to including it
      if (altsAtBestLine) {
        byLine[String(bestLine)] = { line: bestLine, fair: best.fair, items: [] };
      }
      remaining.forEach(p => {
        const k = String(p.line ?? bet.line);
        if (!byLine[k]) byLine[k] = { line: p.line, fair: p.fair, items: [] };
        byLine[k].items.push(p);
      });
      // Only render groups that have items
      const groupStrs = Object.values(byLine).filter(g => g.items.length > 0).map(g => {
        const items = g.items.map(p => {
          const o = p.odds > 0 ? `+${p.odds}` : `${p.odds}`;
          // When line differs from main, prepend side letter so it's unambiguous (u4.5, o9.5)
          const lineHint = (p.line != null && p.line !== bestLine) ? `${ouLower[0]}${p.line} ` : "";
          return `${p.book} ${lineHint}${o}`;
        }).join("  ");
        const playTo = g.fair != null ? playToOdds(g.fair, 5) : null;
        const playToStr = playTo != null ? `  play to ${playTo > 0 ? "+" + playTo : playTo}` : "";
        return `${items}${playToStr}`;
      });
      // Only prefix "alts:" if any alt prices are at a DIFFERENT line than the main bet
      const hasAltLine = remaining.some(p => p.line != null && p.line !== bestLine);
      const prefix = hasAltLine ? "alts: " : "";
      lines.push(`${prefix}${groupStrs.join("  ")}`);
    }
    if (idx < enriched.length - 1) lines.push("");
  });

  const text = lines.join("\n").trimEnd();
  // Robust copy: try execCommand first (works in sandboxed iframes like artifact previews),
  // fall back to clipboard API, then last-resort console dump.
  const tryExecCommand = (t) => {
    try {
      const ta = document.createElement("textarea");
      ta.value = t;
      ta.style.position = "fixed";
      ta.style.top = "0";
      ta.style.left = "0";
      ta.style.opacity = "0";
      ta.setAttribute("readonly", "");
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, t.length);
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch(e) {
      console.warn("execCommand failed:", e);
      return false;
    }
  };

  let copied = tryExecCommand(text);

  if (copied) {
    showToast(`Copied ${enriched.length} ${kind} at 5%+ EV`);
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast(`Copied ${enriched.length} ${kind} at 5%+ EV`);
    }).catch(err => {
      console.error("Clipboard API blocked:", err);
      showToast("Copy blocked — text in console");
      console.log("=== COPY THIS MANUALLY ===\n" + text + "\n=== END ===");
    });
  } else {
    showToast("Copy not supported — text in console");
    console.log("=== COPY THIS MANUALLY ===\n" + text + "\n=== END ===");
  }
}

function renderTracker() {
  const el = document.getElementById("tracker-tab");
  // Apply kind filter (all | props | totals) to every aggregation in this view
  const kindMatch = (b) => {
    if (betKindFilter === "all") return true;
    const isTotal = (b.stat || "").toUpperCase() === "GAME_TOTAL";
    return betKindFilter === "totals" ? isTotal : !isTotal;
  };
  const scopedBets = bets.filter(kindMatch);
  const settled = scopedBets.filter(b => b.result !== "pending" && b.result !== "void");
  const hits = scopedBets.filter(b => b.result === "hit");
  const misses = scopedBets.filter(b => b.result === "miss");
  const pending = scopedBets.filter(b => b.result === "pending");
  const totalWon = hits.reduce((a,b)=>a+b.toWin,0);
  const totalLost = misses.reduce((a,b)=>a+b.stake,0);
  const totalStaked = settled.reduce((a,b)=>a+b.stake,0);
  const netPL = totalWon - totalLost;
  const roi = totalStaked > 0 ? ((netPL/totalStaked)*100).toFixed(1) : "—";
  const winRate = settled.length > 0 ? ((hits.length/settled.length)*100).toFixed(1) : "—";

  const empty = () => ({hits:0,total:0,pl:0,staked:0});
  const emptyWithSplit = () => ({hits:0,total:0,pl:0,staked:0, over:empty(), under:empty()});
  const accum = (slot, b) => {
    slot.total++;
    slot.staked += b.stake;
    if (b.result === "hit") { slot.hits++; slot.pl += b.toWin; }
    else if (b.result === "miss") { slot.pl -= b.stake; }
  };

  const statBreak = {};
  settled.forEach(b => {
    if (!statBreak[b.stat]) statBreak[b.stat] = emptyWithSplit();
    accum(statBreak[b.stat], b);
    if (b.ou === "over" || b.ou === "under") accum(statBreak[b.stat][b.ou], b);
  });

  const bookBreak = {};
  settled.forEach(b => {
    if (!bookBreak[b.book]) bookBreak[b.book] = emptyWithSplit();
    accum(bookBreak[b.book], b);
    if (b.ou === "over" || b.ou === "under") accum(bookBreak[b.book][b.ou], b);
  });

  const ouBreak = {over:empty(), under:empty()};
  settled.forEach(b => {
    if (b.ou === "over" || b.ou === "under") accum(ouBreak[b.ou], b);
  });

  // Projection source comparison: which projection model produced the bet
  const sourceBreak = { blended: empty(), paceeff: empty(), both: empty(), unknown: empty() };
  // Counter-factual: how would EACH model have called this bet at track time?
  // Uses the bet.projSnapshots (frozen at track-click). For each settled bet, ask:
  // "Did this model think the side that won was more likely than 50%?"
  const cfBreak = { blended: empty(), paceeff: empty(), both: empty() };
  settled.forEach(b => {
    if (b.stat !== "GAME_TOTAL") return;
    const sk = b.projSource === "blended" || b.projSource === "paceeff" || b.projSource === "both" ? b.projSource : "unknown";
    accum(sourceBreak[sk], b);
    // For counterfactual: for each snapshot model, count it as a "call" only if its
    // win prob for this bet's side was >= 50%. Then accum based on the actual result.
    if (b.projSnapshots) {
      ["blended","paceeff","both"].forEach(k => {
        const snap = b.projSnapshots[k];
        if (!snap || snap.winProb == null) return;
        // Did this model agree with the side bet?
        if (snap.winProb >= 0.5) accum(cfBreak[k], b);
      });
    }
  });
  const hasSourceHistory = sourceBreak.blended.total + sourceBreak.paceeff.total + sourceBreak.both.total > 0;
  const hasCfHistory = cfBreak.blended.total + cfBreak.paceeff.total + cfBreak.both.total > 0;

  const pct = (h,t) => t>0 ? `${((h/t)*100).toFixed(0)}%` : "—";
  const card = (label, v, opts={}) => {
    const r = v.staked > 0 ? ((v.pl/v.staked)*100).toFixed(1) : "—";
    const logo = opts.book ? logoFor(label) : null;
    const labelEl = logo
      ? `<img src="${logo}" alt="${label}" style="width:14px;height:14px;border-radius:3px;object-fit:cover;vertical-align:middle;margin-right:5px;"/><span style="vertical-align:middle;">${label}</span>`
      : label;
    // O/U split if this card has it (statBreak / bookBreak entries do; ouBreak's individual cells don't)
    let ouRow = "";
    if (v.over && v.under && (v.over.total > 0 || v.under.total > 0)) {
      const fmt = (lbl, sub, color) => {
        if (sub.total === 0) return `<span style="color:#525a64;">${lbl} —</span>`;
        const sr = sub.staked > 0 ? ((sub.pl/sub.staked)*100).toFixed(0) : "—";
        const plColor = sub.pl >= 0 ? '#22c55e' : '#f87171';
        return `<span style="color:${color};font-weight:700;">${lbl}</span> ${pct(sub.hits,sub.total)} <span style="color:#a8b0bb;">${sub.hits}/${sub.total}</span> <span style="color:${plColor};">${sub.pl>=0?'+':''}${sub.pl.toFixed(2)}u</span>`;
      };
      ouRow = `<div class="os-sub" style="margin-top:3px;display:flex;flex-direction:column;gap:1px;font-size:10px;">
        <div>${fmt("O", v.over, "#FDB927")}</div>
        <div>${fmt("U", v.under, "#f59e0b")}</div>
      </div>`;
    }
    return `<div class="overview-stat" style="min-width:160px;">
      <div class="os-label">${labelEl}</div>
      <div class="os-val">${pct(v.hits,v.total)}</div>
      <div class="os-sub">${v.hits}/${v.total} · <span style="color:${v.pl>=0?'#22c55e':'#f87171'};font-weight:700;">${v.pl>=0?'+':''}${v.pl.toFixed(2)}u</span> · <span style="color:${Number(r)>=0?'#FDB927':'#f87171'};">ROI ${r!=="—"?r+"%":"—"}</span></div>
      ${ouRow}
    </div>`;
  };

  const search = (document.getElementById("bet-search")?.value || "").toLowerCase();
  let filtered = openOnly ? scopedBets.filter(b => b.result === "pending") : scopedBets;
  if (search) filtered = filtered.filter(b => b.player.toLowerCase().includes(search) || b.stat.toLowerCase().includes(search) || b.book.toLowerCase().includes(search));

  const betRows = filtered.map(b => {
    const plVal = b.result==="hit" ? `+${b.toWin.toFixed(2)}u` : b.result==="miss" ? `-${b.stake.toFixed(2)}u` : b.result==="void" ? "VOID" : "—";
    const plColor = b.result==="hit"?"#22c55e":b.result==="miss"?"#f87171":b.result==="void"?"#f59e0b":"#d4dae3";

    // Edge display: totals → point delta as %, props → EV%
    const isTotal = (b.stat || "").toUpperCase() === "GAME_TOTAL";
    let edgeStr, edgeColor;
    if (isTotal && b.proj != null && b.line != null) {
      const ptsEdge = b.ou === "over" ? (b.proj - b.line) : (b.line - b.proj);
      edgeStr = (ptsEdge >= 0 ? "+" : "") + ptsEdge.toFixed(1) + "%";
      edgeColor = ptsEdge >= 3 ? "#22c55e" : ptsEdge > 0 ? "#FDB927" : "#f87171";
    } else {
      const ev = calcEdge(b.odds, b.fair);
      edgeStr = ev == null ? "—" : (ev > 0 ? "+" : "") + ev.toFixed(1) + "%";
      edgeColor = ev == null ? "#d4dae3" : ev > 0 ? "#22c55e" : "#f87171";
    }

    // For totals: build a "snapshot summary" line showing every model's edge as it stood at track time.
    // This makes the per-model tracking visible at-a-glance on the card.
    let snapshotsRow = "";
    if (isTotal && b.projSnapshots && b.line != null) {
      const fmtSnap = (key, label) => {
        const snap = b.projSnapshots[key];
        if (!snap || snap.total == null) return null;
        const e = b.ou === "over" ? (snap.total - b.line) : (b.line - snap.total);
        const c = e >= 3 ? "#22c55e" : e > 0 ? "#FDB927" : "#f87171";
        const sign = e >= 0 ? "+" : "";
        // Mark the model used to place this bet
        const isUsed = key === b.projSource;
        const dot = isUsed ? ' <span style="color:#a78bfa;">●</span>' : "";
        return `<span style="color:#a8b0bb;">${label}</span> <span style="color:${c};font-weight:700;">${sign}${e.toFixed(1)}%</span>${dot}`;
      };
      const parts = [
        fmtSnap("blended", "PB"),
        fmtSnap("paceeff", "P×E"),
        fmtSnap("both", "C")
      ].filter(Boolean);
      if (parts.length) {
        snapshotsRow = `<div style="font-size:10px;color:#7a8390;display:flex;gap:10px;margin-top:2px;letter-spacing:0.3px;">${parts.join(" · ")}</div>`;
      }
    }
    const actualStr = b.actual != null ? (Number.isInteger(b.actual) ? String(b.actual) : b.actual.toFixed(1)) : "—";
    const actualColor = b.actual == null ? "#d4dae3" : b.result === "hit" ? "#22c55e" : b.result === "miss" ? "#f87171" : "#fff";
    const oddsStr = b.odds > 0 ? `+${b.odds}` : b.odds;
    const statLbl = b.stat === "GAME_TOTAL" ? "TOTAL" : b.stat;
    const logo = logoFor(b.book);
    const logoEl = logo
      ? `<img src="${logo}" alt="${b.book}" style="width:14px;height:14px;border-radius:3px;object-fit:cover;vertical-align:middle;margin-right:4px;"/>`
      : "";
    // Status accent (left border color based on result)
    const accent = b.result==="hit"?"#22c55e":b.result==="miss"?"#f87171":b.result==="void"?"#f59e0b":"#552583";
    const bgTint = b.result==="pending" ? "#55258318" : "transparent";

    // Stat block helper — small label + bigger value
    const stat = (label, value, color="#fff") =>
      `<div style="display:flex;flex-direction:column;gap:1px;min-width:0;">
        <div style="font-size:9px;color:#d4dae3;letter-spacing:0.6px;font-weight:700;text-transform:uppercase;">${label}</div>
        <div style="font-size:13px;color:${color};font-weight:700;white-space:nowrap;">${value}</div>
      </div>`;

    return `<div class="bet-card" style="background:${bgTint};border:1px solid #1f2733;border-left:3px solid ${accent};border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;flex-direction:column;gap:10px;">
      <!-- Top row: player + bet headline + actions -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;">
          <div style="font-size:15px;font-weight:700;color:#fff;line-height:1.2;">
            ${b.player} <span style="color:#FDB927;font-weight:600;">${b.ou} ${b.line} ${statLbl}</span>
          </div>
          <div style="font-size:11px;color:#d4dae3;">${b.timestamp || b.date}${b.team?` · ${b.team}`:''}${b.stat==="GAME_TOTAL" && b.projSource ? ` · <span style="color:#FDB927;font-weight:700;letter-spacing:0.5px;">${b.projSource === "blended" ? "PLAYERBASED" : b.projSource.toUpperCase()}</span>` : ''}</div>
        </div>
        <div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;">
          ${b.result === "pending" ? `
            <button class="result-btn hit" onclick="setBetResult(${b.id},'hit')">HIT</button>
            <button class="result-btn miss" onclick="setBetResult(${b.id},'miss')">MISS</button>
            <button class="result-btn" onclick="setBetResult(${b.id},'void')" style="background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b55;">VOID</button>
            <button class="result-btn" onclick="gradeOneBet(${b.id})" style="background:#55258330;color:#FDB927;border:1px solid #55258377;" title="Auto grade via ESPN">AUTO</button>
          ` : `
            <span style="background:${accent}22;border:1px solid ${accent}55;color:${accent};border-radius:4px;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:0.5px;">${b.result.toUpperCase()}</span>
          `}
          <button onclick="copySingleBet(${b.id})" style="background:#55258330;border:1px solid #55258377;color:#FDB927;font-size:11px;font-weight:700;cursor:pointer;padding:3px 10px;border-radius:4px;font-family:'Inter',sans-serif;letter-spacing:0.4px;" title="Copy this bet">COPY</button>
          <button onclick="deleteBet(${b.id})" style="background:transparent;border:none;color:#525a64;font-size:16px;cursor:pointer;padding:0 4px;" title="Delete">✕</button>
        </div>
      </div>
      <!-- Bottom row: metric grid -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(75px, 1fr));gap:10px;">
        ${stat("Odds", oddsStr, "#fff")}
        ${isTotal && snapshotsRow
          ? `<div style="display:flex;flex-direction:column;gap:1px;min-width:0;grid-column:span 2;">
              <div style="font-size:9px;color:#d4dae3;letter-spacing:0.6px;font-weight:700;text-transform:uppercase;">Edge</div>
              <div style="font-size:13px;color:${edgeColor};font-weight:700;white-space:nowrap;">${edgeStr}</div>
              ${snapshotsRow}
            </div>`
          : stat("Edge", edgeStr, edgeColor)}
        ${stat("Proj", b.proj!=null?b.proj.toFixed(2):"—", "#FDB927")}
        ${stat("Actual", actualStr, actualColor)}
        ${stat("Stake", `${b.stake.toFixed(2)}u`, "#fff")}
        ${stat("P&L", plVal, plColor)}
        ${stat("Book", `${logoEl}${b.book||"—"}`, "#dde2e9")}
      </div>
    </div>`;
  }).join("");

  el.innerHTML = `
    <div id="tracker-controls">
      <span style="font-size:16px;font-weight:800;color:#fff;">${scopedBets.length} ${betKindFilter==='all'?'Bets':betKindFilter==='props'?'Props':'Totals'} Tracked</span>
      ${betKindFilter !== 'all' ? `<span style="font-size:10px;font-weight:700;color:#FDB927;background:#55258326;border:1px solid #55258355;border-radius:4px;padding:2px 8px;letter-spacing:0.5px;text-transform:uppercase;">${betKindFilter}</span>` : ''}
      <span style="font-size:11px;color:#22c55e;background:#22c55e15;border:1px solid #22c55e33;border-radius:4px;padding:2px 8px;">Auto-saved</span>
      <span style="color:#1f2733;font-size:12px;">|</span>
      <span style="font-size:13px;color:#d4dae3;">${pending.length} pending · ${settled.length} settled</span>
      <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
        <button onclick="openQuickGrade()" style="background:#552583;border:none;color:#0d1117;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">Quick Grade</button>
        <button onclick="copyOpenPlays()" style="background:#161b22;border:1px solid #552583;color:#FDB927;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Copy Props</button>
        <button onclick="copyOpenTotals()" style="background:#161b22;border:1px solid #552583;color:#FDB927;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Copy Totals</button>
        <button onclick="copyDailyRecapProps()" style="background:#161b22;border:1px solid #552583;color:#FDB927;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Props Recap</button>
        <button onclick="copyDailyRecapTotals()" style="background:#161b22;border:1px solid #552583;color:#FDB927;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Totals Recap</button>
        <button onclick="exportBets()" style="background:#161b22;border:1px solid #1f2733;color:#FDB927;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Backup</button>
        <button onclick="importBets()" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">Restore</button>
      </span>
    </div>

    <div class="overview-strip">
      <div class="overview-stat">
        <div class="os-label">Win Rate</div>
        <div class="os-val">${winRate}${winRate!=="—"?"%":""}</div>
        <div class="os-sub">${hits.length}W · ${misses.length}L</div>
      </div>
      <div class="overview-stat">
        <div class="os-label">Net P&L</div>
        <div class="os-val" style="color:${netPL>=0?'#22c55e':'#f87171'}">${netPL>=0?"+":""}${netPL.toFixed(2)}u</div>
        <div class="os-sub">${settled.length} settled</div>
      </div>
      <div class="overview-stat">
        <div class="os-label">ROI</div>
        <div class="os-val" style="color:${Number(roi)>=0?'#FDB927':'#f87171'}">${roi}${roi!=="—"?"%":""}</div>
        <div class="os-sub">${totalStaked.toFixed(2)}u staked</div>
      </div>
      <div class="overview-stat clickable ${openOnly?'active':''}" onclick="setOpenOnly(${openOnly?'false':'true'})" title="${openOnly?'Show all bets':'Filter to open bets only'}">
        <div class="os-label">Pending</div>
        <div class="os-val" style="color:${pending.length>0?'#FDB927':'#fff'};${pending.length>0?'text-shadow:0 0 12px rgba(253,185,39,0.5);':''}">${pending.length}</div>
        <div class="os-sub" style="color:${openOnly?'#FDB927':'#d4dae3'};">${openOnly?'✓ filtered':'click to filter'}</div>
      </div>
    </div>

    <div class="tracker-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1f2733;flex-wrap:wrap;gap:8px;">
        <h4 style="margin:0;padding:0;border:none;">${openOnly ? `Open ${betKindFilter==='all'?'Bets':betKindFilter==='props'?'Props':'Totals'} (${pending.length})` : `${betKindFilter==='all'?'Bet History':betKindFilter==='props'?'Props History':'Totals History'}`}</h4>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="bet-search" placeholder="${openOnly ? 'Search open...' : 'Search all bets...'}" value="${search.replace(/"/g,'&quot;')}" oninput="filterBetRows(this.value)" autocomplete="off" spellcheck="false"
            style="background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:6px 12px;font-size:12px;color:#e2e8f0;outline:none;width:160px;font-family:'Inter',sans-serif;"/>
          <div style="display:inline-flex;background:#161b22;border:1px solid #1f2733;border-radius:6px;padding:2px;gap:2px;">
            ${["all","props","totals"].map(k => {
              const active = betKindFilter === k;
              return `<button onclick="setBetKindFilter('${k}')" style="background:${active?'#552583':'transparent'};border:none;color:${active?'#0d1117':'#d4dae3'};border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;">${k.toUpperCase()}</button>`;
            }).join("")}
          </div>
          <button onclick="toggleOpenOnly()" style="background:${openOnly?'#55258330':'#161b22'};border:1px solid ${openOnly?'#552583':'#1f2733'};color:${openOnly?'#FDB927':'#d4dae3'};border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;">${openOnly?'✓ OPEN ONLY':'OPEN ONLY'}</button>
        </div>
      </div>
      ${filtered.length === 0 ? '<p style="color:#525a64;font-size:13px;padding:20px 0;text-align:center;">'+(search?"No bets match search.":openOnly?"No open bets.":"No bets yet. Hit TRACK on any player.")+'</p>' : `
        <div id="bet-table-body">${betRows}</div>`}
    </div>

    <div class="tracker-section">
      <h4 style="font-size:11px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;border:none;padding-bottom:0;margin-bottom:8px;">Over / Under</h4>
      <div class="overview-strip">${card("Over", ouBreak.over)}${card("Under", ouBreak.under)}</div>
    </div>

// Sums blended player projections per team to produce projected team/game totals.
// Slate is determined entirely from the Betstamp paste — no external API.

let betstampGames = []; // ordered: [{awayAbbr, homeAbbr, awayName, homeName, time, books:[...]}]

// Map source team abbrs to canonical (Roto/Saber/RotoWire vs Betstamp use slight variants)
const ESPN_TO_PROJ = {
  "ATL":"ATL","CHI":"CHI","CON":"CON","DAL":"DAL",
  "GS":"GSV","GSV":"GSV","IND":"IND",
  "LV":"LVA","LVA":"LVA","LAV":"LVA",
  "LA":"LAS","LAS":"LAS",
  "MIN":"MIN","NY":"NYL","NYL":"NYL",
  "PHX":"PHX","PHO":"PHX",
  "SEA":"SEA","TOR":"TOR","WAS":"WAS","WSH":"WAS","POR":"POR"
};
function normTeamAbbr(abbr) {
  if (!abbr) return "";
  const u = abbr.toUpperCase().trim();
  return ESPN_TO_PROJ[u] || u;
}

const TEAM_NAME_ALIASES = {
  "atlanta dream":"ATL","chicago sky":"CHI","connecticut sun":"CON",
  "dallas wings":"DAL","golden state valkyries":"GSV","indiana fever":"IND",
  "las vegas aces":"LVA","los angeles sparks":"LAS","minnesota lynx":"MIN",
  "new york liberty":"NYL","phoenix mercury":"PHX","seattle storm":"SEA",
  "toronto tempo":"TOR","washington mystics":"WAS","portland fire":"POR",
  "atlanta":"ATL","chicago":"CHI","connecticut":"CON","dallas":"DAL",
  "golden state":"GSV","valkyries":"GSV","indiana":"IND","fever":"IND",
  "las vegas":"LVA","aces":"LVA","los angeles":"LAS","sparks":"LAS",
  "minnesota":"MIN","lynx":"MIN","new york":"NYL","liberty":"NYL",
  "phoenix":"PHX","mercury":"PHX","seattle":"SEA","storm":"SEA",
  "toronto":"TOR","tempo":"TOR","washington":"WAS","mystics":"WAS",
  "portland":"POR","fire":"POR"
};
function teamLineToAbbr(line) {
  if (!line) return null;
  const cleaned = line.toLowerCase().replace(/^@\s*/,"").replace(/[^a-z\s]/g,"").trim();
  if (TEAM_NAME_ALIASES[cleaned]) return TEAM_NAME_ALIASES[cleaned];
  for (const k of Object.keys(TEAM_NAME_ALIASES)) {
    if (cleaned.includes(k)) return TEAM_NAME_ALIASES[k];
  }
  const u = cleaned.toUpperCase().replace(/\s/g,"");
  if (u.length >= 2 && u.length <= 4) return normTeamAbbr(u);
  return null;
}

const BOOK_ALIASES = {
  
  "fd":"FanDuel","fanduel":"FanDuel",
  "pb":"Prop Builder","propbuilder":"Prop Builder",
  "pin":"Pinnacle","pinnacle":"Pinnacle",
  "bet105":"Bet105","105":"Bet105",
  "novig":"Novig","nv":"Novig",
  "prophetx":"ProphetX","prophet":"ProphetX","px":"ProphetX",
  "bookmaker":"Bookmaker","bm":"Bookmaker",
  "fliff":"Fliff",
  "onyx":"DK (Courtside/Onyx)","courtside":"DK (Courtside/Onyx)","courtsideonyx":"DK (Courtside/Onyx)","dk":"DK (Courtside/Onyx)","draftkings":"DK (Courtside/Onyx)"
};
function normBook(s) {
  if (!s) return null;
  const k = s.toLowerCase().replace(/[^a-z0-9]/g,"");
  return BOOK_ALIASES[k] || (k.length >= 2 ? s.trim() : null);
}

// Build team projection by summing blended PTS from merged.
// Returns both:
//   total: union total (sum of every player projected by any source, blended avg)
//   bySource: { roto: 170.7, saber: 168.2, rotowire: 172.6 } — each source's standalone team total
//   sourceAvg: mean of all available source standalone totals (apples-to-apples)
function buildTeamProjection(teamAbbr) {
  if (!merged) return null;
  const target = normTeamAbbr(teamAbbr);
  const teamPlayers = merged.filter(r => normTeamAbbr(r.team) === target && r.found > 0 && r.con.pts != null);
  if (!teamPlayers.length) return null;
  let total = 0;
  const sourceTotals = {};
  SOURCES.forEach(s => sourceTotals[s.key] = { sum: 0, count: 0 });
  const lookups = getSlotLookups();
  const byPlayer = teamPlayers.map(r => {
    total += r.con.pts;
    SOURCES.forEach((s,i) => {
      const lk = lookups[i];
      if (!lk) return;
      const m = lk[r.norm];
      if (m && m.pts != null) {
        sourceTotals[s.key].sum += m.pts;
        sourceTotals[s.key].count++;
      }
    });
    return { name: r.rawName, pts: r.con.pts };
  }).sort((a,b) => b.pts - a.pts);
  return { total, byPlayer, sourceTotals };
}

// ── BETSTAMP "BEST AVAILABLE" PARSER (plain-text format from app) ──────────
// Block structure when copying from the Betstamp web app (rendered text):
//   "WNBA"          ← sport header (may not appear at top, but appears between games)
//   "1:00pm"        ← time
//   "DAL"           ← away abbrev
//   "Dallas Wings"  ← away full name
//   "33%"           ← away win%
//   "IND"           ← home abbrev
//   "Indiana Fever" ← home full name
//   "67%"           ← home win%
//   "+200"          ← away ML       [bare odds, no space]
//   "DraftKings"    ← book
//   "+5.5 -106"     ← spread        [HAS space — skip]
//   "FanDuel"       ← book
//   "o177.5 -108"   ← OVER total    ← keep
//   "Pinnacle"      ← book
//   "-223"          ← home ML
//   ...
//   "u177.5 -110"   ← UNDER total   ← keep
//   "DraftKings"    ← book
//   ... fulltime/1H market group repeats below ...
function parseBetstamp(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const games = [];
  const timeRe = /^\d{1,2}:\d{2}(am|pm)$/i;
  const pctRe = /^\d+%$/;
  const overTotalRe = /^o([\d.]+)\s+([+\-]\d{2,4})$/i;
  const underTotalRe = /^u([\d.]+)\s+([+\-]\d{2,4})$/i;
  const bareOddsRe = /^[+\-]\d{2,4}$/; // ML (no space)
  const spreadRe = /^[+\-][\d.]+\s+[+\-]\d{2,4}$/; // spread with space (skip)

  // Skip header noise from Betstamp web layout (logos, navigation, my-picks)
  const skipLineRe = /^(All Leagues|Best Available|Last Refresh|Sat |Sun |Mon |Tue |Wed |Thu |Fri |betstamp|Games|Odds Comparison|Futures|My Picks|Accounting|Analysis|Find Bettors|Sportsbooks|Help|stacktheunits|SINGLES|PARLAY|Track|Your bet|Add Bet|\$0)/i;

  // Walk lines looking for time anchors. For each time, expect away/home blocks then odds.
  let i = 0;
  while (i < lines.length) {
    if (skipLineRe.test(lines[i])) { i++; continue; }
    if (!timeRe.test(lines[i])) { i++; continue; }
    const time = lines[i];
    i++;

    // Skip optional "WNBA" sport header right after time, if present
    if (lines[i] && /^(WNBA|NBA|NHL|NFL|MLB)$/i.test(lines[i])) i++;

    // Capture away abbrev / full / pct
    const awayAbbr = lines[i]; i++;
    const awayFull = lines[i]; i++;
    if (!pctRe.test(lines[i] || "")) {
      // Structure didn't match; reset and continue searching
      continue;
    }
    i++; // skip pct

    // Capture home abbrev / full / pct
    const homeAbbr = lines[i]; i++;
    const homeFull = lines[i]; i++;
    if (!pctRe.test(lines[i] || "")) continue;
    i++;

    // Now scan odds rows until next time anchor or end. Capture o<line> and u<line>.
    const overEntries = []; // [{line, odds, book}]
    const underEntries = [];
    let j = i;
    while (j < lines.length) {
      const ln = lines[j];
      if (timeRe.test(ln)) break;
      if (skipLineRe.test(ln)) { j++; continue; }

      const oM = ln.match(overTotalRe);
      const uM = ln.match(underTotalRe);
      if (oM) {
        // Next non-skip line is the book
        let k = j + 1;
        while (k < lines.length && skipLineRe.test(lines[k])) k++;
        const book = (k < lines.length) ? lines[k] : null;
        overEntries.push({ line: parseFloat(oM[1]), odds: parseInt(oM[2]), book: normBook(book) });
        j = k + 1;
        continue;
      }
      if (uM) {
        let k = j + 1;
        while (k < lines.length && skipLineRe.test(lines[k])) k++;
        const book = (k < lines.length) ? lines[k] : null;
        underEntries.push({ line: parseFloat(uM[1]), odds: parseInt(uM[2]), book: normBook(book) });
        j = k + 1;
        continue;
      }
      j++;
    }

    // The Betstamp page repeats fulltime block twice when toggle = "Best Available Fulltime"
    // and shows fulltime + 1H when toggle = "Best Available 1st Half".
    // We pick the FIRST over and FIRST under, since first appearance is fulltime.
    const firstOver = overEntries[0];
    const firstUnder = underEntries[0];

    const aA = teamLineToAbbr(awayFull) || normTeamAbbr(awayAbbr);
    const hA = teamLineToAbbr(homeFull) || normTeamAbbr(homeAbbr);
    if (!aA || !hA) { i = j; continue; }

    const books = [];
    if (firstOver) books.push({ book: firstOver.book, line: firstOver.line, overOdds: firstOver.odds, underOdds: null, side: "over" });
    if (firstUnder) books.push({ book: firstUnder.book, line: firstUnder.line, overOdds: null, underOdds: firstUnder.odds, side: "under" });

    games.push({ awayAbbr: aA, homeAbbr: hA, awayName: awayFull, homeName: homeFull, time, books });
    i = j;
  }

  return games;
}

// EV using normal approx around projected total
function americanEvRough(odds, projTotal, line, side) {
  const stdev = totalsSigma();
  const z = (line - projTotal) / stdev;
  const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
  const pOver = 1 - pUnder;
  const winProb = side === "over" ? pOver : pUnder;
  const dec = oddsToDecimal(odds);
  if (!dec) return null;
  return ((winProb * dec) - 1) * 100;
}
function erf(x) {
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign = x < 0 ? -1 : 1; x = Math.abs(x);
  const t = 1.0 / (1.0 + p * x);
  const y = 1.0 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
  return sign * y;
}

function renderTotals() {
  const el = document.getElementById("totals-tab");
  const noProjections = !merged;
  const noGames = betstampGames.length === 0;

  // Build a set of tracked-totals signatures so we can show ✓ TRACKED on rows
  // that already have a logged bet. Signature: "AWAY/HOME|side|line|book"
  // Only counts pending or unsettled bets (settled bets shouldn't keep the row "tracked").
  const trackedTotalsSig = new Set();
  bets.forEach(b => {
    if (b.stat !== "GAME_TOTAL") return;
    if (b.result !== "pending") return;
    // b.team was stored as "AWAY/HOME" by trackTotal()
    const sig = `${b.team}|${b.ou}|${b.line}|${b.book}`;
    trackedTotalsSig.add(sig);
  });

  const cards = betstampGames.map(g => {
    const away = buildTeamProjection(g.awayAbbr);
    const home = buildTeamProjection(g.homeAbbr);

    // Projected total = AVG of each source's standalone game total.
    let blendedTotal = null;
    const perSourceGameTotal = {};
    if (away && home) {
      const totals = [];
      SOURCES.forEach(s => {
        const a = away.sourceTotals[s.key];
        const h = home.sourceTotals[s.key];
        const sum = a.sum + h.sum;
        const players = a.count + h.count;
        if (players > 0) {
          perSourceGameTotal[s.key] = sum;
          totals.push(sum);
        }
      });
      if (totals.length) blendedTotal = totals.reduce((x,y)=>x+y,0) / totals.length;
    }

    // Card key & per-card season override (auto | 2025 | 2026 | blend)
    const cardKey = `${g.awayAbbr}_${g.homeAbbr}`;
    window._cardSeason = window._cardSeason || {};
    const cardSeason = window._cardSeason[cardKey] || "auto";
    const seasonArg = cardSeason === "auto" ? undefined : cardSeason;

    // Pace × Eff independent total (from team-level advanced stats, with optional season override)
    const indepInfo = independentTotal(g.awayAbbr, g.homeAbbr, seasonArg);
    const paceEffTotal = indepInfo ? indepInfo.total : null;

    // Active projection source for this game card. Persists per-game in window state.
    // Default order of preference: 'both' if both exist, else whichever is available
    window._cardProjSource = window._cardProjSource || {};
    if (!window._cardProjSource[cardKey]) {
      if (blendedTotal != null && paceEffTotal != null) window._cardProjSource[cardKey] = "both";
      else if (blendedTotal != null) window._cardProjSource[cardKey] = "blended";
      else if (paceEffTotal != null) window._cardProjSource[cardKey] = "paceeff";
    }
    const projSource = window._cardProjSource[cardKey];

    // Resolve projTotal based on active source
    let projTotal = null;
    if (projSource === "blended") projTotal = blendedTotal;
    else if (projSource === "paceeff") projTotal = paceEffTotal;
    else if (projSource === "both" && blendedTotal != null && paceEffTotal != null) {
      projTotal = (blendedTotal + paceEffTotal) / 2;
    }

    // Dominant book line — used for side-agreement check below + Total Probability display
    let dominantLine = null;
    if (g.books && g.books.length) {
      const lineCount = {};
      g.books.forEach(b => { lineCount[b.line] = (lineCount[b.line] || 0) + 1; });
      dominantLine = Object.entries(lineCount).sort((a,b) => b[1] - a[1])[0][0];
      dominantLine = parseFloat(dominantLine);
    }

    // Agreement signal: do both models point to the SAME SIDE of the line?
    // (Not "are the totals close" — that's the wrong question.)
    // If both > line → both say OVER. If both < line → both say UNDER. Agree.
    // If one is over and one is under → disagree.
    let agreement = null;
    if (blendedTotal != null && paceEffTotal != null && dominantLine != null) {
      const blendSide = blendedTotal > dominantLine ? "over" : "under";
      const peSide = paceEffTotal > dominantLine ? "over" : "under";
      const sameSide = blendSide === peSide;
      const diff = blendedTotal - paceEffTotal;
      agreement = {
        diff,
        agree: sameSide,
        side: sameSide ? blendSide.toUpperCase() : null
      };
    } else if (blendedTotal != null && paceEffTotal != null) {
      // No book line yet — fall back to "are totals close" check
      agreement = { diff: blendedTotal - paceEffTotal, agree: Math.abs(blendedTotal - paceEffTotal) <= 5, side: null };
    }

    const sourceBreakdown = (away && home) ? SOURCES.map(s => {
      const t = perSourceGameTotal[s.key];
      return t != null ? `<span style="color:${s.color};font-weight:600">${s.label} ${t.toFixed(1)}</span>` : null;
    }).filter(Boolean).join(" · ") : "";

    const enrichedBooks = g.books.map(b => {
      let edge = null, winProb = null;
      if (projTotal != null) {
        const odds = b.side === "over" ? b.overOdds : b.underOdds;
        // Edge in points
        edge = b.side === "over" ? (projTotal - b.line) : (b.line - projTotal);
        // Model win probability using normal approx
        const stdev = totalsSigma();
        const z = (b.line - projTotal) / stdev;
        const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
        const pOver = 1 - pUnder;
        winProb = b.side === "over" ? pOver : pUnder;
      }
      return { ...b, edge, winProb };
    });

    // Best of each side (by point-edge)
    const bestOver = enrichedBooks.filter(b => b.side === "over" && b.edge != null).sort((a,b)=>b.edge-a.edge)[0];
    const bestUnder = enrichedBooks.filter(b => b.side === "under" && b.edge != null).sort((a,b)=>b.edge-a.edge)[0];

    // Dominant book line was computed above (for agreement check)
    const probsFor = (total) => {
      if (total == null || dominantLine == null) return null;
      const z = (dominantLine - total) / totalsSigma();
      const pUnder = 0.5 * (1 + erf(z / Math.SQRT2));
      return { pOver: 1 - pUnder, pUnder };
    };
    const bothTotal = (blendedTotal != null && paceEffTotal != null) ? (blendedTotal + paceEffTotal) / 2 : null;

    const bookRows = enrichedBooks.length
      ? enrichedBooks.map(b => {
          const odds = b.side === "over" ? b.overOdds : b.underOdds;
          const sideLbl = b.side === "over" ? "OVER" : "UNDER";
          const sideColor = b.side === "over" ? "#22c55e" : "#f87171";
          const edgeColor = b.edge == null ? "#d4dae3" : b.edge > 0 ? "#22c55e" : b.edge < 0 ? "#f87171" : "#fff";
          // Win % color: bright green ≥ 60%, teal 50-60%, white 45-50%, red < 45%
          const wpPct = b.winProb != null ? b.winProb * 100 : null;
          const wpColor = wpPct == null ? "#d4dae3"
            : wpPct >= 60 ? "#22c55e"
            : wpPct >= 50 ? "#FDB927"
            : wpPct >= 45 ? "#fff"
            : "#f87171";
          const projForTrack = projTotal != null ? projTotal.toFixed(2) : "null";
          const bookSafe = (b.book||"").replace(/'/g,"\\'");
          return `<tr>
            <td style="padding:6px 10px;color:#e2e8f0;font-weight:600">${b.book||""}</td>
            <td style="padding:6px 10px;text-align:center;color:${sideColor};font-weight:700">${sideLbl} ${b.line}</td>
            <td style="padding:6px 10px;text-align:center;color:#fff">${odds!=null?(odds>0?'+':'')+odds:'—'}</td>
            <td style="padding:6px 10px;text-align:center;color:${edgeColor};font-weight:700">${b.edge!=null?(b.edge>0?'+':'')+b.edge.toFixed(1):'—'}</td>
            <td style="padding:6px 10px;text-align:center;color:${wpColor};font-weight:700">${wpPct!=null?wpPct.toFixed(1)+'%':'—'}</td>
            <td style="padding:6px 10px;text-align:center">${(() => {
              const sig = `${g.awayAbbr}/${g.homeAbbr}|${b.side}|${b.line}|${(b.book||"").replace(/\\'/g,"'")}`;
              const isTracked = trackedTotalsSig.has(sig);
              if (isTracked) {
                return `<span style="background:#22c55e22;border:1px solid #22c55e55;color:#22c55e;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:0.3px;font-family:'Inter',sans-serif;">✓ TRACKED</span>`;
              }
              return `<button onclick='trackTotal(${JSON.stringify({
                awayAbbr: g.awayAbbr,
                homeAbbr: g.homeAbbr,
                side: b.side,
                line: b.line,
                odds,
                book: bookSafe.replace(/\\'/g, "'"),
                projTotal,
                projSource,
                snapshots: {
                  blended: blendedTotal != null && probsFor(blendedTotal) ? { total: blendedTotal, winProb: b.side === "over" ? probsFor(blendedTotal).pOver : probsFor(blendedTotal).pUnder } : null,
                  paceeff: paceEffTotal != null && probsFor(paceEffTotal) ? { total: paceEffTotal, winProb: b.side === "over" ? probsFor(paceEffTotal).pOver : probsFor(paceEffTotal).pUnder } : null,
                  both: bothTotal != null && probsFor(bothTotal) ? { total: bothTotal, winProb: b.side === "over" ? probsFor(bothTotal).pOver : probsFor(bothTotal).pUnder } : null
                }
              }).replace(/'/g, "\\'")})' style="background:#55258330;border:1px solid #55258377;color:#FDB927;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">TRACK</button>`;
            })()}</td>
          </tr>`;
        }).join("")
      : `<tr><td colspan="6" style="padding:12px;color:#525a64;text-align:center;font-size:12px">No prices parsed</td></tr>`;

    let bestSummary = "";
    if (projTotal != null) {
      const parts = [];
      if (bestOver && bestOver.edge != null && bestOver.edge > 0) {
        parts.push(`<span style="color:#22c55e;font-weight:700">OVER ${bestOver.line} @ ${bestOver.overOdds>0?'+':''}${bestOver.overOdds} ${bestOver.book}</span> <span style="color:#FDB927">+${bestOver.edge.toFixed(1)} edge</span>`);
      }
      if (bestUnder && bestUnder.edge != null && bestUnder.edge > 0) {
        parts.push(`<span style="color:#f87171;font-weight:700">UNDER ${bestUnder.line} @ ${bestUnder.underOdds>0?'+':''}${bestUnder.underOdds} ${bestUnder.book}</span> <span style="color:#FDB927">+${bestUnder.edge.toFixed(1)} edge</span>`);
      }
      if (parts.length) bestSummary = `<div style="margin-top:10px;padding:10px 12px;background:#0e2926;border:1px solid #55258355;border-radius:6px;font-size:13px;">${parts.join(" &nbsp;|&nbsp; ")}</div>`;
    }

    // Build the right-side display: picker + selected total + comparison
    const fmtTotal = (v, color="#fff", glow=false) => v != null
      ? `<span style="color:${color};font-weight:700;${glow?'text-shadow:0 0 16px rgba(253,185,39,0.6);':''}">${v.toFixed(1)}</span>`
      : `<span style="color:#525a64;">—</span>`;

    // Per-source pills (clickable to switch)
    const pillStyle = (active, disabled) => `
      background:${active?'#552583':disabled?'transparent':'#161b22'};
      border:1px solid ${active?'#552583':disabled?'#1f2733':'#1f2733'};
      color:${active?'#0d1117':disabled?'#525a64':'#d4dae3'};
      border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;
      cursor:${disabled?'not-allowed':'pointer'};font-family:'Inter',sans-serif;letter-spacing:0.5px;
      opacity:${disabled?'0.5':'1'};
    `;

    const blendedDisabled = blendedTotal == null;
    const paceEffDisabled = paceEffTotal == null;
    const bothDisabled = blendedDisabled || paceEffDisabled;

    const fallbackBadge = (indepInfo && indepInfo.usedFallback)
      ? `<span style="font-size:9px;color:#f59e0b;font-weight:700;letter-spacing:0.5px;margin-left:4px;" title="${g.awayAbbr}: ${indepInfo.aSource} · ${g.homeAbbr}: ${indepInfo.bSource}">⚠ FALLBACK</span>`
      : "";

    // Source-year badge — tells you whether P×E is using 2025, 2026, or blend
    const sourceYearBadge = (() => {
      if (!indepInfo) return "";
      const a = indepInfo.aSource || "", b = indepInfo.bSource || "";
      // Both teams from the same source → single label
      if (a === b && a) {
        const color = a === "2025" ? "#8b5cf6" : a === "2026" ? "#FDB927" : a.startsWith("blend") ? "#f59e0b" : "#a8b0bb";
        return `<span style="font-size:9px;color:${color};font-weight:700;letter-spacing:0.5px;margin-left:4px;">${a.toUpperCase()}</span>`;
      }
      // Different sources per team
      return `<span style="font-size:9px;color:#a8b0bb;font-weight:700;letter-spacing:0.5px;margin-left:4px;" title="${g.awayAbbr}: ${a} · ${g.homeAbbr}: ${b}">MIXED</span>`;
    })();

    // Calculate models for all three projections (so we can render them)
    const modelData = [
      { key: "blended",  label: "PlayerBased", total: blendedTotal,  probs: probsFor(blendedTotal),  meta: "" },
      { key: "paceeff",  label: "Pace × Eff",  total: paceEffTotal,   probs: probsFor(paceEffTotal),  meta: sourceYearBadge ? "" : "" },
      { key: "both",     label: "Combined",    total: bothTotal,      probs: probsFor(bothTotal),     meta: "" }
    ];

    const agreementBadge = agreement
      ? (() => {
          if (agreement.agree && agreement.side) {
            return `<span style="font-size:10px;font-weight:700;color:#22c55e;margin-left:6px;">✓ AGREE · ${agreement.side}</span>`;
          }
          if (agreement.agree) {
            return `<span style="font-size:10px;font-weight:700;color:#22c55e;margin-left:6px;">✓ AGREE</span>`;
          }
          return `<span style="font-size:10px;font-weight:700;color:#f59e0b;margin-left:6px;">⚠ SPLIT · ${agreement.diff>=0?'+':''}${agreement.diff.toFixed(1)}</span>`;
        })()
      : "";

    const modelCard = (m) => {
      const isActive = m.key === projSource;
      const accent = isActive ? "#552583" : "#1f2733";
      const labelColor = isActive ? "#FDB927" : "#a8b0bb";
      const totalDisplay = m.total != null ? m.total.toFixed(1) : "—";
      const totalColor = m.total != null ? (isActive ? "#FDB927" : "#fff") : "#525a64";
      const probsLine = m.probs && dominantLine != null
        ? (() => {
            const oC = m.probs.pOver >= 0.6 ? "#22c55e" : m.probs.pOver >= 0.5 ? "#FDB927" : "#d4dae3";
            const uC = m.probs.pUnder >= 0.6 ? "#22c55e" : m.probs.pUnder >= 0.5 ? "#FDB927" : "#d4dae3";
            return `<div style="display:flex;justify-content:space-between;gap:10px;font-size:11px;font-weight:700;margin-top:4px;">
              <span style="color:${oC};">O ${(m.probs.pOver*100).toFixed(1)}%</span>
              <span style="color:${uC};">U ${(m.probs.pUnder*100).toFixed(1)}%</span>
            </div>`;
          })()
        : `<div style="font-size:10px;color:#525a64;margin-top:4px;text-align:center;">no data</div>`;
      const extraBadge = m.key === "paceeff" ? sourceYearBadge : "";

      // Season toggle — only on Pace × Eff card. 4 buttons: AUTO / 2025 / 2026 / BLEND.
      let seasonPicker = "";
      if (m.key === "paceeff") {
        const has25 = Object.keys(teamStats2025).length > 0;
        const has26 = Object.keys(teamStats2026).length > 0;
        const seasonBtn = (val, label, enabled) => {
          const on = cardSeason === val;
          return `<button onclick="event.stopPropagation();setCardSeason('${cardKey}','${val}')" ${enabled?'':'disabled'} style="flex:1;background:${on?'#552583':'#0d1117'};border:1px solid ${on?'#552583':'#1f2733'};color:${on?'#0d1117':enabled?'#d4dae3':'#525a64'};border-radius:3px;padding:2px 4px;font-size:8px;font-weight:700;letter-spacing:0.3px;cursor:${enabled?'pointer':'not-allowed'};font-family:'Inter',sans-serif;opacity:${enabled?'1':'0.5'};">${label}</button>`;
        };
        seasonPicker = `
          <div style="display:flex;gap:2px;margin-top:5px;" onclick="event.stopPropagation();">
            ${seasonBtn("auto", "AUTO", has25 && has26)}
            ${seasonBtn("2025", "'25", has25)}
            ${seasonBtn("2026", "'26", has26)}
            ${seasonBtn("blend", "50/50", has25 && has26)}
          </div>`;
      }

      return `<div onclick="${m.total!=null?`setCardProjSource('${cardKey}','${m.key}')`:''}" style="flex:1;background:#0d1117;border:1.5px solid ${accent};border-radius:6px;padding:8px 10px;cursor:${m.total!=null?'pointer':'default'};transition:border-color 0.15s;min-width:120px;">
        <div style="font-size:9px;color:${labelColor};letter-spacing:0.5px;text-transform:uppercase;font-weight:700;margin-bottom:2px;">${m.label}${isActive?' ●':''}</div>
        <div style="font-size:18px;color:${totalColor};font-weight:800;">${totalDisplay}${extraBadge}</div>
        ${probsLine}
        ${seasonPicker}
      </div>`;
    };

    const rightPanel = `
      <div style="min-width:420px;flex:1;max-width:560px;">
        ${projTotal != null
          ? `<div style="text-align:right;margin-bottom:8px;">
              <span style="font-size:28px;font-weight:800;color:#FDB927;text-shadow:0 0 16px rgba(253,185,39,0.6);">${projTotal.toFixed(1)}</span>
              <span style="font-size:10px;color:#d4dae3;margin-left:6px;letter-spacing:0.8px;">ACTIVE · ${projSource === "blended" ? "PLAYERBASED" : projSource.toUpperCase()}</span>
              ${agreementBadge}
              ${dominantLine != null ? `<div style="font-size:9px;color:#a8b0bb;margin-top:2px;">Probabilities vs book line ${dominantLine}</div>` : ""}
            </div>`
          : `<div style="font-size:13px;color:#f87171;padding:8px 0;text-align:right;">No projection available</div>`
        }
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${modelCard(modelData[0])}
          ${modelCard(modelData[1])}
          ${modelCard(modelData[2])}
        </div>
      </div>`;

    const teamLine = (t, abbr) => t
      ? `<div><span style="font-weight:700;color:#fff">${abbr}</span> <span style="color:#FDB927;font-weight:700;font-size:18px;text-shadow:0 0 10px rgba(253,185,39,0.5);">${t.total.toFixed(1)}</span></div>`
      : `<div><span style="font-weight:700;color:#fff">${abbr}</span> <span style="color:#525a64">no proj</span></div>`;

    return `
      <div style="background:#161b22;border:1px solid #1f2733;border-radius:10px;padding:18px 20px;margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:12px;">
          <div>
            <div style="font-size:16px;font-weight:800;color:#fff;">${g.awayAbbr} <span style="color:#d4dae3;font-weight:500">@</span> ${g.homeAbbr}</div>
            <div style="font-size:12px;color:#d4dae3;margin-top:2px">${g.awayName} at ${g.homeName} · ${g.time}</div>
          </div>
          ${rightPanel}
        </div>
        <div style="display:flex;gap:24px;margin-bottom:8px;font-size:14px;">
          ${teamLine(away, g.awayAbbr)}
          ${teamLine(home, g.homeAbbr)}
        </div>
        ${sourceBreakdown ? `<div style="font-size:11px;margin-bottom:14px;color:#d4dae3">By source: ${sourceBreakdown}</div>` : ""}
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <thead>
            <tr style="background:#0d1117;">
              <th style="padding:6px 10px;text-align:left;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600">Book</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600">Line</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600">Odds</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600" title="Points difference: model proj minus line">Edge</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600" title="Model probability this side hits at this line">Win %</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:600"></th>
            </tr>
          </thead>
          <tbody>${bookRows}</tbody>
        </table>
        ${bestSummary}
      </div>`;
  }).join("");

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
      <div>
        <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;">Totals Model</div>
        <div style="font-size:13px;color:#d4dae3;">Per-card pick: Blend (RG/Saber/RW) or Pace × Eff · σ=14</div>
      </div>
    </div>

    ${noProjections && Object.keys(teamStats2025).length === 0 && Object.keys(teamStats2026).length === 0
      ? `<div style="padding:18px;background:#161b22;border:1px solid #1f2733;border-radius:8px;color:#f87171;font-size:13px;margin-bottom:16px;">Load player projections (Upload tab) OR paste team advanced stats below to enable totals analysis.</div>`
      : noProjections
        ? `<div style="padding:14px;background:#161b22;border:1px solid #1f2733;border-radius:8px;color:#f59e0b;font-size:12px;margin-bottom:16px;">No player projections loaded · running on Pace × Eff only. Cards default to P×E for matchups where team stats exist.</div>`
        : ""}

    <div style="background:#161b22;border:1px solid #1f2733;border-radius:8px;padding:14px;margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:700;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;">Betstamp Paste — Best Available Fulltime</div>
        <div style="display:flex;gap:8px;">
          <button onclick="pasteBetstamp()" style="background:#552583;border:none;color:#0d1117;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">PARSE</button>
          <button onclick="clearBetstamp()" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
        </div>
      </div>
      <textarea id="betstamp-paste" placeholder="Copy the Betstamp WNBA Best Available page and paste here..." spellcheck="false"
        style="width:100%;min-height:80px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:10px 12px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:12px;outline:none;resize:vertical;"></textarea>
      ${noGames ? `<div style="font-size:11px;color:#525a64;margin-top:8px;">Paste the Betstamp slate above to load games.</div>` : `<div style="font-size:11px;color:#FDB927;margin-top:8px;">${betstampGames.length} games loaded</div>`}
    </div>

    <div style="background:#161b22;border:1px solid #1f2733;border-radius:8px;padding:14px;margin-bottom:18px;">
      <div style="margin-bottom:10px;">
        <div style="font-size:13px;font-weight:700;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;">Team Advanced Stats — Pace × Efficiency Model</div>
        <div style="font-size:11px;color:#a8b0bb;margin-top:2px;">Paste from stats.wnba.com/teams/advanced. 2025 = stable prior · 2026 = current season (blended ${PRIOR_WEIGHT_GAMES}-game weighting). Expansion teams (POR, TOR) need 2026 paste to compute.</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;color:#a8b0bb;font-weight:700;letter-spacing:0.5px;">2025 (PRIOR)</span>
            <div style="display:flex;gap:4px;">
              <button onclick="importTeamStats('2025')" style="background:#552583;border:none;color:#0d1117;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">IMPORT</button>
              <button onclick="clearTeamStats('2025')" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
            </div>
          </div>
          <textarea id="team-stats-paste-2025" placeholder="Paste 2025 advanced team stats table..." spellcheck="false"
            style="width:100%;min-height:60px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:11px;outline:none;resize:vertical;"></textarea>
          <div style="font-size:10px;color:${Object.keys(teamStats2025).length===0?'#525a64':'#FDB927'};margin-top:4px;">${Object.keys(teamStats2025).length} teams loaded${Object.keys(teamStats2025).length>0 ? ` · updated ${formatStatsUpdatedAt(teamStats2025UpdatedAt)}` : ''}</div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <span style="font-size:11px;color:#a8b0bb;font-weight:700;letter-spacing:0.5px;">2026 (CURRENT)</span>
            <div style="display:flex;gap:4px;">
              <button onclick="importTeamStats('2026')" style="background:#552583;border:none;color:#0d1117;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">IMPORT</button>
              <button onclick="clearTeamStats('2026')" style="background:#161b22;border:1px solid #1f2733;color:#d4dae3;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">CLEAR</button>
            </div>
          </div>
          <textarea id="team-stats-paste-2026" placeholder="Paste 2026 advanced team stats table..." spellcheck="false"
            style="width:100%;min-height:60px;background:#0d1117;border:1px solid #1f2733;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-family:'JetBrains Mono','Menlo',monospace;font-size:11px;outline:none;resize:vertical;"></textarea>
          <div style="font-size:10px;color:${Object.keys(teamStats2026).length===0?'#525a64':'#FDB927'};margin-top:4px;">${Object.keys(teamStats2026).length} teams loaded${Object.keys(teamStats2026).length>0 ? ` · updated ${formatStatsUpdatedAt(teamStats2026UpdatedAt)}` : ''}</div>
        </div>
      </div>
    </div>

    ${cards}`;
}

        <label style="font-size:9px;color:#d4dae3;letter-spacing:1px;text-transform:uppercase;font-weight:700;">Alt Books (optional)</label>
        <div style="display:flex;gap:4px;">
          <button type="button" onclick="toggleBookSettings()" id="alt-settings-toggle" title="Toggle which books show" style="background:transparent;border:1px solid #1f2733;color:#FDB927;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">⚙</button>
          <button type="button" onclick="toggleAltBulkMode()" id="alt-bulk-toggle" style="background:transparent;border:1px solid #1f2733;color:#FDB927;border-radius:4px;padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:0.5px;cursor:pointer;font-family:'Inter',sans-serif;">⚡ BULK</button>
        </div>
      </div>
      <!-- Settings panel: toggle which books show in the alt list -->
      <div id="book-settings-panel" style="display:none;margin-top:6px;background:#0d1117;border:1px solid #1f2733;border-radius:5px;padding:8px 10px;">
        <div style="font-size:10px;color:#a8b0bb;letter-spacing:0.5px;text-transform:uppercase;font-weight:700;margin-bottom:6px;">Show / hide books</div>
        <div id="book-settings-list" style="display:grid;grid-template-columns:1fr 1fr;gap:0 12px;"></div>
      </div>
      <!-- Bulk mode: one textarea, parse-on-blur -->
      <div id="modal-altbooks-bulk" style="display:none;margin-top:6px;">
        <textarea id="modal-altbooks-bulk-input" placeholder="fd -115  pp -110  pin -118  nv +105
or one per line — book shorthand + odds (+ optional line + ev%)" spellcheck="false"
          style="width:100%;min-height:70px;background:#0d1117;border:1px solid #55258377;color:#e2e8f0;border-radius:5px;padding:6px 8px;font-size:12px;font-family:'JetBrains Mono','Menlo',monospace;outline:none;resize:vertical;"></textarea>
        <button type="button" onclick="applyAltBulk()" style="margin-top:4px;background:#552583;border:none;color:#0d1117;border-radius:4px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;letter-spacing:0.5px;">APPLY</button>
      </div>
      <div id="modal-altbooks-list" style="margin-top:4px;display:flex;flex-direction:column;gap:3px;"></div>
    </div>
    <datalist id="alt-book-options">
      <option value="FanDuel"></option>
      <option value="Prop Builder"></option>
      <option value="DK (Courtside/Onyx)"></option>
      <option value="Fliff"></option>
      <option value="Novig"></option>
      <option value="ProphetX"></option>
      <option value="Bookmaker"></option>
      <option value="Pinnacle"></option>
      <option value="Bet105"></option>
    </datalist>

    <div id="modal-proj-display" style="margin-top:14px;"></div>
    <div id="modal-stake-preview"></div>
    <div id="modal-ev-preview" style="margin-top:6px;font-size:13px;font-weight:700;"></div>

    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeTrackModal()">Cancel</button>
      <button class="modal-btn-save" id="modal-save-btn" onclick="saveBet()">Track Bet</button>
    </div>
  </div>
</div>

<!-- QUICK GRADE OVERLAY -->
<div id="qg-overlay">
  <div id="qg-card">
    <div id="qg-progress"></div>
    <div id="qg-player"></div>
    <div id="qg-detail"></div>
    <div id="qg-proj"></div>
    <div class="qg-btns">
      <button class="qg-btn" id="qg-hit" onclick="qgGrade('hit')">HIT</button>
      <button class="qg-btn" id="qg-miss" onclick="qgGrade('miss')">MISS</button>
      <button class="qg-btn" id="qg-void" onclick="qgGrade('void')">VOID</button>
      <button class="qg-btn" id="qg-skip" onclick="qgNext()">SKIP</button>
    </div>
    <button id="qg-close-btn" onclick="closeQG()">Close</button>
  </div>
</div>

</body>
</html>
