<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Live.">
<meta name="theme-color" content="#1a1229">
<link rel="apple-touch-icon" href="live-icon.svg">
<link rel="manifest" href="manifest.json">
<title>Live Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1229;
    --card: #241a38;
    --border: #33254d;
    --green: #27c071;
    --green-dim: rgba(39,192,113,0.1);
    --red: #ff3b3b;
    --amber: #f5a623;
    --text: #ffffff;
    --sub: rgba(255,255,255,0.5);
    --font: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #120d1c; color: var(--text); font-family: var(--font); overscroll-behavior: none; }
  #app {
    background: var(--bg);
    min-height: 100vh;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: calc(32px + env(safe-area-inset-bottom));
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 8px;
    padding-top: calc(12px + env(safe-area-inset-top));
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-name { font-size: 18px; font-weight: 800; letter-spacing: -1px; color: var(--text); line-height: 1; }
  .logo-live-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); margin-left: 3px; vertical-align: middle;
    box-shadow: 0 0 6px var(--red), 0 0 12px rgba(255,59,59,0.4);
    animation: blink 1.4s ease-in-out infinite;
    position: relative; top: -1px;
  }
  .logo-dot  { color: var(--green); }
  .logo-tag  {
    font-size: 9px; font-weight: 600; color: var(--text);
    letter-spacing: 0.3px; text-transform: uppercase;
    border-left: 1px solid #2a2a2a; padding-left: 10px; white-space: nowrap;
  }
  .logo-tag-highlight {
    color: var(--green);
    animation: greenPulse 2.5s ease-in-out infinite;
  }
  @keyframes greenPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }
  .header-meta {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--green); font-weight: 600;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    transition: background 0.3s;
  }
  .sync-dot.stale { background: var(--amber); animation: none; }
  .sync-dot.live  { animation: blink 1.3s infinite; }
  #refresh-btn {
    background: none; border: none; color: var(--sub);
    font-size: 18px; cursor: pointer; padding: 4px; line-height: 1;
    transition: color 0.15s;
  }
  #refresh-btn.spinning { color: var(--green); animation: spin 0.7s linear infinite; }

  .league-strip {
    display: flex; gap: 20px; padding: 4px 16px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .league-strip::-webkit-scrollbar { display: none; }

  .league-chip {
    display: inline-flex; align-items: center; gap: 5px;
    cursor: pointer; user-select: none; flex: 0 0 auto;
    padding: 0; background: none; border: none;
  }
  .league-chip.empty { opacity: 0.3; }
  .chip-name {
    font-size: 13px; font-weight: 800; letter-spacing: 0.8px;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
    transition: color 0.15s;
  }
  .league-chip.active .chip-name { color: #fff; }
  .chip-count {
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3);
    transition: color 0.15s;
  }
  .league-chip.active .chip-count { color: rgba(255,255,255,0.6); }
  .chip-live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
    animation: blink 1.3s infinite;
  }

  /* ── DATE TOGGLE ── */
  .date-toggle {
    display: flex; gap: 4px;
    margin: 0 16px 10px;
  }
  .date-btn {
    flex: 1; padding: 7px 0; border-radius: 8px; border: 1.5px solid var(--border);
    background: transparent; color: rgba(255,255,255,0.4); font-family: var(--font);
    font-size: 11px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s;
  }
  .date-btn.active {
    border-color: var(--green); color: var(--green); background: var(--green-dim);
  }
  .status-strip {
    display: flex; align-items: center;
    margin: 0 16px 10px;
    background: transparent;
  }
  .stat-cell {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px 4px;
  }
  .stat-cell:last-child { border-right: none; }
  .stat-val { font-size: 22px; font-weight: 800; line-height: 1; color: var(--text); letter-spacing: -1px; }
  .stat-val.red    { color: var(--red); }
  .stat-val.amber  { color: var(--amber); }
  .stat-val.red.glowing {
    animation: redGlow 1.4s ease-in-out infinite;
  }
  @keyframes redGlow {
    0%,100% { text-shadow: 0 0 6px rgba(255,59,59,0.6), 0 0 14px rgba(255,59,59,0.3); }
    50%      { text-shadow: 0 0 2px rgba(255,59,59,0.2); }
  }
  .stat-label { font-size: 8px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }

  /* ── SECTION LABEL ── */
  .section-label {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px 6px;
  }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .section-dot.live  { background: var(--red); animation: blink 1.3s infinite; box-shadow: 0 0 8px var(--red); }
  .section-dot.soon  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .section-dot.sched { background: rgba(255,255,255,0.3); }
  .section-dot.final { background: rgba(255,255,255,0.2); }
  .section-name { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
  .section-n {
    font-size: 12px; font-weight: 900; color: #fff;
    background: rgba(255,255,255,0.12); padding: 1px 7px; border-radius: 20px;
  }
  .section-cd {
    font-size: 13px; font-weight: 900; color: var(--amber);
    font-variant-numeric: tabular-nums;
  }

  /* ── GAME ROWS ── */
  .games-list { display: flex; flex-direction: column; }
  .game-row {
    display: flex; align-items: center;
    padding: 8px 14px 8px 18px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    animation: fadein 0.18s ease;
    position: relative;
  }
  .game-row:last-child { border-bottom: none; }
  .game-row.live-row  { background: rgba(255,59,59,0.03); }
  .game-row.soon-row  { }
  .game-row::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2.5px;
    border-radius: 0 2px 2px 0;
  }
  .live-row::before  { background: var(--red); }
  .soon-row::before  { background: var(--amber); }
  .sched-row::before { background: transparent; }
  .final-row::before { background: transparent; }

  /* HIGH VALUE moment highlight */
  .game-row.hot-row {
    background: rgba(39,192,113,0.08) !important;
    box-shadow: inset 0 0 20px rgba(39,192,113,0.06);
  }
  .game-row.hot-row::before { background: var(--green) !important; box-shadow: 0 0 8px rgba(39,192,113,0.9), 0 0 16px rgba(39,192,113,0.4); }
  .hot-badge {
    font-size: 8px; font-weight: 800; color: var(--green);
    letter-spacing: 0.5px; text-transform: uppercase;
    white-space: nowrap; animation: greenPulse 1.8s ease-in-out infinite;
  }

  /* LOGOS */
  .logos { display: flex; flex-direction: column; gap: 7px; align-items: center; flex-shrink: 0; width: 28px; }
  .team-logo { width: 24px; height: 24px; object-fit: contain; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
  .team-logo.dim { opacity: 0.45; filter: grayscale(60%); }
  .logo-placeholder {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 7px; font-weight: 900; color: rgba(255,255,255,0.85);
  }

  /* TEAMS */
  .teams { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 7px; }
  .team-line { display: flex; align-items: center; gap: 5px; }
  .t-name {
    font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-transform: uppercase; line-height: 1;
  }
  .t-name.loser { color: #fff; font-weight: 800; }
  /* Record: same line as name, white, smaller */
  .t-rec { font-size: 9px; color: var(--text); font-weight: 600; flex-shrink: 0; white-space: nowrap; }

  /* SCORES */
  .scores { display: flex; flex-direction: column; gap: 7px; align-items: flex-end; flex-shrink: 0; }
  .t-score {
    font-size: 15px; font-weight: 800; color: var(--text);
    line-height: 1; min-width: 22px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .t-score.winner { color: #fff; }
  .t-score.loser  { color: #fff; }
  .t-score.blank  { color: rgba(255,255,255,0.3); font-size: 12px; }

  /* STATUS */
  .game-status {
    flex-shrink: 0; min-width: 54px; text-align: right;
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .gs-live    { font-size: 9px; font-weight: 800; color: var(--red); letter-spacing: 0.6px; }
  .gs-period  { font-size: 10px; font-weight: 700; color: var(--text); }
  .gs-clock   { font-size: 10px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .gs-break   { font-size: 9px; font-weight: 800; color: var(--amber); line-height: 1.3; }
  .gs-cd      { font-size: 14px; font-weight: 800; color: var(--amber); font-variant-numeric: tabular-nums; }
  .gs-time    { font-size: 10px; font-weight: 700; color: var(--text); }
  .gs-final   { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.5); letter-spacing: 0.5px; }

  /* league micro-label */
  .game-league {
    font-size: 8px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
    position: absolute; bottom: 4px; right: 14px; color: rgba(255,255,255,0.35);
  }
  .live-row  .game-league { color: rgba(255,59,59,0.6); }
  .soon-row  .game-league { color: rgba(245,166,35,0.6); }

  /* window highlight */
  /* win-highlight handled below with gradient */

  /* divider between teams — removed, use row gap instead */
  .teams-divider { display: none; }
  /* section separator */
  .section-sep { height: 1px; background: var(--border); margin: 10px 0 4px; }

  /* ── NEXT UP ROW ── */
  .next-up-row {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 16px 5px 20px;
    background: rgba(39,192,113,0.05);
    border-bottom: 1px solid var(--border);
  }
  .next-up-label { font-size: 8px; font-weight: 800; color: var(--green); letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
  .next-up-teams { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); flex: 1; text-transform: uppercase; letter-spacing: 0.3px; }
  .next-up-cd { font-size: 12px !important; color: var(--green) !important; }

  .mlb-sit { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .mlb-count { font-size: 10px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; margin-top: 2px; }
  .mlb-count span { color: rgba(255,255,255,0.5); margin-left: 4px; }

  /* MLB inline between teams */
  .mlb-inline {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 0;
  }
  .mlb-inline-count { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.6); font-variant-numeric: tabular-nums; }
  .mlb-bar-outs { display: flex; gap: 4px; align-items: center; }
  .out-dot { width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.25); }
  .out-dot.filled { background: var(--amber); border-color: var(--amber); }
  /* SVG diamond rendered inline — sized via width/height attrs */

  /* ── INSIGHT BAR ── */
  #insight-bar {
    margin: 0 16px 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid rgba(39,192,113,0.25);
    background: linear-gradient(135deg, rgba(39,192,113,0.08) 0%, rgba(39,192,113,0.02) 100%);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .insight-icon { font-size: 10px; flex-shrink: 0; margin-top: 3px; color: var(--green); font-weight: 900; }
  .insight-text { font-size: 12px; font-weight: 600; color: var(--text); line-height: 2; }
  .insight-text strong { font-weight: 700; }
  .time-pill {
    display: inline-block;
    border: 1.5px solid rgba(39,192,113,0.6);
    color: var(--green);
    background: linear-gradient(135deg, rgba(39,192,113,0.22) 0%, rgba(39,192,113,0.06) 100%);
    border-radius: 5px;
    padding: 1px 6px;
    font-weight: 800;
    font-size: 11px;
  }
  .team-pill {
    display: inline-block;
    border: 1.5px solid rgba(255,255,255,0.25);
    color: #fff;
    background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.04) 100%);
    border-radius: 5px;
    padding: 1px 6px;
    font-weight: 800;
    font-size: 11px;
  }
  .league-pill {
    display: inline-block;
    border: 1.5px solid rgba(245,166,35,0.5);
    color: var(--amber);
    background: linear-gradient(135deg, rgba(245,166,35,0.18) 0%, rgba(245,166,35,0.04) 100%);
    border-radius: 5px;
    padding: 1px 6px;
    font-weight: 800;
    font-size: 10px;
    letter-spacing: 0.3px;
  }

  /* win-highlight handled by green opportunity rows */


  #loading {
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px; gap: 14px;
  }
  .spinner {
    width: 28px; height: 28px; border: 2.5px solid #222;
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  #loading p { font-size: 13px; color: var(--sub); font-weight: 600; }
  .empty { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 13px; font-weight: 600; }

  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.25} }
  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes fadein { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">
    <span class="logo-name">Live<span class="logo-live-dot"></span></span>
    <span class="logo-tag">When to focus on <span class="logo-tag-highlight">live betting</span> today?</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="header-meta">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="last-updated">--:--</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:9px;font-weight:800;color:#fff;letter-spacing:0.5px">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        EAST COAST
      </span>
    </div>
    <button id="refresh-btn" onclick="fetchAll()" title="Refresh">↻</button>
  </div>
</header>

<!-- LEAGUE FILTER CHIPS -->
<div class="league-strip" id="league-strip">
  <!-- built dynamically -->
</div>

<!-- STATUS BAR -->
<div class="date-toggle">
  <button class="date-btn active" id="btn-today" onclick="switchDate(0)">Today</button>
  <button class="date-btn" id="btn-tomorrow" onclick="switchDate(1)">Tomorrow</button>
</div>

<div class="status-strip">
  <div class="stat-cell">
    <span class="stat-val red" id="sum-live">—</span>
    <span class="stat-label" id="label-live">Live</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val amber" id="sum-soon">—</span>
    <span class="stat-label" id="label-soon">Soon</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val" id="sum-today">—</span>
    <span class="stat-label" id="label-today">Today</span>
  </div>
  <div class="stat-cell">
    <span class="stat-val" id="sum-final">—</span>
    <span class="stat-label">Final</span>
  </div>
</div>

<div id="insight-bar" style="display:none"></div>

<div id="loading"><div class="spinner"></div><p>Loading today's games…</p></div>
<div id="content" style="display:none"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
const LEAGUE_CFG = {
  NBA:  { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard'  },
  WNBA: { url:'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba/scoreboard' },
  NFL:  { url:'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard'    },
  MLB:  { url:'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'    },
  NHL:  { url:'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard'      },
};
const SKIP_SEASON = new Set([1, 4]);
const SOON_MIN = 90;
const BREAK_KW = ['halftime','half time','between innings','end of inning',
  'intermission','end of 1st','end of 2nd','end of 3rd','end of 4th','break'];

let allGames = [];
let activeLeagues = new Set(Object.keys(LEAGUE_CFG));
let autoTimer = null, cdTimer = null;
let viewingDate = 0; // 0 = today, 1 = tomorrow

// ── DATE ─────────────────────────────────────────────────────────
function dateStr(offsetDays = 0) {
  const n = new Date();
  n.setDate(n.getDate() + offsetDays);
  return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}`;
}
function isViewingDay(iso) {
  const d = new Date(iso);
  const n = new Date();
  n.setDate(n.getDate() + viewingDate);
  return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchLeague(key, cfg) {
  try {
    const r = await fetch(`${cfg.url}?dates=${dateStr(viewingDate)}`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const st = d.season?.type?.id ?? d.leagues?.[0]?.season?.type?.id ?? 2;
    if (SKIP_SEASON.has(Number(st))) return [];
    return (d.events||[]).filter(ev=>isViewingDay(ev.date)).map(ev=>parseEvent(ev,key));
  } catch(e) { console.warn(key,e); return []; }
}

function parseEvent(ev, key) {
  const comp = ev.competitions?.[0]||{};
  const st   = ev.status||{};
  const stateType = st.type?.state||'pre';
  const stateDesc = st.type?.shortDetail||'';
  const clock = st.displayClock||'';
  const period = st.period||0;
  const competitors = comp.competitors||[];
  const home = competitors.find(c=>c.homeAway==='home')||competitors[0]||{};
  const away = competitors.find(c=>c.homeAway==='away')||competitors[1]||{};
  const startTime = new Date(ev.date);
  const diffMin = (startTime-Date.now())/60000;

  let bucket;
  if      (stateType==='in')              bucket='live';
  else if (stateType==='post')            bucket='final';
  else if (diffMin<=SOON_MIN&&diffMin>-5) bucket='soon';
  else                                    bucket='sched';

  const sit = comp.situation || {};

  const pt = c => {
    const t=c.team||{};
    return {
      abbr:  t.abbreviation||t.shortDisplayName||'?',
      logo:  t.logo||'',
      color: t.color?'#'+t.color:'#333',
      score: parseInt(c.score||0),
      record:c.records?.[0]?.summary||'',
    };
  };
  return {
    id:ev.id, league:key, bucket, stateType, stateDesc, clock, period, startTime, diffMin,
    home:pt(home), away:pt(away),
    sit: {
      onFirst:  sit.onFirst  || false,
      onSecond: sit.onSecond || false,
      onThird:  sit.onThird  || false,
      balls:    sit.balls    ?? null,
      strikes:  sit.strikes  ?? null,
      outs:     sit.outs     ?? null,
      batter:   sit.batter?.displayName || '',
      pitcher:  sit.pitcher?.displayName || '',
    }
  };
}

let lastFetchMs = 0;
let clockTimer = null;

function startLiveClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  document.getElementById('last-updated').textContent =
    new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

  // Mark dot as stale if data is >90s old with live games, or >6min otherwise
  const age = Date.now() - lastFetchMs;
  const hasLive = allGames.some(g => g.bucket === 'live');
  const dot = document.getElementById('sync-dot');
  if (lastFetchMs === 0) return;
  if ((hasLive && age > 90000) || (!hasLive && age > 360000)) {
    dot.classList.add('stale');
    dot.classList.remove('live');
  } else if (hasLive) {
    dot.classList.add('live');
    dot.classList.remove('stale');
  } else {
    dot.classList.remove('live', 'stale');
  }
}

async function fetchAll() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  const results = await Promise.all(Object.entries(LEAGUE_CFG).map(([k,c])=>fetchLeague(k,c)));
  allGames = results.flat();
  lastFetchMs = Date.now();
  btn.classList.remove('spinning');

  // Reset dot to healthy
  const dot = document.getElementById('sync-dot');
  dot.classList.remove('stale');
  const hasLive = allGames.some(g => g.bucket === 'live');
  hasLive ? dot.classList.add('live') : dot.classList.remove('live');

  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
  buildChips();
  render();
  startCd();
  startLiveClock();

  // Only auto-refresh for today
  if (viewingDate === 0) {
    if (autoTimer) clearTimeout(autoTimer);
    const hasSoon = allGames.some(g => g.bucket === 'soon');
    const interval = hasLive ? 30000 : hasSoon ? 120000 : 300000;
    autoTimer = setTimeout(fetchAll, interval);
  }
}

// ── CHIPS ─────────────────────────────────────────────────────────
function buildChips() {
  const strip = document.getElementById('league-strip');
  const leagueKeys = Object.keys(LEAGUE_CFG);

  // Sort leagues: ones with games today first (by count desc), then empty ones
  const sorted = [...leagueKeys].sort((a, b) => {
    const aCount = allGames.filter(g => g.league === a).length;
    const bCount = allGames.filter(g => g.league === b).length;
    if (aCount === 0 && bCount === 0) return 0;
    if (aCount === 0) return 1;
    if (bCount === 0) return -1;
    return bCount - aCount;
  });

  const allKeys = ['ALL', ...sorted];

  strip.innerHTML = allKeys.map(key => {
    const games  = key==='ALL' ? allGames : allGames.filter(g=>g.league===key);
    const liveN  = games.filter(g=>g.bucket==='live').length;
    const total  = games.length;
    const isActive = key==='ALL' ? activeLeagues.size===Object.keys(LEAGUE_CFG).length : activeLeagues.has(key);
    const isEmpty  = total === 0;

    const dot = liveN > 0 ? `<span class="chip-live-dot"></span>` : '';
    const countLabel = liveN > 0
      ? `<span class="chip-count"><span style="color:var(--red);font-weight:800">${liveN}</span><span style="color:rgba(255,255,255,0.3)">/${total}</span></span>`
      : total > 0 ? `<span class="chip-count">${total}</span>` : '';

    return `<div class="league-chip${isActive?' active':''}${isEmpty?' empty':''}" data-league="${key}" onclick="toggleLeague(this)">
      ${dot}<span class="chip-name">${key}</span>${countLabel}
    </div>`;
  }).join('');
}

// ── FILTER ────────────────────────────────────────────────────────
function toggleLeague(el) {
  const l = el.dataset.league;
  if (l==='ALL') {
    const allOn = activeLeagues.size===Object.keys(LEAGUE_CFG).length;
    allOn ? activeLeagues.clear() : Object.keys(LEAGUE_CFG).forEach(k=>activeLeagues.add(k));
  } else {
    activeLeagues.has(l) ? activeLeagues.delete(l) : activeLeagues.add(l);
  }
  buildChips();
  render();
}

// ── RENDER ────────────────────────────────────────────────────────
function render() {
  const f = allGames.filter(g=>activeLeagues.has(g.league));
  const ord = ['NBA','WNBA','NFL','MLB','NHL'];
  const byL = (a,b)=>ord.indexOf(a.league)-ord.indexOf(b.league);

  // Live: newest start first (most time remaining)
  const live  = f.filter(g=>g.bucket==='live').sort((a,b)=>b.startTime-a.startTime);
  // Soon: soonest first
  const soon  = f.filter(g=>g.bucket==='soon').sort((a,b)=>a.diffMin-b.diffMin);
  const sched = f.filter(g=>g.bucket==='sched').sort((a,b)=>a.startTime-b.startTime);
  const final = f.filter(g=>g.bucket==='final').sort(byL);

  document.getElementById('sum-live').textContent  = live.length  || '0';
  document.getElementById('sum-soon').textContent  = soon.length  || '0';
  document.getElementById('sum-today').textContent = (live.length+soon.length+sched.length) || '0';
  document.getElementById('sum-final').textContent = final.length || '0';

  const liveEl = document.getElementById('sum-live');
  const isTmrw = viewingDate === 1;
  if (isTmrw) {
    liveEl.classList.remove('glowing');
    liveEl.style.opacity = '0.3';
  } else {
    liveEl.style.opacity = '';
    live.length > 0 ? liveEl.classList.add('glowing') : liveEl.classList.remove('glowing');
  }

  const out = document.getElementById('content');

  if (!f.length) {
    out.innerHTML = '<div class="empty">No games today for selected leagues.</div>';
    return;
  }

  renderInsight(f);
  let html = '';

  // Update labels based on viewing date
  document.getElementById('label-live').textContent  = isTmrw ? 'Scheduled' : 'Live';
  document.getElementById('label-soon').textContent  = isTmrw ? 'Early'     : 'Soon';
  document.getElementById('label-today').textContent = isTmrw ? 'Tomorrow'  : 'Today';

  if (live.length)  html += section('live',  isTmrw ? 'Scheduled'      : 'Live',          live,  liveRow);
  if (soon.length)  html += section('soon',  isTmrw ? 'Early Games'    : 'Starting Soon', soon,  soonRow);
  if (sched.length) html += section('sched', isTmrw ? 'Later Tomorrow' : 'Later Today',   sched, schedRow);
  if (final.length) html += section('final', 'Final',                                     final, finalRow);
  out.innerHTML = html;
}

function section(cls, title, games, fn) {
  const nextMs = (cls === 'soon' || cls === 'sched')
    ? Math.min(...games.map(g => g.startTime.getTime()))
    : null;
  const extraHtml = nextMs
    ? `<span class="section-cd gs-cd" data-ms="${nextMs}">--:--</span>`
    : '';

  return `<div class="section-sep"></div>
  <div class="section-label">
    <div class="section-dot ${cls}"></div>
    <span class="section-name">${title} · ${games.length}</span>
    ${extraHtml}
  </div>
  <div class="games-list">${games.map(fn).join('')}</div>`;
}

// ── STATUS HELPERS ────────────────────────────────────────────────
function gameStatus(g) {
  const desc=g.stateDesc||'', lo=desc.toLowerCase();
  const isBreak=BREAK_KW.some(b=>lo.includes(b));
  if (desc) return {label:desc, isBreak};
  if (!g.period) return {label:'',isBreak:false};
  let label;
  if (g.league==='MLB') label=`${ord(g.period)} Inn`;
  else if (g.league==='NHL') label=`${ord(g.period)} Per`;
  else label=`${ord(g.period)} Qtr`;
  return {label, isBreak:false};
}
function ord(n){const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);}

// ── LOGO HELPERS ──────────────────────────────────────────────────
function logo(team, dim=false) {
  const cls=`team-logo${dim?' dim':''}`;
  if (team.logo) return `<img class="${cls}" src="${team.logo}" alt="${team.abbr}" onerror="this.outerHTML=ph('${team.abbr}','${team.color.replace('#','')}')">`;
  return ph(team.abbr, team.color.replace('#',''));
}
function ph(abbr,color){return `<div class="logo-placeholder" style="background:#${color}1a;border:1px solid #${color}33">${abbr.slice(0,3)}</div>`;}

// ── COUNTDOWN ─────────────────────────────────────────────────────
function startCd(){
  if (cdTimer) clearInterval(cdTimer);
  cdTimer=setInterval(tickCd,1000); tickCd();
}
function tickCd(){
  document.querySelectorAll('[data-ms]').forEach(el=>{
    const diff=parseInt(el.dataset.ms)-Date.now();
    if (diff<=0){el.textContent='NOW';return;}
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    el.textContent=h>0?`${h}h ${String(m).padStart(2,'0')}m`:`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  });
}

// ── INSIGHT BAR ──────────────────────────────────────────────────
const HALF_OFFSET = { MLB:0.45, WNBA:0.48, NBA:0.48, NFL:0.48, NHL:0.48 };

function renderInsight(games) {
  const bar = document.getElementById('insight-bar');
  const nowMs = Date.now();
  const tips = [];

  const fmt = ms => {
    const d = new Date(ms);
    const h = d.getHours();
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
  };

  // 1. Current high-value live games (today only)
  if (viewingDate === 0) {
    const hotGames = games.filter(g => g.bucket === 'live' && highValueLabel(g));
    hotGames.forEach(g => {
      const lbl = highValueLabel(g);
      tips.push({ icon:'·', text:`<span class="team-pill">${g.away.abbr}/${g.home.abbr}</span> <span class="league-pill">${g.league}</span> ${g.away.score}-${g.home.score} · ${lbl}` });
    });
  }

  // 2. 2nd half projections — all upcoming games, no time limit for tomorrow
  const upcoming = viewingDate === 0
    ? games.filter(g => g.bucket === 'sched' || g.bucket === 'soon')
    : games.filter(g => g.bucket !== 'final');

  const halfEvents = [];
  upcoming.forEach(g => {
    const halfMs = (HALF_OFFSET[g.league]||0.48) * (AVG_DURATION[g.league]||150) * 60000;
    const halfTime = g.startTime.getTime() + halfMs;
    if (viewingDate === 1 || halfTime > nowMs) {
      halfEvents.push({ g, halfTime });
    }
  });

  // Live games approaching 2nd half (today only)
  if (viewingDate === 0) {
    games.filter(g => g.bucket === 'live').forEach(g => {
      const halfMs = (HALF_OFFSET[g.league]||0.48) * (AVG_DURATION[g.league]||150) * 60000;
      const estStart = nowMs - Math.max(0, g.period-1) * (AVG_DURATION[g.league]||150)/4 * 60000;
      const halfTime = estStart + halfMs;
      if (halfTime > nowMs && halfTime < nowMs + 90*60000 && !highValueLabel(g)) {
        halfEvents.push({ g, halfTime });
      }
    });
  }

  // Group by 20-min buckets
  halfEvents.sort((a,b) => a.halfTime - b.halfTime);
  const BUCKET_MS = 20 * 60000;
  const groups = [];
  let cur = null;
  for (const ev of halfEvents) {
    if (!cur || ev.halfTime - cur.anchorMs > BUCKET_MS) {
      cur = { anchorMs: ev.halfTime, events: [ev] };
      groups.push(cur);
    } else {
      cur.events.push(ev);
    }
  }

  groups.forEach(grp => {
    const evs = grp.events;
    const t = fmt(grp.anchorMs);
    const icon = evs[0].icon;

    if (evs.length === 1) {
      const {g} = evs[0];
      tips.push({ icon:'·', time: grp.anchorMs, text:`<span class="team-pill">${g.away.abbr}/${g.home.abbr}</span> <span class="league-pill">${g.league}</span> 2nd half ~ <span class="time-pill">${t}</span>` });
    } else {
      const byL = {};
      evs.forEach(({g}) => { (byL[g.league]||=[]).push(g); });
      const parts = Object.entries(byL).map(([l,gs]) => `<span class="league-pill">${gs.length} ${l}</span>`).join(' ');
      tips.push({ icon:'·', time: grp.anchorMs, text:`${parts} hit 2nd half ~ <span class="time-pill">${t}</span>` });
    }
  });

  if (!tips.length) { bar.style.display='none'; return; }

  bar.style.display = 'block';
  bar.innerHTML = tips.map((t,i) => `
    <div style="display:flex;gap:8px${i<tips.length-1?';margin-bottom:7px':''}">
      <span class="insight-icon">${t.icon}</span>
      <span class="insight-text">${t.text}</span>
    </div>`).join('');
}

// ── BASEBALL DIAMOND SVG ── (see liveRow for new implementation)


function outDots(outs) {
  return [0,1,2].map(i => `<div class="out-dot${i < outs ? ' filled' : ''}"></div>`).join('');
}

function diamondSvg(sit, size=36) {
  const ON  = 'var(--amber)';
  const OFF = 'rgba(255,255,255,0.1)';
  const S = size, C = size/2;
  const r = size * 0.16;
  const base = (cx, cy, on) =>
    `<rect x="${cx-r}" y="${cy-r}" width="${r*2}" height="${r*2}" transform="rotate(45,${cx},${cy})" fill="${on?ON:OFF}" stroke="${on?'rgba(245,166,35,0.5)':'rgba(255,255,255,0.05)'}" stroke-width="0.5"/>`;
  const off = size * 0.3;
  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
    ${base(C,      off,      sit.onSecond)}
    ${base(S-off,  C,        sit.onFirst)}
    ${base(off,    C,        sit.onThird)}
    ${base(C,      S-off,    false)}
  </svg>`;
}

// ── HIGH VALUE DETECTION ──────────────────────────────────────────
function highValueLabel(g) {
  if (g.stateType !== 'in') return null;
  const desc = (g.stateDesc || '').toLowerCase();
  const period = g.period || 0;
  const diff = Math.abs(g.away.score - g.home.score);
  const tied  = diff === 0;
  const close = g.league === 'MLB'  ? diff <= 1 :
                g.league === 'NHL'  ? diff <= 1 :
                g.league === 'NFL'  ? diff <= 7 :
                diff <= 5; // NBA/WNBA

  // Overtime / extra innings — must be explicit
  if (g.league === 'MLB' && period > 9) return 'Extra Innings';
  if (['NBA','WNBA'].includes(g.league) && period > 4) return 'OT';
  if (g.league === 'NHL' && period > 3) return 'OT';
  if (g.league === 'NFL' && period > 4) return 'OT';

  // MLB — 5th inning and beyond
  if (g.league === 'MLB') {
    const sit = g.sit || {};
    const runnersOn = sit.onFirst || sit.onSecond || sit.onThird;
    const scoringPos = sit.onSecond || sit.onThird;
    const outs = sit.outs ?? null;
    const highLeverage = runnersOn && (outs === 2 || scoringPos);

    if (period >= 9) return tied ? 'Tied Late' : close ? 'Close Late' : null;
    if (period >= 7) {
      if (tied && highLeverage) return 'Tied + Runners';
      if (tied) return 'Tied';
      if (close && highLeverage) return 'Close + Runners';
      if (close) return 'Close Game';
      return null;
    }
    if (period >= 5) {
      if (tied && highLeverage) return 'Tied + Runners';
      if (close && scoringPos && outs === 2) return 'Close + 2 Outs';
      return null;
    }
    return null;
  }

  if (['NBA','WNBA'].includes(g.league)) {
    if (period >= 4 && tied) return 'Tied';
    if (period >= 4 && close) return 'Close Game';
    if (period >= 3 && tied) return 'Tied';
    return null;
  }

  if (g.league === 'NFL') {
    if (period >= 4 && tied) return 'Tied';
    if (period >= 4 && close) return 'Close Game';
    if (period >= 3 && tied) return 'Tied';
    return null;
  }

  if (g.league === 'NHL') {
    if (period >= 3 && tied) return 'Tied';
    if (period >= 3 && close) return 'Close Game';
    if (period === 2 && tied) return 'Tied';
    return null;
  }

  return null;
}

function liveRow(g) {
  const {label,isBreak}=gameStatus(g);
  const sit = g.sit;
  const hasMLBSit = g.league === 'MLB' && !isBreak && sit.balls !== null;
  const hotLabel = highValueLabel(g);
  const isHot = !!hotLabel;

  let statusHtml;
  if (g.league !== 'MLB') {
    statusHtml = isBreak
      ? `<span class="gs-break">${label}</span>`
      : `<span class="gs-live">LIVE</span>
         ${label?`<span class="gs-period">${label}</span>`:''}
         ${g.clock&&!label.includes(g.clock)?`<span class="gs-clock">${g.clock}</span>`:''}`;
  } else {
    statusHtml = isBreak
      ? `<span class="gs-break">${label}</span>`
      : `<span class="gs-live">LIVE</span>${label?`<span class="gs-period">${label}</span>`:''}`;
  }

  const midRow = hasMLBSit
    ? `<div class="mlb-inline">${diamondSvg(sit,28)}<span class="mlb-inline-count">${sit.balls}-${sit.strikes}</span><div class="mlb-bar-outs">${outDots(sit.outs)}</div></div>`
    : `<div class="teams-divider"></div>`;

  return `<div class="game-row live-row${isHot?' hot-row':''}" data-gameid="${g.id}">
    <div class="logos">${logo(g.away)}${logo(g.home)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name">${g.away.abbr}</span>${g.away.record?`<span class="t-rec">${g.away.record}</span>`:''}</div>
      ${midRow}
      <div class="team-line"><span class="t-name">${g.home.abbr}</span>${g.home.record?`<span class="t-rec">${g.home.record}</span>`:''}</div>
    </div>
    <div class="scores">
      <span class="t-score">${g.away.score}</span>
      ${hasMLBSit?`<span class="t-score" style="visibility:hidden">·</span>`:''}
      <span class="t-score">${g.home.score}</span>
    </div>
    <div class="game-status">
      ${isHot?`<span class="hot-badge">${hotLabel}</span>`:''}
      ${statusHtml}
    </div>
    <span class="game-league">${g.league}</span>
  </div>`;
}

function soonRow(g) {
  return `<div class="game-row soon-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away)}${logo(g.home)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name">${g.away.abbr}</span>${g.away.record?`<span class="t-rec">${g.away.record}</span>`:''}</div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name">${g.home.abbr}</span>${g.home.record?`<span class="t-rec">${g.home.record}</span>`:''}</div>
    </div>
    <div class="scores">
      <span class="t-score blank">—</span>
      <span class="t-score blank">—</span>
    </div>
    <div class="game-status">
      <span class="gs-cd" data-ms="${g.startTime.getTime()}">--:--</span>
      <span class="gs-time">${g.startTime.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span>
    </div>
    <span class="game-league">${g.league}</span>
  </div>`;
}

function schedRow(g) {
  return `<div class="game-row sched-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away)}${logo(g.home)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name">${g.away.abbr}</span></div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name">${g.home.abbr}</span></div>
    </div>
    <div class="scores">
      <span class="t-score blank">—</span>
      <span class="t-score blank">—</span>
    </div>
    <div class="game-status">
      <span class="gs-cd" data-ms="${g.startTime.getTime()}">--:--</span>
      <span class="gs-time">${g.startTime.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}</span>
    </div>
    <span class="game-league">${g.league}</span>
  </div>`;
}

function finalRow(g) {
  const aW=g.away.score>g.home.score, hW=g.home.score>g.away.score;
  return `<div class="game-row final-row" data-gameid="${g.id}">
    <div class="logos">${logo(g.away,!aW)}${logo(g.home,!hW)}</div>
    <div class="teams">
      <div class="team-line"><span class="t-name${aW?'':' loser'}">${g.away.abbr}</span></div>
      <div class="teams-divider"></div>
      <div class="team-line"><span class="t-name${hW?'':' loser'}">${g.home.abbr}</span></div>
    </div>
    <div class="scores">
      <span class="t-score${aW?' winner':' loser'}">${g.away.score}</span>
      <span class="t-score${hW?' winner':' loser'}">${g.home.score}</span>
    </div>
    <div class="game-status"><span class="gs-final">FINAL</span></div>
    <span class="game-league">${g.league}</span>
  </div>`;
}

function switchDate(offset) {
  if (viewingDate === offset) return;
  viewingDate = offset;
  document.getElementById('btn-today').classList.toggle('active', offset === 0);
  document.getElementById('btn-tomorrow').classList.toggle('active', offset === 1);
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('content').style.display = 'none';
  document.getElementById('insight-bar').style.display = 'none';
  if (autoTimer) clearTimeout(autoTimer);
  fetchAll();
}

const AVG_DURATION = { NBA:155, WNBA:135, NFL:210, MLB:165, NHL:160 };

fetchAll();
